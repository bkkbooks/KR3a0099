  - {type: page-break, offset: 0, content: '', id: KR3a0099_WYG_002-1a, image: WYG0717/WYG0717-0282a.png}
body:
  text: 榕壇問業卷二明黄道周撰甲戌六月二日余以兒子痁未還山諸友約為再㑹時在榕壇者四十八人唐伯玉蘇伯韡阮霽皇唐君瓚盧孝登王豐功魏伉侯戴石星以家務見謝凡四十人至於㑹次秋水曹公旹以莆李視府篆攝衣升堂謁夫子像畢下堦揖諸生坐定問今日講論何章某請公祖發皇大義推譲久之某云諸生讀書泛泛言大學中庸大學中自然以至善為要歸格物致知為首義只是中庸兩字單舉名篇於中和首義又别著眼此處尚未理㑹如何得開門見山曹公應聲云庸者用也中和兩字只是日用當然大舜所謂用中與聖門致中皆實有下手處以此與大學一様著眼某作禮云賴有公祖開發使諸生豁然不然舎和趣庸又成贅義曹公云正不知次章如何便説中庸不説和字某云先輩只教人看未發前氣象和自庸得不消看了且如喜怒哀樂是庸常有的直做到天地位萬物育亦是尋常事業無甚光怪只是未發前看得不同耳曹公云未發前畢竟如何某曰只是戒慎恐懼且是君子小人在中庸中了無分别只有戒懼與無忌憚便天淵之别了曹公云如此看時中字還是一是二某未觧曹公云如時時守中與時措之宜此是一是二某云聖門喫𦂳入手處只在慎獨自不覩聞以至覩聞自未發以至已發隱㣲顯見何時離得中字何時分破得中字聖門不把和字硬對正是聖門明眼明手如小人便要極通方隨時變化以此於中庸上看麤了曹公云如此看時字便在隱㣲顯見未發已發處透得分明致用極大如小人但説得用不得也某為歛袵者久之某見人厭薄程朱於時中兩字看不明白欲於是日䜿義却念前日强恕求仁之義講究未透聖門本領只是明善求仁求仁工夫看不分明驟説中字便與空門鬬閙了説静説敬入手直捷亦未能於明善求仁處領得完全因曹公問題次應云聖門中尚有疑義如克伐怨欲不行章極是難看也仁字如是難知夫子不合以是强人如是易為諸子不合都做不到且説克伐怨欲四字已是上根人下手不在塵腐路頭令此處刋除未開仁印教人如何用工譬如驕兒戾僕不放出門雖是小可愛養中才亦從此做去難道存遏懲窒便是一路清寜也但不知顔子不遷不貳比此如何耳曹公云胡安國學曾到此試與諸賢一叅時坐久曹公以堂事且去某欲曹公更命一題公固推讓因於聖像前探得桃夭三段公謂聖賢談話動便引詩以此開益後學猶禮樂之有笙簧諸賢欣然承受某私欲吾黨講課自是韋布素心一旦動煩有司不獨鹿豕改色亦恐有人傍門穿竇因送曹公次囘揖諸賢云程叔子極是好人又經濓溪鎔鑄去之十年見獵猶心動僕今日見官人來講論便覺㣲有名心諸先生幸相箴規勿為急燭動火也時日未午同諸賢過紫陽祠謁畢復坐舉題云聖賢相引只是無盡工夫大禹不自滿假求仁無怨欲仁不貪如就克伐怨欲上消磨光淨去仁何遠只怕他執煞認着謂招降殺賊便是天下太平也如此章是聖門證仁第一大義與子路不忮不求子貢無驕無諂一様叅看今人都説不行四者還有四者根在又説在外面打叠不在裏面磨礲難道四者根株尚在外面乎又道不行底象如壅水如截瘧難道壅水截瘧夫子還説是難事也正如禹周驅逐鳥獸益稷粒食生民一段仁心還湏千年與舜文合證且勿説殺賊招降便是盜息民安即使比戸可封難説聖心便了也諸賢云此為首義如次義還是桃夭三章不某云我輩今日雖是課義實是探討聖賢消息某初來要明中庸密義已被曹公㸃破得出畢竟此中尚有一事如中庸其至中庸不可能此中庸字豈是皮膚如何要擇且如擇乎中庸此手豈錯如何又補箇一善出來聖賢心眼精微只看予智兩章針鋒細對擇執關頭指㸃不漏即此知止格物做到舜顔上去無復文章何况二義三義耶諸賢於是命筆以克伐章為第一得善句為第二桃夭章為第三是日暑氣蒸極諸賢集坐搆思忘疲某俯數廊柱唯有自愧晚刻吳雲赤先完兩義雲赤意與某水乳俱合既而諸賢首義以次畢投朱君薦蕭然𤣥引最得聖門進一步法謝有懷趙與蓮居常甚敏是日亦湛思良久乃出唯陳明師浩然吐所欲言於題中疑難掀摲殆盡某拈明師作對諸賢云凡聖門論仁常有兩義一義是密藏一義是進法密藏者對子淵子弓説克復敬恕當面認出内聖外王白地明光進法者對武伯子張説千乗百乗説清説忠背地藏着實用真體金針不度唯對子貢説立説逹挽却當中耳凡聖賢皆當中作出克伐怨欲不行已從當中挽住却未嘗洞中紅心如射箭者手强目髙時時穿透杆外此是博施濟衆的難事弓强手柔時時穿貼紅邉此是不行四私的難事然穿貼紅邉與穿透杆外者手地不同所以一挽之使近一慰之使進異日此義恐不明白纔對子張説能行五者天下為仁能行五者不行四私所謂抽他銅錢與他元寶也不行四私説不知其仁勿作四非禮反説天下歸仁所謂銷他財寶白地明光也諸賢於先難字都看得明白只未把聖門歴歴談仁處一一融㑹成一大塊陳明師似嘗看過却體貼透亮諸賢謂都看過只是夫子説不知便虛涵将去使人自㑹耳洪尊光心地最明淨於此處都看得圓成黄共爾看得圓成都於難字上體㑹大抵此題謂有難字替不得仁字有仁字把不住難字兩下投刀使强力敏手苦心攅眉者一齊心虛跕脚不住如顔夫子博約前後鑚仰髙堅何等艱苦難道心地上做起工夫便容易也所以顔子一箇禮字當子弓兩箇敬恕子弓兩箇敬恕當子張五箇恭寛信敏惠不是理路不同正是稟受領略各别若要一處抖擻特地證成便向旁門喫棒乞食去也是日諸賢各極研㑹楊峻人唐君璋鄭枕石張鎮樸人自豎義斐然足讃唯盧君復張徳聲尹孟寳以苦暑不及完篇翼日乃證次義勗之元屛鎮樸翼日過寓中問首次二義要㑹孰難某云此俱是聖門中第一要義克伐題如劉季入關決定要王仰視宮闕俯顧組璽無一不是王者與留侯商量封府庫圖籍俛首謝項此段精神畢竟與武湯夐别擇善題如武王入洛俘寳萬千到頭只是一篇洪範難之與仁説二既不得二中庸之與一善説一又不得一一邉是入海探珠一邉是登天捫斗纔着一毫麤心便是萬山突礙看顔子得一善後猶是拳拳服膺則聖藏中豈有合下領法只管手下入木三分不要擡頭虛放徑尺也桃夭三章無甚奥義然既當壇與曹公拈出便多作者鄒定基不作次義只拈桃夭之篇與楊玉宸同意復貽書見問云擇乎中庸得一善此善即至善也一字與中庸各何處下落若别有下落道不得中庸不可能也某云此事當日説之已明定基未曽面話且如中庸其至乎不是一善那得至來正謂擇至庸者不得一善所以民鮮能久矣虞廷學問要從精一説到執中若無精一豈有中字要截得來定基又問顔子執擇都在膺上博約都在我上克復都在已上原思克伐怨欲只見克己一邉把繇己章看不見了某云定基看顔子瞧着兩邉耶已字如有兩邊當如月蝕一邊去黒一邊生明迨其明時邊背安在且如克己定基尚謂未仁耶定基云不行與克己畢竟如何分别某云克復消息正如月蝕還明不行消息正如雲霧不興呌月蝕還明自家信得天下人亦信得呌雲霧不興自家把不住鬼神亦把不住也張鎮樸因問前日説不行章有兩義都是無盡義如何叅透某云何䖏看是有盡無盡鎮樸云難亦無盡仁亦無盡是無盡義霧不蔽山雲不蝕月是有盡義某云賢自叅會得透如論體者月明山蒼與雲霧了不相涉如論工者邊暗邊明各隨天下所見何䖏得有盡義耶翼日趙希五又問夫子教顔囘克復教仲弓敬恕教樊遲先難至原思獨云為難仁則不知豈分量不同立教亦異耶某云此事已曽講過不復須疑希五云考亭説克復是乾道敬恕是坤道作何分曉某云猶沈潛剛克髙明柔克耳難道樊遲原思一是屯道一是䝉道也希五云世云克己是提宗不行是對治如何某云提宗如服氣還丹對治如禁葷斷酒兩事細叅有何分别若是仁人只得呼吸尋常與天同運涂爾虞云先難後獲所獲云何如可謂難更當何獲未識攻苦休歇先後放下一齊俱有抑一齊俱無耶周季侯云約法三章少不得垓下一戰其義有可商不某云此則不同垓下一戰只為間道入關若使前途倒戈只得放牛牧馬豈有遏劉耆定又須翦伐一塲只是朽馭上頭戰兢無盡一心安穩難事又來堯舜相對再不説天下太平且及時為樂也林非著又問天下太平與歸仁一様氣象在邦無怨在家無怨亦是小康克伐怨欲不行可是分疆畫守自保城池不某云正是滕薛小邦亦行得王道惜他不行難道效死勿去亦是王者之師楊玉宸是日首義已先完取去某不復憶因問玉宸昨日意旨如何玉宸云顔之克復憲之不行講觧紛紛以天宰所見則顔有復禮在憲力求去克伐怨欲畢竟有頭腦無頭腦之别某憶前期黄共爾嘗問克己復禮禮是何物未及裁答言下憬然因問玉宸復禮是頭腦此頭腦安頓何處玉宸亦憬然某云無復非禮便是禮了此禮字更無可説譬如日出無不明處便是明了不消説明是日出也玉宸云日出便明此是頭腦未明要日出此是未有頭腦耳某云如賢説極是但知雲霧風雷日月亦自在但要吹盡油燈天雞自啼東方漸白耳呂而徳因問如此全是景候昔香巖童子問溈山的的大意溈山云我説不干汝事巖後因擊竹有悟禮謝溈山云當時若與説破豈有今日不審原思景候到時又是如何某云吾道則無此法夫子對曽子説吾道對子貢説予一貫明明呈身見顔囘勞苦直接他文禮路上去見子貢施濟直挽他立逹路上來何嘗看人自啼自静只是前頭説難説獲説為之難後來説易説簡説易簡而理得要人此間探討尋求得箇真歸宿不漫下工夫也外道只管虛虛聞聲應響如心風兒切勿靠信周房仲當時亦問夫子以乾坤兩義提出克復敬恕至如成卦提出虛字繫辭又提出寂字老之清淨佛之妙明皆從此出今日如何説不靠信得他某云寂感虛受此是世間人事神明一定道理豈是佛老割據得去又豈是夫子隂隲䕶他且如仁字一字是夫子特呼出來為五經玉璽任他説慈説捨説果説報説秘密妙義何嘗有一字頂戴得去一字滲破得來即如克伐怨欲四字隨他五隂六塵諸垢淨相包裹備盡此處斷除夫子猶未許他仁字何况黒白雌雄之間鄭孟儲極是湛深人尚有此意亦云談到心性上去便在乾竺𤣥中某云何處見在他𤣥中孟儲云譬如無意必固我不行克伐怨欲此中磨勘逾磨逾細便覺空藏是箇盡頭某云正是此處為他救命為他下藥如荷蕢一流人夫子直曰果哉末難此箇難字是他瞑眩金丹古今豈有不格一物能明萬物不盡已性能盡物性的道理如是一路掃除便成透亮試看日月星辰豈是掃除透亮得來如説磨硏淨盡便與空隣譬如骨角玉石千倍下工只期無憾豈有切磋琢磨直到絶無纔稱明了此一種書晦庵諸老辨之已熟我們再不消説朱季乂又問心性兩字是聖門常談語孟多間稱之者大學言心獨不言性中庸言性竝不言心豈修齊治平許大事業皆從心造不從性造參贊位育許大學問皆繇性造不從心造歟抑心性是一是二吾儒所云存心養性與老氏修心鍊性釋氏明心見性遠近異同歟某云此是賢考究來問的抑是賢謄録來問的如考究來問者某曽講過諸賢偹知如謄録來問者想先輩自有文章也季乂云是俊記得俊初來實未聞説某云看頭日格物明善意義自曉是日剖析斯義於制私一路不入拘儒不墜佛老賴諸賢長助實多而次藝發皇在諸賢心上實未盡暢因問尤詹茹云擇乎中庸此中庸是散見天下的抑是環集吾心的得一善是中庸融㑹的是中庸揀選的詹茹云顔夫子與大舜一様聰明一様擇法問察之下兩端盡融如食知味如行得寶何由窺測得他某云顔囘亦是人耳就陋巷絃誦上體貼如何便到虞廷上事詹茹云虞廷深山想與陋巷一様工夫某云賢説得好孟夫子最善看書顔囘在陋巷擇得一善便拳拳服膺此是舎之則藏一路虞舜在深山聞得一善便沛然若決江河此是用之則行一路詹茹云如此則得一善不消看到至善上去也某云此則不同中到庸處如銀出火鍊用熟成得一善如丹頭㸃就百寶所宗且如人倫方員要有至極得一聖人規矩握要所㑹自然不同譬如一般規矩亦有極精極㣲工夫所謂精以致一也詹茹云然則顔子已到知止能得地位某云古人學問千聖同條静安生慮雖在吾輩何敢不勉黄君琬隨問中字既是未發一善字更是何物李延平勸人觀未發氣象此觀字即是擇字否既於無可擇處著得又於不著一善處得善此等㣲𣺌下文告哀公又於擇善下分派出學問思辨來此是同是異某云賢問得極好古人説此中字只就無過不及上看分化原頭少不得一畨鍜鍊吾人學問思辨工夫正於此處措手如九二大人亦有學問聚辨的淵源耳凡人錯處都在極㣲極𣺌正視不到處如在昭昭路上不是無忌憚的豈有差池且如此天下根原萬物秘藏要銖兩不差定費多少心力此中工夫切勿疑誤呂而遠曰小人無忌憚是糠粃一世不消説了君子而時中却是天長地久不隨風雨明晦的然如此中庸經決擇過尚有一不一處是何縁故不敢謂一善是中庸錯出單義又説不得是中庸了義歸墟看來中庸是舟一善是柂性善是中庸柂工某云都是但一善不是了義歸墟將謂終身日日買船選柂也某憶先儒每坐講論必問孔門所樂何事顔子所學何學初意以原思與顔子對照看出不遷不貳而諸賢紛紛為每事擇善隨時處中二語縛著因林興公來問顔子亞聖過怒應無如何還有某云賢看不遷怒不貳過細抑不行克伐怨欲細也如説克治工夫再無麤細之别如看他體㑹源瀾支節迥然難齊興公云夫子教他下手亦在視聽言動上何嘗直破心扃某云正在此處備見天性凡人下手要有得手用力要有得力處如在怒過上下手終身是箇怒過也興公云如在已上下手豈終身是箇已在某云此不同試把手掌當日照過何者是汝骨月去了非禮便是禮了已克禮復如何猶説已在興公云如此繇己之己與克己之已是一是二某云汝兩手擦面誰是汝手誰是汝面汝自家梳洗整頓衣冠雖有别人亦是汝的此處十分分明如何自家倒錯興公又云畢竟顔子得力何在某云不會首義再看二篇莫若郭受子所云隨立隨掃也謝有懷張勗之柯魯生於是一齊悟一善之善不是等閒自捐所問不煩更答張元屏云中字既明白只如庸字舜顔武周許大事業在夫子都看作庸行誠明性教而下篤恭治平而上聲臭盡處夫子都看作庸言此中擇執何處下落某云看中庸首尾是中庸下落大學開頭説止至善中庸婪尾説無聲無臭至矣庸常道理直到此處不是舜顔誰人領略賴賢提掇不使坐上淺看中庸輕批至善也唐君瓚以補課見過偶聞是説便云瑒常疑希聖希天之説如中庸首章不睹不聞未曽説至只説致字末章無聲無臭不説致字止説至字大學至善致知顔囘擇中得一此不是希天而何某云極是一部中庸束到頭了只有兩字歸結一實如何諸賢尚有紛紛之疑先是與曹公説時中時趙與蓮坐次稍遠不聞講論因舉前話云君子時中小人無忌憚無忌憚只是不戒懼時中只是戒懼不知此戒懼時便是擇守功夫抑是誠明前頭不思不勉時候也某云此事前説已明嚮來呂而遠亦疑時中不是戒懼黄君琬又疑看未發氣象不是擇中大抵戒懼則時時做得不戒懼則時時做不得擇乎中庸不能朞月如何説是時中畢竟於隱㣲去處工夫不到如要刻刻致精自然無朞月終身之别隨他説時中變化我只管是刻刻獨知再勿隨他横生手脚是日二義頗明諸賢旁及他義黄太文問川流敦化楊峻人問仁本孝弟洪尊光問同室鄉隣鄭枕石問顔囘禹稷尹孟寶問不知不能黄共爾問知一知十或理可旁通或言須異日皆裁答未能詮次有盡惟陳明師未有言話因問明師亦有學誨不明師問聖門言一貫者二參言下便承指出忠恕何等直捷賜言下黙然後談性道尚有疑關豈是從人貫者心地易尋從天貫者命前難語抑是魯者蹠實言在意中慧者課虚意在言外耶某云此則未能要解者湏是曾參不死端木復生陳明師固問張徳聲亦以是請某退避曰若説者又是被人惶怪一塲徳聲曰何事某云某前在浙江曾發此義及至毘陵與謙止叅證殊未慊心某生平謂人心頭學地須積精而成如一片日頭晃赤赤無一㸃昬昧團團天中只一片日子日北則晝長氣熱萬物皆生日南則晝短氣寒萬物皆死觸鹵而出則為雷霆迫氣而行則為風雨餘光所照以為星辰餘威所薄以為潮水爆石為火融金為液出入頂踵照於心繫如此世間無一物一事不是日頭串透人生學問精誠常如此日然後能貫串六虚透徹上下千里萬里無有障隔如此便到十世百世更無芥礙了稍不如此雖杵針鐵線穿鑽不來何况鋼城十重内外眀師唯唯徳聲曰此是天道抑是人理耶某云隨賢穿串莫問阿誰張鎮樸復理前語云前日問詩中三頌却未曾説周商與魯王豳與秦風頌始終如何綴繫某云此不須説詩曰眀眀在下赫赫在上又曰維南有箕維北有斗又曰嘒彼小星三五在東鎮樸呀然若未嘗聞者諸賢扵是開指稍濶朱君薦問左國為春秋正傳春秋災異不指事應而左氏言之歴歴不疑将左氏補仲尼之缺抑賢人所詳聖人置不論與某云史失之誣易失之賊只看他無失處不要看他失處君薦曰現前失在何處某云君子之失也如日月之食也日月何曾樂要食在唐君璋又問北極遠近不同自是地形漸别漳南燕北相差十三四度過此以徃顛踵反植於理如何某云此是常談又何足怪羅期生問焦京王楊諸易同異某云寂然不動感而遂通何説之有吴雲赤以前問多不復置問某云姑舉一二雲赤云聖賢損益差等如周公太公報政論治逆知其後必簒必削何不更求至道豈是精神有限抑是時勢使然某云此則未知若是轉移得住一變再變現亦有人却無變處又云蘇空同曰西漢風俗頽敝繇髙祖不事詩書東漢名節厲興繇世祖敦尚儒術莽操難易自是二祖異趣果是世運使然亦是風㑹之故某云此亦未知但使黨錮不興諸賢未盡延熹餘厯尚在炎年雲赤又云宋晉兄弟之國士風兵旤約畧相同今人逺邁漢唐何亦有議論成功之歎某云此則不知聽諸先生私憂過計某則寸田尺宅未能自謀林非著已嘗問過又來談云定危者與人諸葛武侯鞠躬盡瘁負許才識不能復卯金之業就如一箇閹皓提蹋不住如何得使張陸歸誠若使人有此等才識又有此等至性一心貫串天人一心自比管樂兩下分馳不知此時於心性内如何叅得透於體用上如何看得定又如何做到盡頭處某曰此又未知若要知者試問原思做到頭時克伐何在做不到頭時怨欲何在一匡受賜鮑叔未知其始孤城不下魯連不知其終今日只做文章奈何便要上下今古翼日某以負土復還山中且餘未悉以竢來期榕壇問業卷二
