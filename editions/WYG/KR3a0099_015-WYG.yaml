body:
  text: 榕壇問業卷十五明黄道周撰鄭肇中初問修己以敬之義某未有以答也既以有恒一章講論為煩是次乃申前義戴石星問云君子修己以敬只此一句便盡却君子事功君子學問如何又説到安人安百姓上去某云俱是君子本體石星云於本體上是一節事是兩節事某云既是本體何分節次石星云既無節次何須充拓説來某云俱是聖賢就本身上商量無盡若有盡時已外便無人人外便無百姓若無盡時人安已亦是未安百姓安巳亦是未安千古聖賢俱就本心為天下立身立命舍此寸心天下身命俱無安頓處聖賢自家亦無處下手石星云極知修己事難居敬道大然如舜之恭己南面亦是五臣四友之力豈是自家垂裳不動聲色便致無為之理方堯時致治亦半百年璿璣考齊亦非一日上不能去降割之災下不能格頑讒之志𦙍子傲逰于家共工方圮于外豈是自家敬修未至臯陶論治只在知人在安民知人是智上事安民是仁上事古今舍此兩事决無太平日子大禹亦云知人則哲安民則惠能哲而惠何憂乎驩兜何遷乎有苗何畏乎巧言令色孔壬堯不知舜舜不知禹臯陶雖盩領土硎茨階胼胝亦奏不得分毫治效夫子説敬字已到安人安百姓上不知能到知人官人上去不某云人主著敬敬則心體明清與天同道敬庶民與敬士大夫敬天地祖宗與敬身豈有分别人主一息不敬便有侮慢自賢反道敗徳的事敷文徳舞干羽放殛誅竄亦是敬上作來豈徒知人官人而已臯陶云日宣三徳夙夜浚明有家日嚴祇敬六徳亮采有邦此是敬上知人之實績平章百姓敦叙九族此是敬上安民之要領也石星云如此則子路問如斯而已莫是要窮究這裏不某云這裏亦不消窮究領得敬字自然到此不領得敬字雖知人安民亦無一處著落桓景之於管晏漢文帝唐太宗之於黎老何嘗不一留心只是自家不敬人才造就亦無足觀何况平章之業石星云如此則堯舜猶病只是説敬之難不是説修己安百姓之難也某云自然是修己安百姓難所以須敬如不為天下百姓要比已何用石星云如此則堯舜猶病亦只是著敬耳某云堯舜此心亦只是無己無己處亦只是不安一個敬字了得百樣修己百樣修己了不得一個敬字也石星云且説一個修己了得千樣安人安百姓千樣安人安百姓了不得一個修己也某云如此説更分明鄭肇中云聖賢立言甚簡只得其要領所在堯舜相繼百餘年竭數十聖賢之力出百姓於鳥獸龍蛇之中夫子只以一敬字了之黄帝身經七十餘戰奪天下於虎兕魑魅之中夫子只説他垂衣裳而天下治聖賢開世治定功成或只用此一字抑繼體守成禮明樂備亦用此一字不了如承頽敝之後當匡攘之秋仁明武三字猶以為難豈玉色金聲收拾得去某云正於此中見他浩大黄陵結襪多士歸心㑹稽式蛙厲夫動色何况帝王神明上事肇中云且不論帝王只如逢掖拱攝畎畝之下亦有尊道功夫須才須識須學須力自伊尹膠鬲管夷吾百里奚來動心忍性增益多少子路一日誦不忮不求之詩夫子便砭它不足聖門當時不以一道自名如今諸儒為主靜良知之説都是徑路了程門獨舉是㫖至今不絶然竟無有人能以敬字安人安百姓者想不是看敬字差是看修己字差也某云已如一間屋子人百姓如屋子事件敬如主人翁提匙照鑰主翁精神無有損失屋子中事事不失何闗屋子事肇中云極知敬字極大但要勘敬字何等經綸某云竪天立地安世安身只一敬字經綸無萬趙與蓮抱恙新起未有言論與石星偕來因云知人則哲帝猶難之敬字是聖賢把柄哲惠又别是天分非人所及如帝堯於共工伯鯀明明知它如何又放它九載昬墊下民某云諸賢皆明徳之後世家巨族勘除殊難又天未厭災警予未止舜方側陋伯禹未長如何得容易下手古人都説國本不可輕揺帝堯明明對諸臣説𦙍朱嚚訟不是帝堯敬徳格天誰人敢發此口與蓮云放齊之罪浮於驩兜亦只是為佞未嘗為讒後來所以免於四罪馬鄭都以𦙍朱為帝子孔君以𦙍國子爵别是一人仲康時有𦙍侯顧命有𦙍之舞衣是也某云唐虞五等不在岳牧之上𦙍子為小國諸侯未有明徳大功豈得頓膺登庸之舉如有此舉則四罪之服不後於驩兜矣與蓮云齊兜讒佞自在帝廷既帝堯之所明知如何不蚤為竄殛某云小人自是心地不明看不明白他初時亦豈要濟惡只是看人才情偶然投合後來不得不如此堯仁如天只是哀憫著他待也敗壞自然有人與他計較與蓮云如此則九載其咨下民昬墊聖人安得漠然於懷某云聖人只是敬止耑精於疇咨自然有人出來與他商量臯陶云慎厥身修思永去一人而後無可繼去一罪而後不可與圖功豈是慎修思永之㫖凡聖人意量極大圖維極逺只是心細耳此處要安盡天下還安不得寸心也與蓮云敬是何處最難云敬妻子僮僕難又在何處云敬鄉里愚不肖難又在何處云敬巧猾奸雄難與蓮云程伯淳於此處説饗親饗帝某云伯淳意思極逺某意思凡近且看饗親饗帝果亦難於三者不耳侯晉水云敬字是千古傳心之法舍却敬字無論做不得堯舜做人百姓亦不得吾門説明善求仁若無敬字何處討工夫中庸怕人看敬字太易纔説出戒慎恐懼與論語畏字相發書曰君子所其無逸又曰皇自敬徳安人安百姓已包在敬字内夫子再拓出安人安百姓不知安人安百姓是敬之作用抑修己分量至安人安百姓始完耶某云嚮纔説是本體已本體上有人有百姓已修得安人亦安百姓亦安所差者只是人安百姓安已還未安耳晉水云如此則是百姓安堯舜猶病未安也想只是修己難修己要到安人安百姓雖堯舜猶難耳西銘諸書為世儒翻剥已盡今對人説本體便是套了嚮説出敬字生出許多禮樂經濟便是安人安百姓為敬之作用不知此敬安分量亦曾到不言不動不賞不怒篤恭去處不某云自然是如此纔説堯舜猶病凡就己身看出天下痌瘝不獲皆是己身罪過就天下看出己身營窟為巢皆是己身病痛堯舜授受之際無端説出四海困窮天禄永終此八字便是古今君臣所斷舌纔知它看敬字極精看己字極一雖説風動時雍聖人實亦未能如此洪尊光因問大禹謨篇有欽哉慎乃有位敬修其可願兩語在四海困窮之上今論語堯咨無敬修語則禹命亦應無之而夫子以敬修告子路則敬修兩字是危微精一之大結局從來講學説精一危微執中無説敬修可願者唯季路願聞子志夫子説老者安之朋友信之少者懷之於此發出敬修可願之㫖想安人安百姓亦是願力則然要實實做到如此真是堯舜猶病聖賢事業做未出手已出手未到頭都是存留此願使天下後世想見聖賢心力正是君子無己之思某云如此纔是讀書吳雲赤云夫子敬修之論實出於虞廷然自濟南伏生授書二十八篇無禹謨禹謨出於孔壁舜典得於大航頭前世多疑之者不知是孔子述禹謨以申其意抑是禹謨依聖論以行其書耶某云孔壁中五十八篇與伏生合得其半只多二十五篇餘漫滅不行耳寧道中有依傍耶雲赤云蔡九峰嘗言漢儒以伏書為今文今文語反難讀安國書為古文古文語反從順今古相反者謂今文出於女子之口古文已經儒生之筆耳然伏生背經暗誦反得其所難安國摩勘古書反得其所易書經兩人之手口而文勢語意夐然不同豈得謂仲尼原本乎某云書在孟子已不盡信劉歆常云與其過而去之寧過而存之今不論敬修是仲尼之述虞典是禹謨之依仲尼然自危微垂訓以來只此兩字至精至一吾輩可以無疑矣吕而逺又問伏生女子既傳四七之篇河内女子遂獻泰誓之簡梅賾晉中始上孔壁之書姚興齊時乃補舜典之闕豈以前漢而古書難讀迨於末世蝌蚪始明耶史遷嘗從安國授書述本紀亦無舜典禹謨只以禹貢洪範繼堯典之後如有則史遷亦應見之史遷不知有危微精一執中敬修之學乃未嘗讀非識不到也賈誼董仲舒亦未嘗讀此書賈誼稱性神明命仲舒稱二中兩和皆極精微未有及禹謨中語者朱晦菴云先漢文章厚重有力量孔書東晉始出大傳格致極輕疑是孔叢子等為之蔡九峰亦以孔安國書序絶不類西漢文字然古今絶學開於是書亦是東晉諸賢之力某云古二十五篇深𤣥奥義豈是後儒之所能及昔有疑禮記諸篇是漢儒杜撰者晦翁亦謂漢儒深醇莫如董賈董賈如何做得禮運禮器郊特牲許多文字東晉諸賢既不能作一書序豈能創出許多精微質奥之言而逺云孟子語伊亦略依傍如天誅造攻徯我后天視自我民視等語都違謬了夫子語又只是影響如為山九仞功虧一簣天之厯數在爾躬允執其中却以意成義想是時清言既久入理寖微其浩蕩者以翻莊成釋其典則者以起義附經是所優為不為難也某云隨他假為聖賢之言吾已真得芻蕘之採洪尊光又問前日嘗問三墳書是真是偽吾門直以為堪輿家言此書中無一字渉堪輿者豈為謾歟某云正好當彼種書耳尊光云亦整齊嚴宻髙潔有意思今看王輔嗣略例亦訓詁將來豈能如此創義排比渾成如張天覺毛正仲輩自家作數語不成有此手段便與皇極潛虚並驅爭先何苦託之洪荒之逺某云他正要凌駕前人耳昔有人做正易心法者託為麻衣道者張南軒李壽翁極推服之晦菴疑其凡近意是時人所為置而不看一日有湘隂主簿戴師愈來謁即譚麻衣道者因歴叩之果是此老所作尊光云麻衣易只是幾句活話剽撮白撰得來三墳整齊張毛輩如何得就某云看他輩做楞伽經何等精宻凡晉人見諸髙士翻譯梵書髙動天子便欲反之於經宋人見王家父子杜撰傳註震攝天下便欲壓之以古所謂神農之言耳如能説到敬修可願精一危微吾亦從之稽首也吕而逺云異敎等書儘有見到此者吾門何以不道某云他何曾夢見修己可以安人修己可以安百姓修己以敬正是中和之本禮樂淵源九徳九歌之所從出歴代帝王唯温恭祇台敬止敬勝四君子耳餘便未能到此田地而逺云夫子對顔淵説一日歸仁若此之易對子路説敬修猶病若此之難何也某云論一日修己亦安得百姓是聖賢力量論終身復禮亦有猶病之心是聖賢心力也而逺又云子貢要博濟夫子亦説堯舜猶病子路要安百姓夫子亦説堯舜猶病立人達人亦説己克已修已亦説己可見聖人極無多子作用某云而逺恁地分明吕而徳問敬字是千古心法不漏纎毫而仲弓問仁章添出恕字子張問政章添出忠及問仁又添出恭忠二字豈敬字猶有所未盡耶宋儒加一和字莫亦是此意不某云此意極細看來只是修己耳有已纔取譬得人是聖賢將身説法以敬去修己纔有本體工夫是聖賢將法作身恕字是將身作法恭忠是將法作身再不從人身上討下手也和是中之作用中是敬字養成得來無敬做中和不出所以中庸説戒慎恐懼只於敬字上加一倍工夫而徳云然則和字是如何看某云程伯淳稱中心斯須不和不樂則鄙詐之心入之此與敬以直内同意謂敬為和樂則不可然敬則自然和樂耳伯淳之意亦以和是敬字養成也而徳又云正叔亦云敬而無失便是未發之謂中敬不可謂之中但敬而無失即所以中也此與前語相發大意亦謂中和是敬養成耳然其語意得無有滯不某云語雖躓滯大意已是分明而徳又問明道嘗言誠然後能敬未及誠却須敬而後能誠敬之與誠豈有二義乎某云明道亦自中庸看來誠是天道敬是人道修己便要修到誠處誠便與天地同體事親事天饗親饗帝只是此一意極於上下鬼神草木鳥獸亦只此一意而徳云明道又言體信達順之意聰明睿知皆繇此出此是何意某云誠則明矣人心自敬恭而後自然萬慮不擾處事精詳沈若木因問人生而靜天之性也人都為朋從往來思慮日紛賢者因之務外逐末不肖者因之縱慾敗度所以聖賢左銘右箴都説敬字如認得初體分明只一主靜便了如何又著敬字某云純公亦言靜坐獨處不難居廣居應天下為難人都於靜處著動天都於動處見靜除是木石纔得以靜為體若木云若要看誠字直於靜中看得分明某云不是敬了那看得出上下鳥獸蟲魚草木箇箇是誠箇箇與鬼神同體要就靜中看他根胎只有百分之一若木云如是敬者却把上下鳥獸蟲魚草木都作天地鬼神看耶某云自然是如此若木云釋家可有此意思不某云他看作石火電光􅄼得有此意思若木又云東西銘可有此意思不某云他亦説得二三分從此修持悟得一半是㑹次義為誠之不可掩如此夫去歳講義已於使天下人處説得分明石星不忘前義因問鬼神兩字只是不睹不聞中有睹聞只此便是致知便是格物却借祭祀來説耳大學首傳便説此謂誠於中形於外這箇鬼神去逷小人之肺肝中庸下段又説誠則形形則著這箇鬼神去贊聖賢之功徳世閒只此兩種鬼神皆在不睹不聞有共睹共聞之妙在與知與能有不可知不可能之秘算來只是人心實有此理動而為意此意不誠便有許多邪魔隂慝變現手目此意一誠便有許多神明聖賢當身顯見顯見隱微此是千古人鬼大闗誠中形外此是千古幽明大㫖知之者以為天命人性不知者以為精氣㳺魂把祭祀説個影子故云誠之不可掩如此夫如此夫三字讚得使天下聖人賢人愚夫愚婦一齊癡呆動其心目人能看此章透者纔許他格物致知不然且去正心誠意也某云都説得是任爾舉去一一示人戴昌祖明逺時初下教未領前説因問中庸一書究竟明箇誠字然不於君臣父子夫婦昆弟朋友言誠不於天地鳶魚言誠獨於鬼神言誠不知此處鬼神者果屬祭祀對越之鬼神抑程子所謂天地功用造化之迹乎某云程張所説鬼神是天地以上事中庸所説鬼神是人身以上事心如火也火輒有影天地以生物為心生便有屈伸人身以交物為心交便有隠見都是實形取影或正或倒或逺或近在天為災祥在人為寤寐在日用為聽睹形聲極竒極怪極平極常心力大者看鬼神亦大心力小者看鬼神亦小精者看精粗者看粗善言鬼神者莫過於易括之一言曰以齋戒神明其徳其實只是誠字不誠的人看子臣弟友天地鳶魚亦無一物誠者看天下無形無聲無手目無肺肝所在箇箇是我心光所照所以能酬酢一世變化天下故曰知變化之道者其知神之所為乎明逺云如此看來祭祀之鬼神是為人心寫照卜蓍之鬼神是為人心傳響有形寫照者見之於祭祀有聲傳響者見之於蓍龜何處是性命所在某云此無形聲者便是性命所在明逺曰若此者都是意意生想想生妄如何得到至誠所在某云如此纔要誠誠意只是慎獨慎獨者自一物看到百千萬物現來承受只如好色惡臭感目觸鼻自然曉㑹不假推求所謂知至知至便是明誠明誠便與天地合徳日月合明鬼神合其吉凶吕而徳又云吾門常言禮樂精微闗於天地非聖賢莫能識非聖賢莫能用也然考古禮書自享祀至於明堂不過報本追始盡其誠敬而已賈傅有言祭祀禱祠非禮不誠推其大要不過防其邪物訖其嗜慾温恭朝夕執事有恪而已諸繁重簡易與時隆替非有難知之學難行之事且如賓尸酬酢歌奏異宜亦本於人情加之節文非有怪誕至於明水鸞刀鞂本之設袒割求祊坐奥之儀亦古禮相沿習不為創他如䘮禮之招臯鄉飲酒之四座廟位之西首及於饗禮之先爵卑賤後差貴者殽膳下洽樂人始奏皆事理宜然無甚逺於人情者何以必周公始作仲尼始知乎鄭康成始引䜟緯以釋禮經有五帝諸神差為怪誕然今亦無循之者今古禮意差不甚逺唯古人致齋五三舉饌皆有牲醴今以茹素僾然異致而神明蠲滌之義一也吾門每言禮樂精微其義何居某云某何足以知此古人以樂節禮禮之動天地格鬼神者皆託於樂今人以禮為樂樂之諧人情通物故者皆殽於禮無文無聲某又何足以知之而徳又云前日每對諸兄值不了者曰且舉周禮看周禮有何佳處胡五峰蘇子由詆其疏謬如建土踰制冢宰筦利甸師受𤯝内宰立市閽人掌禁女祝禳禬之説種種迂謬不獨青苗國服而已晦翁亦云周禮一書不敢令學者看學者先理㑹身心學周禮却是後一節事吾門如何付人去看某云讀書須是心精心麤者再看不得周禮看周禮後自然耐煩知他病痛某至今未能也且如周禮大司樂一章未經秦火河間古書此最先出玩之長人神智决非後儒之所能造人都説此物壞人一壞劉歆二壞蘇綽三壞王安石亦當試之看其災祥如何耳洪以儀扶光亦初下敎輒問古禮樂中無今干支風水之説春秋書宣公八年冬十月己丑葬我小君敬嬴雨不克葬庚申日中而克葬定公十五年九月丁巳葬我君定公雨不克葬戊午日下昃乃克葬古者卜宅既有定域昭穆可從然既卜日值雨而遲之則是不日也今以卜宅之禮聽之地師趨利之謀縣於日者或一日不葬輒遲數年可云禮乎某云此事譚者已多何必吾門破其闗鍵於時仲冬某自天治初歸初三日己酉雞棲矣漳郡地震有聲許爾翼云春秋著災異不書事應大抵以為隂盛也晉伯陽曰陽掩於隂而不能出文公元年九月癸酉地震公穀皆以為咎在公子遂又九年而公子遂禍作是年姜歸自齊又九年而大歸於齊則救鄭之功為襄仲禍始也襄公十六年五月甲子地震又十六年而子野卒昭公立魯於是始衰昭公十九年五月己卯地震則猶是昭公也而亂在王室二十三年八月乙未地震則猶是王室也而亂且在昭公皆先告焉則甚哉文王周公之仁也匪面命之言提其耳哀公三年夏四月甲午地震五月辛卯桓僖宫災則季氏之澤亦且盡矣五震之中終始于臣而中于君江都之所不稱而其義燦然不可諱也地蓋數動二百四十年之中舉其大者明地之絀於日也而顯為之繫以示夫失靜之常易曰妻道也臣道也其不中于道則仲尼不書之矣曰不足以戒今𤣥月藏伏而地動又甚著在于周則其正月也三始之内陽戰於隂而雷又數殷其在於古嘗有之乎某云吾郡僻在海裔去日又近盛陽伏地與隂相薄如人體中脉過井原稍為滯栗何足疑乎凡雷震不過百里漢元初元年三年皆以復月郡國地震唯永和二年元嘉元年復月震在京師是足占耳自漢而下盛冬地震屈指可數唯大厯二年貞元二年震在京師宋之景徳元年熙寧元年皆以復月震在京師當時君臣敦樸告誡士有常業人懐安土不足憂也凡占者家不占國郡邑不占天下京房飛候亦謂其某處有灾而已君子痌瘝乃身雖匹夫納溝猶為怵然何况天地劉向見魯國地動輒指列國諸事以為正應文義極疏嚮兄所敶皆與劉向異指亦足稱耳謝有懷因問天徳王道聖門只許顔子内聖外王千古只許堯夫不知兩賢果在何處下手某云亦在復處下手有懷云復中可有動不某云復中那得不動又云復中可有悔不某云那得既復又悔有懐云如頻復者不可言復易既説厲又説无咎何也某云復而遂復之謂之休復休復臨也復既見隂復動而之陽謂之頻復頻復明夷也臨以體休明夷體厲有懐云臨至八月而凶何以得吉某云臨當丑月嚴寒戰兢與乾同徳而有憂色凡易十有二變而盡一卦日數其陽月數其隂復自下上七日以至於乾臨自遯來八月以至於坤蓋自八變而陽盡矣君子知微知彰知柔知剛誠中形外則何逺悔之有顔子不善未嘗不知知未嘗復行堯夫云能立於無過之地則物莫之能傷箕亦立於無過之地然至於無咎而已矣有懷云如此則何處分他是天徳王道某云靜處敬便見天徳動處敬便見王道王豐功因問下學上達莫亦是敬不某云明水鞂本可祀上帝如何不是下學上達豐功云夫子説不怨不尤此處只是修己修己尚有學問如事事去知與怨尤念頭有何分别凡人精神須有安頓自得所在如無安頓自得所在雖不怨尤并敬人敬身都是落空不知堯舜當時所學何學某云孟氏有言自耕稼陶漁以至為帝無非取諸人者夫子亦云舜好問好察邇言聖賢學問只是敬人敬身天子之不矜伐匹夫之去怨尤都有二三十年學問如要安頓看此廓中安頓多少人多少百姓又何處安頓詩書戴石星晚後又問大學説至善又説知止不知至善是體是用并知止亦有體有用不某云前日説過此本明者是體此明明者是用隨物明明者是體此不明不止者是用石星云邵堯夫嘗稱天以用為本以體為末地以體為本以用為末此是何説某云他只説動靜耳天無一息不動星辰河漢只依他得不動故説以體為末地無一息不動江河草木只依他得動故説以用為末其實語不玲瓏其先又説火以用為本以體為末故動水以體為本以用為末故靜體用動靜説略分明本末兩字未有的當耳石星云他為何如此某云堯夫觀物要剖析分明只為物有本末一句用自隨體動自隨靜體用中間可以知命動靜中間可以知性寧有從此横分本末的道理石星云動靜體用原自分明誠為他下個本末如何纔穩某云天以用為體故舉末而見本地以體為用故舉本而見末火以用為體故靜而歸本于天水以體為用故動而流末於地石星云此不過該舉言之耳其實理是如何某云氣無不動理無不靜靜本以立體動末以致用水火得天之氣藏體於金木金木得地之理致用於水火人親於金木而急於水火仁義為體禮智為用靜體既立動用不竭石星云如此則禮智是仁義之末耶凡説此等語難得明白不知有宋諸賢誰最明白者某云李伯紀張復之到明白石星問是云何某云李伯紀對髙宗云凡人心誠則公公生明疑則私私生暗張復之謂所親曰人大小事須用智智猶水也不流則腐百小事不用智臨大事寧有智來耶伯紀明於其本復之明於其末伯紀明體復之明用石星云如此則伯紀殊勝復之某云亦猶金木不勝水火鄭肇中云周濂溪張子厚自是明誠通復之宗豈張李二公之所能及某云以程明道之温粹不能轉移臨川正叔之誠敬不能感孚神廟濂溪子厚猶是我輩學問如何得了敬修之局肇中云君子正本而已天地亦有用其本不用其末者人急水火水火豈能遍給天下某云水火自然遍給天下君子敬修不到安人安百姓猶如貫錢株木無當天地之藏榕壇問業卷十五
