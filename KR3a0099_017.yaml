body:
  text: 榕壇問業卷十七明黃道周撰丙子春某以守歲還山獨處墓下時諸親朋各以歲事家居未遑講論而某新奉環命將改荔衣擬拜疏請告稍謝朋從山中書籍皆朽蠧無復足披抱膝看松增其寥落簡諸友尺牘中有陳克韞問業十則劉薦叔問業二則克韞長樂人為平和司鐸敦尚文行所稱道最深至可觀劉薦叔福安人以訪郡守至亦邃於學問又有薛當世大志寧德人問學四五事皆名孝廉不相迂鄙又有檇李陳獻可藎謨商三易皇極亦六七事未有以答也自揣寡陋生於海裔未有聞知然諸君子皆淵懿拔俗即無以答之其問難宜自足傳因略為次於後陳克韞一問榕壇講屢空說命字大是不同命屬太虛屢空則近於虛故曰庶乎貨殖屢中便礙於虛故曰不受命顔子亦多中時但中仍是空如簞瓢陋巷已算到周流無用處子貢亦有空時但空不能屢如到切磋琢磨後前見已自無存是兩賢絶詣但曰屢空便有不空時簞瓢陋巷尚有簞瓢陋巷在三月不違亦尚有三月在曰屢中便有不中處性道文章却推解不來聞一知二亦遺落處多如夫子者周流天下何處定是曲肱疏水罕言雅言何處定是見聞解悟到是兩賢之所未及又云夫子於兩賢往往較量㸃化一貫為屢中切劑屢空亦為竭才微㫖鄙夫一章次於多能之後與如愚多識一樣著眼豈不是㸃化分明某云某看書何曾到此某一日曾晤丁玉明坐久無可酬對者某因云顔子竭才又稱屢空夫子說我叩兩端而竭焉此兩竭字與空字如何取證玉明云先生胸中豈有未竭處某為爽然又憶辛未春日劉完公初入都問屢空貨殖之義某云屢空便是顔子窮缺貨殖便是子貢聰明向後完公再舉此語某遂不認某向曾說簞陋有餘周流無用曲肱疏水現前富有天下三十屢空現前享有兗國古今只有兩人一稱鰥夫一稱貧天一者享壽百年一者廟食百世子貢恁地聰明豈遂億不到此億不到此不成子貢也張明公曰不弛勞而底豫舜其功無所逃而待烹申生其恭亦看得六七分意思克韞又問博學無所成名黨人無心議擬已寫出夫子上達莫知境地夫子以為知己才說出下學實際來夫子一生不厭不倦只下學上達一句開頭說學習便道不知不愠說中庸便道遁世不悔學到不見知處直是心體上取照非世人聞見所及故以上達破子貢聞見榜樣然不言下學是何等工夫子貢粗心却不復尋故聞黨人之語遂指出射御以示門弟子禮樂射御書數正是下學吃緊處射者反已最可悟道御之一事與周流較親故曰吾執御矣蓋實實約略生平如此非是權對也黨人雖不學却千里相遇子貢雖聰明却當面錯過某云子貢何曾錯過下學上達依舊是一貫本子只說箇上下十倍分明夫子對子貢傾㕑倒􅍥子貢見夫子目定心癡一日陡問女以豫為多學而識之者歟子貢理㑹猶未十分忽聞一貫如富子驟貧又一日見夫子自稱莫我知也夫子貢商量未下忽領得下學上達如貧兒驟富言下再著不得一毫言語聖者自示賢者自承悟人不討下手美人不現全身如曾子門人便須償他忠恕一飯之外禮意蕭然今日如何又把殘羮當作太牢之享執射執御分明是破著名心銷他學障老子云如大久矣其細聖賢學問中無復有細於御者何曾見周公以卜宅致富虞舜以陶漁興家克韞又問前日說孟子學易以五百餘歲見知聞知闡發深微然孟子學問盡於不動心不動心在知言養氣易中何處說知言養氣只是孔子聖之時也時即是易進退存亡不失其正仕止久速各當其可此便是易了某云如是人都曉得再不須問亦不須說易云將叛者其辭慚中心疑者其辭枝吉人辭寡躁人辭多誣善之人其辭游失其守者其辭屈此便是孟子知言易其心而後語定其交而後求知微知彰知柔知剛此便是孟子養氣養到此處才說得三極自如一極不動不要泛泛自酬應上看人工夫克韞又問知其性則知天矣此章心性身命只是一套事知得透即是行行得透即是知學庸兩部都是心性上事易說窮理盡性以至於命孟子說盡心知性以至立命想亦無甚差别大抵窮理至於盡心則盡矣盡心是知亦是行盡心以下孟子字字說易盡心以上孟子事事學易盡心以上即孟子六十四卦盡心以下即孟子繫詞孔子有孔子之易孟子有孟子之易猶伏羲有伏羲之易文王有文王之易某云讀書尚論最要實安得如此櫽括易字一字豈可通掛孟子七篇前五篇上下都論仁義禮樂霸王聖賢的的大意告子盡心兩篇才為學庸疏明心性為窮理源頭關防萬世錯路所云盡心者大要明善而已明善即是致知誠身即是格物物格知至即是至命孟子云知命者不立於巖牆之下此即格物的的大意人把學庸論語來看孟子字字分明何消以易溷他伏羲文王孔子三聖相傳於易前不敢錯說半字程子說顧兔可以作易常為之噴飯孟子即是論語學庸疏義耳趙岐云孟子書七篇二百六十一章三萬四千六百八十五字孫奭云天以七紀璇璣運度七政分行故以立法二百六十一章以當二十一歲之月三萬四千六百八十五字以當九十五歲之日離其七篇分章贏縮以當一歲之辰自孔門來著作無有精於孟子者又其全書未經滅裂是則告子盡心謂之開陽瑶光矣是皆看孟子太髙然見古人用心未嘗潦草對聖賢開目也克韞又問心字易知性字難明性一也朱子解性以為兼氣質而言語雖本於程子然似有二性矣要之性不離氣質第不雜氣質而言耳非特耳目口鼻為氣質即心亦是氣質心之生處是性譬如火是氣質火之光處是性水是氣質水之流處是性心之生處即仁義禮智故曰性之德告子以生為性原不差朱子以知覺運動解生亦不差第後人認知覺運動屬血氣猶孟子所難白雪白玉者遂差耳不知孟子初未嘗非告子特恐其分别未精必流為義外之說故就生字盤他盤到根心生色所在則幾希之義亦明白惜告子不得而遂勿求耳某云克韞與達巷回護猶可何與告子回護自孟子後無有知性者董賈尚不錯至周程便錯耳夫子說性相近只論上智下愚之初不論上智下愚之末耳智愚末流皆是習豈是性便如此克韞說不雜氣質而言此句最好說不離氣質而言便不得氣有清濁質有敏鈍自是氣質何關性上事如火以炎上為性光者是氣其麗於木而有明暗有青赤有燥濕是質豈是性水以潤下為性流者是氣其麗於土而有重輕有晶淖有甘苦是質豈是性生字只是就字起義也如何便指為性天地之大德曰生生是天地之性是就理上看來故曰天生蒸民有物有則民之秉彞好是懿德不曾以二氣交感者稱性也以生謂性自然以食色為性以食色為性便與鳥獸異類無别耳記曰别聲被色而生只是說他活路豈是所以生之理也就生上可拆到幾希所在猶王伯安少年拆竹木要求理所在也水之潤下火之炎上金之從革木之曲直人之仁義禮智信豈可拆其形體而求之只就形色看出天性則是聖人盡性之妙看天下山川草木飛潛動植無一不與吾身相似此從窮理格物來邵堯夫三十年才見一半如何便以一句塞之凡聖賢立言再不糊塗勿為傍門所誤克韞又云天字易知命字難明大抵天命之說亦猶心性之說心之生處是性天之不已處是命天何以見不巳即在人心之生生處故曰天命之謂性天之行健無息即心之戒慎恐懼所以說命必到無聲無臭說性必到不睹不聞天命至處便是太極太虛心性至處便是至誠至聖天之有氣數亦猶人之有氣質性無所麗麗於氣質命無可見見於氣數故言氣質而心性即在其中言氣數而天命即在其中不可分天命為理氣數為數猶不可分心性為理氣質為質也某云說合一處何嘗不合說精微處自然要條段分明天有氣數人有氣質天命在氣數中人性在氣質中何嘗不是然說氣數則有災沴之不同說天命則以各正為體說氣質則有智愚之異等說人性則以至善為宗氣數猶五行之吏分布九野與晝夜循環猶人身之有脈絡消息天命猶不動之極向離出治不與斗柄俱旋即人身之心性是也心性不與四肢分咎天命不與氣數分功天有福善禍淫人有好善惡惡中閒寂然感而遂通再著不得一毫氣質氣數不睹不聞無聲無臭只是性命宅子於不睹聞處見睹聞於無聲臭處斷聲臭才是宅子上認著主翁四面巖牆走來試命一團花酒就中取性縱使不死不昏亦是他數髙禀厚難道是立命知性也凡說性命只要盡心者不欺本心事事物物當空照過撞破琉璃與天同道四圍萬里不見浮雲克韞又云前日嘗講夏時之義因思建子建丑之說舊紀所傳載之巳久然信史不如信經疑今不可疑古春秋書春王正月之義本直截而無可疑合之詩經七月流火七月食瓜益無可疑者豳風作於周公底定之後而周禮以正月之吉始和懸象魏曰始和明是孟春未嘗建子也即商建丑亦未有實考惟商書伊訓太甲元祀十有二月乙丑見之經耳然既稱十二月則是未嘗改月也自軒轅以來皆以孟春正月為歲首代有律厯而子獨取夏時者蓋天道運行每數年一差想夏厯獨考較不繆比諸厯為精故夫子用之非疑周正也然正朔原無所改而行事或有相兼夏書云怠棄三正則建寅而兼用子丑昔亦有言之者也今建寅亦以冬至稱賀又以十月為歲終而行鄉飲酒禮固未嘗以子月為正朔也如此則豳風與春秋亦可以了快而無疑矣某云習見此說讀書要有憑據不可專以意斷之公穀要以意斷事然至於春王正月不敢以意斷為寅月者是其親見不可誣也史遷親用秦人建亥其書二世至武帝以上皆無寅月今諸世表現在可考既不疑於史遷不可疑於公穀左氏凡厯書時月之不敢違者要以日食為本使日食不必問則朔望時日皆為無用矣夫子之不改周厯此無足疑夫子之用夏時要是一家私論安可便變魯史以紀時事也春秋書春王正月春王二月春王三月此所謂三正以示列代之所致謹不可以月令繩之汲冢書有周月稱一月既南至昏昴畢見日短極日月俱起于牽牛之初右回而行歷十二舍終則復始又云周正歲道數起於一而成於十次一為首其義則然凡四時成歲有春夏秋冬各有孟仲季十有二月各有中氣以著時應春中雨水春分穀雨是則汲冢之意謂數厯則以一二三四數時則以春夏秋冬也豳風數日則云一之日觱發二之日栗烈三之日于耜四之日舉趾又云二之日鑿冰冲冲三之日納于凌隂四之日獻羔祭韭三之日即寅月也而不稱歲首尚以日命之數月則以巳月為始云四月秀葽五月鳴蜩八月其穫十月隕蘀又以午月繼之曰五月斯螽動股六月莎雞振羽七月在野八月在宇九月在户十月蟋蟀入我牀下蓋當時各以干支紀歲以隂陽别之十月無陽而謂之陽月四月無隂而謂之隂月日干月支五年再閏歲陽在於𤣥枵則歲隂在於星紀律隂在大吕則律陽在黃鍾星窮於亥而律窮於已故干不數亥以甲數子十一月甲子十二月乙丑正月丙寅二月丁卯變月為日以一二三四呼之五歲而復始支不起午以已起已四月己巳五月庚午六月辛未七月壬申八月癸酉九月甲戌十月乙亥甲與已合五歲而復始戊辰皆土也姑洗之律隂陽盛交合有日月故曰春日又曰蠶月凡天人之務至五歲而備矣日月之交五月而變揲蓍之法陽四而隂八故以四呼日以八呼月秀葽鳴蜩食鬱亨葵剝棗築場納稼及於條桑此八月者聖人所以成務也其四日則聖人以之經始聖人之分别日月損益隂陽本蓍與律煩重其事以告後世之逺者至其改憲分明三代異制觀於十月云隕蘀云納禾稼云滌場云為改歲為春酒則子月之為歲首明矣七月鳴鵙食瓜其氣候原是五月九月叔苴十月隕蘀氣候亦似八九月豳在周原之西決無晚寒差兩月理然不敢定為先時者以斯螽一章覩牀下而嗟婦子改歲之義不可易也詩稱二月初吉載離寒暑言寒而不言春又稱維暮之春亦又何求言春而不言初大抵語日月則取之易有四有八以一為始語寒暑則取之律可叙可歌以辰為端也曾㸃說暮春浴沂自然是建辰之月孟子說七八月間旱則還在未申之間所以然者孟子言日月而曾㸃語寒暑耳世儒不見汲冢書另有月令另有時訓又不知周公所以煩重其說使士君子究其理田夫野叟辨其事習見夏時則曰正二三月為春七八九月為秋耳五年再閏十九年七閏之說置不復考故夫子特録豳風以起小雅使人知有日月寒暑之異七月始寒則正月始暑甲日始陽則已日始隂戊以陽兼隂則癸以隂兼陽五年而知其閏十九年而知其次三四十九戊癸互宅此道不與讀書者治之寧當與田畯耳語乎仲尼以詩自為詩春秋自為春秋詩可以諷詠而通春秋觸目衆所共睹既不宜别為日月寒暑之說又不敢更改時制移時換月故以春還春以秋還秋以一王之憲不可擅易以亂小民之耳目又不宜更定以煩君子之心志使後之人有通於其說謂春非春秋非秋者則丘有罪焉耳是則仲尼之與周公同過也考周克商之月在於𤣥枵日月星辰皆在北維因為歲首以祀人鬼始於黃鍾猶太甲初年遵用殷憲十有二月祀於祖廟也然殷不改歲而周則改歲既改歲則未有不書元春而書冬仲者此皆事理必然無足多怪至於制作則周公備極矣三分四時八尺取晷復為元始如用立春則太蔟之律發於明夷觀其享祀用樂天主夾鍾地首林鍾人用黃鍾其義可見豈有周公仰思待旦不知顓頊以來四帝一王同用建寅之是自仲尼立議以後人皆唯唯夏時是遵其實不知夏時遵合何㫖止謂泰月大來農政伊始耳仲尼損益百王與顔回特發此論明白易曉亦欲省周公之煩重還天下因天下以知百姓無敢汨五始棄三正者并不敢以反古之說詆議聖賢至如建寅之說二分二至自黃帝以來播於閭巷其誰不知杞宋所傳當於漢初尚有顓頊正厯及正殷厯諸書夫子皆以為非時而斥之當周室東遷熊楚稱王時想即有别建三正私行其厯者夫子特筆以識周正當時之譏夫子猶今日之疑周時今日之宗夏時猶夫子當日之尊周正也凡春秋日食間有難知至於灾祥雷雨極為易考隱公九年春三月癸酉大雨震電庚辰大雨雪春三月即夏正月故以雨電為灾既已震電不宜復雨雪故亦書雨雪如夏正驚蟄而後大雨震電又何足異乎近以法推三月無癸酉庚辰癸酉乃二月十日庚辰乃二月十七日如此則震電為寪舍而發矣又桓公八年冬十月雨雪亦是夏正酉月不宜雨雪十四年正月無氷亦是夏正子月不宜無氷如解凍後又何足疑僖公三十三年冬十二月隕霜不殺草李梅實此是亥月無疑唯二年春王正月不雨至夏四月不雨疑為子月未宜雨耳然已帶四月六月而書則非為正月宜雨也襄公草八年亦書春無氷如夏正者又何足異略舉數條可以豁然康成守道不篤以蠟祭息老物謂建亥之月是矣又謂上春釁龜疑是寅月然秦人自以亥月釁龜康成稱為歲首又何必疑周人之釁龜移於寅孟乎康成不精春秋故持兩端然其解周禮正月始和為和輯典制不指氣候卓哉其言之矣世儒寡學單舉致論要當詳悉與之共明萬勿以某為誕也克韞又云嚮與考較事見在邦必達題作者多就應世上此似非是玩質直三句是學問絶大本領非聖賢不能知非聖賢不能行極不是酬應作用也大抵此章為聖賢而發當時狂狷學力不深陶養未至尚有動而忤俗反而自疑所在此自疑所在却是好義未到頭處世人看他疏略動成非笑惟鄉願輩同流合汚與衆喣喣到處騰譽子張却有學術之憂直欲勘究到底看他是箇達人不是達人抑是鄉里吠聲之輩夫子見他說箇聞字才為他一一剖判說出色可取直不可取仁可取義不可取自慊人可居自信人不可居排他聲聞之輩為無根之流斂此狂狷之氣就中行一路此便是盈科後進成章必達的意思某云此則精微此便是下學上達根基克韞又云達是精神貫徹達處都無聲名聞譽只是天知人知自家洞朗悅親順親信友獲上亦從此貫去謹願之人只能做出忠信廉潔不能做出忠孝大事在家也只是阿容說孝子不違其親在朝也只是阿容說大忠無所擊忤世人見他軟美說話好聽便推轂他後來極不濟事壞人邦家做自己聲名所以夫子惡他比之於賊如是聞人恐怕尚有好惡又敢做仁人又敢作孝子又敢作忠臣又敢做義士壞人心術并壞人邦家所以夫子定要誅他某云天下何人不忠孝何人不仁義只要涵養真粹無上人之心古人云性猶火也火性炎上伯夷典樂曰直而溫臯陶九德亦曰直而溫察言觀色正是鄉願丹頭取彼他山攻我良玉默地自疑只恐我的不是又恐認賊作子詩曰戰戰兢兢如臨深淵如履薄氷易曰知微知彰知柔知剛萬夫之望克韞又云井田法度今所難行即戰國時未必行得孟子何以惓惓於滕助與徹皆井田也鄉遂用貢都鄙用助徹之法較員通何以教之行助而不教之行徹又引大田之詩云雖周亦助也凡代無不弊之法何以獨言貢法之害竊意貢助各有流弊亦如差雇之各有利害以後代所行言之則貢法之不可廢亦如雇役之不可罷雇便於差貢便於助至今未有易者豈聖賢不算到此抑法有宜於古不宜於今也某云井田原與封建并行封建則疆域易明經界易正如一同之內遂溝洫澮以達於川徑畛涂路以達於畿皆有文尺步數分明老稚之所共曉既為郡縣則民易轉徙官制不定兼並遊食者多非如五等所能自理又天下已大去王畿道逺勢必改徹為貢今日之四海猶古者之侯甸也古人意思治地之法只是經理民居不是盡地之利每百里內各棄一二十里以為道路溝洫只是怕民遷徙商君開阡陌以盡地利是後不得不純用貢然自民家輸公各有定額能以什一取之亦猶之徹法耳吳越賦重有什二三者如周禮不易之田所謂上則江楚閩廣多三易再易之田亦有賦輕於二十者矣九等徵輸蓋自禹貢而然取民之道猶之治家業少則其算嗇業大則其算寬今民家自置産與民均分猶之徹助也輸米於公有過十一有不能十一者如使官家丈量民田要十分取一雖酌其豐歉計畝均分豈不為厲於天下隋宋兩行非久輒廢所以然者不知先王之意只在安民不在任地耳以千百國諸侯自家算嗇供應王官雖密亦可以四海一王丈量起科奪富與貧貿田自實雖二十取一猶為不可也限田與優免原自同法優免既不可冀限田豈可復行誠得良有司正其冊籍躬行阡陌知一方貧富之數令無詭寄飛竄之弊已助得一半徹到十分耳差雇雖互有得失然差役亦要良民土著不使浮浪之徒失陷官物雇役多是遊民㚥慝所合今綱運關係尚須差官唯民夫驛遞幫貼雇役耳豈能與貢法并稱貢法如大海衆水所合不得不鹹禹貢九等至十三載乃同食其明德者無庸復議如子産治鄭管仲治齊便不得不更定一番孟子亦是此意所謂業少者算計宜密耳如以五十里封疆界於大國內有君子野人之需外有戎馬交際之費無遂溝洫澮以别其域無田産穀祿以固其心此徒為鄰封芻牧何可十年自保乎孟子勸滕公行助只是安貼民生隂寓丘甸兵農之意不在徵賦利弊間也其心非貢法以貢法行久必使衆庶痛癢略不相關如富家子執簿詰租坐享成算一傳之後移丘換段了不復知亦無復伯主亞旅守望相助之意耳自秦開阡陌來君如置碁民如飛鳥方文之田已千百主矣每見孟子議論極是精微克韞又云什一之說必如朱子於公田中取二十畝為廬舍只以八十畝還公才成十一然周禮任地近郊十一逺郊二十而三甸稍縣都皆無過十二則亦不能槩定於十一者又治野上地夫一廛田百畝萊五十畝餘夫差等亦如之而公邑家邑小都大都之田皆當時公卿大夫之制祭祀朝聘皆在其中而餘夫二十五畝並圭田五十畝其制俱無所考豈請野以下皆孟子自為經濟抑原本周制而為之歟某云孟子所談皆是周公餘意趙岐云請野九一而助而如也欲令郊野九區如什一之助法也又當時國賦差重孟子欲使國中什一之賦從古者園廛二十稅一之法故曰自從也從古法也然考周禮國宅無征園廛二十而一自是王都之制與侯國不同孟子嘗言輕於堯舜之道為大貉小貉今安得使鄉國之間二十稅一乎想周制王畿近郊十一逺郊二十而三甸稍縣都皆無過十二漆林之征二十而五滕之國中亦有雜行逺郊甸稍縣都之制者孟子勸其一切皆行什一即所謂鄉遂用貢都鄙用助者然云使自賦則不定為常額取贏如貢法之硬耳諸侯之國中只當天子之近郊是亦王制非孟子所創也周禮以廛里任國中之地以場圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地康成云宅田者致仕之家所受田也士田者仕者之田所謂圭田也蓋天子之卿大夫受地視五等爵而初仕與致仕者未有采邑理合為宅田以佐所不及故此數田在公邑家邑小都大都之外又小國之卿僅視天子之士則自卿以下祿入甚少為置圭田五十畝亦是本王制所謂宅田士田者非孟子創義也田制餘夫受田并萊田三易之數皆如正夫小國郊野不比天子之鄉遂故為酌量其數得二十五畝令不至徙業以供致旗任輦治洫之役故自周官制度之後考究精詳未有如孟子者蘇潁濱至訾司馬法以為周禮指萬井之提封為百乘之采邑疑其出車不似古傳可謂過矣後世儒者輕議古書惑溺近說孔君以謂是鑿混沌而畫蛇足將夭性命而失巵酒今先生雅信周禮推崇孟氏亦五經之錧轄六藝之喉襟也劉薦叔云嚮讀問業第十二卷云身心原無兩物著物便是妄意意識情欲附身而起誤認為心則心無正面亦無正位又云要曉得意識情欲俱是物上精魂不是性地靈光又云格得此物十倍分明始信得意識情欲是心邊物初不是心分剔痛透雲霧俱消矣然思意識固為心纍亦是心之所生孟子云乃若其情則可為善夫子云我欲仁斯仁至矣又云欲立欲達如此等情欲皆在理路盤轉謂何非心且如無此四者則此心便虛空與葱嶺何異葱嶺之學掃除一切單刀直入故曰本來無一物今稱原無兩物則尚有物在又云意識情欲是心邊物則物復有物竟多無所掃除者孟子謂凡有四端於我知皆擴而充之要使人於情中認性欲處認理人際認天動靜體察一念之生觀所繇起一情之發審所繇止到人欲盡時天理流行自然皎日當空纎雲不起入夷出晉赫赫如常某云兄謂孟子所言異於夫子抑夫子所言異於孟子耶孟子說擴充不是漸次夫子說欲仁不是頓了萬物都有個真源知所繇起知所繇止知擴知充此一路火光如從電來則是隔山雷影不是本光如從燈來則是竈下炊灰不成獨照只此一物通透萬物要在意識情欲邊頭認他如借電燈以準刻漏也夫子立言如中夜泰山金輪陡現孟子立言如東窗正坐特地分明葱嶺諸賢直從被中說是寒來暑往耳善格物者只格一物格了一物更無萬物某看一物尚未能透如何敢說無物來繇又云如俟人欲盡後天理流行且待雞啼占風撥霧也劉薦叔又問前講云定靜中間自能安慮人到安慮始識此心真正面目藻思易云何思何慮孟子曰不慮而知慮似第二義大學乃自知止定靜之後得之則慮是聖神絶頂工夫矣晦翁云處事精詳此不過一貼細人事耳豈必盡從靜定中來積疑數載及讀書經安汝止惟幾惟康始知惟幾之慮決自安止中來禹思天下有溺者繇已溺之稷思天下有饑者繇已饑之伊尹思天下之民不被堯舜之澤若巳推而納之溝中詩云逮天之未隂雨徹彼桑土綢繆牖户子曰老者安之朋友信之少者懷之五聖人積思待旦不寢不食要盡天下納在至善之中盡百世食他明德之報不知多少險阻曲折豈是不慮而思之所能了中庸云誠者非自成已而已也此知止能慮都是誠明動處到了能慮才能盡其性能盡物性可贊天地化育二氏亦知定靜如何識到能慮管仲諸人亦慮周數世乂安人物又無源頭學問終歸小補前日說思則得之不思則不得只一思字是盡存之要法可是此道理不某云正是此道理亦正是此事難得精詳也民便是民物便是物如何看得有一體之親有明新之盛易曰唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至唯幾唯深唯神總是一箇能慮而蓍龜似不慮得之聖人於此看得分明知天下只是一物更無兩物日月四時鬼神天地亦只是一物更無兩物說是兩物者人所不知龜亦不知蓍亦不知了說是一物者何以人所不知龜又能知蓍又能知只是人多思慮如泛海洋泛看流星無復南北到有一定東西範圍不過曲成不遺兩膝貼地一日一夜周行十三萬里若竟此言只恐世人吐舌也要知天地只是殼子日往月來寒往暑來只是脈絡周行文數無數聖賢只為天地療得心痛不曰如之何如之何者吾末如之何也矣又云天地無人只是一塊血肉人無天地難道一線空懸薛當世自寧德來鼓篋甚殷初至問學以何為始某應云博約為始當世云約猶有所始博何所始某知其學有繇來因問云兄何所學當世云潔其心某云潔心云何當世云潔其心則神明來舍潔其心則聖賢為徒潔其心則君親可格某云以何為心答云此有覺者為心某云何者是意答云此轉覺者是意某云何者是知答云此不受覺轉者是知某因問云何者是物良久答云此中無物某云既稱無物何得有心有意有知既有心有意有知何得說是無物良久答云謂中無物所以有知如有物者知安從來某云若爾無意何從得知若爾無心何從得意知意心身生千萬物此千萬物各印爾知此是博約路頭通天徹地勿勤灑掃只衛空宫翼日又問知若有物不如無知心若有意不如無心因意見心因物見知果然心知中初無物某云如此則爾身中初無心知何從又見有意有物薛云物來觸心知以虛應知往接物意緣觸生虛觸之間依然無物豈應心裏有物藏知某云如此則天地間盡數是物何獨爾心無意無知須知爾身的有自來又知爾心的有自受止㴠萬物動發萬知函蓋之間若無此物日月星光一齊墜落譬如泓水仰照碧落上面亦有星光下面亦有星光照爾眼中亦有星光若無此心伊誰别察又如璇臺四臨曠野中置安床日起此亦不起月落此亦不落漢轉斗回此不轉回依然自在打破大地二萬一千里這個心血正在中間為他發光浮在地面要與山川動植日月星辰思量正法也此處看不明白禮樂詩書都不消說翼日又問若此則是三界惟心六塵惟識也某云現是一身莽說三界生成五藏妄碾六塵不是大雨淋頭那得通身發汗如再說者則不須談翼日又問古德嘗言儒者只曉得格物不曉物格曉得致知不曉得知至某云不曉得物何繇說格不曉得知何繇說至我只要人曉得一物不要人了得千知薛云程朱夫子皆與崖謙諸賢講論不知當日辨折如何某云大地盤旋見星見月竈㕑燈火不禁夜行當世翼日請歸告道便云明日回去又别是一樣學問陳獻可博覽羣書喜為通志成務之學貽書來極論洞璣三極之道以為古今未有某未之敢仞也獻可所著為象林及洞璣式象皆本晉書宋天文志裒益洞璣為立象序卦之所繇始來書言乾集虎首坤集龍尾繇是卦數爻象相推而萬世不盩晷律不違日差地行循環不忒天之言也亦羲聖所欲言也兩極隱現於乾日月出入於坤轉六十四為反對三十六倍反對為七十二以之直十二爻而取度則二五之髙深盡以之接運氣則腑臟之主客治以之取交㑹而加乘則日月之贏縮定天之言也亦文聖所欲言也大明生於東帝宫出於震太隂視之盈虧五精視之遲疾頂踵合于乾坤星漢區乎八際前際後際貞緯雜緯易詩春秋往牒治亂不爽君子推之可施進退補救之權周官不廢十輝餘圖遡諸占候君子明之可布敬治天人之業天之言也亦孔聖之所欲言也凡夫子所言皆自然之理故然之蹟夫子曰行于自然之謂易營于故然之謂厯易者行于自然而營之者也非夫子自道乎某自為此書來遍示同志無有人曾看到底者獻可此言雖不敢任然自是心地精微可謂窮理矣某答書既潦草不復記憶唐伯玉過齊頭見獻可書因問獻可何不道一畫之變究於十八每指諸卷分屬而言某云他從天道下手未曾布蓍既於兩極六爻看得分明久之自然造此且此最易悟想彼已習故不復談耳伯玉云自三千年只道六爻變化窮賾極動無人說得分明何不直舉與他想他直悟便談至此矣某云無多識人如何輕道一貫如蚤識一貫者雖百錢坐窮耳張朂之又云獻可開頭便說乾集虎首坤集龍尾繇此相推萬嵗不忒吾門豈有此法此法尚在羲軒已前數千餘年如堯時日躔在虛則前去三千年亦只在璧奎之間安得遂符此數今過此三千年日躔壽星大火之交安得虎首龍尾常宅乾坤乎吾門只舉此段以為積算之始非以此為限如何守此萬年不爽某云伊亦看得分明伊云象數相推晷律不違日差地行循環不忒既曉得日差地行寧不知虎首龍尾之非定舍只謂從此數起萬年可齊耳朂之云獻可為何從聲音入手某云是其所長引伸便到凡讀書先因其明後通其晦如入暗室久便分明也朂之云邵堯夫負不世之資研精三十年吾門每每說他不合獻可此處登標遡本如何看得分明某云凡窮理先致一曲後覩大全如為性命之學與秀才家講只是茶飯耳曽經外道走過一日豁然自知其非便十分洞徹矣為天道之學與厯律星象家談之只是呆呆畫餅曾經邵家走過一日豁然知他未盡便百倍完成矣朂之又云堯夫聰明自仲尼而下與太𤣥潛虛元包孰為優劣某云前日說過太𤣥而下惟皇極書粗得其意略為齊整耳凡讀書須洞見本原知羲文所以因理明象因象明數有毫髮不可那易之處非為方局隨人下手也揚子雲作太𤣥窮於畸零之分司馬氏作潛虛只得九分之一邵堯夫作皇極準于天道六甲之方至於盈縮氣朔交㑹不復能舉以之命厯推策則太𤣥之視皇極猶髙祖之於雲孫矣消長乘除只是救敗之活法如要上遡羲軒下觀周孔必洞精七厯然後以易通盤打算乃知聖人所謂一貫不繇多學龍馬所謂呈圖不繇文字乾坤屯蒙之次非為偶然天一地二之文非為泛舉因而推之五百之期六十之甲歲月日辰有饒有乏盈虛交食各有其端故云易之與厯厯之與律三者同用也記某少年嘗作太咸以形聲色九九相推各得七百草九本於河圖曲折之數兩其隂陽以六因之足盡萬物之用然亦到底與太𤣥同摹其所以差者不過謂元㑹運世歲月日辰約略相等耳必知此四者實不相等數自一畫至十八變乃知歲星之準鎮星之遲熒惑之倐閃金水之附麗固各有繇非偶相值也聲音唱和本之於律律生於易易中象數豈可纎忽那移自漢以來推步未通皆除坎離震兑四卦以為監司後餘六十以準一朞之卦堯夫不知其繆别依歲厯以一十二相起以歲月日時起元㑹運世七八九六宛轉相因推於聲音有字無字只得影響非為實測一年之外至於周甲少六十日以至三百日可謂疏矣三統四分只是髮絲不能盡合遂至數年之外交食盡差豈可立大概之乘除包千年之贏縮乎至於聲音微眇恍惚以八方之風調五土之氣比於鳥鳴鈴語尚有未該雖鑄以鐘磬諧以律吕大小異制戛擊殊度則唱和之際遂不能齊况以口中之音調紙上之字變通愈便則調度愈難矣朂之云獻可亦稱夫子所云物無定聲各隨其方方無定音各依其義數言已盡其藴則獻可圖韻亦包得此意為何不讚歎他某云此道極為精微繇人自悟不因言說其有據者一金二石三絲四竹定依古法起於黃鍾終於仲吕自京房變律而執始以下遂乖本聲况以喉齒調其義類氣質既殊水土各别繹之則易精用之則寡效合之則成書分之則無律必欲分配勻調須上稽天道下察物數包詩經之列國參禮樂之條度一本於易以聽八聲知水火之極微悟金木之重叠裁以五土終於坤艮九八七六以類相從而後六書之義七律之變可以并著而互起也凡事簡則易從易則易知今以三十六母翻切相宣實為易簡而隂陽清濁到處難齊分以七聲則疑礙閒起又堯夫所云十唱十二實是古法未可輕議以九唱十二為百有八以四因之亦是古法但四因一千二百九十六則是天方數始合於音中自去八百有一以易裁之合去一千九十進退消長難以齊矣古云合同而化天地微眇之故未有不依天地而能長存者管子所辨五音為鳴窖離羊負豕雉木至今童姁猶能言之史遷較定律書出於金石後人更定遂指角為徵移羽作角况以開發收閉之義託唇喉齒舌之間六書之義僅存其一四聲之數反離其經是以洞璣緒論未之及收更俟他年研精請益耳時以此意寄獻可使去未知獻可以為何如大約此道可不覃精必欲纍思須精明易理以律麗之吾輩無獻可聰明且留精神以觀爻象動靜出入符之於身一欲審聲便生卜度既生卜度便落波流如洞璣者亦可得其大意知天地日月星辰寒暑只自一畫流貫自然極於萬世可示指掌知聖人無雕鑽之功神明非刻畫之器諸瑣瑣者不足勞心也榕壇問業卷十七
