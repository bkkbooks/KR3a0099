body:
  text: 榕壇問業卷十四明黃道周撰漳郡文章之盛則稱葵圃鄭家葵圃鄭觀察與其弟薊州公皆為學典雅相尚觀察沒而孝廉海門與弟肇中又以文行稱肇中二十餘著詩及詞賦數十卷以通家往來某心避之也既在㑹中問難維謹某心念鄭觀察為農臣上疏歸某尚未為諸生及在金處歸數過從見觀察口中誦說苑韓詩外傳及東萊博議動千百言如下晨鐘今安得如此人令人自慚耳肇中既敏好不恥某亦未遑别設一榻因對衆坐云三十年前某未解厯律之學一日過鄭觀察觀察方取器量晷問某云若知北極出地有處中天不某謝不知又問若知表影有處倒南不某謝不知又問若知日出入有非卯酉不某又謝不知觀察便默然别論史漢文章諸雜事某歸愧恨不食也夜持竹几坐中庭如此者兩年之間二三百日乃知南北中分隂陽贏縮之說以非觀察授我誣也於時坐中未有問難謂某與肇中自序家世耳肇中因問聖人吾不得而見之矣此章語意如何某云兄所疑何在鄭肇中云此章以聖人君子兩格敻分然自堯舜而下夫子所稱亦君子也依中遁世即稱聖者修已安物堯舜猶難君子聖人豈有兩種學問且如性之稱善心之稱恆或無分别大易以善稱繼尚書以恆稱性今又以有恆次於善人明心與復性豈有差等其間乎某云論學則聖人君子亦無兩樣學問論心則善人有恆亦無兩樣德性只是風㑹不同習染漸異夫子勸人實地下手耳嚮見吳雲赤說聖人不難只是有恆難也極有意思肇中云聖人可作要亦大關氣數豈是恆心所就昔封德彞言末世人心漸漓魏徵云如使人心漸漓易代而後豈當化為異物耶恆稱君子立不易方大過稱君子獨立不懼天下亦不少此等人夫子品他在善人之後又若致絶望者不知聖人善人的是何人又不知恆無恆虛恆約便可稱善人亦可到君子聖人不某云孟子說美大聖神夫子說不驕不諂不失其正皆為聖神了自夫子看來何所不合自我輩看來自然有德性問學尊道之殊如無尊道工夫任他常無常約常虛不墮釋老窖中只是空山朴子何時得到君子位上肇中云曾子說顔子從事在若無若虛不多不能上置力想聖人都是此意權作朴實呼喚示人耳且如善人為邦善人教民全是為上者主持風教不知有何制置經略可以即戎去殺莫亦如老氏所云守嗇去泰能慈能儉却走馬以糞的意思不某云如此看來聖人君子又是天下為公三代而上羲農之儔了夫子此意與觀蠟禮書一樣發慨肇中看得分明肇中云既如此看何關聖學上事某云經世治心都是要細明體致用都是要實豈有兩種道理肇中云恐如此做去到頭亦只是恆心恆性不能到天下歸仁地位某云如此所貴學問也凡學問都是自家心細如粗大便自虛張不老不實且勿問他本體虛無上事也如論本體天下歸仁豈有兩樣心性在洪兆雲云前日嘗問善人是何等人却道是西域一流人今日對鄭肇中又道是老子手段釋老兩途吾輩不齒如何得在君子而下有恆而上某云某何敢作此說某少時曾會薛方伯先生方伯偶簡佛書歎云古之聰明睿知神武而不殺者夫某為艴然方伯因問兄看善人之道果是如何某云不踐迹亦不入於室方伯歎云從門入者不是家珤某亦愕然久之去今三十年方伯長我四十歲謝世十年矣乃聞肇中談話令人懷感凡過去諸賢有一種可𫝊者都於心性上有四五分了徹釋老只是不學無尊道功夫便使後來譸張為幻如當時肯學踐迹入室豈能貽害至於今日兆雲云論他譸張為幻還是無恆一流人從其道者當使狐狸貒貉白日噉人但當時楊墨尚未昌熾不知夫子何以發此言論某云夫子亦有為而發吾輩只論聖功不問緣繇耳兆雲云此話亦豈有繇來某云備在春秋許爾翼云夫子當春秋時木鐸天下便是萬古聖人於時君子則有蘧伯玉子産州來季子晏嬰程本及門則有顔閔四科具體分體者以至身通六藝七十餘賢雖四友十亂可以比肩如何便想有恆之難如子路行詐宰豫改觀要是一時有激之言豈可以此便概一世若說人都要做聖人君子不要做恆人所以為有為盈為泰不可方物難道夫子教人不做聖人君子善人但做恆人也某云聖人善人就不是恆人做的亦是恆心做就爾翼云孟子說恆心有常只歸之士從士做聖人寧止數級中間踐迹升堂得門入室在夫子造就不少其人何以遂致絶歎所云有為者想不為及門諸彥也某又云備在春秋他日兆雲問尊光春秋中夫子豈有致慨有恆之說尊光云無之兆雲云㑹上嘗有此論尊光云夫子說無恆不可作巫醫又云不占而已說在昭公二十五年臧㑹之竊寶龜三十二年史墨之論大壯也二十五年冬昭伯如晉臧㑹竊其寶龜僂句以卜信僭云僭吉臧㑹遂為僭也詐而見逐久之計於季氏季氏謂其臧氏所逐也臧季方惡及昭伯出亡季氏遂立臧㑹㑹曰僂句不吾欺也三十二年公薨於乾侯趙簡子問於史墨史墨曰社稷無常奉君臣無常位三后之姓於今為庶在易之大壯以雷乘乾是天道也季友之生卜人謁之曰世為公輔政在季氏四公矣民不知君何以得國此二說者皆以卜筮占玩互反臧㑹以詐叶於寶龜史墨以壯干其常位想是夫子所非故發此慨也兆雲云如是則只為無恆發慨不為聖功立論易稱恆以一德恆德之固也又云天地恆久不已日月得天而能久照四時變化而能久成德之配天地日月四時者恆而已想不為此占玩兩事尊光異日以告而德而德曰其為昭哀兩公乎昭公之在國也比於宵徒而逐權臣其出也不信而失衆三十一年公在乾侯傳曰言不能內外也恆卦上下皆凶取鄆取闞取之而不能居也失其國而以五百乘為臣哀公多妄而君臣交惡叛吳歸越卒以不復夫子之歎其為此乎抑為桓康二子耶聖人之生不當堯舜文武之盛又不及成康有道之君次又不當隱釐之際而當無恆之時乍用乍舍詩曰終風且霾惠然肯來終風且曀不日有曀又曰曀曀其隂虺虺其雷是夫子所為致歎也某云某自見鄭觀察薛方伯後三十年來始聞典論聽者勿謂巵言然吾輩只管立身不須歎世鄭孟儲云隱釐得為善人乎某云隱公之遵父命僖公之用季友還是君子一流人孟儲云隱公在讓不明以啓鍾巫之釁季友既殺慶父僖公藉其成勞耳某云如此則天下無善人也孟儲云恆為久道化成之卦九四又云久非其位安得禽也然則盡變體常都無定理何以一德貞固其事某云恆卦內外初終皆不可動嚮嘗說過兄未致思耳孟儲云恆五爻皆凶豈皆謂動故凶乎某云吉凶悔吝皆生於動至於恆者只是守常初三四上才動便凶五爻差可比二作內吉作外凶婦人性靜夫子性躁婦人動小夫子動大故曰婦人吉夫子凶孟儲曰象云婦人貞吉從一而終夫子制義從婦凶也此是何解某云婦人從夫雖有所動終為義制夫子從婦才有過動所壞多矣隱公沒於鍾巫釐公從婦於禚雖未失德要是君子所不取也孟儲云風雷原是變動如何說不易方某云我輩守貞正於變動處見風雷極是朴實每有變動先徵於色老圃老漁之所能曉驚蟄之初義不可浚閉電之後義不可振禾稼將華義不可速禾稼將成義不可久所謂制義要於動中取靜耳孟儲云如此則時也何恆之有某云唯恆所以可久勿為字義所纍羅期生云記嚮日講論都就長男在外長女在內家道久成處看出今以雷風解之不知雷風一物是有是無是盈是虛是約是泰某云有無盈虛約泰在雷風身上某則未知如在天地身上决不是譸張變幻出來此物皆根於日日道漸長則陽氣漸盈陽罡觸鹵破水與石其勢迅發如擊焰爆風起則雷止雷起則風止風雷交作勢不移時先風後雷灑雨而已有無盈虛約泰的的在人目上如何假冒得來期生云夫婦作家盈虛約泰自然瞞昧不得如值無常却自譸張家人說言有物行有恆都是此理不某云雷風自為夫婦便是君子聖人風動而雷乃起是為夫子從婦雷起而風乃止是為婦人從義也兩物鼓舞變化萬物只是為善之心戴石星云比來說有恆聖人都遼濶不可解今日只問聖人亦只是恆心恆人亦俱有聖心只不要看聖人太難看恆人太易耳某云雲赤亦作此說試問玉宸看玉宸云宇宙聖賢總是善念做起這個善念在天為明命則曰不已在人為至誠則曰無息無息不已正是恆處故易曰繼善成性又曰觀於恆而天地萬物之情可見矣舍一個善無處討有恆舍却有恆亦難名至善尼父繇聖人君子說到有恆是繇神聖見本原孟子繇善說到聖神是繇本原推神化徹上徹下宗㫖相同諸論品論人都是無頭學問細思聖善並提便是善為聖體恆是聖善之在人心者夫子罕言心性只說出聖善使人自醒此心此性可是常有的是不常有的可是常善的是不常善的歷歷自勘有無盈虛約泰之際極是分明某云看玉宸說得極明白同時侯晉水亦問厥有恆性民之秉彞彞與恆均是一義今言善又言恆可是常善便是恆抑是有恆便是善耶某云常善便是不已不已便是維天之命晉水云如此則聖人君子善人有恆無分别了某云工夫自然不同聖人教人指㸃次序得有結宿耳晉水云如此則安得嚮來許多言論某云總是一個雷風有時驚天動地有時發火聞香天地性情於此可見鄭肇中云嚮來議論雖有結宿尚未的據夫子雖引導下學要層次到頭畢竟尋常修持何能證聖於經書上有可直達無疑者乎某云聖賢原無頓路只是源本的的不差易稱乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業此賢人便是聖人君子一流人世人只管要德業不要易簡所以將無作有將虛作盈將約作泰事事俱有枝葉把自己知能看作天下權變文貌聲名日張日侈所以望之則不可親從之則到底無成既不可久如何可大只是中不易簡所以無恆夫子說以約失之者鮮孟子道不失赤子之心人能保此赤子之心到不惑知命何患不到聖賢田地赤子無他亦只是易簡易簡只是恆性今人說良知良能便要靜虛吐靈發許多光焰出耳何不說易知簡能朴朴實實無機無械夫子說聖人可做我也直地要做聖人夫子說聖人不可做我也直地做我不做聖人簡簡易易可知可能易曰直方大不習無不利有盈泰便是習直方大便是性性字既明天亦可到聖人則猶是人耳肇中云無虛約與直方大如何商量某云此處有何商量有習者無虛約亦是習也明得善體但覺日簡日易終身無一盈泰念頭確然隤然便與天地相似肇中云如此即是日損之說不某云恆尚無益何處有損損益便自變動動便有凶如是恆者雷風破山此體不動肇中云如此則安得富有日新某云可久之為富可大之為新莫作難親之德莫作難從之業肇中云如此莫是願人不某云願人如何可久鄭孟儲於是再舉小德川流之義某云此句被人埋沒多時今方拈出亦是快事嚮來只說不害不悖耳何曾見川流意思孟儲云如何下二章說時出經綸皆當得川流意思鄭康成以小德浸灌喻諸侯大德厚生喻天子又云唯五始足以當之此是何說某云古人以中庸一書皆是說仲尼德業至此章才分明寫出春秋五始一元年二春三王四正月五公即位以此五始配得五帝之德為天下萬物綱紀黃帝所授施於仲尼以為春秋二百四十二年文萬七千餘言每言一義不可增損自公穀左氏皆為此說康成學兼三傳以春秋為祖述憲章之實蹟其義數千凡例數十為小德大德之總云耳孟儲云如春秋只是文武之緒何與堯舜上事某云古人以元始氣以春始時以王始治以月始朔以即位始令本於璣璿二典之意以欽若敬授允釐咸熙此即祖述所在至其義類正變皆本於周公舊章常制杜氏所謂稱凡者五十其别四十有八雜稱二百八十有五是也孟儲云如此則上章所云禮儀三百威儀三千精微中庸知新崇禮是也何必旁引别傳某云後人讀書所不及古者只是掇皮便止耳聖賢著述皆無淺義引類不伸精微不出如何得有知新崇禮學問如說此德非獨春秋詩經三百五篇千七百餘章一字一語有禮樂之陳日星之垂帝王升降四千餘年諸侯進退列國盛衰因此為序譬如百川中藏萬澗溝澮溪壑有源有委涓涓不竭流而趣海其義一也孟儲云㑹中屢說詩春秋為何不說書禮樂某云禮樂即在詩春秋中書自孔壁而後或存或亡云贋云真繹其篇章以存法誡俱在敦化之中矣郭受子因問後人讀書不及前人只是拾瀋亦繇别察不到先儒以下章仁義禮智四德為川流四德即元亨利貞乾元所為資始也如何說是小德俗儒開口便道月落萬川人間學問都為此等語爛了然有一事可疑水中看天地與空中看天地了無分别鳥不見空魚不見水想魚之視鳥亦猶鳥之視魚而人於實中看魚看鳥辨别金木水火之性不知人在敦化中間抑在川流裏去某云如此問亦希竒察天察地不礙飛躍是敦化上事鳥以空為實魚以水為空是川流上事也受子云如此則依舊是不害不悖之說了某云人於此處豈得異同受子云人與魚鳥都在氣中氣無虛實而有隂陽陽氣蹈空隂氣蹈水人立隂陽之中以統五德當謂氣即是德也抑還有德生氣者來某云德不可覩聞氣可覩聞人落氣中亦與魚鳥無别凡著覩聞戒慎恐懼已自無及如人病中中暑中濕是為重感不可救藥也如要細細分别就人身上敦化川流何可盡說一日一夜氣一百周脈行一千六十餘丈豈是人耳目之所能及聖人以天地觀身以事業觀天地作用看宇宙間萬物四時只是兩部詩春秋耳凡世間有形象者都是吾身文字有文字者都是吾身文字注腳過此以往總是魚鳥事業羅期生問前日諸友有問動靜悅樂者未有以對也某問云何期生云先儒稱靜觀萬物之理得吾心之悅易動觀萬物之分得吾心之樂難以應觀吾心動靜盡於一敬何難易之分程子云惟靜可為學又云靜觀萬物皆有生意王勝之常乘月訪康節必見其正襟危坐當是至靜之內見得精明如此某云都是動處勘得破此靜者原不與動俱動羅期生云此靜者是太極不落隂陽動便落隂陽不是太極了某云太極與隂陽總是一個動極處正是不動所在張益州嘗謂李畋曰子知公事有隂陽不曰未也益州云凡百公事未著字前屬陽陽主生變通繇之著字後屬隂隂主刑刑貴正名不可改也此亦與堯夫同意然事前後則無隂陽之分心前後實有難易之别要曉得此物動極實是不動所以隨寓能安入羣不亂不要光光在靜處坐尋起生義尤詹茹又問夫子把有無約泰虛盈論心子思以大小言德都是精微上事然亦有人綱領極是分明於條目上却不甚密如郭崇韜張嘉貞張齊賢韓魏公都不料理細務亦有人極細謹却不能理大事如石奮衛綰范質竇儀都無甚發揮是他材器有大小之别抑是他學問不同某云自然是學問不同詹茹云恐他德性上亦有些分别某云其分别者是質不是德性如德性須是尊養得就詹茹云如郭崇韜張齊賢加之學問豈能如顔閔之醇衛綰范質加之學問豈能如由賜之達耶天地缺陷尚難完全牛馬齒角亦有去取且如鄒衍東方生之流亦是材具使然豈是恆心喪了能有如此明辨某云亦是不學使然詹茹云張益州每勸冦公學冦公學前是如此樣學後亦是如此益州自家擊劍任俠既而折節好學到底有些劍俠意思想人不能如仲尼都在小德中沿流赴海而已西漢以來文章人才各不相似恐别有氣化在裏面吾輩囿之而不自知耳某云氣化山川皆能囿人只有心思通徹天地仲尼在未學前只是忠信美質加五十年學問便是堯舜文武前頭只恐忠信無基為有無約泰盈虛所蕩耳莫說美大聖神不是善信本業也吕而德云天地大德曰生易曰復小而辨於物復之與生皆仁也夫子對諸賢終始是一仁字自顔子而外未嘗輕與人仁子思說中和又說肫肫其仁仁與天淵並峙便是三才之極此處說大德小德莫都是說仁字易曰復其見天地之心乎合而言之天地之所為大也夫子末年刪定纂修都是仁之藏用子淵求之文禮子貢求之文章舍小德亦無處見大德了不知尚有何處見大德不某云如而德說者一嚮皆是謝爾剡見某閒論春秋因問春秋時諸侯不朝京師而天王數聘列國此自夷王之烹齊哀始乎抑自褒姒之誑燧臺始乎某云履霜堅氷其來已漸此事魯人不得不任其咎爾剡云鄭於平王母弟也繻葛之戰射王中肩天下諸侯無有非之者何獨魯能之乎某云凡春秋以天加王天王無有不是者繻葛之師天王獨四聘於魯而魯無一朝春秋之書四聘以明魯之失禮也爾剡云當時天王亦未能秉禮以齊諸侯某云何處見之爾剡云隱公元年天王使宰咺來歸惠公仲子之賵此未死而賵之也文公五年王使榮叔歸含且賵此已死而賵之也均之母也成風以嫡婦含與賵死而致之致以親仲子以庶其子未立未死而致之如為隱殺桓之母者猶奚斯之聲也後世以為灰釘此其失在天王某云左氏誤也仲子蓋已卒惠公之年春秋不書近於殉者隱公以桓之母母之故天王歸賵焉爾剡云文九年秦人來歸僖公成風之禭彼失之早此失之晚故春秋譏之某云春秋尊天王不責外國天王而降禮其在秦乎魯之於王國則未有處也爾剡又云隱公三年秋武氏子來求賻魯已含賵而又求賻則汰矣桓公十有五年春天王使家父來求車文公九年春毛伯來求金四傳之所交譏也某云君之於臣也無假不貢則求之求之猶責焉耳天子無不直於諸侯以桓公之時天王屢聘魯無卿士至於京師者王崩而不及賻使天子不具乘馬是宗國之過也春秋悲之以天下無可責者而責之周公之孫使周公受過焉耳爾剡云威福出於天子以禮正名其孰敢違莊公元年立不討賊又未有武功冬王使榮叔來錫桓公命何休曰弒逆之人法所不宥而寵以大勳故去天稱王文公元年天王使毛伯來錫公命穀梁曰禮有受命無來錫命錫命非正也不正則不威又何以命諸侯某云如此則難為天子矣王室式微强藩悖叛天子不得已先施於其宗國屢降不反所僅存者聘問誥命鼎隧一二虛文耳故府猶且重之獨於宗國致其惓惓而君子又從咎之是為父母者無以待老也詩曰或以其酒不以其漿鞙鞙佩璲不以其長是諸君子之謂矣爾剡云胡康侯何以不廢是說某云讀書何關他人除是堯舜文武當仁不讓何繇親見周孔禀受而行張朂之以前日謝爾載問納音之義某未嘗答直以太師吹銅之語塞之因問此事著於天下既為明時所録百姓日用不知瞽師搖惑其說今日語之不明何以破俗正義某云此義有何要緊朂之云如火一土二水五木三金四之說何異汨其五行此上世所必誅而今人用之何也某云他自愚黔首何關兄事朂之云畢竟源委如何某云前日說過先甲三十後甲三十五自為運六自為氣五六相乘以行河圖初起四九自西而東反五以歸於金火是為西南金火之運次起一六自中而西而東以歸水土是為中氣戊艮水土之運次起二七自南而東而北而西歸於火木是為環氣南東火木之運次起五十自中而西而南而北歸於土金是為閒氣坤已土金之運次起三八自北而中而南以歸於木水是為東北木水之運此五運者以包六氣行於周甲之中相與為治金火之治水絶於東北水土之治火絶於正北火木之治土伏於四季土金之治木絶於正東木水之治金絶於西南六氣之行以分五德先庚三十後庚三十五六相命以行河圖初起五十而西而南而北而中木絶於正東為土德之治次起四九而東而北而中而南各存其方次起三八而北而西而南而東則土絶於房中三甲之治金水三庚之治土木五德皆在其中際十與十二各相起也作者之意以干支相命氣運之德不能該全聖人用其所德棄其所絶揣摹圖象以為義類耳九宫三白南北利運之說皆從此出以參於素問不能合也素問又以五六命歲得其大者梗概非逺矣朂之云素問運氣以正化主客别其干支甲己乙庚丙辛丁壬戊癸為五行之序子午君火丑未濕土寅申相火卯酉燥金辰戌寒水巳亥風木與此敻然不同何繇比類某云素問之取象於後天猶納音之取象於河圖也家自為說以稽於爻象猶醇醪之化為醴蟻矣仲尼作春秋自隱公至文公一百四年書日者二百四十九自宣公至哀公一百三十八年書日者四百三十二干支俱在義無所屬然自伊訓洛誥吉日十月以來備有其說何可勝也勗之云伊訓武成洛誥諸書皆紀日而不紀歲左氏紀歲隂而不紀歲陽漢元封七年歲在丁丑而洛下閎鄧平等以為甲寅史遷亦因而用之以為甲寅甲寅之與丁丑差草四年納音既殊運氣亦異施於上古春秋亦無己未文王亦無戊午矣日不可除則歲亦不可除歲可紊則日亦可紊也嚮見丁玉明先生亦以歲甲干支無據為談春秋猶據歲星所在為證今嵗星移行差三四宫如何可定某云詩經傳於誦說尚且不絶歲次自五帝以來閭閻之所稱習如何紊得如有紊亂則是大撓容成積差以來非復洛閎鄧生之所能改也凡讀書先經次傳次史可以道古耳諸紛紛者都費辨折不煩推求朂之云古人稱七聲十二律皆與納音相通自漢唐日家去古未逺皆有是說豈是閭巷亹談某云且看周官自然曉㑹許爾翼又問天以一中分化只是一理安分大德小德聖門亦稱小德出入可也又稱小道必有可觀致逺恐泥莫非小德亦是制度文為經曲之末如詩書六藝豈可以小德目他凡可出入的物終是泥滯川流不得要細細分别起來却都是大德貫串前篇所云莫載莫破是也以莫破說不盡又以川流贊之語極分明夫子生平口中不說小德自禮樂而下軍旅便不談了子思却說律天時襲水土的是何物某云嚮才講過自元年春王正月至有星孛于東方都是天時上事自雎鳩河洲至景山松柏都是水土上事也爾翼云如此則春秋判與天時詩經判與水土春秋屬禮詩自屬樂記云樂以陽率天禮以隂率地春秋何以率天詩經何以率地乎某云隂陽禮樂固自為用堯舜未嘗作詩而有喜起之章文武未嘗作春秋而有周官之法此處何必分行爾翼云古人三才同為經緯黃帝宅丘之法周公卜洛之書想别成小德秦皇焚詩書其農圃醫卜皆賴以存而此獨無有豈是仲尼所刪抑是秦漢人不貴小道耶某云七略所載五行三十一家六百五十二卷有神農太幽堪輿金匱五音竒腴其託於軒后者或百餘卷别為形家宫宅地形數目倍於醫方則是亦前代所尚也古書既不可見今為晚唐南宋諸公滅裂殆盡何足復談爾翼云天道用龍地道用馬龍有隂陽馬分牝牡地貴牝馬天貴陽龍今說家以隂龍為真陽龍為僞不知此說何始某云如此等事某皆未學且舉周禮一一再看鄭肇中見諸賢言論浸廣或逺於經傳因問三皇五帝之說某云此論備見疏家開卷已賾不復能存於兄所疑云何肇中云帝王代逺載籍互異如春秋運斗所指三皇為伏羲女媧神農如秦博士司馬貞補皇記所指天地人三皇又尚書大傳稱燧人伏羲神農禮號諡記祝融伏羲神農孔子稱五帝答季康子以伏羲配木神農配火黃帝配土少昊配金顓頊配水其答宰豫則曰黃帝顓頊帝嚳堯舜家語與戴記又自不同孔安國以羲農黃帝為三皇少昊顓頊帝嚳堯舜為五帝於理覺順是儒生之所服習史遷帝紀祖五帝德又以黃帝為五帝之首而獨遺少昊以宗顓頊今世所傳唯此兩家祖史遷之說則當以燧人伏羲神農為三皇黃帝顓頊帝嚳堯舜為五帝祖安國之說則當以伏羲神農黃帝為三皇少昊顓頊帝嚳堯舜為五帝也仲尼於三皇不言燧人於五帝多一少昊安所取裁某云於此事實所未知肇中又云司馬貞補皇紀既稱伏羲女媧神農又稱天地人三皇此是何說某云褚先生小司馬又何足談肇中云胡五峰亦主小司馬之說又閲三墳載伏羲為天皇神農為人皇黃帝為地皇次序又别然與安國同㫖矣前輩如譙周應邵宋均皆主史遷主史遷者雖不言三皇自應以燧人火化神農粒食與庖犧并為皇始而黃帝得正五帝之先皇甫謐世紀孫氏世本皆主安國主安國者雖升帝為皇自應以少昊靑陽顓頊髙陽與髙辛并為帝紀而唐虞得正五帝之終二者孰從某云如兄說極是明白三皇五帝俱是後人所命不是本地傳宗認逺祖者隨人祭掃勿問內神是日發題原為修已以敬而肇中送難以有恆為首諸兄從之遂舉修已以繫下篇榕壇問業卷十四
