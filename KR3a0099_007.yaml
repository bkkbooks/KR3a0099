body:
  text: 榕壇問業卷七明黃道周撰九十兩月以文宗至欲停會義唐偉倫云諸生雖就試不過數日暇期甚多張敬夫當軍旅簿書之際不廢講章蔡季通於患難奔竄之餘屢質疑義今方清平捉筆如茶飯之有賓客何遂輟其饔飱乎某笑云家有賓客亦看主人忙定耳聊舉四義聼諸賢作止以畢兩月之程一為君子無終食之間違仁節其次知斯三者則知所以修身又一為告諸往而知來者其次為知其性則知天矣偉倫因問吾門屢説求仁致知此是兩事抑是一事某云能近取譬是一語抑是兩語讀書人立心須要極細細得盡時條理分明自然到仁田地如取譬處是致知近取處便是求仁也偉倫云如今日説知三者則知修身告往知來知性知天此種種知果繇學問果不繇學問某云如不繇學問又説他怎麼程伯子云涵養須用敬進學則在致知致知只是學耳偉倫云如知斯三者是學告往知來便有不關學處知性知天漸到學無用處夫子前説多學而識説然又説非也如何專説學來某云此學豈有須臾可斷造次顚沛正是學問大關只此知字不是識想所造耳如夫子居平説修身一正心便了才説三近出來覺正心尚有不了處我輩不實實用工豈知好學力行知恥此六箇字於吾身上一毫糊塗不去如有一毫糊塗又那得造次顛沛之用歷歷以來同是此義不須疑也唐伯玉因問人生世上總有貧富貴賤死生三端不能自主執而較之富貴可割生死難齊有一等人始念只是怕死後來流為貪著富貴如李斯輩是又一等人貪著富貴到底要死亦無富貴如揚雄輩是千載下知羞李斯反為揚雄回護何故某云李斯初念亦不是怕死揚雄初念亦不是貪著富貴只是不曽讀書伯玉云李斯學於荀卿揚雄友於仲元如何不曾讀書某云兩公説性字不明便無讀書資質所以流浪漸與仁逺焦漪園諸公極與揚雄開脫正如德祖所云老不曉事耳漢家有兩人怕死流為貪著富貴如馬融就聘於鄧騭中郎應召於董公兩人皆頗知學但未嘗在仁字站足宋家有兩人貪著富貴流為怕死如王子明以天書固相死請為僧張天覺力詆溫公舍家奉佛此兩人亦頗知學却未嘗在仁字問途如識仁者中間豈有欲惡取舍豈有富貴貧賤豈有終食造次顚沛故説必於是是者與仁同骨不與仁同髓如説必於仁者猶於是處看不通透也伯玉云夫子於富貴生死皆言仁孟子於富貴生死皆言義安仁非君子不能慕義則壯夫可勉吾人精義之學當從何始某云夫子以仁甚水火以義掃浮雲此處精微豈有分别文信公云唯其仁盡是以義至聖賢都有必不可那移處才成精熟世人起意避却硬拗兩字流為孔光馮道范質趙普之倫何可勝説呂而德問仁之為道通晝夜一生死是不隨起滅的勘到終食之間只就著衣喫飯實實落落把世界許多勞攘一齊放下似不在頃刻環抱釋兹在兹之説某云著衣喫飯拋下勞攘如何便説為仁曽子云仁以為己任不亦重乎死而後已不亦逺乎豈是尋常實落得去有人於必於是處看得分明雖終食間消得十年學問也司馬君實常患思慮紛亂有時中夜而作逹旦不寐程正叔謂君實良自苦人有多少血氣當此摧殘其後君實告人曰近得一術常念一中字自然靜正正叔曰人於名言中縛得一箇好字不如一串數珠耳門人問受病如何曰只是不與心為主正叔但知苦用思量是不與心為主不知合食便食合睡便睡亦是不與心為主也而德云如何是與心為主某云無終食之間違仁造次必於是顛沛必於是張吉甫云既必於是便是定見定力如此君子是凜凜克治一步緊一步的意如何是存養渾全某云克治與存養豈有兩樣工夫吉甫云如此看仁字還在取舍欲惡一邉無違仁亦是不染著富貴貧賤顛倒恐怖而已如顔子三月不違仁亦豈是不著取舍顛倒恐怖已耶如三月後有富貴貧賤造次顛沛如何了某云人患無此三月工夫有此三月不違亦無終食違了人生到老只是欲惡兩字堯舜周孔是處看得分明除却欲惡是為何物顔子直頭欲無過怒如有一分欲惡便有三分過怒了豈有人於生死窮逹看得通透尚終日紛紛多過多怒的道理林非著云過怒發處極微欲惡動處極大聖人説無欲無惡説寡過無大過此處下手誰為得力某云程氏兄弟見茂叔特領無欲真靜之體李延平教諸生尋未發氣象兩意都無差别但須學者實實下手認得造次顛沛終食三月是何如工夫何如體段耳劉賡穆問君子一生在不覩聞處用工説出終食之間便涉覩聞如何是終食前一層消息某云伯淳常言人生而靜以前更不須説賡穆云終食前未便到生而靜上也某云自下床啼聲到今日談話何者不是終食之間通海銀河再無先後之别賡穆云論川上話頭似無前後論調御工夫到有內外不同某云如何賡穆云戒慎不覩恐懼不聞此裏面事似是前境造次於是顛沛於是此外面事似是後際某云此處直截更無分别湯水因緣某又語賡穆云朱元晦初見李延平敶説道理動輒造微延平云公懸空理會俱得種種道理而眼面前事却不理會何也此道初無繆巧但就日用平實細心便見元晦於是一意於下學今看夫子言終食言造次顛沛富貴貧賤是何等平實何等綿細更要想他前頭便是懸空理會也張藹士問自古仁人脫不得顛沛今之仁人亦脫不得顛沛豈是仁中合有此境抑是此處鍊得仁來耶某云顛沛何須危難只如蹶趨之間亦有動氣動志之别陸子靜云志道者造次顛沛動容周旋應事接物讀書考古莫不畢於是詩云小心翼翼無二爾心即是此法看子靜此語與程正叔所云為心作主俱在必於是處看得分明侯晉水問貧富一章聖人説學無盡頭耳賜論切磋琢磨初不就詩索解夫子與其可以言詩亦不單在詩上論學也假如空説往來亦與逝川同義如只説告往知來亦是聞一知二耳於此中有何進處某云藏往知來自是聖神要義溫故知新自是學人正諦此處關人靈明亦總須學問耳豈在言語推來如説言詩兩字不是詣極往來之間别有深義則易書春秋皆無一路通透矣夫子生平只把新故往來四隅啓發當作振天之鐸如今人看草木鳥獸蟲魚皆無一箇活動者就看得活動依舊是箇草木鳥獸蟲魚於吾人身心世上經緯那有一毫干涉以此説一部本草不成耳如何便到言詩田地晉水因問晦翁詩注得失如何某云他自成德底人不關風雅上事唐伯玉云如晦翁説四始六義再不相通諷刺之詠指為導淫懷古之談以為紀實如何得有往來之妙某云藏知之妙繫于人心玩咏既熟興會自見如只要讀數訓詁雖把韓嬰諸篇逐字推求亦了無意義矣如是胸中明朗新故相推義類環生都有進處即春秋禮樂總成比興有何滯礙豈必逺宗韓旨近詆朱詩耶陳非魚云寒暑日月尺蠖龍蛇共此往來共此屈伸易曰天下何思何慮此處知識更藏何所某云謝上蔡見明道時亦發此問明道但云極是要事可惜問之太蚤也呂而逺云聖門説話都是真實如無驕諂是子貢已往真實境樂好禮是子貢未來真實境道學自修即是此意今人只説是悟頭耳譬如中庸説淇澳之詩句句是平地用功如何攔去作悟頭也某云此説極好但有告往知來四字便是六經張本不在至善之篇别討注疏也修解原無二途知行即是一事進一步者色色俱新停一步者塵塵成故歲成明生雖同此日月亦自有進德修業底意思在此處煞執雖晝夜寒暑猶費磋磨黃介俶云子夏因詩知學子貢因學知詩夫子皆以為可言詩想説詩是夫子本意論學是二子素懷一從風雅上入一從實歷中來故覺言之有味耳如别人談之恐夫子未許也某云大家意思在詩禮上商量雖是説學已包括甚大子夏胸中先有禮後一句子貢胸中先有切磋兩語不是臨時答應酬恱目前如詩人胸中先有意思遇色成色遇聲成聲比興賦頌自然不同從此入道才有源瀾才有意致如外道人打偈只作空頭耳著想便打如何打到登岸所在介俶又問先儒謂靜固靜也動亦靜也靜者心之本體濂溪謂主靜以無欲為要如此則無思無為與何思何慮便關至極如何書稱作聖詩稱無邪與子輿所云心官則思顧相背馳耶某云無邪作聖寧是不思不慮如有思慮便不靜者要心何用濂溪云無思本也思通用也聖人無思而無不通又曰無不通生於通微通微生於思思者聖功之本而吉凶之幾也此原是濂溪破綻語然於誠明原始不甚差殊何得謂與孔孟異旨乎戴石星問此知生於思則何得謂之良知某云夫子誨子路只説知字孟子説良知便説思字如云思則得之不思則不得也與知之為知之不知為不知語意正自分明曉得思到良處便是思反無思之位石星云陸象山讀程易至艮其背四句復齋先生云汝看正叔此段何如象山言其終不明白直截謂艮背兩句是無我行庭兩句是無物耳正叔兄弟只就時行時止看得不繫於欲似有未了徹者某云程説靜亦靜動亦靜於心體止法極是分明如忘我忘物於此位上更須參覔伯淳常言物各當止其所八元有善而舉之四凶有罪而誅之此便是不獲其身不見其人如熙寧末司馬溫公致政家居呂申公再登樞府人以出處為二公優劣正叔曰呂公世臣不得不歸見上司馬公諍臣不得不退處此便於行止上看得不出其位學問須於動靜出處上看得分明莫説忘物忘我便足了事也魏秉德問陽明先生云致知各隨分量所及如樹有些小萌芽只把些水灌溉不要浸壞了它論此良知根芽與草樹不同落地光明貫天徹地聖愚之分只有保喪而無增減豈有只此端倪怕人浸灌的道理某云説則如此説何嘗見有良知落地光明陀陀爍爍也程正叔云學者如登山平處濶步到峻處莫不逡巡某亦云學者如提燈燈亮時自謂眼力甚明燈滅時雖一身手足亦不能自信也要須學得此光與日月同體低頭內照不失眉毛秉德又問程子説艮體是靜亦靜也動亦靜也聖門説心法是出入無時莫知其鄉既到靜源便無出入抑有出入俱到靜源則曽子所云艮體不出其位此位字當屬何所某云反震為艮艮自不動不動時只是克治洗藏反艮為震震自不靜不靜時只是恐懼修省各有當然攙越不得艮震分路未到乾坤之元如論兩元不分動靜既無動靜那有出入然則如何是艮其背不獲其身某云我徂東山滔滔不歸如何是行其庭不見其人某云我來自東零雨其濛還有精微於此者乎某云夙夜基命宥密陳無涯因問此位字得無即是素字素字即是仁字否某云此問大好賁者仁之色素者仁之地也有此素地隨他繪出富貴貧賤患難夷狄造次顛沛如一大幅山川草木鳥獸蟲魚屈抑動靜姿態橫生只見可樂不見離異耳學人無此素心便每每出位出位者如借人倩盼作我笑目才動此想便是哇淫勿道當碁奪人手路也劉賡美問盡心知性知天工夫只在存心而存心工夫又著在何處也某云不然中庸説盡性孟子説盡心工夫都在此盡字程正叔張橫渠於此處看得明白或問正叔要盡心者此心得有限量不正叔云人限以形氣不通以道安能無限量茍通以道天下豈有限心之物又云若謂有限除是性外有物始得似此數語於心性天上看得極分明張橫渠云天之明莫大於日以無目纍見得有數萬里之髙天之聲莫大於雷霆以無耳纍聽得有數千里之響中間寥廓自然如此人為耳目聞見所纍中間填實便不明通如要盡其心須知心之所繇來始得此數語不如正叔直捷然大意是看得到了賡美云要盡心須知心之所繇來則是盡心須先知天也某云此語亦不甚倒順數一家共此祖脈看得盡處便自通瓏賡美又云孟子一生養氣集義看來養氣是存心工夫故不動繇於善養集義又是養氣工夫故襲取不得浩然王陽明答倫彥老云心無動靜君子之學無間於動靜其靜也常覺而未嘗無故常應其動也常定而未嘗有故常寧動靜皆有是之為集義此語得無偏枯不某云陽明諸老自有一種是處某則不知只道是必有事焉而勿正心勿忘勿助長也鄭孟儲問性從心生中庸言性不言心此何以故人身中靈覺便是天又説知性了才説知天此中豈有分别乎某云盡處則無分别若不盡者勺水海性隙照天光終難説得分明也有意思人再勿傍影起形牽扯字義羅期生問中庸言知天可是先天之體孟子言知天可是後天之用與某云如何分别羅云伊著存養一邉某云存養便是先天之用也呂而德問紫陽云知性即窮理之事窮理便向外去知性祗從中尋此語如何領會某云紫陽學問得力在此自濂溪以來都説性是虛空人受以生耳紫陽始於此處討出二五合撰事事物物皆從此出如曉得事事物物皆稟於天自然盡得心量盡得心量自然性靈無遺當時諸賢皆為禪門所誤唐仲友便説朱某尚未解字義如何説性命上事看繫辭上窮理盡性以至于命此語極是分明李質嘉問夫子言性相近孟子言性善蔡虛齋云夫子以其不離氣質者而言孟子以其不雜氣質者而言豈孔孟立教亦異指歟某云濂溪以至靜為性善惡為幾伯淳以本善為性善而有惡者為質姚江龍溪皆宗是旨源流漫汗只是繼成注腳耳何關立教上事伯淳云才説性便已不是性也豈有聖賢作是言義荀卿才説性惡便開李氏牽犬之路伯淳徑云善固是性惡亦未嘗不是性如此則是天亦有善惡也儒者回護伯淳甚於夫子亦是當時未有思量耳尤詹茹問天性在人猶水性之在氷此語如何某云張橫渠不作此説作此説者猶程門氣質之論耳橫渠云氣質之性君子不謂性也又云海結為氷氷散為水氷泡聚散而海不與焉此處説氷才水性亦猶外道説石火電光非實論才性也詹茹又問火日外光而偏屬陽水月內光而偏屬隂木藏內光而亦屬陽金藏外光而亦屬隂土藏四光而隂陽合屬如此則稟受不同自有善惡何謂無耶某云如此五吏之才何關帝天之命詹茹又云有形便有神有力便有識亦有形到而神不到識到而力不到者濂溪言力而不競天也不識不力人也橫渠言在文王則知天載之神將毋性光到後形神識力一一完全乎某云性天亦如石火如要完全只看盡心心盡而後如登髙山四顧青蒼穹窿罩野王千里問窮理盡性以至于命此命字分明領得氣數如五十而知天命此便是帝王命世千古苞符難道猶是天命之謂性也某云上天之載無聲無臭至矣又云維天之命於穆不已不是性盡理窮如何到得此田地千里問孔顔而外千古幾人到得某云蘇子瞻傲睨一世見周濂溪乃云豈敢稱吾友造化乃其徒似曾到得千里云濂溪古今所宗吾門説他初不識性如何便説知命某云它已是盡心上人但不善於立言耳如其所到已在純亦不已路上千里問邵堯夫如何某云它自髙勝據其所得在伯夷伊尹之間只是未脫氣習耳千里云何謂未脫氣習某云看他垂老與溫公諸人往還吟咏之間卑薾疏脫處處逗漏千里云他聞洛陽杜鵑便知天下將亂豈不是知命消息某云知命不在此處熙寧去靖康尚六七十年豈有禽鳥得氣預道六七十年之事南北話頭徒開癡柄堯夫饒舌不宜到此也唐偉倫因問曾點竟是何品孟子嘗稱為狂如鏗爾舍瑟浴沂詠歸此又狷之中行者豈是嘐嘐進取一路某云後世鄉願太多便把狂字雌黃人物如聖門諸賢都有狂氣偉倫云如何某云千乘之國可使治賦百乘之家可使為宰束帶端章此是何語偉倫云它都實有此本事後世如冦萊公似子路劉晏似冉有亦都實有此本事春風沂水不過是眼空話頭耳孟子狂他得無以此某云他此處無不相掩看他斐然數言之下生動千古便自成章洪尊光問程子云聖人化工也賢人如剪綵為花便乏生意此語似太别白了圗畫看牡丹比之真者何啻萬里顔閔之與夫子具體而微豈有真似之别某云正叔此語是説子瞻兄弟搬弄文章耳如有若之與夫子形似亦在甥舅之間豈可認作衣冠敖孟耶林非著問先儒之學有理有數以理附數遂謂數學之精以數翼理遂謂理學之祕論天地竒耦則理立而數分論聖賢疇象則數成而理著然如文箕之蒙難孔顔之厄窮此皆理不勝數不知兩者孰為有權抑豈並行不得軒輊歟某云吉凶生大業隂陽竒耦窮達夀夭總是德業必經之路如使聖賢都要富貴都要夀考則爻象無隂蓍策無竒也夷齊顔冉龍比由賜八人生死天下窮竒然無八人盜跖彭鏗比屋而是也吾門以數明理以理明數除却理數性地自明不干管郭之事四義略相質難諸友作者不能強半余亦以相宅數作郊行未悉此論既數日趙與蓮偶過因問圗書之數某云此道迂庸備在廢簡如小兒畫沙牛羊踐踏耳有何奧義與蓮云圗書之出明是天地大文章不容終祕何妨闡揚某云如不容祕者前輩闡揚不為不極如容祕者朽殼枯草何以能談與蓮云且不説玄奧只道相得而各有合變化以行鬼神可是此一員一方折合補空縱行偏正者乎某云自然是此五十有五生成得來若無此物五行萬象如何變化與蓮云洛書四十有五却除了十如何亦相得有合變化而行某云圗之與書猶夫之與婦損益十五只成一百若無兩家萬象不立與蓮又云生成竒耦左右生尅位置各殊如何同用某云夫婦支干音聲笑貌亦各不同排比不得趙云既是同用夫子如何只贊五十有五某云欲成家計只説丈夫林興公亦問河出圗洛出書聖人則之言出孔繫後儒鑿空謂九十之數非古圗書謂河圗天球同在東序乃歷代相傳重物而書為文字總名無文字不可名書某云河圗既為傳寶則易繫五十有五之贊不足復疑箕子明説汩其五行則洛書合有五行生成之説然考古緯書河圗九十六種皆為帝王升降之符譬如一易首坤首艮各自名圗非有别象洛書稱疇稱範亦是自家推演道理不必天畀名言也想來九十成文自是天地所立推演次序自是歷代不同羲文之際其盛著者何足疑乎興公又云李之才邵子及劉牧程大昌諸人并以九為圗十為書晦翁改定十圗而九書此又何據某云論易繫則有天一地二之文論箕疇則有五行至極之數晦翁據此分圗分書然圗書之出非在一代箕禹以前羲軒而降變化九十義類相推自非聖人難詳其説耳林朋夔又問洪範一書以為推衍自洛不知止此戴九履一左三右七二四六八之數耳何所配合而始為五行次為五事八政五紀皇極三德稽疑庶徴福極之種種人知圗從中起書亦從中起故皇極為宗而八者麗焉然以書敘疇以疇衍書洪纎畢具而倫次不齊考所繇來從無要論徒謂箕子推衍與天錫神禹者原自不同耳若此則何謂天乃錫禹洪範九疇也某云賴兄此問才覺生色前日問參兩倚數最有關係此關係又大千古暗燈無人起火也某愚昧幼嘗尋繹是書原本河圗九十方圓通配成用夏商經國位置官方皆出於此此書發端三説彞倫是夏商前後論説圗書之本彞倫出於五行此濂溪圗象之所為作也漢儒星卜諸家皆以五行為彞倫但不知其斁敘之故耳唐人稍論九宫蕪陋愈逺今據圗書隂騭相協先於王居繼及民事皆以五行為本故五行第一初不説用從一數起終於九十其在方圗者倚數十五一與五九南嚮當中其法為王者本治以用威福故一為五行初不説用九應於下為嚮用五福威用六極威福嚮用坎離主之故箕疇所謂一九周易所謂坎離也次西南行二為敬用八應於上五事之與庶徴相為表裏敬念互存故八為念用萬物始坤而終於艮敬為五事之宗念為庶徴之本坤艮主之故箕疇所謂二八周易所謂坤艮也轉而東行三為農用七應於西八政之與稽疑相為表裏明農合致故七為明用萬物出震而悅於兑農居龍祥之鄉明涵金水之域震兑主之故箕疇所謂三七周易所謂震兑也轉而東南行四為協用六應於上五紀之與三德相為表裏協乂相宣故六為乂用龍辰所經應於乾德兩克協和長者所治以為萬物朔易訛成之紀乾巽主之故箕疇所謂四六周易所謂乾巽也五居四方之中中心無為以應八極故曰建極錫極保極會其有極歸其有極一極之所虛六極之所窮攝於九十謂之寄閏謂之歸餘率是道也其在圓圗者三乘疊象內外分周一準北極居於內上以命五行化生萬物五事應之處於南內密邇天子是為敬始猶紫宫之與太微虛危星張前後治之三在東內蒼龍之鄉食貨祀司空司徒司冦賔師農政庶官之所考績五紀應之處於西內太史所職歲月日時歷數以糾羣慝以集農務房心胃昴左右治之六在北上公孤之位實秉三德以為輔弼太卜應之以為稽疑以定大業以通衆志七處南外斗室井軫諸星治之八在東外龍火所直實主庶徴以阜民用太祝應之以辨福極以察疾苦以協孤終九在西外角箕奎參諸星治之東北為命生之地西南為考成之鄉故金火革於西南水木榮於東北一與六比而調隂陽三與八比而成治務二與七比而神人之路通四與九比而斁敘之倫畢所與方圗相拂者唯從革炎上之政使五事稽疑五紀福極相互為治耳餘可相比而行也故範以圓圗為體以方圖為用圓圗以正官方以考庶績方圗以通神務以協民居人道正於上則天道應於下人事正於左則神務應於右太史太卜太祝太醫此四者所贊彞倫隂騭之窮也周人用之如太公居左召公居右周公居前史佚居後前巫後史王中亦略用此意故範有九用敬用農用協用建用乂用明用念用嚮用威用九用各可相資建處其中以通一十敬明農念協乂嚮威遞成互用不為差池也朋夔云如何説是圗以為體某云圗以圜數靜居其方父子立人道之體書以方數動致其效君臣立人道之用或順或逆或生或尅彞倫所生合者以為兄弟離者以為朋友隂騭相居大意如此論其曲折一三五七九麗於陽爻二四六八十麗於隂爻隂陽之交窮神極賾以九御之凡得五十三萬一千四百四十一以為五行五事五紀庶徴之所終始雖復更僕未能盡籌耳黃共爾問西銘極是至理然亦有可疑者某問云何共爾云惡旨酒分四事之餘育英才僅三樂之一大舜曽子古來絶德申生伯竒有何絶詣貧賤困窮知是玉成富貴福澤寧無去處只此數言雜引仁孝以為精義能無商量某云共爾且勿易看過橫渠以孝子事親為仁人事天頭段説出一體大意隨後説出繼志述事無忝匪懈顧養錫類底豫歸全從命順令厚生玉成存順沒寧此十四事者仁孝之義纎毫畢罄矣程伯淳云雖有此意思無此筆力發不出來今看唯筆力小讓耳如意思者直與天地日月同光奈何指此以為疑二王豐功亦問伯竒申生智不足以全身德不足以化親蒙讒至死豫其父以殺子之名終志不白繇斯道以死者不孝之過過于迂也張子厚取之以謂事天謂恭且勞莫大乎是將使世人信生信死聽天推排孟夫子曰夭夀不二修身以俟之著一修身便覺許大擔子上肩難放子厚如何教人學申生伯竒之道耶某云豐功如何亦作此説親之殺子尚著許多低回天之奪人豈容賢者持挽子厚以不愧屋漏為無忝存心養性為匪懈此於修身兩字已説得分明申生伯竒只説得俟之兩字耳極有英賢臨場悲歎豈獨猾者賣履分香此處看不分明必為瞿曇𣲖下所笑豐功云如何不説到挽回玄感一路某云不弛勞而底豫便是傾否大端然此舜功匪夷所就遇無奈何只合申生伯竒使人貞勝耳文王之於藎臣申竒之於貞子顔回之於貞命皆與曾參啓視一樣精神王千里問周公居東考亭以為東征仲默以為避謗兩説差池皆本於金縢之序序云弗辟無以告我先王訓辟為致辟之辟則居東即為東征訓辟為避位之避則居東疑為引辟也又云二年則罪人斯得得罪人在致討之後則是破斧缺斨時事得罪人在啓悟之前則是公孫碩膚時事只此異解而時數差池考亭謂居東復辟通在三年之內仲默謂迎復東征共有六年之期總從序中辟得分見耳仲默受書於考亭豈容如此違盩某云此事原無確據考亭倣舊説謂負扆方新流言已作國家初造因權行師聲罪致討二年罪人斯得引避一年而後迎復於聖人作用未甚背馳如聞流言即引避以沖人托於管蔡之上雖召畢諸公攝行相事何以下服武庚且召畢諸公坐視危疑無此情理周公隱忍以釀禍亂不成經權矣仲默以得罪人為得流言之人如不利孺子之言豈必兩年始勘疑案乎故弗辟為致辟之辟得罪人為得大首之得無疑也千里云如此亦依金縢之序耳序中居東無東征之文大誥始云今卜并吉肆朕誕以爾東征大誥在金縢之後則是啓悟後事不在孫膚之前也某云金縢一書東漢諸儒嘗疑其偽今且不論金縢但如多方篇云昔朕來自奄大降爾四國民命今豫唯不爾殺則殷人反側自非一時東征破斧亦非一事又如大誥所云以爾庶邦伐殷逋播臣不言伐奄則大誥非為武庚而作明矣千里云還有證佐明白者乎某云經典之外唯有史記史記惝恍便如東山之為東征耳晉魏以來皆以居東為避謗謝安所以誦東山而隕涕也竹書紀年成王三年呂伋伯禽皆已分封逸周書兩無明文其世次與竹書相近大率克殷大賚便有分藩周公食邑豐鎬之東用師沫土留居東邑不為迫上也從古權臣暗干天位者不敢仗鉞出於師中周公舍其負扆逺辱衮衣既得罪人徐征逋播使已當其難十夫分其功豈有金縢已開武庚方叛安三載之投間動倍年之憊克者乎千里云如東山之詩只敘情愫不言征討似與破斧異義何也某云正於此處見得聖人不同如豪傑人但云功成不受賞長揖歸田廬而已魏秉德又問永徽之間髙宗册立武后李績許敬宗輩都不足責如褚遂良自是賢者顧命之臣初次執爭云王后太宗所立惕以顧命明以無過天子已為動容明日乃云陛下必欲易后請妙擇天下令族何必武氏髙宗所慮者謂后不可易耳如可易則目屬武氏何疑乎此言似拒之實贊之矣如當時再爭必濟如何某云天下似此者極多人臣格君要在未萌之始到萌芽已煩鋤剪了才人供事已十三年退居萬年宫又四五年此時聽其入宫雖有強項之言徒斃鐡撾之下耳儒生再勿論此恐為袁絲所笑洪尊光云嚮説巧力兩字如學識是力一貫是巧施濟是力取譬是巧剖析極明但榜於巧力入手處尚有疑義某云云何尊光云巧力兼到總是心精顔子未到聖人猶是心粗孟子才髙却粗於顔子某云顔孟亦無粗細顔子巧中用輕弓弱矢孟子巧中用大弝長箭均是穿的百步之外尊光云顔子明睿遂至卓爾似巧勝于力曾子剛毅獨得其傳似力勝於巧未知從巧從力孰為捷得某云學庸中看曾子極是細心剛毅處想浩然自有的𣲖學顔子者於約禮上看得極大學曾子者於慎獨處看得極小如使巧力分行安有一得之路也尊光又云有宋諸儒如茂叔灑落伯淳和粹似顔子堯夫通達似子貢是巧一邉人伊川謹重橫渠嚴密似曽子晦翁強博似孟子是力一邉人兩班孰為低昂某云此處登岸或舟或車到安床時都無分别大約諸賢都是天質帶來不關巧力巧力便是學就如由基教射立木走版久之依稀耳堯夫與晦翁學力深於四賢四賢之中橫渠又為攻苦如濂溪明道亦是天質清和巧不通神力用減半也吾輩只想孔顔絶世明聰為何不食不寢鑽仰瞻忽此處巧亦不來力無用處後來忘憂卓爾有似巧力别出相求不知巧力現藏何處孟子才識到此便是絶世明聰看他盡心數言了了嚦嚦真有百千手眼萬里透札學者舍此别無淵源戴仍朴問一日歸仁嚮雖面證實未領會某問云何仍朴云如晦翁所説天下皆與堯舜宣尼亦收羅不住如何一日克復天下都歸某云此處不容人疑夫子當日便説一日克復千古歸仁焉豈可復疑千古之逺耶顔子對夫子説話事事是經綸百世如獅子吼震動天下七百歸獄三千出宫此片刻事為宇宙喧傳須知布衣身中皆有此一種消息仍朴云如此却在外面只如真積力久一旦豁然見得天下無一處隔礙髙門洞開萬象森然豈不親切何必取外邉證佐為裏面經綸耶某云是則是如此看但人人説得八荒我闥無一人信得一日為仁却不如陳子昂一朝破千金之琴孟嘗君半日焚百家之劵耳仍朴云如此不無已外某云斷蛇斬蛟一樣刀路神采不同時陶文宗方較士所命題如空空兩端竭才卓爾不能不多夫子自道皆種種有意使吾輩思量諸賢應試之後略相講求無復問難者林朋夔乃舉南靖不二過一題問聖門心學實不乏人何獨至回遂稱絶學譬如曾參慎獨仲弓居敬兩賢自是學門鼻祖豈初少年未到不遷不二所在某云此則未知就有此人亦要堅他神明壯他魄力如過怒兩字是生人之所難免止一之學是聖賢之所共企此處淵源決不在讀書六藝語言之下從此推求希聖希天其實難到朋夔云大哉乾元萬物資始再無一字落效法一邉有怒便自遷有過便自二了不遷怒便是無怒不二過便是無過看來只是未發之中已發之和某云此大難言人生如無喜怒哀樂便與木石同體合下便説無怒無過亦與佛門一般只從此見學從此見好天體不遷於風雷日月不二於彗孛兩事便是聖門效法的的大事莫説不落效法一邉也朋夔又云曽點漆雕開豈亦未見到此某云隨他見到實落難言遊鱗長云夫子五十學易可無大過何以顔子之年便已到此想是拳拳服膺四勿從事也某云然此正是約處約到不二約到不遷便把一生博文工夫納於無文上去吾輩過失之多只在浩博一路收拾不下如實見不二不遷卓爾藏神立命雖百國寶書九千絃誦何能滓人見聞羅期生因問空空叩竭之旨果是言説智解一齊墜落答問裁成都可不作彼此具足相笑無言耶某云如此則執兩用中都無問察之路只是莊釋相遇中途豎指而已期生云正疑此説顔子屢空又問為邦直要何物夫子無端説出夏時四事淫佞二端直是何故以此認聖賢實有不空不竭所在才有學誨默識來往路頭譬如虛寂不動感而遂通又有應問如嚮亹亹變化豈可説天生神物亦是虛間不干人事耶易本虛寂説出吉凶同患孔顔禹稷本是空洞説出飢溺由已此是空中所藏抑是竭復歸空如何參透某云韓魏公云崇朝雨天下歸斂寂若無雖是偶談亦有意思黃芚人又問博文約禮直到卓爾所在此處還是前後髙堅抑不是前後髙堅某云才力竭時鑽仰瞻忽一無所用博約盡頭前後髙堅當前合併此時宇宙上下無萬精神凝結一處似太空中一物現成非我非夫子與天地參併不知世上多少聖賢一向此中瞻前失後也芚人云如此則是瞻忽東西到此拿住如何又説欲從末由某云汝看此是何物能髙能堅乍前乍後乍立卓爾還要拿住得他芚人云如此到底則是猶龍之歎也某云此則不同從博反約從轉得定約定中間又無站處以此見得聖賢精神力量終古無窮趙與蓮云聖道一而已如何有可語上不可語上之分周安期曰仲尼之門從未有半夜入室而談者然克復之義一貫之指囑付無多子貢到底説不可聞一事夫子到底説吾無隱乎爾會它語意歸宿一路只云知我其天此間受者不易承當傳者亦難交付得無略略逗漏乎某云天字是聖賢常談夫子兩度引著子貢何言莫知語下分明豈有推托玄虛之理然如何言之説行生莫知之説學達皆未嘗到無聲無臭地位依稀指點已得路頭正不知回言終日退省其私可是兩股言話而已與蓮默然某云此處已難言論請俟異日别證所聞榕壇問業卷七
