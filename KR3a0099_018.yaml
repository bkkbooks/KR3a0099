body:
  text: 榕壇問業卷十八明黃道周撰去日苦多也得一堂講論殊難程伊川云不啼哭底孩兒誰抱不得子産遇叔向仲尼遇晏嬰王子晉遇師曠終日談道搬之不倒吾被蔣先生一問啞得百日也洪尊光云鑿山甚易得玉殊難蔣先生偶蹴龍宫吾門何必自移寶藏乎某云自某談論以來風過樹翻無人復看落葉蔣先生才拈一枝覺樹樹紅酣山山碧戰也四坐寂然某云此處不發憤那得樂來前日為誰開此難端儘成罪過尊光云問吕而德看而德云前日為夫子誕辰請教蔣先生惹得此問以此罪過不從蔣來不從諸生却自夫子生下帶來某為􅋏然試請而德一一舉似而德因舉蔣一問云益稷臯夔生值重華皆有三十年學問繇今思之其嚮用當在五十餘歲苐不知所學何事彼時山經未作苗譜稀傳律例樂書豈有定本無乃天人參半抑從心性透玄某云試問吳雲赤看雲赤云包羲六佐通隂陽海陸之書軒轅七輔明存亡治亂之級如無文字則法教不章如有傳言則神明破漏神農半生七十二戰黃帝階下五十四賢論棄甲已自如山若著書何難成冢述而好古萬古上是此述而先進從今千嵗餘亦此先進只借心性做箇簡紙天人做箇漆丹益稷臯夔只是學堂弟子勿復問他髫齓勝衣而德云契不某云天人亦做得簡紙心性亦做得漆丹參半透玄蔣公已自説破從今好古誰是真本蘭亭譬如今人讀書將使後世謂今人無書可讀也而德云如此則何處著落某云璿璣玉衡隨山刋木芻蕘鹿豕是諸賢真正行卷而德云如何不到精一本上某云此本已是畫圖畫師何曾盤礴而德又舉蔣再問云文王五止具一部圖書此便是易有太極若於太極外更加無極便入老莊即於卦象外另圈太極亦非羲皇初筆否某云試問鄭孟儲孟儲云前日論説已遍又為朱陸重炊箕子九疇備有五方文王五止初非一畫白虎通略舉義類得其大端易卦驗得其標瀾遂流方術要如父木君火之説未免偏枯圖左書右之旋均有順逆既有順逆便有兩畫六變三乘只是一圈且如三讓之餘不説兄弟嗣徽之裔不道夫妻圖則兄弟同居書則長幼有序聖賢只是身體圖書未嘗口談河洛若論口談何嘗識得作睿中央便是聖人之於天道也而德云蔣公只是看象此又分爻蔣公為濂溪發藥此并為京郭下針可亦契不某云蔣公欲認羲皇初筆若論初筆漆枯兔秃已在兄弟九首之前又舉蔣問云中庸是舟一善是柁如無柁匠祇是岸橫一貫如樹學識如花徒取花師終同繒剪某云衆看蔣公虛心體道如此等語置之誰復關心一經烹鎔香光四照誰復看書能如蔣公者而德云人見吾門説性在止善開手已是迂儒又見吾門談道常有聲光亦疑枝葉不想瞿曇説善到隱怪路上是有柁無舟秀才説學在文章裏去是有花無樹也某云搯船上岸亦是别路神通剪綵上燈亦是心花所造如不信得兩極通天終是敗舟落葉又舉蔣問云阿難徵心似與吾儒不别只欠戒懼一著耳吾儒自割卧榻聽二氏鼾睡若以心論統在天命範圍某云而德看蔣公論心與二氏論心果有差别抑無差别而德云吾門説戒懼伊説無怖只是此處差别前輩亦云不攻二氏二氏自滅如鬼打鼓舉槌與他鼓聲不作某云試問洪尊光看尊光云月自不殊因眼異色既有異眼亦生異舌孟子説不動心告子亦説不動心同一輪車有生有死詩説皇皇后帝佛説衆鬼夜叉同一空中有精有怪吾儒戒懼只是仁人孝子事親事天之常如無此心只是鬼奴風犢之無畏敬有所恐懼正是明淨天中辨出雷根雹子如是無風無雨何人不説天晴某云疾雷破山晴天自在漏光滅火整頓衣冠終是蔣公看得明悉尊光云天命範圍依然鶻突此間聞睹斷不傍人又舉蔣問云周公驅虎豹犀象后夔舞百獸鳳凰論他性學本無精粗然於苗頑殷頑反都棘手將繇人不如物抑亦頑不易廉盡性爐中決無後先走作某云試問吕而逺看而逺云蔣公此意似從丘隅伐木感發得來盡性爐中只是人灰難度人能如鳥猶是百分中人鳥得如人已是千分靈鳥飛廉惡來力格猛獸不足以服朝涉之心許孜郭文仁孚異類不足以通時賢之志聖人意思只是千古上下頑懦難起耳重華五十年不格父母卒藉帝壻之功西周十五世不靖寶龜終資斧斨之力為此性爐終難息火只將心目全付交盤如是已外有人人外有物于田不必號泣待旦不用仰思也獸惡網羅却是惡人性惡民憎其上只是憎他習深苗頑之侮慢自賢殷頑之知疵反鄙却是人人都有聖賢之心虞廷之弊羽頓干文公之破斨缺斧只是此心不敢與鳥獸同道萬勿外頭錯怪人物莫從這裏輕别精粗某云蔣公亦是此意而德云蔣公説無先後走作便是一盡俱盡也某云黎民於變四方是遒此間豈論丹鳥赤烏又何處胡飛亂走又舉蔣問云七百歸獄三千出宫片刻事震動天下布衣身中亦有此一種消息先生救華亭三疏解遼環萬言自是斬蛇斷蛟手段總之覷得一官七尺輕欲驗歸仁看此一日某云此是拔劍驅蠅何嘗動得天下杜子美之救次律李青蓮之贖令公在聖海瀾中如勺鹽水吐此勺水不成陂池何處是真種消息試問黃共爾看共爾云太原發迹一半是要成家神武挂冠七分是要拔宅都有欲在那得能仁仁者無欲不是半夜踰城便是一朝斷臂管夷吾九合一匡民到于今受賜夷齊餓於首陽民到于今稱之一家靠才一家靠節猶未盡得一日之力吾門只是問心未嘗問世任他半去半來我自獨克獨復莫説此是大綱未到節目也某云梧桐一葉驚秋此是天下歸根時候雪裏野梅放眼此是妙華結子緣由信得過者云是天分從心信不過者云是神明護力莫聽蔣公從臾太過又舉蔣問云聖門七十二子個個中人宋儒却言佛門祖師個個竒偉豈為淡收不住正恐耳食者便云文殊普賢騎得象王壓倒四科也某云白日衆眼自明中夜吹燈莫説此事不消再論且問鄭非愈看非愈云任他騎得象王終是獠頭鬼面吾門三尺不道桓文又舉蔣問云二南非南國乃南風義取薰解本諸舜然塗山氏女始作南音則南之義兼本諸禹管子未為二南故有三歸房杜諸公總是面牆難道人豪無數皆坐不讀關雎某云程正叔蘇和仲尚坐不讀關雎何况别個而德云何某云試問朱君薦看君薦云參差荇菜左右采之南有樛木葛藟纍之程蘇皆未有此意而德云正叔初直講到處見宰執言路和仲與賢士夫相處極有情愫豈不是采荇縈藟君薦云此是一德相求上事不關體面黨與他於此處雖不牽帶尚未分明也而德云元晦浙東糾唐三疏恐亦不讀關雎某云豈不夙夜謂行多露既有士民遮訴此事亦難輟手而德云上有王淮乖異之心下有同父離間之口雖速我訟亦不女從如何參看某云兄輩看書漸細如某所云只道求之不得寤寐思服是發憤忘食上事窈窕淑女琴瑟友之是樂以忘憂上事周孔行徑只在此處覃精鵲巢鳩居猶是後人事業君薦云如何是後人事業某云周公東征召畢居守仲尼促駕顔子安絃人人如此便是一家何患幹不得事業又舉蔣問云夏時本遵堯厯自商周秦至漢文景皆用之只以所建頒朔周書曰夏數得天百王所同革命改正以垂三統至於敬授民時巡狩祭告猶自夏焉周公原不變四時之名孔子恐無改周公之理行夏時只是行夏小正以為燮理隂陽之本如春行冬令則水秋行夏令則旱明堂政事原與洪範相關某云西漢不信左氏未嘗不信春秋公穀不疑周時後儒苦稱夏月似亦習於所見不得無駭所聞前日講之甚明試問林朋夔看朋夔云周公創改夏時似亦經怪仲尼憲章近代反覺尋常不信三家舊傳且看十二公經僖公十年冬大雪如是夏月雪何足書襄公草八年春無冰若逢寅後豈有冰理僖公三十三年冬十二月隕霜不殺草明是亥月稱陽定公元年冬十月隕霜殺菽明是隕蘀豆熟春秋自本周憲後人習見夏時竹書既有時訓又以周月命篇意義膚庸徒成破綻所稱日起牽牛已非天黿之首若云杓指中氣亦乖積差之原想在周人别有閏法所以五載常正三春今如閏不變月便有二丑二寅若使卻移歲終即是三正遞建調劑之精非夷所及豈有周公不識閏餘歲朔反令後輩錯指四立二分如云小正諸書決難精於時訓月令向使百王同用何必顓云行夏之時想在列國暗行夏厯仲尼見之已為逮災所以確然首舉春王不顧時人私稱古厯依經據傳勿傍他書漫向羲和重敶七月又舉蔣問云雅有五際風頌宜亦有之唯商魯寥寥頗難推算若六笙九夏果否缺殘束廣微補亡固非劉原父以為有聲無詞聲從詞生似無無詞有聲之曲或以天保當南陔常棣當華黍伐木當崇丘菁莪當由儀如以時邁為肆夏執競為樊遏之類而併以思齊當齊夏行葦當族夏其説亦似可通紫陽故掃詩序雖屬邊見即如詩説詩傳亦是商賜優伶某云談詩不廢舊説所以泝逺知風古意尚可推求何妨以經嫓傳鄭夾漈時有錯綜嚴坦卿亦自明白朂之既有講求且問朂之看朂之云黃圖説詩有三百十二篇以當日軌消長各六益巧言之何人斯為實數三百有六損何人斯以去商頌為二百九十有九日月循行經理百世決非後世所得動移然聞師説若尋崇丘由儀諸篇即在南山蓼蕭之內則南陔諸篇初未曾缺傳其序者不容獨遺其文得其聲者不容并失其字即以魚麗序次何殊酌桓賚般之文豈必取材天保而上彤弓而下至如斯干之非新宫楚茨之非肆夏年久樂湮無徵孰信六笙九夏儻亦存其微言不必施諸鐘鼓矣五際諒非宣經聖門亦無顯説如有暇日尚勞仰觀既明三垣九野之談可廢六笙九夏之辨尋聲依永稱容明體自是申毛後乘何煩蔣老推求某云蔣公此道博深别須見他求其堂室又舉蔣問云三禮分彚立例凖小學大學繫辭雜卦以為全書儘是快事惟樂律黃鍾三寸九分與九寸尚無確論黃鍾一誤諸律全差京房六十律錢樂之三百六十律均似蛇足請合太玄新書元聲正聲諸説為樂全經與三禮並懸宇宙某云蔣公發此𢎞願為天地開目太玄得領樂書是子雲爽籟然于鍾律實未分明何處下手試問唐伯玉看伯玉云此道洞璣講之甚明無人體會律起一尺二寸截其隂陽以為上下二宫故有夷則之上宫黃鍾之下宫分統十二故有百四十四律自京房至鄭世子無人覷破徒謂淮南吕韋橫起疑端耳周公製律以尺取晷冬至日晷一尺五寸六分夏至日晷一尺五寸合此十二以為律本益上則損下益下則損上律有隂管吕有陽筒分百二十進退其間三萬九千絲八千一百釐是一是兩是五是十夫子談之草年無人肯信枉令諸儒聚訟經年也禮書自是晦翁遺意吳幼清業有定本樂書備在文圖如是不信周公製律之原且勿復談古今鍾吕之事某云此道吾雖屢説實不分明前在京師説律即是厯幾為暗儒唾煞今日談之又自夢夢亦是此道分數未得昌揚也又舉蔣問云古厯多疏後厯漸密議者謂至元郭守敬而盛亦至元而衰近以日食刻數不合將大統回回西域滿城四厯并較各驗食圖亦多錯出不知古厯之踈何以反得敬授精意黃圖自在太玄經世之上定有南針某云此道都非一口所吐劉歆僧一行如在今日與之談道便有分曉若與郭太史商量亦有同異耳盧肇不識夏潮云是日光所迫北人不見南極便云地下無星若説易即是厯枉被拘儒惱死也此道講之亦二十年無人肯會試問唐君璋看君璋云易起六變以成十八地行天周各有餘分交會之端起於直爻月行爻中與日相薄歲十三周積餘微至至六十歲以得食始五百一十一歲以得會終六千一百三十二月以通贏縮凡易倍竪一百二十有八以四周之以三割之弧背弦矢十三強半以度月規而交食晦朔與爻相值隂陽死生判於爻中小之當辰大之當歲自有易來未之能舉也三統大衍粗發其端譬之太倉稍揚粒米今日便舉全囷示人無人信得西洋空竊蒙古之緒滿城又揚郭史之波比較食差以增損杪法虛立損益以追提食分縱曰得之久必旋迷近亦數年豈能必世吾門不作長厯可通三年不靠一家可包衆厯想亦古有此法可惜今無能徵蔣公以是相推何不當前直闡某云七聖未嘗作厯刻漏何當春秋道有明時吾不藏頭道有行時吾不掩尾可惜繡敝説未開針又舉蔣問云建文之後為革除帷幄者極多土木之變以逃回命官者不少齊黃曹鄺既不足談篤信學道一章恐當竟屬新建但云過去聖賢初無呆事留與後生恐逗出鄉原甘草一路某云周則豈敢而德云王新建恐亦未到篤學善道田地某云篤學善道是潛龍上人新建遭時遇主已在飛躍之間無一潛字飛躍不得試問楊玉宸看玉宸云張子房李深源劉誠意都得到此王景略猶有富貴之心也又舉蔣問云帝堯元年經世推為甲辰今依竹書定為丙子堯在位百年依經世起甲申則舜元年己未中間隔世幾於三紀不如竹書丙辰之去己未正可三年獲麟迄今二千三百餘年素臣自多苦無闕里豈真子輿結讖長作秦人閏冬某因再問謝有懷有懷云共和以上世譜無稽竹書丙子經世甲辰均之囈説約略賢才或泰或否子輿之去黨錮黨錮之去河汾河汾之距濂洛五百上下巳自難齊繩以文孔之年亦可六百餘歲聖賢立身須是後天而老如為世數所囿猶是食氣中人不知羲皇前頭可得幾個甲子疏仡上下聞見何家且請蔣公題其闕里某云蔣公此意實是難承生值開闢前關莫問斗虹後路啼麟笑鳳果是不祥又舉蔣問云世間無一物不是日光串透人心頭學問如一片日才能貫串六虛透徹上下第虞日有中昃還須步步看取扶桑某云蔣公防人厭倦也此一片日在天地中原無蚤暮人為天地所隔自不見日其實日光無一刻子不貫心眸而德云如此日光猶是外鑠不是特地光芒某云天命謂性性非外來心中是天天何漏處試問王千里看千里云天地隔不得日日行地下夜氣勾萌血肉隔不得心心行體中醉夢自覺譬如無地日當倍明假使無身心當倍妙也某云某猶未學到此舉似蔣公當為發粲又舉蔣問云聖人雖遇小事於三才不靠一家還靠自家耳到得自家作主更無三才某云蔣公教我隂陽剛柔仁義在人性中只是一中認得中字何須隂陽剛柔仁義而德云此説靠不得知微知彰知柔知剛猶怕三立無一是處無血皮中奈何下砭某云試問楊峻人看楊峻人云六爻總是一卦三才俱是自家粹精見性旁通見情只此性情與天地合德日月合明鬼神合撰不是太虛中間更無隂陽剛柔仁義也某云某説底錯賴峻人分曉而德又云只靠自家此間何能無倚有膽有識亦未到聖賢田地某云聖人何曾無膽無識靠中而存靠和而行靠虛而遊靠實而成如此獨立始能不懼不懼始能無悶無悶始能無倚楊峻人云不長夏以革不大聲以色不識不知順帝之則此處還靠甚麼某云亦還有帝則在峻人云有物有則亦不靠人順帝之則亦不靠天則地之道亦不靠地三極中間一則命貫此命貫者的是何物蔣公直云自家所謂誠是自誠道是自道某云生平讀書只有此處未能直領賴諸友剖析分明又舉蔣問云虞舜盡孝夫子知天皆費五十年工夫文王受命亦在中身大衍一關實百聖千賢上下證果向後六十耳順受者彌虛九十五耳提強益不息千二百歲崆洞問難剖出隂陽原委乃能與日月參光如此精進十分始信生曉之無祇歸小慧學無厭倦坐證長生而德云蔣公善祝孔蘧以來未有這段學問召畢吕散皆百餘歲不知中身與誰周旋作如許學問伯玉磋磨於尼父衛武提㩦於張仲亦皆半百之年尚云知非寡過河汾十五而為人師二程四十而擁臯比以視學易得無太蚤某云人寡過最難唯有力學可以自勉顔淵不二即三十不以為夭彭祖多欲即八百不以為壽羅期生云蔣公既説大衍一關是千聖證果則五十學易的是如何參會某云人生百年卧消其半只餘五十任是現前百歲亦要再加五十工夫虞舜文王仲尼蘧瑗皆於此處領得一半工夫任是聖賢全副精神亦無全副受用做得一尺成得五寸若到此關便當證果雖是仲尼蘧瑗包管不住若過此關不能證果雖是岐黃彭老夕死為難認得此關是理是數是工是用若得一百便成二百子瞻所云若得七十年便是百四十也繇夫子看來千年工夫亦只是五百成就學到天理淨盡尚有小過難除莫道五十知非便是終身不二也任對蔣公一一舉似勿從紙上看作諛詞翌日朱伯勤從浦中至翻閲諸義因問蔣公發如許問何者是蔣公大意某云不厭不倦則可謂云爾是蔣公大意又問吾門如許條答何者是吾門大旨某云忘食忘憂不知老之將至是吾門大旨伯勤又問蔣公所見自十二卷以上撮領提綱備聞妙緒自十二卷以下魯生肇中所緝之明博石星賡穆所記之精微朂之而德重收之簡至理過百條文逾五萬若要請正如何裁取某云任看山山樹樹仍是老至倦來一部易書只領得乾乾終日於時王豐功陳無涯在坐某謂伯勤問他豐功云衛武公學問老成抑戒一篇四百七十字字字坤道臯陶哲惠生知九德一章綜貫十八言言言互體如何專領乾爻某云不是用九那得乾元惟其乾乾所以抑抑陳無涯云夙興夜寐灑掃廷內惟民之章此處便是強恕而行抑是致知格物簡而廉剛而塞強而義此處若有一念隂柔亦是不知不止大家講貫末後分明儘在兩老身上某云無涯教我任對蔣公一一舉似勿從紙上看作諛詞是日丙子歲二月九日也某馬齒五十有二會中諸賢請宫庶若椰先生提耳為贈若椰翻諸問業揚粳簡寶得十八條初示聞道之艱難末示成德之不易叮嚀告誡於孔蘧寡過之年所以裁成吾黨垂引來哲不為少矣因録若椰先生問義篇次如左榕壇十八問附人報君親雙斷後天排雲水兩空痕幼平黃先生壬申誕日詩也上既深知幼平首俞召用推車過霹靂又得滂沱吐舌舐青天寧憂虎豹屬五十加年之旦正三千繞座之時漳潮諸賢以璟幸托三同雌長數月逺來授簡遜謝未能聊就榕壇教鐸詮叩膚疑以當席茅下風之拜問益稷臯夔生值重華想皆有三十年學問繇今推之其嚮用當在五十餘歲第不知所學何事彼時山經未作苗譜稀傳律例樂書豈有定本無乃天人參半抑從心性透玄問文王五止具一部河圖洛書此便是易有太極若于太極外更加無極便入老莊即于卦象外另圈太極亦非羲皇初筆否問中庸是舟一善是柁如無柁匠祇是岸橫一貫如樹學識如花徒取花師終同繒剪問阿難徵心似與儒門不異只欠戒懼一著耳吾儒自割卧榻左右間聽二氏鼾睡若以心論統在天命範圍問周公驅虎豹犀象后夔舞百獸鳳凰論他性學本無精粗然於苗頑殷頑反都棘手將繇人不如物抑亦頑不易廉盡性爐中決無先後走作問七百歸獄三千出宫片刻事震動天下布衣身中亦有此一種消息先生救華亭三疏解遼環萬言自是斬蛇斬蛟手段總之覷得一官七尺輕欲驗歸仁看此一日問聖門七十二子箇箇中人宋儒却言佛門祖師箇箇竒偉豈為淡收不住正恐文殊普賢輩耳食者以為騎得象王獅子便足壓倒四科也問二南非南國乃南風義本薰解蓋取諸舜然塗山女始作南音南之取義似兼取禹否管子惟未為二南故有三歸房杜諸公總是面牆難道人豪無數皆坐不讀關雎問夏時本遵堯厯自商周秦至漢文景皆用之只以所建頒朔周書曰夏數得天百王所同革命改正以垂三統至於敬授民時巡狩祭享猶自夏焉周公原不改四時之名孔子恐無改周公之理行夏時只是行夏小正以為燮理隂陽之本如春行冬令則水秋行夏令則旱明堂政事原與洪範相關問雅有五際風頌宜亦有之惟商魯寥寥頗難推算若六笙九夏果否缺殘束廣微補亡固非劉原父以為有聲無辭聲由辭生似無無辭有聲之曲或以天保當南陔常棣當華黍伐木當崇丘菁莪當由儀如以時邁為肆夏執競為樊遏之類而并以思齊當齊夏行葦當族夏其説亦似可通要之無關詩教也紫陽故掃小序雖屬邊見詩説詩傳恐亦商賜優伶問三禮分彚立例凖小學大學繫辭雜卦以為全書儘是快事惟樂律黃鍾三寸九分與九寸尚無確論黃鍾一誤諸律全差京房六十律錢樂之三百六十律均似蛇足請合太玄新書元聲正聲諸説為樂全經與三禮並懸宇宙問古厯多疏後厯漸密議者謂至元郭守敬而盛亦至元而衰近以日食刻數不合將大統回回西洋滿城四厯並較各驗食圖亦多錯出不知古厯之疏何以反得敬授精意黃圖自在太玄經世之上於易律參同定有南針問易八卦談兵師同人謙豫是御將要法坎離兩濟是戰守古方今寵命空優惟聞左次號咷已久不變冥盱而自醫巫閭抵賀蘭一帶地險盡為敵人飲馬之場山海之守憊甚鬼方河套大寧空巢奉我濡尾尚賖無望折首也不知敗局落在何爻即今推環應參何卦問靖難之後為革除帷幄者極多土木之變以逃回命官者不少齊黃曹鄺亦不足談篤信學道一章恐當竟屬新建但云過去聖賢初無呆事留與後生恐逗出鄉願甘草一路問堯元年經世推為甲辰今依竹書定為丙子堯在位百年百年外依經世當起甲申而舜元年為己未中間虛位幾於三紀不如竹書可據獲麟迄今二千三百年餘素臣自多苦無闕里豈真子輿結讖長作秦人閏冬問世間無一物不是日光串透人心頭學問精誠如一片日才能貫串六虛透徹上下第虞日有中昃還須步步認取扶桑問聖人雖遇小事於三才不靠一家還只靠自家耳到得自家作主更無三才問虞舜盡孝夫子知天皆費五十年工夫文王受命亦在中身大衍一關實百聖千賢證果向後六十耳順受者彌虛九十五耳提強益不息千二百歲崆洞問難剖出隂陽原委乃能與日月參光如此精進十分始悟生曉之無祇歸小慧學無厭倦坐證長生榕壇問業為吾漳諸弟子講論而發夫子自壬申抵家諸弟子相從講論皆在浦之北山至甲戌夏始人郡就芝山之正學堂為講舍其條約見於篇端彚次成帙者凡十八卷憶乙亥十月十六日正會時環命初下報人至歡動城邑夫子方與諸弟子論文未輟閽者不敢以聞翌日諸公勸駕亦會歲暮夫子亦還山守墓未獲再證諸弟子所次問業已得十六七卷二月九日為夫子誕辰諸弟子合前後問修二業請于宫庶蔣先生先生因就問業中拈出十八條推暢玄風以抒嘉祝乃復録師説彚於末卷以振諸篇坊實綱紀其事遂不揣載筆以托後乘云丙子夏門人吕士坊謹識榕壇問業卷十八
