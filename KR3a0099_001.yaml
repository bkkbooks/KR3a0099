body:
  text: 榕壇問業卷一明黃道周撰甲戌五月十有六日榕壇諸友㑹於芝山之正學堂坐定發端便以格物致知物格知至為第一要義云此義明時雖仲尼子淵坐晤非遠此義不明雖祖朱禰陸到底不親諸賢寂然未有問難仰視屏間有李見羅講義一章顧問諸賢云此章講義盡未諸賢又寂然意似未盡者某云千古聖賢學問只是致知此知字只是知止試問止字的是何物象山諸家說向空去從不聞空中有箇止宿考亭諸家說逐物去從不見即事即物止宿得來此止字只是至善至善說不得物畢竟在人身中繼天成性包裹天下共明共新不說物不得此物粹精周流時乘在吾身中獨覺獨知是心是意在吾身對照過共覺共知是家國天下世人只于此處不明看得吾身內外有幾種事物著有著無愈去愈逺聖人看得世上只是一物極明極親無一毫障礙以此心意徹地光明才有動處更無邪曲如日月一般故曰明明德于天下學問到此處天地皇王都於此處受名受象不消走作亦更無復走作那移去處故謂之止自宇宙內外有形有聲至聲臭斷處都是此物貫徹如南北極作定盤針不繇人安排得住繼之成之誠之明之擇之執之都是此物指明出來則直曰性細貼出來則為心為意為才為情從未有此物不明可經理世界可通透照耀說此話尋常此物竟無著落試問諸賢家國天下與吾一身可是一物可是兩物又問吾身有心有意有知夢覺形神可是一物兩物自然谺然摸索未明只此是萬物同原推格不透處格得透時麟鳯蟲魚一齊拜舞格不透時四面牆壁無處藏身此是古今第一本義舍是本義更無要說亦更不消讀書做文章也諸賢釋然各有所得時日已可中諸賢各濡墨自就課義晚刻徴完急共辨論草三人中半依朱義無為陸氏之說者私喜晦翁實詣之效一遂至此自關諸賢悟性厭薄鑿空非為功令所懾坐間紬繹謝有懷趙與蓮吳雲赤鄭孟儲洪尊光唐伯玉盧君復黃太文尹孟寶各作有本之物知止之知楊玉宸直指誠身明善盧孝登尤詹茹張勗之德聲唐君璋君瓚參酌明善窮理之間黃共爾魏伉侯王豐功王元槐戴石星張鎮朴元屛各依朱義以即物窮理為最實詣意欣然各得坐後且别乃訂諸賢翼日各質所疑既翼日再補强恕一義謂前義已明無復以格致精微一再推勘者唯唐伯玉趙與蓮鄭孟儲再申此意遂以諸賢辨質略載於後唐伯玉問云格物致知紫陽文成兩家互觭紫陽亦有參合內外底說晚年亦說象山底是今日已盡破諸紛紛了但如此知字與知止知先後是一是二與慮字亦頗有層次異同不某云是問得好明是知之晶光慮是知之照耀同一日光從地出來透暑透寒是他格物從天穿過有晦有朔是他能慮從天外看日只是一片光明從地中看日要是容光必照即此物是有本的物即此物是不遷的止即此物是先天獨存不落後著唐云如此則前日課中吳兄說先天之知極是又如何嫌他某云實㑹的人且不要髙聲趙與蓮問云博約兼該孔門正印鵝湖橫分德性問學為二離德性既無處尋學問拋學問又把德性如何尊今日說事物歸原不知德性問學可是一物尊之道之可是一事不某云物既不分事又何别如說德性無物便使學問無事既有源瀾正好觀看須信尊是至善寶座道是格致威儀鄭孟儲問云格物之物若果有物致知之知應别有知夫子直說知之為知之不知為不知是知也此知字豈有物在某云此看極細夫子生平說無知中庸都說有物佛家極要說無物諸乘都說有知此是𤣥黃之判然是夫子對子路說得不同異日無端特呼子路云由知德者鮮矣彼知字若是無物則此德字亦是無知了此處參透于本始工夫定無疑悮翼日張德聲又問格物如是有物則夫子居恆所說知之者好之者樂之者生而知之學而知之困而知之好古敏以求之見而知之聞而知之此數之字竟指何物如是無物又何須著此啞謎某云如賢說較孟儲又緊聖賢出世只為此知未了未能與日光并亮以此不寢不食仰思待旦發憤終身如是一句指得何消如此德聲云如有難指處則萬物一物了不得此物衆明同明了不得此知任從今日說天下身心洞然無間猶須終日不食守此疑團也某云且不要疑他子思說至誠動物書云至誠感人人與天地萬物决有通透一路只怕人心粗眼窄耳此赫赫原頭切勿礙空礙實是日唐君瓉推拓此義于象山涑水近代姚江異同上下對得甚眀大要宗主紫陽以窮至物理為有體有用某但云如賢說都是不須辨折未後又問云如下章峻德格上下中庸云中和成位育此格致又決不從事物上尋求某亦云不須辨折如賢都說得是是日開駁已透意諸賢中必有舉聽訟一章為問者久之了不復及意此事不過是身心中一事蚤年亦常講過遂可付之無言翼日諸賢又說聖門只是論仁他無要義格致之義可是仁不某云為有此箇才看得萬物皆備古今來只有西銘極透此意勿說萬物一體是腐生之陋談盧孝登云且放下物格知至如論語約樂章說仁說智說處約處樂仁可是物格智可是知至處約處樂可是物是事某云此正是止處如夫子說聽訟猶人是仁是智那無情之情欲盡之詞是善物不善物善事不善事如要與他搬弄雖終年閣筆不得做府縣人有箇詞訟在人身中有遷善改過都是看得此物眀暗盈虧意色不同照出影來如要自家光淨放出靈通只是不為約樂所動看得約樂亦是照身影子以此看車蓋宫室門巷瓢盂了無罣礙便與山水動靜一般意思不到此處如何放下魏伉侯云前說萬物一體未免是籠統說話周程說敬延平說靜唐虞說中此中皆不著一事一物如要靜觀未發氣象又放不得胞與源頭某云賢說得極好未發前不看得天地萬物已發後必為天地萬物所倒此處格透縱有蔽虧是天地萬物影光相射關西延平都此意只是說不出來為賢參透通身汗下能於此處實實著手何患聖賢做不出頭翼日又問諸賢還有疑義不黃共爾云顔曾俱是聖位上人曾子一生得力忠恕顔子得力俱在禮上忠恕只得聖心禮字并得聖人作用然如夫子說他屢空此中更著何物如是影話何所恃靠便可有是行藏如的有是才可行藏不知髙堅的成何物某云極是奧藏某亦曽於此處發憤研求極髙極堅無下手處極博極約才可安身不得安身更無利用易云精義入神如使聖賢無此工夫縱使發皇滿世亦是暴虎馮河更要空忘如何得見龍蛇之效共爾云此處難言但說禮字一日為邦施此六事此六事與復禮約禮是二是一抑是此處髙堅一齊合從抑是此處才情一齊罷舍耶某云禮如至善復約便是止處認得此物天下何物分别且如大家看顔淵與禹湯舜文尚有分别顔淵與夫子兩家對談宛是一物一事異日孟子述顔淵談話與有虞别無分面又扯禹稷與顔子合作一身賢豈復疑為邦過為窮大耶共爾意殊有省元屛又問聖賢所得各自不同顔以開悟入門曾以真積下手顔稱四勿曾稱一貫後人不以曾學太精顔學太淺今人紛紛為朱陸異同想亦不是某云此說得好都是胸中有物不透看得東西大小白黑耳元屏又問子貢顔淵一般聰明夫子對子淵說得簡易直捷對子貢說立逹却甚𤣥奧了如何已立便能立人已逹便能逹人如說是欲猶懸空想豈古人欲明天下亦是空想耶某云欲仁得仁欲仁仁至此事如何說落空想元屏又云如此前日諸賢課中有講欲明的欲字者如何嫌他某曰也罷何嘗見老婦穿針官人放債唐君璋云顔子說四勿天下誦為要方憲問說四不行夫子以為疑藥樊遲說先難孟子說强恕出自夫子口中箇箇可宗出自原樊意中反成疑難此是如何某云此正如程伯子說王介甫在平地上談相輪不如相輪上談平地也謝有懷云今日言談可謂終日夫子到說無言默識既有學誨不知默識何物既云默識不知學誨何事某于言下亦覺有省起謝諸賢云正為此物事灰心杜口未得有懷又問子貢說學不厭智教不倦仁子思說成己仁成物智是一是二某云不省到那田地自然省得某藉諸賢分别何遂敢知諸賢默然又問諸賢今日可别有所疑不張勗之云夫子論士以為心有所定計有所守然後不為約樂損益此事不關領悟而來子貢對衛文子云孔子之施教也先之以詩書𨗳之以孝悌說之以仁義觀之以禮樂然後成之以文德今以格致求仁為宗又是知行合一之㫖如薛文清王文成胡敬齊陳公甫路徑不同終與孔門施教之途隔數十里何能教諸賢不墜講解不落文義的的造有為有守上去某云古人風氣尚醇化柄在上四十强仕成材乃逹今人舞象之年便要立地頂天文藝百行便奪席登殿矣如不於文藝一途指出是聖賢晤對滴滴還源如此波瀾何所底極文成諸公不合教人上屋去住伊自家磨鍊摧折自天隕來却教人不得人只管上屋不知他是屋匠上下無疑天下人各有心眼那箇不知龍溪溫陵說喫不得至如羅近溪周海門近來諸公引人入悟初亦不離仁義禮樂只要自家卓爾髙堅雖造屢空不墜空界自家多識一貫雖多億殖不受物纍文藝講解正是兩澤相麗處雖遭謠諑不至獨善其身勗之又云曾子言三十四十無藝即無藝矣五十不以善聞即無聞矣與夫子不足畏相發似此聖賢念念心心放不得文藝聲聞何繇能斬斷浮游直證性道某說此處實無分别神龍一日五化鳳備九德文章豈有鏟華就實之理只看他瑲瑲鏘鏘委蛇屈伸與魚鳥自然敻異何况出類拔萃之人再無復疑文藝聲聞足滓性道也尤詹茹言下亦遂豁然云嚮才擬議欲問文章何以日新今知此道本之實悟如使才品成就决無大業不居之理某默然良久云才品成就是有才品的文章如富有日新自是忠信進德後事合去做去只是去却畔援歆羡直抒所見與聖賢相期久之神明可通自然與日月星辰輝映戴石星云性道文章既合一何說可聞不可聞且文章有言不說言字性道無言反說言字此理如何某云天下事物那箇有口那箇不㑹說話譬如一草一木有枝有節雖不說草木現見他是草木如他自家臨春怒生倚風自笑是誰聽他說話此處只要領㑹更不須疑諸賢共云今於此事此物差不疑二了但於此外即事即物疑難尚多某云何妨推拓盡去吳雲赤云士固有同情殊斷者亦有名美實難盡者載記所及尚有八事罥礙於心某云何妨備說雲赤云圯下受書商山翼漢此是何處精怪出來當大索十日時白鬚老公逃躲何處抑是取履奮椎先後異學節候不同耶某云漢家常有白頭翁怪他何事聖賢手段動忍而後自然不同雲赤又云董公作春秋災異何不與弟子商量季漢北地尚可為何無伊周手段王茂𢎞不答處仲豈為肘後報仇謝安石偶然折屐豈遂矯情終敗魏𤣥成十思十漸難洗前愆趙韓王再誤一言奚當論語某云某尚未讀書無繇知他功過雲赤又云且如劉青田勳業造邦文章𫝊世比之子房優劣如何某亦云不知但如太祖德過漢髙自然青田優於圯下也雲赤默然良久張勗之見過問曰嚮吳兄問八賢此是讀書窽隙為何不甚開答某云知人不易各有當心處令人憶愧如何答他勗之云他可不答如劉張優劣答之何妨某云青田在上前貶剝諸賢了無回護自家抽身非久正命此間豈有異事異書疑情疑案如留侯之與韓彭蕭曹功過上下高祖自知即如周昌豈是留侯商量得到青田之於汪胡緘口不得安得于此看有異同洪尊光來問春秋所書二百四十二年不過萬八千字古今良史何以都不參合王河汾作元經始於晉惠終於四國之亡與春秋可復相印不某云自春秋後只有元經粗識大意餘者俱在史部耳尊光云如何見得某云畢竟意義不同尊光云春秋書王狩河陽史書帝在房州兩者豈有異義某云未嘗生見蟠桃見圖畫中亦與苦李殊葉尊光未肯某云夫子七十二年才作此事切勿容易剖判張鎮朴云春秋既是夫子絶筆未可頓參如夫子刪詩時才四十餘耳弟子講論已自多年如何至今有齊魯毛韓紛紛不決直至紫陽翩其反而肯綮緊要畢竟何在某云賢亦尋他何處未得鎮朴云且如三始便自不同常棣伐木祈父白駒各有風刺嵩髙蒸民朋友相贈都有風頌直以大篇列於正雅天保采薇治內治外天子所用又非短章列於小雅賓筵抑戒一人之詩篇數俱巨别分大小此義何居某云此義前人都攻擊去了畢竟事體不同聲律迥别鎮朴云且不論聲律專論事體棫朴之官人菁莪之育才斯干之考室靈臺之奏功六月之北伐江漢之平淮南采芑之南征常武之平淮北事體并同而大小分置畢竟何居某云此亦無怪如斯干考室與文王靈臺遣戍勞戍自然與中興克復殊奏六月江漢采芑常武何疑之有但如賢說終是章句分㑹如何得到上有日星下有帝王前有髙谷後有深岸裏去夫子中年作此一事精華方壯於列國水土九野文象一一包裹這裏依之為禮制之為樂律度權量鈞石斗甬一一俱從此出豈有他派大小正變尚有差池之理學者只為章句體貼不了如要把章句理㑹律襲上事猶從丘垤上手捫日宮如何可到即如十五國風一衛之中有邶有鄘王豳與秦意義事物一條千别曹鄶唐陳無甚足録存他一國與秦豳上下江漢周召隱義數千舍之不問諸小小者何詎煩料理耶今人只蔽於朱詩賴賢此發與嚴坦卿證明極是可敬餘便不論了張勗之過來坐久又問琠姪尚問魯頌如何徑不答他某云此道亦自千條不須再說黃太文問易道精微且不敢問但舉其粗者如仲尼作十翼除了大象歸併周公只有九翼何處得十來某云誰作此說太文云是晦翁某云晦翁定不如此漢人說文言是文王舊話雜卦是九師所傳如此只有八翼見近人以上下小象别為兩翼此俱不曉文意也文王周公文字在大彖六爻與夫子意義敻然天淵豈容混說是日午下鄒定基見過某試舉此義定基云此錯耳注云兩象六爻此言六爻俱有兩象是文王周公所繫之詞非惟大象小象也某謝鄒云某初不讀易然亦未嘗錯過勸諸賢章句文字之外别意相求尹孟寶云昊尚有一章句易中元亨利貞玩其爻詞皆云利於正固耳文言直作四德後來何以不通諸書俱云利義之和某云夫子既言書不盡言言不盡意奈何讀夫子書不許夫子斷句取義孟寶殊謂未然某云都且放却某不解章句文義於時衆論且畢疑信各半盧君復楊玉宸王豐功王元槐年最少未有疑難顧問如何王元槐云命瑤有一事問得太澀不問又拋遠不得如一代之興必須正厯近日議厯紛然徐閣老既用西域今人又許滿城滿城既依郭史自然與雲間西域異道不知歸宿齊整欲上合天道下揆百世定是如何某云問得好但惜太蚤也譬如格物須看得自家身心是一是二是離是合生死人鬼了無異義然後通得天下家國幽明神祗今人做厯不曉得天一地二天三地四茫茫在嵗差上下零分多寡比擬將來寬數十年又是一畨謬誤且如日之於天猶心之於人取道不齊晷影自别今勸他星臺先明二至日影以定月交淺深無一人肯者又要近舍守敬逺祖冲之如何得有端竟出來元槐云此事逺近實未深曉但要探箇消息某云未能格物知字消息如何相探得來午下張三華世兄并勗之俱在坐元槐是三華外孫三華云伊說且不須辨晰但如伊說顓頊厯七政㑹于營室此是真是僞某云正如此事亦須格物當帝堯時日中星虛顓頊分在堯前虛在危前尚一二十度豈有數百年後倒行一二十度之理後生人每事審問再不要為文字所誑但勿以此隔斷稽古之路王豐功次云經邦不敢遠問只如聖賢躬體力行俱在倫理日用子臣弟友夫子終身自謂未能自夫子來何人不是此物何人不做此事却無一人做到夫子田地夫子於此處說出忠恕分明是以己恕人對仲弓說又添出敬字仲弓之敬顔淵之禮莫是此處下手不同遂使終身言行都不慥慥了某云賢說得有歸宿某今日說格物致知說强恕而行未嘗結得敬字賴賢此說得到格于上下格于鬼神鳥獸草木魚鱉道理楊玉宸當日已信格物是箇明善再不復疑某曰且問看玉宸云朱陸異同勿論格致只如一學字晦翁謂明善復初陸說是自然有覺將覺先於學抑學後乃覺耶有學便有習將覺果是性學果是習耶某曰此則不曉格物是知去格他抑知至是物通至此耶聖賢只是如此學問猶天上日月東西相起决不是舊嵗星辰覺今年風雨亦不是今嵗晦朔覺去嵗光明吾人只此一段精魄上天下地無有停期溫故便知千嵗知新便損益百代切勿為時師故紙蔽此晶光盧君復最簡重嗜古不茍言笑最後離席問士不通經學古不足致用宋儒講論于斯道極為有功然如當日經濟視漢唐如何漢治雜霸唐治雜術宋治積衰日淪日廢議論成功亘然兩轍毋亦德行文章經濟判然兩物并成兩事歟某曰今日最喜得賢此問異日免被天下笑罵宋家天下自燕山來半是敵國賴得元祐諸賢清明潔治末後衰頽不比五代自是氣運使然向無諸賢不知幾多豪傑臣遼臣夏何况金元且如狄武襄嶽武穆諸賢經許多危疑從容問道豈是河朔節度皮毛所及陳同甫騁驟天下作一虞允文不成但看張邦昌劉豫做不成天子亦是周程諸公手末弩千萬勿說德行文章不成政事今日只管看得此物透與不透如透者宓羲神農與今日天下了無分别如不透者呼韓稽首屠耆接踵猶是隋朝世界天下未平也某昏昧諸賢髙明一一指示勿使後人室裏猶有異同榕壇問業卷一
