body:
  text: 榕壇問業卷九明黃道周撰乙亥春間浦中諸友從墓下搆一講室久之未成五月入郡諸友復尋舊業初六日會于壇次謁晦翁畢坐定豫云别久苦不長進今日何以教我者諸友閴然豫云有一事欲與髙賢商議篤信好學守死善道此是幾層事幾層學問危邦不入亂邦不居有道則見無道則隱此是何等人有道貧賤無道富貴恥也此是何等心事此處勘得透者才見讀書有用不然到有求死不得去處洪兆雲琦云此當是學也天下有亨屯人身有出處兩者如風雨晦明起倒相逐要知吾身有不隨起倒處如眼前瞀亂坐暗室中或作夜行人提燈達旦都是顛倒為他一心逐物走閙俾晝作夜如發風人了無明白徒為醒眼發恨耳善學人從此處見道信得天有晦明人有出處時時是學不為一切利欲勳名所亂詩云風雨凄凄雞鳴喈喈又云東有啓明西有長庚正是這樣意思某云是看得極好林朋夔云説到學去想只是道子張云信道不篤人都曉得讀書只是一無所學亦有終年講學不識一道字識得道字真是入水蹈火不淫不移知幾其神應時則出任是經史盡灰猶然誦讀自在眼上不靠詩書胸前不靠事業更有何人謊誆得他詩云獨寐寤宿永矢弗告又曰委委他他如山如河正是這樣意思某云是都看得極好但某現前不知如何是學如何是道耳盧孝登因問好學善道二者合一功夫抑學是平居求志道是出世事業耶某云如是出世事業又學甚麼孝登云如是志上事何消從危亂否泰上著眼某云天下是道場學是科儀引身躲閃不得只有人信守不定便隨風落魔耳孝登云信守如何靠得狄梁公之事女主張德逺之扶衰祚巢許之遇讓朝務夷之遭鼎革此豈是信守不到又如李元禮范孟博樊英盧藏用輩豈是不學亦成就他一種道理耳某云如是學道人於此再開心眼盧云如道字看透才於危亂否泰看得明白學是學此守是守此天下身心别無兩道窮通興廢合莭明通某云此處顔閔低頭唐偉倫云篤信好學不是理明識深如何便可出處無憾如王荆公一種人好學而入於賊揚子雲一種人好學而入於愚皆自謂知道而卒去道甚逺且如霍光金日磾皆未嘗好學而受顧命行大事如其夙習者然似於此處有先一著法學道猶是第二義者某云誰受此説王荆公揚子雲總繇不學道耳金秺侯要於篤守上得力看他撲殺弄兒分明合道霍子孟不學卒以權死周亞夫木強似父亦不善終綘侯沈識晚年亦與陸賈諸公往來長多少學問如要尋先一著當從何處著眼偉倫又云夫子為龍德一人曰無可無不可又曰天生德於豫如此信守豈是學問得來今謂篤信兩語便括出處大事亦附會帖括如何便可施行某云汝想仲尼自信不死此不死處的是何物上天生德未喪斯文從此入心發憤敏求百年苦短如何説是帖括上事凡世上搬弄聰明者切莫開口侯晉水又云夫子此章分明是説學問畢竟説到出處上去豈學問在出處上見抑出處有主張才顯出大學問耶某云出處是影子學問是正身道是燈日之光將身照影如是本身正受日光不須低頭顧問影子晉水云到有此影才現此光逃虛就隂便别測不得今如危邦不入亂邦不居固為全身逺害然無則見則隱一段與沮溺丈人何異今合隱見與危亂齊看才顯得神龍無首潛躍自如夫子劈頭説篤信説守死又似為節概人立定根基此等定是何人想為平仲而上伯玉而下閔子曾參之倫某云都看得好若論淵源夫子平生亦不過如是謝有懷云平仲伯玉固是恰到此處然易稱六爻變化其道光明天生聖賢將為世用且如堯舜在上巢許山栖明王不興孔墨載道必硜硜信守規治亂為進退豈學道之正乎某云巢許量才自是不及伊臯孔墨量世亦是未成江河聖位下人於學字道字都看得明白不是草草也有懷云如管子天下才夫子亦許其人却浪試射鉤束身膠目到底成就只是小匡豈三十年與鮑子講明者有未盡歟某云他也學道他亦篤守但是恥根充擴未盡如是此位中人羞稱五伯仔細看他總有功名富貴之心呂而德又云出處學問之大前賢未必盡然如二王二龔李杜陳竇之流以匡時罹患林宗幼安子真君平以潛晦完身或因其時或因其位進者不得退靜者未得動各自有命豈關學乎某云林宗處陳杜之際名顯而不傷仲元學楊嚴之間道尊而無患袁夏甫以土室安身黃叔度以優遊師世此皆其學何云命也而德又云任永逄信托疾避世陳東韋月將出位納忠亦皆其時勢使然得之不因有道失之不緣不學據其篤守亦是聖賢中人必以為學道又似無當者豈篤守與學道意義不同尚須泝合歟某云初無不同但看過去聖賢初無呆事留於後生擘頭信他擘頭好他只為此物兼善天下孟子云窮則獨善其身説一窮字更無去處信得過者荼苦如飴守得過者孤城萬里任是千部詩書不過是此道理兼善亦得獨善亦得只是不為俗物所敗耳而德云此處豈復可敗某云萬物不敗聖丹只有兩字功名是敗丹蛇蝎才有兩字季路傳書亦篤信不得神禹嬰城亦守死不保也而德云孔子夏據經名儒而委隨於安漢公荀文若紆籌善士而竭誠於曹孟德唯此兩臣天下學者唯此兩主天下無道譬如此時委身王室盡言效忠內扶主后之傾外折權姦之釁治亂持危有何不可而必以功名為嫌乎某云看得功名者只是看道不精看道既精自然於有道無道處領得十分分明而德云此豈可學而至乎魏玄成王叔炌亦是學人不能相幾於武德禇淵王儉非知道者乃能密契於蘭陵王魏出入危亂不以益愚淵儉攀附鳯麟不以益智且如寇萊公之才韓稚圭之膽王子明之慧李復古之識此豈盡從學問中來耶某云呂而德多讀書莫以學道讀書判為兩事而德亦云極知善學不倦只是至道難聞楊元實云至道既不可聞則嚮來信字學字守字從何處歸著道之深者莫過於易其大者莫過動天地而易云言行所以動天地也夫子説邦有道危言危行邦無道危行言孫想只是這箇樞機學到盡頭更無尤悔愧怍既盡禍亂不生詩曰永言配命自求多福更無甚出世入世至精至神的道理某云如賢看得極是此等道理不是富貴之先資亦不是貧賤之痼藥只要躬體不在言説之下耳黃芚人又問學問經綸歸到危邦不入可謂明哲保身若亂邦不居難道袖手觀變聖賢道力不值危亂何處發揮且如春秋天下分裂此危彼安此亂彼平猶有退身轉步之處如今人天下一邦周流不得直要鳯鳴圗現俟河之清人夀幾何勿論往事譬如建文南都正統土木正是升平之時禍生不測諸賢只領得守死更領不得善道了如何學道又要守死守死又要危亂不涉顯晦無間某云夫子對原憲已説分明邦有道榖恥也邦無道榖恥也人無甚可恥只做了富貴貧賤人於天下無一毫重輕此十分可恥耳靖難之後為革除帷幄者極多土木之變以逃回命官者不少否泰方交出處變象偶一值之達人無稱也芚人又云如齊景曹鄺輩豈皆無與學道上事某云齊景學道而未善曹鄺正命而未學玉石炎崑蘭蒿焚澤守正之士置而不談先是侯晉水問此等問學恐不是潛龍一流人如是潛龍已不消説出篤信守死了某初未答至是復問某云試問楊玉宸看玉宸云長沙安石非不學問篤信則未懷英子明非不善道守死則非看得信守不精則學道不宏易以確不可拔樂行憂違做合下事或躍或飛都從此起此章正明白寫出極好注疏蓋出處大端必先從不可拔處跕得牢牢耐耐才於行違處看得淨淨明明見則有顯仁事業不至空疏誤國隱則有藏用手段不至純盜虛聲如云危亂不救自家亦有愧心蓴羮鱸鱠何足傲人天下何事賴此半邉漢子晉水云如此看得極是然必如夫子説學是學此信是信此守是守此語可相通乎某云神明堅定何微不通地位既登手眼自别信得確不可拔自然天下文明劉賡言又問先儒稱荆軻聶政召忽荀息為守死而不善道陳相許行篤信而不好學此八字殊未穩賴楊兄破之然如法見不入不居明是知幾其神則見則隱又是清明在躬不知夫子何故臨河而反猶且轍迹不窮豈是堅白之義與危亂相磨飛躍之神將天淵互用耶某云此義諸賢已皆商過信得過者千金不移守得過者百戰不奪只管讀書自然理會是日晤對可四十人完義得四分之三洪兆雲老辣湛定極似陸夢鶴趙希五説學道善應極明淨林朋夔唐伯玉皆於善道學守處發得通透竒至鄭孟儲尤詹茹黃君琬呂而逺而德黃芚人劉賡美賡穆謝爾剡皆清峭髙嶷盡刋諸軟語侯晉水謝爾載謝有懷唐君璋皆散朗玄清邈然象外盧孝登唐偉倫黃介俶羅期生黃太文皆含英吐芳比音廊序楊俊人茹荼載筆卓然遒舉張鎮朴斂英就堅語無剩義楊玉宸獨製二篇連鴻雲表備觀諸作咸有其美獨某以寥落昏散筆研久虛著眼玄黃是為興歎耳次義聊舉行素之旨此是某生平習談無復奧義正如夫子所云繪事後素也天下事物稍稍著色便行不去只是白地受采受裁如水一般色味聲文一毫不著隨地行去無復險阻江河之礙富貴貧賤患難夷狄一毫著心便自不素便行不去素字只是平常戒慎恐懼喜怒哀樂一切安和常有處淡處簡之意如林類榮期拾穗而行歌黃霸夏勝雍容而講道管寧荷钁於遼東子卿啖氊於雪窖此景豈是現前做得亦豈是只行現前之事人都為數箇行乎要作行事看所以差耳譬如富貴便行富貴之事如何去得書生開口便説三重九經袗衣鼓琴此如網大海魚豈有盡理要知山川自繪乾坤自素神禹之菲惡黃帝之創造一般意思帝舜一日正想要五采五音大禹便比之丹朱傲慢小小人家得一科第便思科第行儀所以行之不可終日茍識得箇素字夏行負陽冬行就隂冷飯殘羮備當法乘諺云小心去得喜粥自在釋道兩門正於此下自注奴僕耳坐中有問四書三素各為一義者某云如何應云素位而行既是當前素定繪事後素又是素地受采素隱行怪又是探索鉤深如何分别某云只是此素耳素隱的人猶言長往把這隱深當本色看遁世以無悶獨立以不懼斷葷以齋戒祕泄以洗心此等人亂德作怪要使天下後世頂禮稱師又自家安穩不入富貴貧賤夷狄患難簿中自謂能轉移富貴貧賤夷狄患難四大簿子所以後世翕然宗之多少賢豪垂老半生懶心苦俗便墮他窖中顯看是素隱看是怪素原不居怪又自行了如以正道律之豈曾行上半途以隱當素如暗黑漆紙以現在當素如未染布以易當素如明月自明白日自白海水自鹹江水自淡也又云如未染布却不是如當鋪上現取褌衫耳魏秉德云賁亦當素夫子卜得賁而嘆以為不正之色何也某云賁不當素素非白也五色玄黃各有素在賁主丘園白稱異客詩云有萋有苴追琢其旅易曰賁如皤如白馬翰如秉德云京房以五色不成為賁夫子以不黑不白為賁今當以賁為白乎某云賁有六爻唯白無咎素有四行富貴為難行之與色猶言之與動飾言飾動跬步為難易曰賁亨不利有攸往夫子之嘆蓋嘆飾也歎飾而存白故曰白賁無咎居易而惡險故曰行怪有述吾弗為之矣楊峻人云素者緣盡色空所謂性也某云何處著此語性無緣色亦無空盡只是事事物物各有道理有道理處都極平實耳峻人云從古帝王皆從心性料理唐虞之精一執中商王之制心制事周家之敬勝義勝此皆行素之實不徒是視若固有有而不與也某云如此看行素亦是但他説行素只是中庸如舜之耕稼周公之繼述只是本地風光再無神通變化常於暗然處看得文章成功自然巍煥難名耳中庸一書都説誠字誠是素之精髓素是誠之質地素如玄酒太羮繭栗藁本誠如七日致齋視聼無形再無兩樣道理張元屏問素富貴之説載説苑孔子云以富貴為人下者何人不與以富貴敬愛人者何人不親是即今日行素守約之旨然如得位乘時制禮作樂享祖配天極崇髙之務如何説一素字某云如有這箇想頭便做不得這樣事業這是外面的事水到舟移自然行去原他心地潔白精微豈有玉帛鐘鼓罣在裏面必如此説在貧賤時耕田鑿井負販荷擔自是本分夷狄患難如何説得斷髮文身鬼薪白粲也易説思不出其位只是不見其人不見其身外道亦云當割截時如見有身便耐不得既不見身何從見人身見人見一路清明聲華平靜諸千種願一齊掃落所以天格神通鳥獸率舞自在行去不動風波元屏云如此説又太細了想艮不出位只是止字止如敬止之止仁敬孝慈信五者夷狄患難一刻難離修之常常便名為素素得盡時便名至善即此是止即此是行某云如此又細得好劉賡美云素不願外此不願外便是執中擇中精一淵源人世繁華只是喜怒哀樂搬弄精怪如嚮此中打疊乾淨七情安帖無一漏走漸漸看到無體之禮無聲之樂無服之喪此中包羅千天萬地信得泰伯仲雍箕子膠鬲龍逄比干黔婁榮啓與堯舜臯夔都是一箇人身一樣行徑如此簡易直捷在天地間再無險路再無夷狄患難富貴貧賤四種分别夫子以為如何某云某亦看到只是行不到行不到時只是空願空願便是外想外想便與繁華子一樣行徑魏秉德又問篤信行素兩種學問都是學道看來畢竟退藏之意居多易説聖人以此洗心退藏於密不知識得易後方能退藏抑是以退藏體易且如密中一絲不罣何物可藏又曰知來藏往知來為神藏往為智此密中却是神智之府如何洗心見得神智出來豈是藏後長此神智抑是洗時神智便現耶某云古人初無此問今人難作此答詩云如切如磋如琢如磨如金如錫如圭如璧秉德又云仇璋嘗言天下無道聖人藏焉河汾則曰天下有道聖人藏焉天下無道聖人彰焉如此看來反一無迹則見者有所未能因二濟行則隱者有所未可夫子以為是平仲伯玉之間閔子曾參之輩不知河汾叔度能遂至此乎某云河汾言行已近聖人適魏而反聞隋而嘆觀其出處可謂知道其季札子産之間乎叔度言詞不甚表著有兄伯庸哭母而亡遂獨廬墓三年乃下揚綏於魏乞食於秦如此似非忘世者昔人擬之顔子無德而稱大約是好學善道河汾魯衛之倫羅期生因問古人謂能盡語言飲食之道則可以盡去就之道能盡去就之道則可以盡生死之道此中巨細深淺如何齊豁且如此意不過適可而止耳恐聖賢所篤信而學之學而守之不止是如此某云如此看來篤信甚難也夫子一生只是箇時字有人説時字可盡聖人我便不信即信又不篤篤信又不死守了如何能見聖人之道夫子自言天下何思何慮日往月來寒往暑來只此往來是神智之府鬼神之撰無一人信者何况能得聖人一言一字奉之終身膺之勿失乎道字且不須談只要好學好學力久此理自見戴石星因好學之論問云有宋諸儒學道淵源當以濂溪為始濂溪可比得河汾叔度乎某云河汾叔度處於亂世濂溪生於明時致用不同才具各别若論所學原本一也石星因問王荆公不可一世嘗懷刺候濂溪三及門而三辭焉遂反而求之六經濂溪知荆公自處太髙欲少折其鋭不料反成其執拗嚮令坐于光霽之下成就或有不同某云是或不然恐是濂溪門人尊其師説或是程家門人歸咎濂溪也邢恕常言茂叔聞道甚蚤王安石為江東提點刑獄時已號為通儒茂叔遇之與語連日夜安石退而精思至忘寢食時安石年四十茂叔年四十四矣謝無逸亦云荆公子固在江南議論或有未決必曰姑置是待茂叔證之然荆公四十時在嘉祐初年試館職不就出知常州為度支判官與濂溪知南昌時各不相值及在潯陽濂溪葬母時荆公與旅出執政移家金陵初無講論明道半山少濂溪不過三四歲不在弟子之列如何陶鎔得他石星云謝上蔡執贄程門從旁隙處安適數月豁然有省乃領明道言論荆公三候便歸自是根器不同某云魯雞鵠卵亦是形神迥别劉賡穆云前日嘗云濂溪未嘗識性今日許他為河汾叔度一流人得無己過某云河汾叔度時未有空門所以識見不差當時釣徒牧豕者皆有荷蕢石門之風濂溪從禪門悟來才具各别賡穆云此事豈有門風某云清明榖雨時日不同又云吾輩不要方人只管本分上事賡穆因問前日講一貫是知至對針今日説忠恕是誠字注腳兩番拈出極是分明不知知至意誠亦與此同義不某云賡穆極細心吾每日説此無人收管此元本契書交付兄處也凡意不誠總繇他不格物不格物所以不明理謂萬物可以意造萬理可以知破如到不造不破去處生成一箇龍蟠虎踞不得支離漸漸自露性地所以説是物格知至賡穆云大學為何説心説身説意説知不説性字某云且喜嬰兒不識果子便説桃説李説棗説栗如識桃李棗栗依舊笑他果子兄且細細分别此心此身此意此知果是何物絶不要説三界唯心萬象唯識也呂而逺因問中庸一書明物是性直從萬物歸結性上説出莫載莫破一畨道理如何歸結到天地夫婦上去某説易言乾坤只有兩物為萬物生始萬物只有兩物為夫婦根宗兩端中間只有一端兩便莫載一便莫破戒慎恐懼不覩不聞千知萬能都此端所造易曰言行所以動天地也曾子曰夫婦會於牆隂細密之言或知之者矣格物工夫從此造起明體漸露漸漸光明漸到日月霜露之外漸到天地萬物為一所謂知至所謂意誠也周濂溪云動而無靜靜而無動物也動而無動靜而無靜神也物則不通神妙萬物如濂溪此語猶是未嘗格物天下無無動無靜之物有常動常靜之神中庸一部説天地夫婦鬼神通是此物知獨者該萬知萬者還獨知一者該兩知兩者還一如是格物工夫只從兩端細别立剛與柔立仁與義原始要終知終知至只此知能便是聖人之所斂袵鬼神之所彈指矣蔣仲旭云夫子説潛龍不拔似于信守之意居多乃乾坤二卦稱用九用六隂陽通復決無成體不用之理乾用其剛反以柔坤用其柔反以剛顔子問為邦季路問行三軍兩者皆有意於用世不知回是用柔路是用剛抑回是用九路是用六耶某云如此問得好若論顔子自是潛龍夫子引他到無首上去季路自是戰龍夫子引他到永貞上去顔子未到無首不失其初季路未到永貞不失其終皆是夫子變化之力仲旭云如夫子者當是何龍某云七龍皆備仲旭云戰亢二龍豈宜安於夫子頭上某云髙而無位其道窮也非是而何仲旭云近世儒者皆稱惕龍如此當是八龍咸備也某云君子當龍賴有君子領得羣靈不然只是飛潛之長看他説坤上下猶未離乎其類也一語極有意思林興公問如何説未離乎其類也某云既知是君子便有聰明睿知之心既知是龍便有風雷搏鬬之勢知是鳯麟泰山亦有鳴圗封禪之想矣聖人變化隨時何類之有無類故無首無首故不戰不戰何悔故曰唯聖者能之興公云人氣質不齊相離甚逺如顔子天資合道年三十時便與夫子相似夫子自志學來直到五十始知天命程途如許迂折豈夫子亦有氣質之纍耶某云夫子開闢之手顔子守成之良如何比倩譬如神禹疏瀹亦有九載功夫何况仲尼開鑿人間未有之業黃介俶云仲尼只是素分事業如何説開鑿人間未有某云如此素分直是天地描繪不成介俶云如此則與素隱有何分别某云素分是行道素隱是入隂入隂之與行道何啻萬里介俶云聖人猶説成名疾名不稱易便説不易乎世不成乎名古之至人􅉨􅉨逃名匿影如陶回友重華而稱之者不逮巢許牛牢交文叔而稱之者不逮子陵龍丘萇遁世力耕不仕新室而稱之者不逮梅尉武攸緒賣卜長安不附女主而稱之者不逮天台道士逹巷黨人説夫子無成名夫子若不敢當者豈是易道甚大聖人常苦未能耶某云成仁苦難成名有何足計勿論上古自宋元禍亂以來潛鱗逸羽豈復可盡蘇雲卿才具大於張德逺而聲譽不及德逺陳夀翁學力深於吳草廬而聲譽不及草廬趙仁甫行誼髙於許平仲而聲譽不及平仲黃楚望機悟過於劉青田而聲譽不及青田此皆並轡聨鑣猶差池若此况於韜光鏟采不屑人世之務者乎王千里又問四書每説聖人一曰從容中道一曰大而化之一曰遁世不悔不悔兩字可亦是從容造化不某云此皆非人所知往常誦説知進退存亡不失其正便是聖人上交不諂下交不瀆便是知幾知幾其神為此兩語沈吟半生未嘗理會唐伯玉忽問皇圗三乘二十六萬二千一百四十四卦咸統過倍五十三萬一千四百四十一卦一是河圗一是洛書乎某云何偕來之衆也伯玉云既如此説豈得不明某云他兩家只合就一百點無人明者如何説許多事務伯玉云極天下之至賾而不可厭也某云此猶未極耳伯玉云前日對林巍忠以書配卦以圗合書今日何以不舉某云試舉看伯玉云朱氏啓蒙以書配卦皆依宓圖今配出震齊巽又是後天文王之序某云汝見文王異於宓羲耶伯玉云既依後天則離九艮八兑七乾六又何所取豈是圗象生成隨取三天皆可分配乎某云聖人做事整齊神明所定點畫不移誰敢撒手伯玉云每見皇圗中參差出入先後中三天亦與古人頓别以故讐挍不能盡合某云此非要事如看得不合亦且置之不必深求伯玉云如洪範中所有云一極所虛六極所窮攝於九十寄閏歸餘此是明白正義可得聞乎某云此亦不須説古人有學問思辨的工夫此等問辨皆先要學思把載籍中圗書爻象思量十數畨才參近説證之則自然契合不在言説之下伯玉又云先天卦位自復而頤以為至始便該納虛如堯典冬至始於虛度也今既納箕則度數之差已去十卦何云納虛某云某不會説納虛納虛者餘分所積置於空道耳步推因時自以天行為主豈得近舍天憲逺蒙古書耶已有别談不須更説又云前賢讀書以度數名物亦為末務不必勞苦費心此為下根開便如漢人以此為至道則亦不同只要理會梗槩見他廣大髙明中間無盡足見聖人憤樂之始張朂之云吾徒且未與此事只見日來言論實難荷承昨日説宰我是言語之科却忍罵忍痛發從井短喪之論使千古疑關的有證據極是巽心近日仁禮兩字講者甚稀晦翁欲集三禮大成有所未及吳幼清論次稍定又多所漏遺不能詳合吾漳素秉家禮近日期功之喪亦鮮有修持者不知仲尼之哭司徒敬子蘧伯玉之請夫子攝喪顛括之服虢叔昭公之喪慈母與孔門諸雜記平居皆可詳説不蓋某時有期服已四五月尚腰絰肅容故朂之及之某云此平居都可不論然如三禮詮次極是學問中要緊工夫乃告朂之云禮書經緯蚤欲講明幼清所裁粗有端緒久已分類引伸但日用疏淡未能繕寫耳曲禮以毋不敬發端此是頭篇不可移易檀弓記諸禮節之始未應便為曲禮次篇賈公彥謂儀禮王道之本周禮王道之末此亦不同儀禮所存未必精於戴記周禮所用歷代尚有異同然其説可義起也今當分類立例各自為上下二篇曲禮內則少儀宜合為一類以為初學持循之矩所謂禮始於家猶之小學王制周官月令宜合為一類以為明王致用之效所謂禮行於國猶之大學郊特牲明堂位明堂玉藻祭法祭義祭統冠禮冠義昏禮鄉射大射射義聘禮聘義覲禮公食大夫士相見諸侯遷廟釁廟朝事公符宜合為一類以為吉禮喪服大小記雜記士喪服奔喪夕虞饋撤服制宜合為一類以為凶禮有此四篇而經統稍備猶易之有上下經彖文言也學記經解緇衣儒行坊表記仲尼間居文王世子武王踐阼衛將軍文子小辨用兵小間宜各為一類樂記禮運禮器曾子問主言曾子立事本孝立孝大孝事父母制言疾病千乘四代虞戴德誥志子張入官盛德宜合為一類此兩大篇悉本於聖門之雅論猶易之有上下繫也間取夏小正職方諡法易本命自為一編又取檀弓考工司馬法弟子職各四篇終焉猶易之有雜卦傳也如此則整齊完備上下分明多不過百篇少不過八十一篇而禮家經緯從此大定矣朂之云承此極是大事然易以孔子釋文王周公故可分别上下今如曲禮儀禮雜記或多聖門髙弟魯門之所記録而推為前編以夫子曾子之言綴於下卷可乎某云都是聖門所記取其義類相從耳萬事都可燦見錯出亦要整齊至於禮書尤宜詳整也朂之云篇中二戴尚有重復事例亦有異同者如何某云此不過略為刪定吳幼清亦嘗刪過但未詳悉耳至於漢儒傳注都是禮數曲折所繫未可泛刪見今人讀書不知賈王馬鄭是何貫籍真可一嘆也凡禮貴損益三代之禮不可俱存然至聖人餘言寸珠尺玉安可一切刪除而寶其敝蹻乎杞宋足徵備於二代周官儀禮確所當行惜吾冷落未能旦夕就草也朂之云此事鍾當與二謝共成之但要刪定重復去取注疏不過歲月之間如周官者篇帙尚多疑信各半想當孤行某云孤行亦自可但去古既逺義類相從及今不取後必有起而惋惜者朂之云如逸周書豈可憑據既取他職方則王會時訓何不并存某云寧過而存亦當存其無弊者耳朂之云如此裁定只有七十六篇某云間有大篇自為上下如曲禮檀弓喪服雜記之類斟酌自符謝爾剡因問前日朱季又問樂律何以不答某云彼事難言徒使人逐末自瞶耳又云朂之鎮朴屢問詩傳何以不説某云都説過爾剡云鎮朴問三體五際淵源差殊朂之問毛傳朱序是非得失都未盡談某云五際之義若昧若明在三易圗中屢屢説過三詩本序斷自從時又何可説當毛詩未出時雜説甚多即如關雎皇華騶虞鼓鐘柏舟芣苡賔筵采薇已不勝異説及後左傳儀禮金縢孟子諸書咸出以毛傳考之無不合者然後大行朱詩最後出又參齊魯韓毛兼用其説如關雎取匡衡柏舟取劉向笙詩取儀禮抑戒取國語賔筵取韓詩與毛出入者十分之五大指謂四家詩傳皆無的據故據辭論義耳士君子不欲盡掃前人又不欲依違去取元晦既已作此何可廢乎爾剡云夫子欲放鄭聲而鄭聲俱在孟子云迹熄詩亡而春秋之後尚有國風此最堪疑某云此亦有理鄭非淫詩而音節近淫勸戒所在義不可刪雅詩雖亡而遺風尚在詩序所傳間有可取爾剡云楚澤膠舟下堂見侯如此豈有敶詩之事乎鄭志所存魯府所誦樂工肄及是非一音則雄狐之作不必指為齊襄楚丘之編不必傳為新衛木瓜既非齊桓之仁二舟亦非衛朔之義黃鳥既非秦穆之嚴阿丘亦非許女之智凡在春秋以後皆非古人之風如以孟氏為本則齊魯韓毛皆可廢也何又取其豹斑文此􅎓鼎乎某云時代既久寧過而存瓜蔓已半何忍重刪留此數言以待來者耳是會謝爾剡爾載實為主長汀劉余二生初在坐未有問難爾載方欲發問又中止劉兄金鼎因問天何言哉時行物生倘是夫子要無言則是夫子以天自許了天分明是無言的夫子分明是代天言的夫子提木鐸之柄作有口之天固以此言鉤子貢之問好發大意耳後面説出行生正是天言處天以行生為言夫子以言為行生豈有兩種某云亦説得好但夫子自云吾無隱乎爾吾無行而不與二三子者又云躬行君子則吾未之有得他日又云吾之行事在於孝經諸如此等豈在言述大畜之卦曰多識前言往行此是言述之本反卦便是無妄曰先王以茂對時育萬物此是無言有述之本不要草草翻題立論余兄長祚又問默識章説不厭不倦何有於我與我無能焉一樣語意所謂分明香在梅花上看到枝頭却又無也及仁聖章又以不厭不倦作承當語子貢又以不厭不倦作仁智解此是何説某云看到枝頭却又無分明香在梅花上諸友莞然一粲良久謝爾載舉孟莊子之孝一章來問云君子學問要篤信守死曾子亦是篤信中人深於至道何故忽誦夫子之言以不改父臣與政為難能也某云兄何所見爾載云當時晉為雄長季孫專命想有許多難處之事要將獻子臣政更端一畨經言資于事父而愛同資于事父而敬同莊子於此定有不為利誘不為威屈者某亦默然良久乃云莊子自是賢者塞海陘而還可以為武斬雍門之橁可以為義有此兩功可以執政而退處于季孫之下臣亦不改政亦不改猶然大夫也季武子以孟孫之勳自銘鼎鐘以為令德莊子若無知者在諒隂之中一盟于向一再伐邾皆是獻子故事不與武子分功退處下人極是髙識爾載云魯既屢侵於邾明年庶其來奔季孫又多賜其從者莊子寂若不聞此亦是一段難事某云此却不是改臣與政亦不是繼志述事看他俘齊之後季孫多少張皇報宋而還公為賦南山有臺之章如此幾乎改玉孟孫淡然自成父志而已是年四月鄭公孫蠆卒以伐秦之勳晉侯為請於王得賜大路蠆以伐秦得賜大路於沒宿以伐齊得鑄鼎鐘於生莊子身為首功而怡然若素聖門崇奬謙讓不以才能為髙雖雍門海陘之事推成父業難與此事比德故夫子之歎難能猶子反之稱不伐也曾子極是讀書告成之編只有此人執筆豈可草草看作無改父道如孟莊子少年便識聖人這箇意思亦應是改違不得爾剡聞之亦遂釋然以為丘明記事與曾參載筆果然去聖未逺凡在會者以此一會講論最多榕壇問業卷九
