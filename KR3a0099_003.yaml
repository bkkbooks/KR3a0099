body:
  text: 榕壇問業卷三明黃道周撰六月九日某以內諱還山又十日郡邑較士丙舍下楗朋從不絶草九日曹公祖致書以㑹期難遇再訂初秋之朔某竟以負土言謝亦謂考期不遠聚㑹非宜也朔二日曹公自到榕壇問諸友所請題目先是朔日已封二題付張勗之去一抑為之不厭一合外內之道也曹公對諸友發揮大意所未及領初八日徴文始完彚至墓下僅三十五人趙與蓮郭受子洪尊光唐君瓚諸兄皆不值而游鱗長施非昃蔣仲旭謝爾載新下教游鱗長見問云論語一書言仁多端至聖字則靳言之不知仁聖是一是二抑有天人安勉之分夫子辭聖未嘗辭仁又辭名未嘗辭實但不知夫子所為何事所誨何物一時門徒定道不出某云此何須疑勿問夫子所為何事所誨何物且問古來百千仁聖所為是何事所誨是何物仁聖是到頭食報之名為誨是三冬穮蓘之務如富翁長者如何敢居下糞耕田是吾本分說出此話豈有含糊書生只為聖字喝倒如怕虎人說食虎肉便怪驚謂無此理不知是獵家常脯耳顔淵曰舜何人也豫何人也有為者亦若是孟子曰堯舜與人同耳又云亦為之而已兩為字都從此出顔孟以下於此為字都不體貼經師談到為仁聖便咋舌且說是空空為本分事無為仁聖理不知仁聖當日亦只為得本分事譬如堯舜當日兢業終年豈曾標箇堯舜終年去為堯舜耶唐君璋云夫子說為誨是下學還是上逹如屬下學何以從默識說起如屬上逹何以謝仁聖不居某云此中千萬勿說辭謝如說謝字躬行君子夫子亦不敢居不為酒困夫子亦說何有於我譬如擔糞下田人老實口吃當用力時齒亦不開於此處說甚下學說甚上逹到異日人稱他富翁稱他長者雖極正當亦要打恭起來豈有呆說我便是也如老農夫祁寒暑雨晨夕田畔不著一聲咨嗟勿論膏粱子弟勉强不來即伊家粗頑漢子亦趕不上了只此就是聖人心事聖人樣子黃太文云夫子到處遜謝到處擔當窮年孜孜憤樂相乘大家商量無有盡處是本領得的所在如云除却敢心便有實詣則一味謙卑已證聖果如何還費商量某云賢說得是除是莽操亦有豈敢之心小兒瓜果親前亦要讓只是當仁不讓了如說去箇敢心便可證聖將顔孟無復證聖日子如問本領所在難得直說一樣肥糞工夫不同一樣工夫時候各别聖人雖遇小事於三才上不靠一家孟子云地有肥磽雨露之養人事不齊也一誨一為教斆相長精神心力吐露畢盡矣凡人精神明清是聖心力融結是仁兩處都下不得手口只要此處人自鍛鍊到心力融結精神明清便去仁聖何逺勿說岸上終無人行也張元屛云從來說家亦云夫子非辭仁聖子華非贊仁聖一是指出學人為仁聖門路一是悟到至人成仁聖歸宿是否某云便是此亦不是尋常說家但說門路歸宿則微不同門路是迹歸宿是室此是吾輩實歷功夫擔子上起家也此處相長無量成已成物日月不竭君璋所云任人見仁任人見智是也陽明先生謂發憤忘食是聖人之志樂以忘憂是聖人之道豈命志時初不見道得道時了不見志耶不過憤樂相宣如風雷水火要此兩物生成萬彚如云天地渾然更無憤樂成甚法界莫云風雷是志雨露是道也佛家只曉得虛空是天聖人蚤說乾乾兩字真龍心骨勿為蛇蚓所撓耳楊峻人又問學不厭云何有為不厭云云爾豈學深於為抑為别有所學乎使為非仁聖則聖門所學的是何事如以仁聖為之則仁聖如一榜樣似有成格可慿盡境可居某云賢問都是然夫子下語最不死煞仁聖涯頭有如天海尋他成格盡境的何所在生平說忠清才藝算不得仁一旦子貢問施濟是仁反說何事於仁必也聖乎又如神禹顔淵亦是不矜不伐一旦原憲問不行克伐是仁反說可以為難仁則不知觸類引伸教斆之間豈可量乎聖既不深於仁則為何得又淺於學耶峻人又問夫子對子路說為人究竟亦無實義如說仁聖便是此人將毋堯舜亦是此等憤樂某云賴賢指得分明孟夫子云舜往于田號泣于旻天只是念到不得為人不得為子試就此段想出聖人不得於天涕泣悲號開眸無處何况發憤而已蔣仲旭問莫亦是地位難臻工夫可到不某云嚮來吳雲赤亦疑仁聖是性之為誨是反之然此中只說性教不說性反如是工夫者自家做不了誨不得别人雖是教學相長亦如魯雞終伏不得鵠卵出來趙希五云是夫子恐人把仁聖自居便有歇手特以不厭不倦使人鼓舞而不自知某云如此則是權教終無實義吾門皆是實義不用權教蔣仲旭云既是實義不用權教則只任他地位還我工夫也某亦深以為然吳共玉云如是實義則子臣弟友格致誠正參入為中終無了法亦無悟理如何生出憤樂教誨許多妙趣出來某云此事談之已多吾人只管發憤樂亦無用誨亦無用勿問他是權是實是假是真楊玉宸云雞唱吹燈烟飛整案認此是為多少得力如說修贊刪定在吾身中只是三分日子頭白齒落半坐空閒亦誨得多少某云賴賢此發孟夫子說舜徒孶孶於不厭不倦處又領得分明人都不看孟子書被宋儒粗看誤了玉宸云孟子學本子思於誠字贊得分明於無息兩字却未曾贊出某云不是無息如何說得誠字凡事只是不為為又不誠所以厭斁出來孟子每每說為人君為人臣為人子為人弟又說雞鳴而起日夜之所息舍此便無作聖工夫亦無做人地位張勗之云還是作聖工夫難還是做人地位難還是作聖地位大抑是做人工夫大也某云論聖則有差殊論人更無分别諸賢說是地位工夫某說終是精神心力論語中兩說無倦與是合四矣子路子張無倦源頭與夫子有何差别如有差别夫子亦不勸他冉有說力不足夫子把不好字靣與他使他猛省只從此看便分明勿就為處看反費爭論也勗之云千聖只是箇學不學何處見為然如禹湯文武分量氣候寧無不同如何為之得一某云且勿看他不同只看他同處無怠無荒不敢怠遑雖使宓羲神農豈有差等必如峻人所指為的何事則夫子對子路子張亦未曾說無倦何事也且看不厭不倦的是何物耳呂而逺云夫子志學云不踰矩平天下云潔矩矩字的是孔子衣履留與後人譬如上下四方覆仰圓成如何說一矩字既是矩字如何貫去且如一矩為之又從何始某云瓊山潛閣兩先生亦曾看到此未曉出處某常道此事只有管仲曉得曾參用得管子云大圓生大方大方生規規生矩矩自四方從大圓中五變出來生人生物生四肢百節禮樂疇象無人曉得顔子問目夫子把四勿與他版版整齊他人一毫用不得曾參以忠恕兩字代之漢初儒者把大學中庸置禮書中是聖門奧義今人抽出以為心學如一方磚磨作圓錢又於矩中再變回去是樂律中黃鍾子聲五變之後再起清音也古人為學立一字有千種奧義追尋將來所以發憤為得不厭今人為學極好是賣弄得去所以自家亦厭薄了今如賢看到矩字此是管子所謂大圓初生時如一印璽千聖相受尚有手法孟子所謂巧力一聖難傳譬如一物渾圓勾而股之此之謂潔潔是潔而使方一物四方率而圓之此之謂率率是率而得圓一物方圓徑而通之此之謂貫貫是貫而得一聖人只此三法提挈天地裁成萬物舉其形迹似云凖繩規矩推其巧力便捖搏兩造創立精光三千年來無人解得賢不推勘某亦不敢啓齒但恐言之又生許多口涎費人貶剝且勿辨論只溷溷大家看四書去也呂而德又問性體穆然無思無為中庸便說戒慎恐懼此是後天存省之功是先天流行之體某云而德兄弟每問得精微某有一語甚粗與而德對破人須曉得人不是天性不是道人若是天便亦蒼蒼茫茫逺無紀極性若是道便亦隨人函裹𢎞闡不來所賴聖人居敬存誠時時看得人即是天性即是道所以禮樂文章節次生來成箇變化昭明外道大錯只說天字更不看地看人更不知天上日月星辰如何安頓天上有箇日月星辰人靣上有箇耳目口鼻只此便須戒懼豈得無思無為如是未生以前何消探討程伯子所云極上更不須說也成周盛時公卿士夫箇箇知學如頌云維天之命於穆不已雅云天生蒸民有物有則夫子乃云乾道變化各正性命保合太和乃利貞吾儒著眼只在各正不已中間未到於穆變化上去切勿云毛髮骨節俱是虛空也羅期生云中庸以性明道揭一誠字即如老氏所謂其中有物者窈冥之內信有此物則𤣥素所求差别不逺如何刋落兩家且如前日所論繫辭退藏寂感何思何慮難道無存省流行之别某云賢與而德一樣學問洗心退藏此中更有何物寂感遂通此外亦有何物只如憧憧往來此時戒懼已為晚矣人身自床几上下何處不空頂踵豎來何處不實空實兩字切不須說只看日方出地萬象昭明雷在澤中萬物宴息泛泛說虛中寶藏猶入古廟中見鳴蛙以為精怪也如是至誠的人只管肅衣冠一揖而退耳今日方說為人便到此又𤣥虛了且勿談罷吳雲赤云問苦難切也格而知恕而行為誨而默識默之與誠同是一藏內外虛實合一圓成若是矯物見清納物見和於二五妙合之精得無稍著一意某云豈敢賴賢針砭通身發汗人苦不自聞過也某自生世五十年未曾與物抵牾只是體骨不媚變化未能三代以下如謝安石王茂𢎞都是聖人難學得就也雲赤云至誠動人久而後見矯納之人不能歲月孟子謂聖人得力在智則至誠得力在成物上吾輩當所共勉耳某云此道甚大如賢說又非現在所能且須不肖反躬克治識箇頭緒相與推求也鄭孟儲乃問嚮來說人不是天性不是道此語得毋揑怪且如太和保合則本來有完成之義合德合明則神聖有作為之功合內外成物我費多少鎔鍊陶汰仍不落博施濟衆局靣不入摩頂放踵空門僅僅以性體了之未知性道兩字作何下落某云自開口來萬語千言只為此事如何又疑將起來同是此物自天為命自人為率自聖為修修之與為為之與學同是此事看是文章便作文章看是性道便作性道只不要突鶻扯來將禰作祖耳如此尋求吾輩談話不如西銘訂頑包舉得實也盧孝登唐伯玉施非昃又把兩義合看一畨於誠明格致上都有體貼謝有懷謝爾載都與西銘同意然疑此處與二氏同旨謝有懷云性合外內則無邊際無見相與佛家所說無人我等相及老氏所云心無其心物無其物有何差别謝爾載云子瞻亦云骨節皆髮毛孔皆身真實到此才扶得世教醒得人心某云呂而德羅期生亦是此意今日辨論此事雖費筆舌亦是要義然自前日歷歷道盡此印此手不落白屋人家何須攻擊追討我說合外內之道他說中邊皆甜不是和合反要籠罩過來何止應節而已其實此已不成物無成處自己不學誨從何來現前只說一君一相成就不來天下盜賊兵戈豈有了日如吾身中一心不活百病橫生取譬得出良方立現以此與二氏差别爾載云亦只是戒慎恐懼不然便有虛詐變僞出來某云看得世人虛詐變僞是吾身隱痛此便是聖人學問看得吾身變弄幻化是天地本情便是外道學問也爾載云佛門亦不如此某云流將到此王豐功云宋儒有云志伊尹之志學顔子之學伊顔都有所樂可是志學都從樂上盤旋出來抑别有所志所學也某云日日要人此問胡湖州問大程顔子所學何學大程又問諸賢孔門所樂何事二義極是要領前日亦曽提過喜有此問夫子生平不說伊尹只說伯夷柳下兼說武王又扶繩了漢帝嘗云不食馬肝未為不知味也只說堯舜以來一介千駟古今同視貧窶之身常在苦境無一樂字鼓舞不來直到樂中才得自在孟老以是探討精微補出聖人不漏眼界切勿道到功名路上去也功名是時分推排禹稷顔子伯夷柳下生下看命豈能知其所至近日羅近溪先生亦於樂字上探得八分只有樂字便不厭不倦外內圓成了然則憤是如何某云天降時雨山川出雲氣象盈舒的然可見豐功又云志字絶隱微誰人詐冒不得亦看他作用如何某云一介不取千駟弗視此處豈亦詐冒得來如是作用除却孔子都聽天地推排耳是日諸賢問者不多都在兩義上折難分合唯黃君琬問德性問學須歸結禮上已於呂而遠問中備露此意朱季義問至誠之道可以前知前知有甚緊要某云前黃可遠先生主試楚中亦發此義謂前知不甚緊要只是心體光明吉凶同患自然為家國開符吐珍先一著事某於此處實未了徹只得啞口但願諸賢循常格致到定靜中自然知他緩急先後也張子京問成已先於成物如何又說知及先於仁守復禮乃可為仁如何又說仁守還須動禮某云此道無窮東西相起切勿粘他字句王元槐問書說上分别字義某云此則不知林非著陳非魚問孔顔作用某云此則現在食的睡的林興公唐偉倫問求其放心偉倫語意甚懇却於麯糵飛鴻之外窘迫塵務焦遭時勢某念此賢立志如此不覩衽席必被蒲團圍住乃對興公云讀書人莫苦紛囂莫喜空寂只是不驕不諂不淫不濫如駕安車𨗳坎過橋常覺六轡在手雞犬放時亦在家園何須建鼓如為聖賢何妨鬆些直放此心太虛之表六合內外看夫子對顔淵時何等空濶豈是顔淵亦有鄭聲在旁佞人侍側耶陳明師都不發問黃共爾良久乃問昨日施日熺作魯太師語樂來面請益節於屛風後聽未明白如是器數難道太師不解如是審音知變不知聖心尚費多少言說不知夫子正樂心事還於此章便了未了某云萬事到夫子手中自然簡易直捷如此數言已為多矣一部周易千竒萬怪自夫子說來如家人耳語社師蒙訓一樣羲農以來各有樂章百代損益不過如此看心是心看事是事看禮是禮看政是政禪繼放伐條理不殊聲振如一無他只是性經相同心緯如一也如說可知處尚有一半則更有一半不可知了看此十八字六變咸備天神地祗麟鳯鳥獸總萃於此可知兩字亦是遍閲六代領略將來不是提耳輕慢樂師也此道亦甚大且須從容冥心七日張鎮朴最後問三軍與行藏有何關涉却為子路闡發豈是顔季便有韶武之分抑是聖人常有征禪之論某云後世聖人禮樂軍旅在行藏中決是大股單行不得大武樂成時便有周召分陜之事然未聞顔淵商量到此黃共爾前日問顔子極好是箇大拜如何謀天樣事賢今日疑夫子極好是揖遜其次必及征誅耶吾人讀書只管得不寢不食發憤忘憂以愚柔自處便有明强人來以明强自負便到愚柔邊去戴石星云夫子意思不論如何但如此事說豈敢說云爾一味虛懷開悟後學不知多少某云亦要看他傳手傳心開胸開目如說豈敢云云濟得後來幾分大事是日曹公祖聞到壇中諸友至者僅十八人曹公極其欵洽開𨗳無量但未有載筆從之者尚冀諸賢録其緒論益我愚䝉耳附寄諸友書某頓首某以頑鄙荒遁之餘不委溝壑得侍函丈備觀美富三㑹之下聞所未聞每發一題初無定意及覩諸丈分曹競奏鐘鼛磬管備有成音心明目開何樂如之僭以一度濫登筆長或識所未通低徊不下或意有率爾妄即刋除自反此心良為發忸昔夏馥一與擯籍終身不至陳留季緒好為詆譏子桓訾其不類周獨何斯執此盟載聞此朔二日曹公祖親至講堂𫝊餐命坐此日諸賢所當咸集共請提誨而猥以不肖所寄題目施於楮筆倒行凌節愧如之何某既伏匿耳目不張雖有鼓鐘何繇思享不知誰復載筆記此當日授受之言者問業比益反約都在題下推求題下既有評隲復有講論不患不詳所為此條欲諸賢旁考經傳下逮史籍益廣聞知破我聾瞶耳前吳雲赤兄屢有引伸今亦反近以為切篤其實切篤俱從博收單條起義勢必嚼蠟古人講論春夏禮樂秋冬詩書以春夏晝長精神茂暢秋冬晝短意思靜專耳先輩孫月峰與耿天臺同在南都分季翻繹史傳數年前祁倪二年伯亦用此法分為六籍今如禮樂之餘有法器圖象厯律星官地理算數詩書之餘有諸子百家素問太卜時集要者有㑹典衍補通考函史左右兩編何妨以類分限講求如舉子業者只存於心心淨則筆不囂心深則言不剽加以師友切磋的知源本千溪萬徑攝月通川隨處理明經心成道豈必隨人描眉改鬢乎某思此事性習未開立少觀多指摘盛集咎譽之下顧盼殊勞講說數畨大意已畢便當反舌收聲以省罪過區區此懷再貢函丈非有喜負欲試同人聊借鄰光以舒夜織也中元前一日黃道周再頓白榕壇問業卷三
