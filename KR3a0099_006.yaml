body:
  text: 榕壇問業卷六明黃道周撰士别百日苦不刮目所繇致思功少隨眼時多也人福分事業九分俱在眼上此物下不清靈無復清靈去處人能時時致思便覺眸子靜深不逐物走閃遇有自得處廓然千古上下千古聖賢留此文字只恐人心眼放不清靈天地亦恐人心眼放不清靈故留此文字不然羲元一畫鼻上兩眉大抵亦不須作也秋爽漸深繁隂欲落試問諸賢臨稱八月此義何居洪尊光云臨為丑月觀為酉月臨觀相反臨方壯而觀始衰反臨為觀二陽之用錯而居外所以有凶某云此解極分明聖賢看書只是一正一反內為君子外為小人惠迪為吉從逆為凶臨以君子居內事窮勢極遂有八月之凶范文正出理鄜延道見吕鄭州鄭州云在中朝尚不能料理閫外在閫外何以得成帷幄之業及西事罅出韓范相顧追思鄭州之言臨之八月范公當之尊光云然則觀卦何以不作此解某云觀以君子在外勢極而反不薦有孚亦自聲實所致李深源羈迹江右至十餘載卒之元載亦去相業顒然觀之不薦李公當之尊光云然則易之吉凶只看陽有消長陽自復至夬只是陽內而漸長隂自姤至剝只是陽外而漸消隂不與陽為對猶小人不與君子并衡何必云復邊皆從陽出姤邊皆自隂升乎某云此亦有意但恐習聞者掩耳試舉似洪兆雲看兆雲云易稱一隂一陽隂升則陽降陽長則隂消小人之與君子倚伏互勝寧有小人不動君子自為消長之理某云尊光亦有意但講之未明耳凡氣無寒暑時無涼熱寒暑涼熱皆繇日道所生日道向北陽氣漸升日道向南陽氣漸降升而日永刻漏晝長陽畫以多降而日短刻漏晝促陽畫以少晝之長短皆生於日不生於月故云陽自升降隂無消長也大抵寒暑涼熱猶之氣運盛衰氣運盛衰聽主心髙下主心盛明陽氣充周則百草滋生萬物暖燠主心衰暗陽氣疸謝則百草凋枯萬物凍折非有一隂物當頭與日相抗如黑光之於曦影也兆雲云自有圓圖來便成兩畫復以陽左姤以隂右六變相起隂陽各分以成卦次如人有男女脈分左右明明如此安得云隂不雙行陽自開闢一年十二月只是陽光自為進退也某云以日為主則寒暑實非兩事以君為主則邪正實不雙存君子逺則小人自親君子親則小人自逺豈一邊生小人則一邊去君子如隂陽之為代謝乎大抵陽爻如一日行有赤黃二道分為六畫赤黃之外皆為白道不紀日行便成黑道所謂隂爻也兆雲云九道皆有日行月差與日相逐日月并在九道之中隂陽并在六爻之內如謂有陽無隂實所未聞尊光云日能為寒暑而月不能為寒暑古今涼燠生於日道而不生於月行舉其大概則云隂長陽消核其精微則只是一陽自為消長猶之月然語其大概則云明生魄死要其情實則只是此明自為盈虛耳某云今日之談殊勝肇論尊光因問臨觀之義或與或求何也某云賢者在內其道有餘有餘曰與賢者在外其勢不足不足曰求禽賜較量聞政曰求之歟抑與之與看臨觀兩字極精臨便與大君同意觀便與生民同情洪尊光云臨如至和嘉祐時文杜富韓相繼為治諸君子皆在於內然不知有王安石吕惠卿之姦及熙寧禍發而朋黨論起根芽乃在景祐之前觀如元豐之末年天下方苦新政君實晦叔景仁持國微仲堯夫六七君子時望攸歸觀時進退復成元祐之治雖紹述繼煽宋社就頽而諸公出處終不失道嘉祐君子身享其實元祐君子身享其名論諸賢學術古今所稀皆不能維持百年之運一反一復不出十年而天下大變何也某云夫子每説必世後仁守成之君只要安常如值好卦勿浪變才一反正則體背異用矣有病之軀兩次易醫自然不起尊光云醫看手力耳既已錯用那得不反某云只得一反那可再錯戴眉仲云士君子生平都説挽回世運有宋諸賢竭力挽回每一挽回對頭愈惡一似生成有四吕二范便有四蔡二惇奈何説不是隂陽消長某云只是君心易向便作南北分行譬如人鬼雖是雙存要之生人終不見鬼眉仲云運之所厄聖者難持火在水中終燃不得陳竇欲去北軍遂有建寧之禍涯餗欲除神䇿遂罹甘露之災譬如冰凍人雖向火其奈冰何某云此亦積漸所成已非一日生人病極豈無人意便自與鬼為鄰北地寒深雖有日光亦自與冰共戰非從病起便有鬼生一自姤中便成冰結也晉自懷愍而後世運已屬劉石所賴王戴周祖挽回於中宋自徽欽而降天下俱落金元所賴韓范富歐敦培於始假使晉宋無諸君子豈能與正統齊觀戴眉仲云既説不落隂陽如何又成世運某云氣有隂陽時有寒暑人有男女日有晝夜皆是積成自然序數可别至於治亂之胎結於渺忽差池長短各不能齊夏殷數百陳隋數年除是聖人聞樂見禮睹始知終豈復有能執刻漏而數其延促者前宋主德清明雖促漏亦成清晝後漢主德曖昧雖永歷亦似隆隂一消一長只在君心賢人生其間但如風雷為日效用終與君心把持不得眉仲云如此則是無用挽回也某云風雷得用雖不能改夏變秋亦自造民生物林非著時在叢桂堂中看書因問吾門常説春秋己未至洪武戊申整整一部易宋九青給諌嘗送吾門詩云二千九十年俯仰在冠襪此是何解某云己未至戊申二千九十年只當半部易耳全易一部四千三百六十九以半割之二千一百八十四餘九十四年上除幽王十一年平王四十八年下合洪武三十五年整得九十四為半部易也非著云如此則乾坤中交三十二卦斷自宣幽之際下逮洪永當以永樂壬午為乾之始中宣王己未為坤之初際今始於隱公元年下逮洪武元年前後三分除九十四年則陽節隂節縮分已多何以步逺而合某云論卦周則二千四十八已當乾坤之中論氣周則二千一百六十亦居常行之半以五百一十乙約之已滿四周內盈四十六外縮九十四以陪除贏在己未一元之半其數可致也非著云吾門未嘗言數如言數則一代盛衰正如寒暑晝夜可測而知何以治忽無常聽於主心或延或促渺不可度某云數百年在天地中只成一候數十年在天地中不當一日譬如一日風雨隂晴經時數變雖在目前不復能知至於積久氣運統齊則春潦秋旱自然可推故舉半部易可印全部藏往知來於此過半勿對癡人道夢姬公也尊光問乾坤坎離咸恆兩濟夬姤剝復何以為初終中候某云兄把圓方二圗子細熟看自然通曉尊光云吾門説方圓二圖非龜龍之始所以不玩某云論羲軒本易則現在今經論易簡自然則圓圗體備矣尊光云既以今經即為古圗則何物名為周易某云爻詞自是周聖所撰象序諒自古昔而然看他綜理數千百年懸如洗鏡諒不是中古始就尊光又問大衍之數五十河圗加五洛書減五仲尼説五十學易於此看得如何某云嵗法閏餘備從此出尊光默然某云試舉問唐伯玉看伯玉云此亦影響譬如期三百六旬氣盈五日有餘便是圗象朔虛五日有餘便是書象也某云五十之義何所不通履端於始舉正於中歸餘於終縱橫屈伸皆從此看一六因之而皆為水二七因之而皆為火三八因之而皆為木四九因之而皆為金貌言視聽秉睿而出便是建錫之本伯玉云此則諸生曉得又如四十有九自黃赤上下挂一兩分創義之外别有奧旨不某云除衆曉者誰為玄奧太咸卦嵗四千三百六十九去其體嵗四十有九亦成奧義然自仲尼上下未嘗從此留心只是作睿中關參假未透尚須八百彭祖之年尊光又云圖以生為序左旋書以尅為序右轉乾坤鑿度言天左旋地右轉想亦此意某云試問唐君璋看君璋云此説備在黃圗黃圗序云赤極相距各五十五天日競旋地牽其中積遲而右一嵗之行一百五十六分滿六十三嵗而退一度故七政地道皆為左旋以其遲沓遂成轉右尊光云然則聖人何以於此異同某云聖人别有所見黃介俶與非著同在叢桂堂中見尊光數問厯象因問五運六氣參錯難齊要自岐黃以來著於天官子午卯酉以為少隂君火陽明燥金辰戌丑未以為太陽寒水太隂濕土寅申巳亥以為少陽相火厥隂風木對化反治司氣間化五年而遷其六氣循環皆以風熱暑濕燥寒為序今文圗中乃有十二氣燥金艮金風木敷木濕土剛土寒水明水少隂君火厥隂遊火少陽相火少陽遊火其司天司泉皆不繇古法何也某云素問內經以運氣治民間之疾其法主感感而治之在於外故以風熱暑濕燥寒各司六十日視其主客以為化勝文圗以圖書繫天下之命其道主應應而治之在於內故以心包三焦遊騰四火麗於君相以視腑臟各應喘息以為標本疹治不同而天人共事微密繇中其效一也介俶云古經皆云五臟六腑今云隂有五臟臟有五系上隂之君心縣於肺故肺與心别自為系陽有四腑腑有四房下陽之君膽縣於肝故膽獨為一系以上五隂虛胃以與心以下四陽實胃以與膽其合則十其别則九合為二十别為十八何也某云凡人本天而生五運六氣九圗十書八卦只是一物信得過者隔垣聞聲洞見腑臟信不過者滌腸剖腹只是採生異日尊光又引所親談太乙六壬日將直符之説某云吾門小步不道遁竒尊光云自東漢以來任文公薊子訓諸賢皆通壬乙之書何遽無也某云伊自為風角家言耳不涉壬乙六朝來唯梁武最好竒遁侯景師至都城羊鴉仁敗於東川帝猶據式命將以廉貞遊奕為不敗汴京之亂郭京劉孝竭等皆取丁甲鍊為神兵以是覆亡者不可勝數吾門樽爼自軍旅已謝未學何須問此猥瑣之營唐伯玉又問黃圗陽得一三五七九隂得二四六八何故遺十某云亦是箕孔之所不用整整百萬與天不復相追伯玉云整整百萬則是天地全數何故不與日月相追某云春秋二百四十二年以易象分之只得九十九萬五千三百二十八尚餘四千六百七十二夫子不用其餘伯玉愕然某云且去思量得其端緒也異日伯玉君璋又與尊光同問某云己得端緒不伯玉云未也某云得到敬王四十一年四月己丑便整整百萬矣君璋亦愕然某云且去思量得其端緒也異日尊光又問前説何以不得端緒某云人事差池天道可見見後者為贏見前者為縮西狩獲麟是前見縮蒯瞶入衛是後見贏公孫宿以郕叛於齊是春秋正命前後準差凡二百四十四年餘五百七十六是其端緒也尊光亦愕然某云試舉似伯玉異日伯玉又問某云已自明悉吾門讀書只要明白既不明白論語學庸豈斷人思想之路伯玉云如何是整整百萬某云只是天數二十有五地數三十如何是春秋正命某云七十三乘六十四尊光云吾門既不説數如何又説到此某云是易中點畫文字尊光云既是點畫文字如何説不明白某云胸腹易見心胃難摸於是大家掃卻戴眉仲復問有道心便有人心有德性便有氣性亦如隂陽合體而出雖有分别却不能離如何得以道心消融人心以德性變化氣性某云晝夜同一道心看不明白人心便起風雷同一德性感得躁暴氣質便殊人能敬靜在在見極便無復晝夜風雷之别亦無復養心養氣之殊一日林朋夔見過某問聖賢言語皆有來歷中庸劈空説出造端致曲端字既為聖賢常談如曲字作何來厯朋夔云前日領過學問致知格物物不曲不直易稱龍蛇之屈精義入神禮稱物曲本天殽地鬼神體物聖人曲成正在此勾萌處實實致力此處隱微未顯未見然到顯見却無復致力之處正在獨知處衷曲自語事事見得自己不是有一兩處鬱崒未達盡力托出便是誠明路頭某云此與克已有無分别朋夔云克已似踐形盡性一流人致曲似格物致知一流人克已當行致曲當知某云曲成萬物而不遺泝其源頭更無分别有不善未嘗不知此曲最是分曉尊光又問關雎鹿鳴冠於風雅乃齊魯韓三家皆以關雎為康王政衰之詩杜欽傳曰佩玉晏鳴關雎刺之漢明帝詔曰應門失守關雎刺世太史公云仁義陵遲鹿鳴刺焉蔡雍琴操謂鹿鳴大臣所作王道衰賢者隱故大臣託之諷諌繇是而觀詩序參差皆非聖門本説晦翁盡刪之是也吾門時常何以不喜晦翁刪序某云詩多譎諌主文而無罪如此等詩性情禮義前賢猶云刺時則鄭衛淫詩或是刺時所作而晦翁皆謂淫者之口此處乖謬害意泥詞非謂其刪詩序也尊光云如此則詩自正雅而外皆有刺而無頌所以頌自命篇風自稱諷雅有正變諷頌互參觀其命名思過半矣某云如此看甚明白大抵詩為禮樂之藪樂繇禮生風得樂之意雅得樂之理頌得樂之容故為禮家皆有禮頌頌容也非詩也聲容相宣亦間有叶詩者而道不盡於詩凡詩必依韻韻必和聲如清廟之什六章無韻臣工之什四章無韻閔豫之什酌桓賚般皆無一韻以振鷺白馬推之知其皆為容也尊光云然則魯商二頌又何以皆韻某云世代既殊作者異義要如周公所裁皆匪夷之所思度尊光又問三百篇而後降為樂府似於風雅為近如人生不滿百常懷千嵗憂有蟋蟀思居之遺勞謙得其柄和光甚獨難有小宛溫恭之風馬啖柏葉人啖柏脂不可長飽聊可遏飢有苕華星罶之慨自唐以來始有近體未知近代五七言尚可嗣三百不某云此是詞人口唾尊光為何掇他周家以來山甫張仲之精於性命申伯召伯之懋於事功衛武召康之邃於道德今繹其詞如誕先登于岸俾爾彌爾性訏謨定命逺猷辰告古訓是式威儀是力誕后稷之穡有相之道古之人無斁譽髦斯士昊天曰明及爾出王神之格思不可度思豫懷明德不大聲以色佛時仔肩示我顯德行精言渺語紬繹無窮使漢儒為之則朴確無光使宋儒為之則枯朽就爛矣聲律雖細本於神明豈有無聖賢之學作神明之語者六朝以來唯有彭澤晉宋而上只推魏武要其所得自成顓門陳伯玉掠皮而多膚杜子美鏤心而或滯過此以往亦鄭衛之輿儓鼛鼗之撾操矣尊光云王龍門尚採漢魏以方古詩難道此脈於今而絶某云間亦有之霓裳羽衣何必與韶武爭陳吕而德曽過尊光所因與尊光論士人雖是讀書到底是個名位終日披閲只是得喪利害盤在心上與聖賢何涉想在此處定有篤實功夫才得壓倒羣動某云此事唯有李延平説得好延平云古之學者讀書只要明道道明則生死不動其中何况得失榮辱今人讀書只要應世應世則錐刀皆動其中何况生死名位某謂今人最怕説一道字説一道字如犯祖宗之諱泛泛讀書只是唇吻既從得喪利害讀書便就得喪利害結局何時跳出這箇圈子而德云如何跳得某云先破生死後破名位已破名位更無得喪而德云如此看道漸落禪虛某云吾道之與禪門只是有學無學之别尊光云生死只是一日豈有日日生死某云為此一日生死長却百嵗商量吕而逺因讀史次問西晉東遷汴宋北狩一樣摧頽何以太興而後晉祚尚崇以白版鎮於五胡之上建炎而後宋社遂卑以黃屋屈於金人之詔某云劉石初起收拾未定而氐羌內患尚有未遑金人積威滅遼而後勢無反顧而逺云劉石席捲中原勢如掃葉周訪祖逖雖有小勝未能損其蝟毫烏珠雖已渡江而廣德髙橋靜安和尚原諸師往往克捷且當靖康時河東所失者不過恆代太原澤潞汾晉數郡河北所失者不過真定懷衛濬四州而已其餘四五十州郡及兩路兵馬尚存非如懷愍時幽冀揚兖俱為異域也而舉朝病尫稽首不暇以宋視晉猶奴之於主耳而舉世右宋無與晉者何也某云宋人只有兩個黃潛善汪伯彥已當得十個石勒晉人雖有兩個王敦蘇峻當不得一個王倫可是宋朝人才忒好也而逺云王導庾亮溫嶠陶侃祖逖桓彛論它志行豈得與李綱宗澤比耦至如韓嶽楊吳自非訪處顒約所及似亦不是人才之咎某云人才只論一個安得個個人才信得過者王猛崔浩張賔亦與夷吾同收其效信不過者茂𢎞安石只是庸流而逺又云世事亦自難料王夷甫之賣牛車謝安石之辭桓帥均是一樣安靜而成敗不同澶淵之議土木之變均藉六龍之威而安危異道當汴急時唐恪嘗謂欽宗曰唐自天寶而後屢失復興只緣天子在外可以號召四方今宜留太子居守而上自幸洛連據秦雍領天下兵以圗興復唐恪生不足存此言亦未大錯土木之變尚有主此説者謂死守社稷是諸侯之事天子出居春秋無貶李伯紀於此看未分明得毋是耶某云論事須是晰理晰理須是豫定唐人尚有奉天之築宋人初無雍洛之談臨時鼠竄令輜車未及而敵騎躡追何如死守之愈乎土木偶然輪轅如故而徐武功輩倡此妖言真可生拔其舌而逺又云古今四番黨禍皆是小人造此名目凡説出此字耳不忍聞今士大夫平居動説人黨似以已為獨立者不知此語出於何時某云自王猛王子朝之黨始也唐虞只説協恭和衷夏商只説蕩平正直夫子每説吾黨異是天下一王何處討此色目掩耳掩口真是怪事而逺又云一病十醫此病不起太和之黨牛李爭競一起一復不足以禍唐訓注入宫而黃流大潰紹述之黨王馬波瀾一起一復不足以禍宋黼貫用事而邊塵四起大抵衣冠肆毒禍盡於衣冠非類當軒禍連於宗社也某云我輩談道不須及此尊光又云屯見而不失其居蒙雜而著此作何解某云猶言屯著而隱蒙雜而見也尊光云古今何義足以當之某云齊小白晉重耳足以當之齊有無知之難鮑叔牙已先奉小白奔莒及難作管仲始奉子糾奔魯雍廩難作而小白自莒先入震內坎外不失其位皆先一著故云屯見而不失其居重耳困於蒲狄娶於齊秦身更厯國在外十九年六十二而始得反內有兄弟之患下有吕郤之難內險外止雖後一著而天下稱之故云蒙雜而著尊光云鮑叔牙管仲亦當見而不失其居狐偃趙衰司空季子亦當雜而著也某云君相自是一體狄仁傑亦見而不失其居李深源亦雜而著尊光云梁公自雜而著鄴侯見而不失其居某云許得梁公則去鄴何逺而逺云廬陵初未失德艱虞養晦在外十五年免於誅夷之禍此亦見而不失其居睿宗委蛇稱嗣再稱太弟一值五王之變一值重俊之難卒藉其子以顯此亦蒙難而著也可惜其中無臣耳肅宗即位於靈武代宗避難於陳州事雖不侔而見雜遞應比於宋事則康王兼有之惜李綱諸賢不究其用耳某云康王如何比得唐宗而逺云宋時諸賢亦難比唐室某云韓魏公見而不失其居趙汝愚雜而著而逺云何某云魏公當英宗時兩宫未調疑疾屢作太后每對羣臣嗚咽流涕英宗每對近侍棄藥詆訶魏公對后稱慈對帝稱孝涕漣之極動於雲雷至於撤簾之旦天下肅然備覩經綸之大故見不失居魏公當之趙知院當紹熙時光宗不能執喪嘉王未承明詔留正已去憲聖之旨未下徐誼詆其坐觀托胄因為巷遇知院權宜其間內請指揮出更袍幄須臾之間中外晏然故雜而能著趙相當之有宋以來唯此兩公一稱經綸一稱果行有唐諸臣未見其偶而逺云張柬之魏元忠輩如何某云亦是果行育德一路未見經綸而逺云唐人家法不好女主閹寺積威所劫搖動為難宋人家法好曹韓盛德與大臣同心如家人治外寇靖內難事事不及唐人使宋君臣值唐室諸難不知是如何顛倒某云才運君臣往往相配唐人豪華故見才宋人老實故見德文質循環自然到彼雖是主相所造亦是氣運使然尊光云如是氣運使然漢晉唐宋漸不相及難道今人劣於前代耶某云春秋至元室是半部易今為鴻濛之始行與羲農同功如何是前代可比尊光又問嚮稱鄴侯梁公不知梁公何以配得鄴侯梁公身事逆雌周旋姦佞至老而沒無一豎建為婦人女子所譏不過是杜鴻漸一流人某云如何又儕於杜相尊光云肅宗之在靈武未受父命朔方諸將皆受玄宗殊恩天下喁喁説開元天子無不感歎鴻漸才望見太子不思君父遂奉箋勸進此不過乘時倚勢取大位者耳某云上皇在馬嵬時已有是命太子一至靈武自是天下歸心方長安破陷逆賊縱橫長安百姓一夜數呼云太子兵至矣京畿豪傑往往殺賊以應官兵靈武即不即位誰從蜀中迎舊天子者借九五之勢收將士之心未為不可鄴侯看事極明白方長安收復時肅宗欲表請上皇自還東宫鄴侯驚曰如此上必不來但當言馬嵬請留靈武勸進今幸成功晨昏思慕為羣臣賀表請上皇還京以就孝養耳及後上皇見表果如鄴侯所言則靈武勸進未為不是也尊光云得無已驟某云草昧經綸能盤桓者自是聖賢上事譬如梁公負許大才能飄然逺去豈不絶世但料當世無復梁公不得不從容以鞭五王之後凡看賢者亦勿草草尊光因問宋仁宗天下賢主一時名輩俱集朝端而用舍乖睽卒成黨議何也某未答云試問吳雲赤看雲赤云亦是吕坦夫造就尊光云吕坦夫天下賢相經理中外容保諸賢而言論抵牾遂攖衆怒何也雲赤云中閫人所難言諸賢一為國母一為國本動成伏闕吕文兩公出處之際似有瓜葛一逐孔道輔再逐石介而輿論騷然盛名遂損主相之際不得不分受其過尊光云吕公亦賢者豈肯以內侍隻言報讐於龍軒潞公之盛雅豈至以益州竒錦結知於宫掖君子不幸遇難明之故亦多以含垢為大耳若值王吕章蔡豈敢以此言相加雲赤云如此才成二公不然豈有六十年天下某云微雲淡河漢亦自斐然尊光又問用舍行藏看得圓化仲尼而下只許子淵然仲尼皇皇揖七十二君淵獨彈琴陋巷終身不仕王仲淹上十二䇿不用退處河汾其徒房魏皆為貞觀名臣兩人相去千有餘嵗大略形影之間師弟上下出處各殊豈是時命使然亦是識趣各别某云聖賢出處不關識趣亦不繇時命要是吞吐天下在兩袖子或開或合略不繇人尊光又云古人如此者甚多何充何準兄弟異趨梅福嚴光翁倩同轍釋之長公以父子而不侔尚長禽慶以友朋而一致此豈盡能吞吐天下開合繇已耶某云茍無濟世之具只可量時而施半依時命半成識趨榮枯之際萬樹同風是會不談課義只與尊光諸賢曲室上下遂復辨析往事問及文獻非有指摘旁印當時尚冀尊光焚其殘草耳榕壇問業卷六
