  - {type: page-break, offset: 0, content: '', id: KR3a0099_WYG_008-1a, image: WYG0717/WYG0717-0362c.png}
body:
  text: 榕壇問業卷八明黃道周撰臘月將還浦守墓諸友固請一㑹於是林非著為政非著因問先儒謂學有三弊溺於文辭牽於訓詁惑於異端茍無此三者則必歸於聖人之道矣今國家以制義取士士亦從制義應試雖無異端之惑而訓詁相沿文辭遞習深入膏肓即不溺文辭不牽訓詁循經注之言何繇便歸聖人之道某云非著意思極好吾鄉初年為詞賦追琢之文三山最盛陳述古起而非之為知天盡性之說與陳烈周希孟趙穆三人唱明聞者誹笑久之漸為信化矣蔡季通之出舂陵亦有名士挾才誹笑前修者相過數次便心服拜謁凡人立志要定趨向要真不為流俗所惑耳不畏異端也制舉義原本四書以聖門之微言導才人之𢎞致茍能真切究心雖淵騫接手何必以是自薄乎張子韶少時能默誦六經通其奧㫖常對客問經義如流客曰紙上聖賢盡在是矣子韶置卷斂袵曰精粗本末原無二致某不敢謂此是紙上之語人能如此讀書何患文辭之靡訓誥之滯非著云學以聚之問以辨之自有問業來發明大義實開胸次然問者僅資聞見不無塞責即能談論如何實踐得去人各為時藝所縛溺於故套久且漸失立教初意終成懈惰博文約禮豈容易了得如何是下手工夫指示門路使各警省可便持循某云是某錯了如何七八㑹來都無實指竟落空談某少時初讀論語問先生云頭一葉書孔子只教人讀書有子如何教人孝弟孔子只教人老實曾子如何教人省事聞者大笑某今老來所見第一件猶是讀書第二件猶是老實耳凡人人自是聖賢自有意思才說開示導引者不是長傲便是導諛只是讀書大家勸勉似不為過元時有資川黃澤者每每教人致思近來羅近溪只教人打坐致思之去仲尼猶覺未逺打坐之去釋子其間幾何新安趙汸嘗問黃澤致思之法澤云如經𫝊中難解處自為一例致思之久連類旁通耳鄧文潔亦教人打坐此法自李願中來只有消滅無長進法非著云致思只要旁通嘗記唐宗有言學者如鑿井但得美泉耳何必鑿空乎某云正是美泉難遇見人讀書長年啖土若不致思泉脈何來非著默然知是格致求仁之㫖是次以屢空貨殖一章為義魏秉德問云天地惟空故生得許多人事人心惟空故受得許多聞見顔子屢空自是舍却蹊徑直尋根宗至子貢之屢中必有不中者矣其有不中者是億有未中還是億故不中耶某云賢看顔子屢空是屢不殖故空屢不億故空耶夫子生平未嘗言命只此一章言命命中不著一物本來自足初無空殖可言無空殖故無得失無得失故無億無忘只是清虛淡薄則與命較親卜度經營則與貨較親耳世人言命都在得失一邉所以有殖有億有氣數人事之差哲人言命在清虛一邉所以無殖無億無得失當否之慮日往月來寒往暑來明生歲成此即見天之命說空不得說殖不得說億不得說中不得說不億不中不得說屢不億中自然億中不得如能盡空此等游於虛無亦與道合體大約受天之命便有心有性有意有知有物難格有知難至物理未窮性知難致定後之慮去億一丈去空一尺空是物格無物天命以前上事億是因意生知人生以後下事屢空是天人隔照之間屢中是物理隔照之間譬如一事當前有是有非有得有失屢空人只說我生以來與物平等初無是非初無得失屢中人便說某處是非某處得失至人看來安慮之中萬物畢現空亦不空中有不中是非得失如天命然一絲一毫洞然難逃如此便說屢字不得說無不中不得無不空不得所以說空空又說竭字竭字是夫子下得極謙極呆字如泉竭自中之竭聖人於空下說竭猶於無能下說何有何有下說未能亦只是對照作無了藏非奧義也如此屢中屢空便成奧義矣秉德又云先正嘗言道如覆盂本空無有射者即言無有未嘗不中然却多一射某說此言近似却不是也豈是顔子射覆自一至十常說出空子貢射覆自二至一常無不中耶道該萬有還未嘗有空者得他還元一路十中八九億者得他發生一路十中二三子貢於萬有路上見得七八只是格物物還未格顔子於元無路上見得八九已是物格與知至為鄰耳他們常說世儒只曉得格物不曉得物格正是此樣秉德又云顔子博文約禮屢空豈是墮黜子貢已悟性天道屢中豈資卜度夫子一題以空一題以億能遂差池至此如以億為格物空為物格則格物物格中間亦距千里耶某云箭開時萬里同觀箭到時只一鏃地巧箭不射髙碁莫著射是巧力所生億是明聰隙現難道靜觀動照不是一樣神靈只是靜觀無礙動照易窮耳秉德云如此則顔子若億亦有不中子貢若不億亦無不空耶某云自是如此才謂順命如在親前逆一念者不成孝子更億甚麼呂而德云顔子屢空似是一絲不罣而為邦之問許大荷擔聖賢決不是淡薄無事的但簞瓢饑溺易地皆然禹稷顔子全是空洞無物觸處不礙若靠著伎倆終成勞攘故夫子於問仁處指出克復正是屢空頭腦不某云屢空作克復頭腦亦得克復歸仁是反約一路屢空近道是至命一路易云窮理盡性以至於命理窮而後性盡性盡而後命至命至是造物之始不著一物以生諸物反約是窮理之後不遺一物以至無物也聖賢讀書如看卦一正一反原始要終自死而生自生而死子貢只說正卦自下而上爻位吉凶都分别得亦不是伎倆作用只却未曾看得全易也而德云禹稷是如何某云禹稷六爻皆動顔子六爻皆靜子貢是如何子貢只是看卦周房仲亦問仁之一字自關禮樂顔子問仁夫子對他說禮問為邦夫子并對他說樂如此包裹㸃滴不遺就他自家說博說約說出竭字未嘗便空文禮今夫子直以為屢空空之與竭果何分别如是仁者㸃㸃滴滴皆有淵源豈得如泉竭自中之說如說天命本原包藏萬有豈有空盡之事前日亦道日月星辰何曾空得如是孔顔呆說枯腸短氣此處亦發明性道不成當作何體㑹某云外道說空字極大如空洞之空所謂洞見垣一方者無牆壁河嶽都看空洞即此透彼如琉璃瓶樣譬如人在家鄉看得長安胡同明明朗朗在宫牆之外看得人家房舍一一分明皆是身嘗到彼識光所射亦是心力所届如親到一般所以豫處五臟直破癥結不須剖割立效神方所謂仁也其實聖人無此要妙只是才力智識皆常用過不留纎毫如富家翁發財施舍造橋興梁救饑拯溺待下禮賢敬神奉公將巨萬金錢纍年用盡只留得隻身衣食粗足福亦不生禍亦不至但有兒郎不名富子只道是某家遺孩人人要看此便是屢空貨殖對照模樣孔子不曽發財原來無物衆寶咸歸叩其囊槖依舊蕭然所以直說無知直說竭字顔子已曾發財私下所藏一朝費盡無髙無堅無前無後搬捨幾回欲罷不得所以既說才竭又說如有子貢未嘗發財只是治家誓發大願欲俟滿車滿篝博施某方廣濟某衆只存誓願未曾施捨所以孔名空空自呼云竭顔稱既竭僅得屢空子貢多財從空立願季路車裘無復捨處聖門學問不過如此外道不解掇拾影響便以施舍立論稱仁稱禮皆是依傍孔顔誤嘗他藥也房仲云如此則空竭大小原是造命淺深如何又說不是某云天命羣生却無如此勞費仁義禮智隨家俱有不自為寶賊亦不惱如自稱財與賊偕來凡有非禮等事皆是發財所致如無非禮等事已是萬寶咸歸孔顔赤身其富敵國子貢拮据誤墜金火為史遷加誣蕩家破産論他發念何嘗不知所以捨財順命順天散財已名仁方不稱大藥雖稱大藥不落空藏唐君瓚問仰鑽瞻忽此財用在何處墮體黜聰此財散在何處某云不用何得散處君瓚云他歸併誰家某云東家不要西家不要只為子貢拖纍多少林非著云聖賢不作戲論今日何作此說某云夫子發此論時何曾管爾徒使顔淵喟然興歎耳非著云晉思大智亦好問察深山不廢見聞夫子如以一貫接引學識容易說去以空竭接引學識如何說得去某云千貫萬貫才以空竭接引他如無一貫奈何以空竭接引他也非著云此豈是前日學問要損德性要益之說也某云此亦不同懲忿窒欲遷善改過此是吾人茶飯茶飯恰好豈常損益縱有損益如何併盡此是萬寶船中瓊林庫裏發此大義非著云如貧子便接引不上耶某云貧子已生成近道且如顔子以下都是貧子非著云才說他仰鑽自是財多今又作財少耶某云他看得夫子便是財少了財少用大去竭愈蹙財少用少去竭愈遲有財遮蔽不見自身不見天命所以懸空想億愈去愈差非著云此又是日減之說也王龍溪云古人之學只求日減聖人本空賢人屢空顔子知得減擔法所以其庶某云大差了顔子如是減擔仲尼寧是拋擔耶非著云龍溪又言入聖之方須有主腦不是靠聞見幫補些子耳某云此亦不同多聞多見是吾用財時候寡悔寡尤是吾散財時候不見不聞是吾財竭時候無悔元吉是吾合財歸命時候財少窮身財多窮命財空命復財竭智全只關工夫不關本體上事謝有懷因問子輿言命多屬氣數一邉只命也有性焉一語以理言命子思言命多屬理一邉引詩言命維新微似數耳不知此章言不受命者果何所指如是降𠂻之命如何不受如是五行付畀亦豈人力所爭如是貧富智愚同歸此命貧者可富愚者可智人事天道合併將來則子貢所得已深於顔子夫子此論又何所軒輊耶某云正要講明此事命之有理與氣如人之有形與神合下併受無有分層順則都順逆則都逆善作家人說他餓死他亦要仰拾俯掇善讀書人縱是頑鈍他亦要旁稽博覽有此一途才見工夫為道教之本如論天命原始則只是饑食渴飲不學不慮清明在躬志氣若神人如看得名利亦淡才情亦淡自是理氣兩路俱清如看得名利亦不淡才情亦不淡自是理氣兩路俱濁也子貢已是聖賢但就孔顔看之便覺不同詩曰抱衾與裯實命不猶人都是此命只為率之不猶所以差别詩曰天命不徹我不敢效我友自逸夫子於此亦無甚軒輊耳有懷云如此則於理路上無甚開交也某云用財與不用財橫命與不橫命此俱隨人體勘論他初體有何不同有生之始寶貨與聰明兩無所著涉世而後貧人之慕寶貨富人之慕聰明豈復别其孰理孰氣孰內孰外耶有懷云如此則貨殖須如史遷之言豈必如漆園所云塞其天穿之竇耶某云蓄學與殖財同是一樣聚斂窮理與格物同是一樣發身聚而使空則微雲不滓空而使聚則射覆徒勞夫子明假此言開人痼癖學者勿分兩路自取糾纒蔣仲旭云夫子與參賜均言一貫却不把參賜竝提只就顔子對證者豈是曾子聰明壓不得子貢顔回愚魯當有過於曾參耶天下聞見決是難除人心聰明定不可少從德性上體㑹則有屢空之與屢中俱透靈心從問學上體㑹則有多能之與一貫俱徴實業陸氏既尊德性則希顔子之空朱氏既道問學則宗子貢之中子貢既聞性道到底不放多能豈有子貢終年封殖不曉多能鄙事之說耶某云如兄實有所見不隨人空話子貢從門而入見夫子百官宗廟縱橫美富自家欿然如一貧家不覺禮拜終身投地顔子從門而出見一身赤體蕭然不繫一物的是富翁的的親子不向人家爭氣爭財曾子聊稍恕身亦曾出入孔顔門第亦曾比倣子貢家庭見得可休便休得足且足如何得化度子貢招歸顔子耶陸氏專主德性不入宫牆只是貧儒自寶其身朱氏兼道問學若見孔子宫牆猶是當階辦事世人嗤嗤剝食子貢如與子貢共事聖門方知屢空大難度日屢中不是尋常耳仲旭又問顔子屢空還說有怒有過不知怒過著在那裡夫子說無恆之人為有為盈為泰曾子說顔子以多問於寡有若無實若虛豈顔子自勘若多若有若實便是可怒便自為過耶某云常無常虛常約是聖心之恆體若無若虛若寡是聖學之復機恆云立不易方復云不逺而復耽著虛無見有約寡此亦當怒當過何獨見有見多見實然後為過乎想來過怒亦是人生之所應有雷霆薄蝕上載難除只是復不可頻悔不可祗耳仲旭云前日嘗言在過怒上用工者到底是個過怒在學識上用工者到底是個學識如何從此得見本體某云不遷不二上便見本體寡尤寡悔上便見工夫若要認定虛無約寡與認定實有盈多更無差别洪尊光因問夫子說子貢不受命子貢反說夫子天縱想是子貢終年欽服夫子美富是天無所吝他自家鄙陋是天有所嗇如顔子蕭條賜既不安如夫子美富賜又有限所以竭力蓄聚未能拚捨要與造物相爭至使外人疑於夫子微子貢自家與回對勘誰知回賜己自不同者三代而下此識絶少竹林諸賢脫略世故二阮幾於屢空安豐幾於貨殖世皆以放縱目之不知諸賢於才命之際亦有所窺不某云諸賢在夫子之時作琴張曾牧不成何況可望回賜回賜精明皆在性道天人之際諸子只是擺脫物務耳聖門上唯夫子說酒諸賢皆不敢說如處危亂之際以酒自晦康誥酗慢豈不足以殺其身乎嗣宗才韻最髙却乘醉為人起草猶之節婦被酒行淫雖使小人稱慎奚如使俗子稱狂凡人品自四科而外皆不可學由求宰我尚須取節何况他人尊光云如山巨源具有經濟向子期思慮精湛何可少他某云以回賜照他只有屢失屢亡不關德性亦不關學問尊光云何平叔王輔嗣奚若某云此猶則可虛無約寡之間尊光云虛無約寡何以亦亂天下某云晉人常言秦尚法律二世而亡豈亦𤣥虛所致尊光云彼輩𤣥虛於聖門恆復之㫖可亦相近否某云正為世人看他相近所賴回賜竭力支持王千里問易恆卦唯體卦亨利貞無咎六爻皆無得吉者唯九二無悔耳何得列於九德與復卦比論某云恆德之固也澤山至靜而聖人題之以感感便常動雷風至動而聖人題之以久久便常靜靜以立動之體動以致靜之用少男在內少女在外其情易感感故持之以虛長女在內長男在外其道可久久故持之以常虛以平其用常以正其體使速者可久使久者不易其要不纍於情欲而已咸以少而處靜無情欲之感不傷於和故居貞皆吉恆以長而處動情欲不宣非乖則孤故貞有兩凶一吝聖人之道歸於和平而已千里云貞是有恆之本德吝是無恆之愧心不恆既已當羞有貞何以得吝且如初五兩貞并以得凶六三一爻又以得吝則無恆之羞其義云何某云古人以貞悔自分內外貞雖恆之本德然夫婦長久隂陽有常得恆而可矣益之以貞動為變象此所為作內凶也千里云如此則於吾心德體何涉某云宅心居家豈有兩樣譬如以無為有以虛為盈以約為泰故是無恆起羞祗如長要本無本虛本約於吾身德業豈有長進便是貞吝世儒溺於傍門專守初體如官人內家一味空寂自謂貞正便有求深從婦之嫌熟玩此詞殊通至德魏秉德因千里問易又問先後天八卦方位迥然不同先儒謂四正有交故乾坤交其中爻以為水火父母謝權退居西北西南之位三女從坤三男從乾以為人道之本此說是不某云此亦一端何關羲文之㫖羲以氣言其道從天文以象言其道從地從天者本於日月從地者本於山川山川自西而東日月自東而西日月以易簡效動故天地處於南北山川以險阻分功故乾坤導於兩隅二氣有遞兼之位經緯各於其方五行以左旋一周金木各涵兩象此理備載圗中吾輩如未研心且置勿問王陽明謂算得合時亦有何益此雖不是然聖賢此種學問極是難聞得其皮毛無益象貌得其象貌無益神理徒使淺學小慧者弄其青火耳秉德云如此則皇圗一書何以備詳此義某云是某見得如此與世人通說不得閉門講論不是如此何以酬答羲文楊峻人因問古今諸賢談易者甚多而子輿七篇未嘗引易豈不肯談抑有别見他書可證據否某云子輿初無他書峻人云劉子政鄭康成嚴君平周濂溪二程司馬君實邵堯夫晦翁皆屢屢談易如謂天道難聞則七聖言之已多如謂末世不悟則諸賢求之已至子輿何故不言豈知後世有子雲者將疑於大易遂置不論耶抑時字一字已括諸妙利之為言又妨初意聊藏其間引而不發耶某云賴兄此問引而不發是孟夫子本意中道而立是孟夫子彀率說一時字一中字了一部易不須更說了峻人云還有說處不某云窮理盡性以至於命此是聖賢奧詣一生憤樂於此總萃時止時行不過是此中影子耳孟子說盡心知性知天又說事天立命又說成性存存道義之門皆與合節更無復言說去處峻人云易云書不盡言言不盡意然則聖人之意其終不可見耶嚮來揣摩猶是言說上事孟氏之意尚未可見如何理㑹某云前日亦嘗與謝有懷講過但未曾明白若要明白又是後來唇舌之本峻人云是俊親問問不明白則是俊罪過某云古今來只一大事才要讀書論語末篇感時於雌雉春秋末篇感時於獲麟孟夫子七篇至末說出易理易象易運易候皆是古今諸儒之所未說詳細說去使人煩心潦草說出又使人怪歎凡易六十四卦合乾坤坎離頤大過中孚小過往反不變為七十二卦爻象相乘得三萬一千一百有四以歲朔乘之通卦大周五百有四年加以氣盈七年得五百一十一年而易象初周盈虛合計得五百一十八年餘分之積五大周而餘二歲為聖賢聞見之㑹古歷慌惚以竹書考之帝舜元年己未即位居冀距上元甲子一千五百五十五年為羲農上際文逺莫徴唯帝舜五十年合禹臯陶至於湯夏歷四百七十年通得五百一十八歲升陑克昆吾之歲也湯元年癸亥即位二十九年殷歷四百九十六年合伊尹萊朱終於文王以武王七年益之通得五百四年武王元年己卯至幽王庚午二百九十二年四十八年而入春秋又百七十二年㑹於沙隨之歲而仲尼生通五百一十一年自周靈王庚戌而後帝王之統盡在仲尼至獲麟以降統緒中絶孟氏之生去仲尼之生凡兩七十歲三周之後疑一置閏而聖賢聞見不復可循獲麟至光武中興又五百有四歲至宋仁宗天聖明道間五周再閏諸賢又出雖聖統不續而聞逖見遐無愧闕里自光武距今一千六百一十年去聖愈邈帝統上懸凡三千六百餘歲天道咸熙素修引分學易之士所與孟氏而同歎也峻人云如此想亦約略不可詳聞然吾人聞見本於覺知覺知先後不關世數如以世數則正嘉之際文清敬齊文成近溪諸賢講論豈減關洛今以聞知見知責人承受誰肯祗承某云亦是際盛生於當時令人欣欣有鳯鳴圗出之意迂談越想不覺惘然峻人又問歷代年譜班馬兩家遂大差池共和以前既無譜牒不知子由古史及邵家經世以何為據而謬增殷厯徑泝唐年始於甲辰接於己未耶汲冢之歷世猶存疑今日何為依他繩尺將無為貴逺而賤近乎某云共和以前既無譜牒幸有竹書不得不遵堯夫固是聰明淹貫博綜非其所習豈有不馬不班但依世本坐推百世之上如邵家經世帝舜九年甲子至周敬王四十三年甲子已一千八百歲何謂五百之期考數非逺耶古今遺書唯汲冢壁書最可觀僕自生平不敢以空臆傍人學問又云凡人讀書於無根據處最要根據洪兆雲問云前日承諭志道據德依仁游藝是每事每時動念俱有只是恰好燦現耳果無等第節次看得極是某云若說無等第節次者此又却有也無有志據那得依游人生只此精神先要拏得堅定在堅定裏充拓得鬆便是得力受用只是㸃㸃滴滴在聖賢理路辨其生熟耳一日之間心眼拏定不走錯路不放工夫不趕枝葉又不枯寂作事使他精神在在貫注隨其所見在在㑹心便是絶大成就然不如節次安排做去到依仁上旁通六藝無所不可如此又為快活也林非著因問游藝是如何既非要緊何不除却某云世上再無板聖賢懸崖跕足移目便顛端拱之餘亦有歌詠凡日用文章正是道德之通途據依之快事但不宜倒做耳八字中一字錯掛不得志仁志德猶則可通一志落藝便是奴才學者常把八字時時當關看他著落最有實用最有生趣興詩立禮成樂亦是此樣著眼非著又問逹巷章說博學無成名說何執說射御未審指歸何在拈出射御有何妙義某云無成名他人看得忙急夫子却看得等閒博學無成名他人看得濶大夫子却看得纎小君子去仁惡乎成名不知其仁焉用佞夫子此處說極分明不要支離解說李質嘉問禘祫之說諸儒互有異同馬融王肅皆云禘大祫小鄭𤣥反之賈逵劉歆則云一祭二名吳氏徴以肆祼為禘饋食為祫丘文莊云禘者禘其自出之帝為東向之尊祫者合羣廟之主於大祖之廟朱子云禘為大祭王者有禘有祫諸侯有祫無禘祫則羣主皆在禘則羣主不在紛紛云何某云此義備於王制諸賢講之甚詳不過當時有周禮魯禮沿襲不同或有夏殷祭名溷於時享字義互異何關巨典乎禮緯云三年一祫五年一禘百王之通義然以鄭注觀之不過魯之王禮耳魯禮三年喪畢皆祫祭於太廟如文公二年大事太廟於祫已蚤閔公二年吉禘于莊公於禘已速一祫一禘相距八年故僖公宣公皆八年秋有事於太廟二年之祫合有一禘在八年之內如文公祫後明年春禘於羣廟是也或并在一年如閔公二年四月祫五月吉禘于莊公是也其皆五年者如昭十五年禘於武宫昭二十五年將禘於襄公是也考諸公有禘祫互舉者亦有禘祫一遺者矣天子諸侯之喪畢皆合先君之主於祖廟而祭之謂之祫祭杜元凱謂禘為三年一大祭傳有禘祭而無祫祭之文則禘祫一也唯時祭則祭始祖與親廟不及祧主與大祭為别耳王制本文云天子犆礿祫禘祫嘗祫蒸諸侯礿則不禘禘則不嘗嘗則不蒸蒸則不礿又云諸侯礿犆禘一犆一祫又云嘗祫蒸祫言諸侯之禘不能兼礿唯一犆一祫而已注云礿則不禘者虞夏之制南方諸侯春礿竟來朝故闕夏禘禘則不嘗西方諸侯行夏祭竟來朝故不嘗嘗則不蒸此北方諸侯行秋祭竟來朝故不蒸蒸則不礿此東方諸侯行冬祭竟來朝故不礿也天子則每歲祫祭唯春未告成就親廟犆祭耳古者天子郊皆三年今特間代舉之猶古者免喪而行禘祫之義董仲舒以為人子事親豈有間年始舉之理然自歷代損益間行以時亦無三年五年之别今官家每歲祫祭皆稱曰祫立春出主於殿雖稱犆祭其實祠禴之㫖立夏立秋以告盛物乃合二祖祭於大殿謂之時祫季冬卜日大告歲功遂合四祖祭於大殿謂之大祫祫皆禘也大饗配天又是郊禘之别義何足疑乎古今紛紛只是圜丘方澤分配天地始祖世父禘於祧室此足疑耳然自帝不襲禮王不襲樂本於精禋以格幽明天子所議鬼神率服又何不可之有沈若木時初入會未領前說又問克復歸仁之㫖某云某從來亦未見到此但見人有已便不仁有已便傲傲便無禮無禮便與天下間隔無已便細細便盡禮盡禮便與天下通老氏云謂我大甚似不肖如肖蚤已細克己者只把己聰明才智一一竭盡精神力量一一抖擻要到極細極微所在雖外間非禮不能染著猶須如蕩滌邪穢一樣用工所以洗心退藏不墮沈潛髙明之弊如是剛人實克到柔如是柔人實克到剛事事物物俱從理路鍊得清明雖視聼言動無一是我自家氣質如此便是格物物格致知知至耳所以天下更無間隔更無人說我無禮不肖便是天下歸仁若木云如此歸仁猶在效驗上看耶某云不曾施藥自己康強克得一身日行千里如何說是效驗同時聽者猶覺愕然如未曾聞張朂之最後乃云天下無人不說孔子吾門獨云孟子而下無一能知聖人據孟子所知聖人者髙不過曰集大成曰聖之時卑則曰不為己甚者不識當年及門諸子及親子孫乃謂賢於堯舜生民未有匹於日月比於天地誰見得是某云孟老自見得是勗之云他及門至親晨夕領受豈有不是某云如此誰復能學夫子者譬如學天無可學處只說天不為己甚者天聖之時者也豈不親切必如顔子仰髙鑽堅瞻前忽後如此說天又無可學處只得說博說約說文說禮如見日月星辰四時寒暑知其次序漸見天心耳如此亦却平易不為己甚也勗之云如此則堯舜萬鎰仲尼九千鎰之說如何某云乘髙易呼他們心粗如何曉得榕壇問業卷八
