body:
  text: 榕壇問業卷五明黃道周撰閏月二日郡中試事尚未畢諸友懇至講壇數辭不已因舉知之者不如好之者好之者不如樂之者為義洪兆雲琦黃介俶居禎張藹士謹張非熊應熊張漢徴堪新下問而孟寶太文明師而逺峻人非昃與蓮石星興公枕石諸賢以家務先後不值某因發題次謂唐君瓚瑒君璋璟云某性最下劣於斯道全未理㑹只是束髮來於今三十年每年反覆心地上覺自不同如論學問則消散大半不知是進是退大約於知好樂三字聊稍分明君璋云知好樂不同光景現前可證豈消三十年磨勘耶某云正恐百年磨勘不來於是諸賢將有所請某云且自推演見到不同處自然有契再舉一義為使天下之人齊明盛服君璋云此於中庸中何等要義某云是中庸第一要義林朋䕫在坐因云既說中庸如何又說鬼神來某云不是此兩字不知多少霸人揑賢扯聖如何尉貼得他且是一箇别無兩家天人路頭有立卓爾雖欲從之末由也已君璋再問某云只在中庸首章精魄動靜一一分明初六日諸友徴文已就只四十八人洪兆雲涂爾虞游鱗長柯魯生盧孝登陳非魚黃共爾郭受子唐君璋林非著唐偉倫吕而德謝爾剡張子京謝有懷蔣仲旭王千里張鎮朴魏秉德黃介俶劉賡穆皆作轉法於此道中得無盡義許二懋朱君薦鄭孟儲張師乂林朋䕫唐伯玉吳雲赤唐君瓚黃君琬張非熊羅期生洪尊光蘇伯韡朱季乂侯晉水張勗之謝爾載劉賡美鄭兆中楊玉宸王豐功張漢徴皆作進義於致知處得無盡法王元槐瑶問此兩義何者最實某云亦無分别作轉法者於宇宙間精神心力一齊卷動看世上淺物都深粗物都微糟粕醪醇俱有精意所以遇物觸事領略不同雖不指出知體畢竟是靈明所透猶看海水者不道日月耳作知字進法者於吾心中法力光明一齊通透看世上淺物都深粗物都微腐朽神竒同此妙理所以反念冥觀攔截不住雖實指出知字畢竟是領妙無窮猶覩日月者之稱潮汐耳在夫子身上不厭不倦憤樂相宣豈有初終之别然如此事不是實入其中都夢說不得譬如文藝不是一做再做領略不出也翼日許二懋問聖人之教因地豎義曰興立成則於詩禮樂曰志據依游則於道德仁藝此知好樂不審果何所指夫子生平常說仁智知之是智好且樂者是仁想夫子是說仁智而已某云公西華看不厭倦亦是此意却是指出仁智精神不是指出仁智本事也二懋云夫子既不明指示人後人無可把捉則不得不就學豎義就學豎義則詩書禮樂道德仁藝都在其中了某云道藝有盡精神無窮仁聖是不厭倦做的不厭倦不是仁聖做的也只曉得知好樂中間意思不同是人是物是理是義都不消分别了夫子生平說及博學便道是射御聽琴觀器反說是聖神妙理再不要於之者中間興雲起霧只信裏靣意量無窮耳柯魯生云聖門喫緊只在知上到頭樂地只是完滿此知從知到樂只是夫子領出自家本分到樂時亦無住法耶某云此義講之已熟如夫子說過此未之或知孟子說不知舞蹈到樂時無有了境亦寧有别副精神壓倒樂上耶盧孝登問此知是本來之知抑窮理之知如本來者則不學之知即為舞蹈何須樂作轉步如窮理者則不改之樂只在如愚何消知作關頭想此知亦非發慧偶嘗此樂亦豈層歷所到某云此事只須湛浸切勿揣摩古人嘗云三年口不敢談利害不敢言是非又三年口更言利害更談是非又說忘仁義禮樂雖是外道到是讀書人真消息天下容有聖人墮體黜聰決無賢者膠新滯故如是本來之知不消轉步則周孔寤夢只是孩提如云不改之樂不消破關則伊尹耕莘了無道義吾人本來是本精微而來不是本渾沌而來如本渾沌而來只是一塊血肉豈有聰明關竅如本精微而來任是死去生還也要窮理讀書夫子自家說發憤忘食樂以忘憂又說不知老之將至一語下頭有此三轉如是為人自然要盡人道如是好學自然要盡學理孟子說盡其心者只是此心難盡每事只領三分知不到好好不到樂雖有十分意量亦只是二三分精神精神不到滿天明月亦是襆被度身意量欲窮四處雷霆自有一天風雨切勿說雲散家家春來樹樹也唐偉倫問如此看則致知之義深於良知樂天之義齊於好學見今世達人皆尊自然而下窮理古來有道者皆遺好學而貴樂天何耶某云易曰窮理盡性以至於命又曰樂天知命故不憂樂天不從好學此樂竟從何來如良知不繇致知此良究竟何至良有三訓良言善也言常也言小頃也言善者從繼善來所稱柔順利貞者是言常者猶稱良常所謂厥有恆性者是言小頃者猶稱良久良已所謂乍見夜氣者是其言自然者不過不學不慮一段而已亦是不學不慮而良不是不學不慮才訓作良也人讀書都要讀其易者難處放過如生成瀟灑者頑皮無礙問他所知所好所樂中間開放果是何物亦復茫然晉人道解飲者自知飲趣如不解飲者聞酒輒醉豈亦復領醉妙耶偉倫云如此則知如知味之知好如好色之好樂如在中之樂只是自家領略如何度得别人某云只指出此法人人自知自家認得是學大家認得是道勿復問人此中是何學何道也劉賡美云此章極是關鍵如夫子說出自家像讚畫出自家神明如吾十有五章十年一轉每轉十年只是這副精神繇生入化未審不惑知命時可便到樂田地不也某云曲肱疏水此事豈判十年聞道有得還是少時最頴四五十來只是悲憫念多浩落致少矣聖賢精神深微變化故有唱不若歎歎不若泣者羅近溪先生少年頴悟謂孔顔只是箇樂如此看榮啓期林類豈不賢於閔冉耶賡美云亦只是此不如光景前後環生到處自得其不可知處正如百尺橦竿坐盤起舞也某云正是孟子最善看書說深造逢源生惡可已正從此處得來嚮來王豐功最得此意鄭孟儲已曽到此諸多得者但談之不透耳賡美又云前日對張德聲問數之字今日對許二懋問數者字都不實指只惝恍說去如在聖門豈有此等言教某云精神為聖心力為仁屢屢言話此是詩書禮樂之所包胎道德仁藝之所抽暢為何看他惝恍劉賡美云嚮偶見江右艾生評文云聖人立言不附禮樂刑政不附理數帝王而深微於數與學者唯吾夫子能之似以此處微言只是性學也某云性道與仁如何言說鼓舞不倦只是文章孟子亦說樂善不倦古今多少聖賢不敢於江漢源頭酣歌鼓掌奈何動指蚤虱以為車輪也鄭孟儲又問昔人要尋孔顔樂處今人輒謂樂亦非止處孟子說聖不可知繫𫝊說未之或知於此處可亦有進否某云如說進者不知老之將至便進於忘憂如不說進者樂水樂山豈淺於觀魚濠上耶侯晉水亦問孔顔只是箇樂然說樂之者中間明明有箇種子不是光光樂趣但說知不如好好不如樂有何意義某云明是如此此等心眼要在知處打開前日諸賢都問生而知之者好古敏以求之者中間實指何物某亦未嘗分注子貢有言夫子之言性與天道不可得而聞也既有好古敏求四字豈患空岐錯下心目晉水又云可與共學未可與適道可與適道未可與立可與立未可與權此是進法抑是轉法抑是論心地不同階級難越也某云夫子立言隨光所映受者自人引者自我合看是道分看是學有此兩章使一世淺人都深粗人都細鞭後牽前使捷足兒無復跕腳之地勿復比青配白看朱成碧也楊玉宸云孔顔得力發憤忘食是何事欲罷不能又是何事不過此一㸃知光包天括地自家本性與萬物相蕩併力趕上教休不休工夫淨時覺日朗天空任飛任躍無論敏求博約俱著不得自有一段活潑潑地孟子說萬物皆備反身而誠正是知至的光景今人不識致知入門空把孔顔樂處虛貼商量無論拾級循途不得即兀坐靜參亦不得也某云如賢說都不須疑難昔湖州問程叔子直以誠正立論於此知字尚隔一層伯子見濂溪重證所樂亦未嘗一日道破今日說是性光無量與萬物相映從此更尋實義不落慧空始信曲肱疏食不是黃虀數根弄月吟風亦不在頭巾話下也謝爾載云大家說此知字未曾分明說此樂字枉成活潑想箇中消息候至自迎學人只應循序漸進寧為其難勿為其易才可與談學問之要語性情之微耳某云纍日來都是此說不須疑難於是諸賢豁然復尋前日不厭之說又翼日多以鬼神為問者某云夫子已對宰我說明一部中庸只有誠明兩字誠明之道聽不以耳視不以目千百手眼只是獨知能覩能聞果是何物只為人要說鬼神才以誠字替他不圗已說誠字今又紛紛要道鬼神也吕而德云孔子有言氣者神之盛魄者鬼之盛鬼神即是氣魄又說體魄在下其氣在上如此鬼神判然兩物合之則生離之則死如何專指微顯之間某云不識生死只看夢覺不識鬼神只看心目離合屈伸千倍分明而德又云聖人與鬼神合其吉凶似世問别有鬼神堯夫謂一念未起鬼神莫知似鬼神判然身外與禮記中庸之言何者最合某云合則都合離則都離不貴衆見只貴獨知吳共玉問人心自有鬼神則齊明盛服就是鬼神情狀何消指出祭祀一條若祭祀是為世人說法則郊社禘嘗如何是聖賢妙㫖某云此處切勿粗看中庸一書只此兩字日用飲食無人味嚼試問天命兩字如何是命之於天率性兩字如何是率之於人天人中間承接一路有覺有知果是何物從此推求覺造化之跡二氣良能皆是誤認了何况世人繪空畫鼎也羅期生云書言周公多才多藝能事鬼神鬼神如在人心要此才藝何事且如鬼神流行空際亦與才藝何涉某云此則不知有無但人如曽子始於空中見得十手十目人如仲尼始於默地認得多見多聞如不是周公如何得與鬼神合德郭受子云如此得無戲論中庸不過要人修身才把齊明盛服四字指出修身要領如論語說正衣冠尊瞻視儼然如神此與志氣清明亦無二義某云如此則近著這邊陳非魚云如此則是人自為鬼神也如何說是使天下之人某云人自為鬼神只是使却一人天下共一鬼神便使却天下之人了非魚又云人身具精氣神精氣既以為物則神何所麗離了精氣變為游魂則鬼神且無精氣何以使人某云此則未解且問唐君璋楊玉宸去也非魚嚮問君璋君璋云夫子前日答蔣仲旭云山川不變雲雨時興人與鬼神同是一物言下了然何須復疑中庸兩篇三說微顯首以天命終以天載此以鬼神外此無有也天人相接只是一路性命之際聽覩𤣥微通書以誠通誠復為知幾西銘以不愧屋漏為無忝莊周以虛室生白為吉祥武公以灑掃庭內為奏格如此鬼神豈關魂氣間事又問玉宸玉宸云鬼神即天命體物不可遺即須臾不可離不見不聞即不睹聞齊明盛服即是戒慎恐懼工夫中庸要說誠者天之道誠之者人之道恐人忒離了中間指出鬼神淺淺在人心目使隱怪收其伎倆小人吐其精誠所以下章說如神無疑都是此日用道理飲食知味說非禮勿動先敬先信都是此齊明盛服指掌淵源如說鬼神繇齊明而生齊明與鬼神映現猶是取燈寫影得人物意不盡精微也張非熊云熊亦見得舜文武周皆是齊明之人奏格篤恭都是齊明之事但不知齊明盛服算得未發大本抑看作已發達道耳某云此處喜怒哀樂都無著處直是捖搏天地屈伸萬物宇宙形聲一出一歸了無覔處算作隂陽頭腦極處藏身非熊又云造化之迹迹字當作何解某云既是迹字何須解他二義已明於是諸賢更端復問謝有懷因問古今道統見知聞知薪盡火𫝊豈有他屬乃孟子稱堯舜見知獨舉禹臯不及稷契見湯獨推尹朱見文獨推吕散餘無及焉何也某云二典詳於禹臯自然以禹臯稱首簡舉成文尹朱而下亦互包得去何消疑他有懷云孟子自任見知抑是聞知五百前後共推兩人到伊身上反成獨力是何意思某云古人觀察極是分明孟子前頭既有顔曽後來不數韓董居數甚近獨立難扶看他無有兩歎如一結䜟斷了五百路頭極是可怪漢人盛推董生去孟子時正五百年耳荀卿前頭亦自依附孔子却無人推他譬如一嵗堯舜是春湯夏文秋仲尼是冬孟如秦人冬後置閏既是閏月不成中氣二千一百六十年間於二氣運中合成閏候所以孟老望之慨然獲麟於今又二千一百餘年五百氣殊見聞雜出孟氏䜟後無人因承則亦付之夢夢而已切勿談此恐門外笑人也有懷云王通去董子猶董子之去孟子今日之去元公猶元公之去王通也何謂不得因承某謂人只要實見實聞不要自家創造亦不要依傍他人我輩只是瞻禮日月安得望氣推星洪兆雲問夫子之道忠恕而已是曽子見知堯舜之道孝弟而已是孟子聞知元公說明通公溥似說思曽之道明誠而已程朱後來只說和說敬豈是聞見不同抑是悟頭頓别某云只是數字躬體力行無弗一處切勿道是介陌畫阡南門北户也張師乂云吾人立身以孝為本體順而行無甚梗礙然如幾諌一事便是格手不易完全某云為何想他師乂云夫子亦言當不義則不可不爭爭之與幾已差池數里幾尚有怨有勞爭則安得無勞無怨如為人臣子苦口盡言反來擯逐豈是道有未盡抑有命存與某云對臣子言自然是道有未盡師乂云盡道當是如何某云夫子說明只是敬漢人常說孝生於敬延叔堅是東漢名儒言仁生於孝蔡鄭諸賢各舉為篤論孝能生仁有子已嘗談之敬能生孝自是臨深履薄上事人知其本於曽子不知是論語中常談也新臺二子三閭大夫都是敬身未至何命之有蘇伯韡問曽子云孝者所以事君又曰事君不忠非孝其告子夏曰有親可畏有君可事有親可諌有君可論是為至樂異日齊聘為卿却而不就曰吾不逺親而為人役魯君使人致邑反復不取曰受人者常畏人聖賢言行各有至情理同跡異何以如此某云未嘗見曽子不知其故言下泫然伯韡又問夫子治魯三月之間讓畔别塗羔豚不飾齊歸侵疆許大作用何為不能使當寧聽政權相卻樂豈機權不同抑行止繇天耶某云此亦不知一假司寇作真宰相難怪人眼不熱幸是季氏相知如遇别人橫招大禍也伯韡云何便至此某云趙汝愚朱晦庵現前可見放下勿談黃介俶問上智下愚同是一性如何便說不移豈是教為中人而設性亦為中人而命耶如說性有智愚應是命無繼善夫子說君子而不仁者有矣夫此豈是習能移性性不能移習耶不知不移兩字從那裏說某云益之為言遷善改過上知下愚俱是積習所成積習既成遷改不動如他性初何曽有上智下愚之别切勿如程伯子所云氣質不同變化未易也魏秉德問求放心孟子云求則得之又云弗思耳矣求可即是思不易曰何思何慮又曰君子思不出其位分明恐思亦有坐馳了此思不思間如何得存養下手某云此亦嘗講過易曰咸其脢無悔咸其腓凶此動而不動處是神明後堂此不動而動處是雞犬下路也秉德云此位果在何處如在腔子裏容易走作如在宙合中何消收拾他某云宙合中亦要管腔子裏亦要看集義所生豈有不見身人便成登格耶王豐功問先行其言而後從之洪範云言從作乂曽南豐云若千里之外應之此解可互參不某云言如引頭行如走路聖賢經書只為吾人開道著作輜重不過是跟腳後來中間躬行有何言說切勿為岐談所引又問幾事不密則害成信如此說只宜躡足附耳圗于深宫了洪範說謀及卿士謀及庶人如許明目張膽想是文理密察之密與退藏之密意思不同也某云賢都看得好荀卿云大周生大明董生云治身莫若幽都有弊病以此見賢意識逺於荀董某因問諸賢居平亦曽流覽圗書不林朋䕫云亦曽看過易曰參天兩地而倚數本義謂天圓地方圓者一而圍三方者一而圍四關子明謂數兆於一一未可用生於二成於三二三為五五為參兩蘇子瞻云天一天三天五之謂參地二地四之謂兩一三五依而為九二四依而為六是為倚數三說紛如孰為當乎某云本義自是漢唐舊說是氣象初生之本千古聖賢尋繹不盡只方圓象器研索難窮窮得此事天下亦無復難事了朋䕫云子明子瞻可曽窮得不某云子明占驗極精子瞻神識敻異然於此事實未分明周公本蓍立器因表測象始定方圓準於土圭八八之中倍周其廓百二十八以為方始再矩復方而卦象咸備凡百二十八四周之數五百一十二以七分之每分七十有三去七不用刓而圓之三百六十以五分之各得七十二去兩存參則二百一十有六去參存兩則一百四十有四因廓為徑存八則象盈去八則氣虛因徑為規視朞則微饒視象則微縮皆前參則後兩前兩則後參夏至日晷二百一十有六冬至日晷一百四十有四北極出地三十有四下距南極二百一十有六南極入地三十有四上減天平一百四十有四皆以天表準於土中參兩倚數備於此矣子明子瞻想亦備見此意只從原始上說出一端含吐未明又把蓍義為圗書所混耳蓍法主七象法主八兩體不用而用九六以蓍揲之三四之餘以為四九三八之餘以為四六兩四一八其餘四八兩八一四其餘四七是為參兩之始兆數未明兩卦互藏而數義始著矣今為一法簡易直捷以三命陽以兩命隂三三為乾三兩為坤二兩一三以索三陽二三一兩以索三隂九六七八其義易尋概名月分通為周甲參兩倚數一覽燦然耳朋䕫云是則為布蓍求卦之法如何以徑率方圓便盡變化行鬼神之道某云鬼神精魄其大小幽明盡在日月徑率方圓正是天地日月開人神智人於此處看得分明世上更無不明之事圓神方知明明示人如何又說此義未盡乎朋䕫云如此則關蘇神識有所不到如何每常推他某云前輩讀書雖有偏全終無卤莽洪尊光又問典謨之亂不録齊桓五命之辭而載秦穆還殽之誓王豳而外既存桓叔朱襮之章又詳寺人白顛之作聖人所學何事疑𤣥某云自是風聲不同氣象先見如季子誦秦以為夏聲豈亦䜟耶某小年時作此論今多談者殊不要切耳尊光又問詩有商頌不及夏聲豈九德候人破斧諸歌都無足録與又詩有五際謂大明在亥四牡在寅嘉魚在巳鴻鴈在申天保在卯祈父在酉采芑在午如此七際果何所據某云七十二緯無復存書鑿度魚龍不含神霧誰復辨此者嚮日張鎮朴屢問四始亦欲鉤人出緯耳某實未讀緯書何繇辨此端的蚤嵗作易雜圗嘗一尋究今諸賢已置為啞鐘如何更翻臭腐以為神竒尊光云不問精詳且粗問大意如何是四始五際某云周自文武至宣平兩雅大小百有五篇諸王所厯三百八十四嵗約九十嵗以為一始七十三嵗以為一際小雅自鹿鳴至無羊三十篇亡詩有六古人以此列于大雅之首大抵戰國誦詩之士曲學阿秦以大明當亥為秦人改元之始十月司嵗也漢髙登極亦嵗在己亥丙寅為居攝之元年己巳為新室之元年東漢腐生又附此說為桀莽之佐故云大明在亥水始也四牡在寅木始也嘉魚在巳火始也以從新莽更革漢室耳然光武建元嵗在乙酉只當革政之年髙祖興師并直午亥之際鴻鴈祈父非為興由而䜟緯之隆萃于後漢權位所藉長呼多風不可奪也尊光云如此則緯書盡是謬妄如何漢儒以誣孔子某云聖門原有此說微言既絶至道難聞不知當時分𣲖五際果何終始決不自小雅前頭二十五篇之內耳謝爾剡問二南雅頌為樂章諸國風不被之樂然季札觀樂備歌諸風史記詩三百五篇夫子皆絃歌之以合作者又似凡詩皆可入樂鄭夾漈論孔子刪詩只取其聲諸國各具一音唯邶鄘衛三國相近聲音易混故曰自衛反魯然後樂正此義如何某云歌風何獨季札自子産子太叔諸賢皆歌鄭志原憲商頌發于匡床何獨仲尼乎夫子轍環以來備審衆音於理亦然聲有貞淫理關邪正水土天時通於律襲另是素王一畨政令非復學士所窺如說邶鄘衛三國相近聲音易混才須亟正此則不然魯衛兄弟之國詩書相及書中費誓只是一篇酒誥并及三等詩中閟宫稱頌邶鄘又列三國不是至道再煩必是沫土難變也朱季乂又引魏祖所駁牛𢎞噓灰和猛之說疑測律不須候氣都說得是只於製律損益處尚未究心耳蔣仲旭問禘自既灌夫子便不欲觀程子謂成王賜之伯禽受之皆非禮也然吕氏春秋稱惠公請郊廟之禮於周天子王使史角報之使成王已賜則惠公又何請耶祭統稱成王康王賜魯重祭如成王既賜康王又何加焉詩稱莊公之子龍旗承祀僖三十一年書四卜郊則此郊應自僖始耶某云程子說得是祭統諸書所載不誣當惠公初年幽平搆亂晉鄭兩侯實夾輔周未有殊禮鄭人取鄶天子不討已為大賚及後文公再定王國請隧不許天子猶以大物未改為辭豈有惠公無故専請大祀之理大抵成康所賜既非常典白牡騂剛亦非創事每郊必卜每禘必請自是故府所存禮不敢越隱公既以攝位昵於鍾巫桓公又以弒立不書即位享祀不懈非僖而何四卜不從難可稱頌承祀叶典必在初年又奚疑乎仲旭云如是禮者夫子何為說不欲觀𫝊記又云孔子言杞之郊也祀禹也宋之郊也祀湯也魯之郊禘非禮也想周人既以后稷配天則魯人不應以后稷郊祀了某云魯人亦避后稷配天之文不歌思文而頌侐宫既與明堂異制又以姜嫄為始以上酬大功下長侯伯雖夷戎諸醜聞上辛郊禘不敢執其大夫如何苦要駁他仲旭云如此則夫子何不欲觀某云此義既自難明人事不同禮樂亦異俯仰之間真難為著眼耳游鱗長問春秋內中國而外夷狄至邲之戰不與晉而與楚黃池之㑹始進吳子然則夷固可主華盟歟自春秋而後吳楚之力雄于天下文物遞盛施及于今夫子豈知異日吳越方幅楚漢之事歟某云吳楚稱王不是夫子誰敢黜他北之有戎南之冇夷習見則狎逺聞則怪盟戎於唐㑹戎於潛不見深譏邲戰右楚黃池與吳又何遽異乎天下甚小一王甚大須知吳楚時候稱人稱子下筆甚難吳雲赤問瞶輒之事一經子貢品題業有定案正名之論對子路發抒未有分張子郢既無立理衛輒又無讓情若要正名作何分曉某云春秋於蒯聵之出兩書世子論語在靈公之時屢稱無道世子自是當立無道有何足依蒯聵以父在不抗靈公衛輒豈得以祖亡復抗蒯聵蒯聵居戚一十二年衛輒嵗時何以動問止於此處想極難通何必避位郊迎乃稱合禮乎雲赤云蒯聵若為趙鞅所立難道此名便正某云石曼姑若殺蒯聵難道衛輒無子弒父之名人至拒父何知有祖隨他不正切勿復談張勗之問星官之說有傅說虎賁幸臣謁者柱史九卿司空軒轅分野之義有晉鄭燕韓趙魏河內中山如今閩粵亦𨽻牛女此是厯代畫蛇抑是馮相所辨且如周官保章辨别州土至于藪澤六畜男女無一不詳何獨不詳星野所屬僧一行云星土以精氣相屬不拘于方隅分野以山河為界不係於都邑是否某云此說闡于左氏皆以始封之國更命日月太嵗所在主其祭祀如自戰國以來日月屢更卜象異食顓頊太皥豈復安存且如今日天下一家分為兩京離為十五豈有戰爭豎割異道必如易云在天成象在地成形則蒼龍東首白虎西尾今已冬夏跨其中腰何遽定乎某前于雜圗中亦嘗約略光氣别其晨昏欲歷考祲祥以著其驗未之能耳勗之云春秋不著灾應漢祖入關五星聚井應在三月而史書誤為十月算厯之家日無比蝕而漢唐所載比食者二隂霾風雨百里差殊而或以日食晦明禍分內外豈是習揣𫝊訛抑是文勝則史某云若論經常則宇宙之內何物不有若論經怪則戒慎恐懼豈屬妖祥亦只得現前自參學究而已張鎮朴問律吕相生只可順成自子而丑遞損遞益至六而極十二而反如何又要隔八相生使隂陽易位昭穆不倫某云娶妻生子是古人常談陽不易位而隂者改姓關雎鵲巢萬物所開何疑及此若要順看只從黃鍾八十一分遞損到無射四十四分六釐從應鍾四十二分六釐遞益到大吕七十五分一釐陽順隂逆兩路分明豈有纎毫紕漏韶年看書再不要潦草自著意見如司馬遷者聖人而下有其聰明豈為淮南所誤瞿徴君及李文利諸賢都未深解此意而過為結撰徒傷作者之心京房自仲吕而下復生六十律己自精微萬寶常復為蛇足讀書之道至漢而盛亦至漢而絶某自束髮時常推演李書本三寸九分之說至草四五嵗才知其誤至四十嵗才知其合離合之故各自不同此道須研心靜息尊古反始非聲氣載籍所得呼動也唐君瓚問井田之制三代通行東遷而下經界遂衰夫子相魯三月不變丘甲王半山才要舉行遂復敗了豈是時勢不同抑是法度未審某說此事談者已多封建既殊井田豈可復設程子說有關雎麟趾之意才可行周官之法度譬如州縣爭一界限十年不明何況清釐千家破産仲尼不變丘甲子産只治洫伍得其大意使都鄙里甲井然有條嵗時考核别其良楛自然催徵不煩辭訟都掃禮樂易興盜賊不犯賢者三年聖人朞月不為誣也君瓚又問嚮張鎮朴問京房變律儒者以為無用何故說他精微某云他猶不變古法只是推演得多遂成六甲之候想自容撓造法來遂應有此絃桐金石統繇此分不必嶰谷之竹止於簫管也君瓚曰如京君之意以黃鍾至仲吕止當甲子至乙亥耳執始至南中當為丙子所治丙盛至內負戊子之分分動至物應庚子之域質未至南事癸亥始畢如此則黃帝造律尚有不完之厯倫容制器只屬東方之管也不如萬寶常以十二復統十二至百四十四律然後旋宫易齊正變各盡如何說他蛇足某云京君遞推此法至四十八律已極短不能成聲自惟汗生依行依行生包育丁亥分上已入子宫包育生謙待戊午分上變為己未矣何得復增許多必如十二各自為部不必與仲吕相承使黃鍾隔八自應月時仲吕而下别間日甲使十與十二彼此相因則分烏南事而下依然可增何必以𤣥雲襲髙曽之貌乎君瓚云月時亦此甲子嵗日亦此甲子何必更造某云既然包舉則是京房精微君瓚云謙待至南事為何錯了一宫南事還黃鍾午不生子如何依他某云此是他疑誤處理不曽錯可以更調也大抵變化鬼神極於五十有四詩自兩雅南北分行到此交限已缺六章無聲之聲變律之律更俟達人一為整頓耳王千里問管氏器小看管子才極廣博思極精微只是才思多了正枘不能量鑿御車不能教釣管子分别為之故覺器小夫子分别看他故器小愈見抑是原本處不同也某云說器便自小了夫子許他器者都是要用得他如夫子做堯舜用得管氏做稷契臯䕫也顔淵問為邦夫子說出六事那一件是管氏做得子謂顔淵曰用之則行舍之則藏行時不是有足之鐺藏時不是可卷之席人到藏時雖是瑚璉球璜與釜甑一般於密原頭豈有一絲氣色設使管仲終身商旅豈有素王素相手段如許才器終是藉人提挈而成如顔子者一定不爾也千里云顔子才思恐不如他某云我輩未嘗親見顔子看他喟然發歎數言之內囊括乾坤接引一世突問為邦豈是尋常心手千里云如他言志如何比得夫子某云伊此處正針得管子病痛發得大禹心腸雖然不比夫子畢竟單行宇宙之內劉賡穆問李陵有國士之風子長是千古人物投分相契忽然乖違如管夷吾忍辱檻車便為鮑叔之所鄙薄豈有一匡九合之事子長發此壯心子卿忽然落魄令人感嘆此問情事定是如何某云賡穆為何問此人看事須看得極大看心須看得極細漢家存一李陵成得甚事失一李陵喪得甚事千古聖賢豈為一人判下生死子長當時若救得李陵不過邊庭一將反偷將士之心李陵就使報效不過斬數名王反開疆場之釁可惜子長學問不深為氣節所動耳賡穆云亦只是為他歎息此一節關李陵身名猶小子長無端為此一事做出一部史記所關甚大某云賡穆奈何猶有豪傑文人之心文人看事極不破豪傑做事極利害就使漢家無一部史記亦少得甚事只是子長到那時分只做得如此所謂百丈文楠燒做灰用也看他自序及報任安書極是明白使人覺顔閔不仕跕地極髙林非著問夫子不詆猶龍後人苦攻靈鷲二氏原本何殊差只是分流濫觴全倒如以末流訾他原本則李斯之學茍卿介甫之學周禮豈可株連及於尼周某云非著相從已久如何猶要問他淵源如是後人學仲尼有弊者只管呼徒以攻自身如是不然且依孟氏長長親親切勿問人佛佛老老也張元屛問晦翁詆眉山而許介甫人謂晦翁於介甫愛而不知其惡於東坡憎而不知其善還是好東坡而知其惡惡介甫而知其美耶某云晦菴後輩於前輩有何愛憎不過是非之心有不狥於衆處東坡於情事透徹如學問精純豈能逺過程周當時閭巷稚叟皆識蘇學士晦菴說他有縱橫之習何曽枉他介甫情事不能透徹學問不能精純其文章意識自然橫絶一代後來舉世詆為邪奸晦翁說他是學行中人何曽諛他元屛又問介甫作詩罵昌黎晦菴亦以為是他日又録為名臣躋於韓范之列某云此是伊本朝前輩文章勳業著於一代如何貶他元屏云君子是非自有公案豈為前輩壓倒且如象山與晦菴意微不同便生許多議論撫州荆公祠象山又為作記頌他反與晦翁同意不知介甫當時何等才學壓倒時賢某云介甫文才自是精堅蘇子瞻最不服人過潯陽見介甫壁上詩為他瞻詠信宿乃去如今人只是橫生詆毁耳君子只要虛心採善集義切勿恃己見貶駁前賢是日問難己就閎微某以空疏約略酬對尚有遺義謝爾剡將去三山偶過補鬼神之義某云此題切勿便指鬼神看爾剡云亦知是微顯之間覩聞之表領意神明然中庸已說出鬼神為德如何冷落得他某云鬼神即是中庸尋常耳目能聽能覩尋常不聽睹說有覩有聞如何不是至德如說鬼神靈通安能與人并看爾剡云此是云何某說易云天且不違而况於人乎而况於鬼神乎鬼神自是人之後來張子京最後問詩書之餘六藝必通自是古人造士定有此法今士子束於功令舉業既未能精微何暇及於操縵雜服射御書數之科間有意至回顧本來廢然反矣將遵何道使制作度數亦能盡心帖括文辭亦能應世于文藝中便睹經濟之用某云文藝中要覩經濟豈是帖括所收讀書人只管讀書想著應世便是欺世嵗月甚長工夫無盡何曽見人逼切下工便濟得去溫公曰萬事只要緩圗只須無助無忘得其先後耳子京云如何是先後之序某云先心後目先目後手先經後史先史後籍先做聖賢後做孝秀先做孝秀後做官人榕壇問業卷五
