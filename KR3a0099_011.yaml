body:
  text: 榕壇問業卷十一明黄道周撰暑後借王家園與諸友晤㑹許汝翼適近隣舍集坐頃汝翼因問天下大患治道不效豈患聖學不明漢之地節甘露唐之貞觀開元宋之景祐康定當時四夷賔服閭左蕃庶士大夫辨政涖官子弟優游庠序諸賢初無發明及熙寧元豐乾道淳熙間始闢門講論分曹誦説天下已自蕭然不復可觀豈如晦翁所云時有窮逹善有獨兼不得持同甫之說關顔閔之口耶某云宋無諸賢豈得與漢唐齒凡天下治道不效皆是學問不明書生開口便道讀書是讀書人做官是做官人從此人才日益汙下嘉榖不茂稂莠日長滅裂鹵莽取報宜然耳汝翼云當胡海陵時立經義治事二齋修兵農禮樂書算諸務士人皆有實學數十年間用之不盡今書生不過舉業其精微者又談性命理道之細於兵農書算等事廢置不講縣官宵旰憂簿書錢榖之務卒無一人起而荷承者想周程之談性命不及海陵課實事之最也某云天下事靠簿帳不得只是寸心去做心地清者做事必明淨心地密者做事必周詳心地了徹做事必簡切決無虗憑簿帳弄出才諝之理譬如水利土工鼓鑄収納這三四事極是瑣碎使小人有才者幹辦一畨極是報効然不過數時法立弊生旋歸破壞惟有心地清明不憚勞苦者從頭徹尾一一做去便成百年之規今官府書吏精習簿帳試之繁劇如健小馬走數百歩輒想槽櫪豈成致逺之器就如兵家須有専門作將帥要諳練邊事至於出機應變只在寸心或有應變才短而小心敬慎者雖無大勝亦無大敗嘗試小兒狎知事例只是貫串弊竇啟侮冒功而已何嘗見韓白奮臂出自師門吕散鷹揚初曾服習耶汝翼云如此則只須治心不須治事子産何以吝邑於尹何夫子何以輟試於子羔耶某云想是他們治心未到不是他們治事太密也汝翼云海陵門人到成就得多某云亦不見胡學盛於程門只是風教運㑹自有先後之别耳是日因講周南召南之義鄭孟儲問云周召二公采邑也地志扶風東北有周城東南有召城地以二公得名不知何以俱繫之南不知何以又不稱風舊說后妃之化被及南國然方后妃時周召未封南國諸侯何以俱囿周召之下且如傳稱王道缺而關雎作則關雎已非風化之本就以風化立說則雀角之訟野麕之誘顯為强暴軼於淫邪何以得稱文王后妃之化耶某云聖賢學問先以性情為本性情變化以和平為先性情上不和平雖有格天事業猶之飄風掠過秋草而已天地罡氣多在西北聽秦豳二風多少挺勁其極窈窕者如秦云在其板屋亂我心曲豳云無衣無褐何以卒歳語氣猶之截然被於管絃别成北音非優柔平中之韻唯關雎至麟趾鵲巢至騶虞二十五篇反覆誦之使人意消體平形神俱暢猶盛暑中之被南風欣欣解愠不知其然便有袗衣鼓琴之意人生無此意思雖身佩衝牙與口銜瓦礫再無分别見忿欲相尋人入門出户何處開眼虞舜之刑溈汭太姒之嗣徽音皆從此處下手此處下手便見太和在尋常牀几間周召許大事業到老成就無鷹揚之稱享清明之福是夫子所動操而思南薫也孟儲云王風亦有和平者不某云既是敗管如何取節孟儲云雖速我獄室家不足林有樸􅈪野有死鹿此語亦戅豈在秦豳之下某云士君子常有貞正之心纔有燕婉之致漢有游女不可求思古今神明其事正是吾徒平居本色切勿草草看過也侯晉水云從來説二南以為南國今獨以二風為南風此語何所稽承某云說南國者猶是傳説南風者固是經耳孟儲云如周南在扶風東北亦難以南稱也晉水云自酆鄗而觀則皆在南耳某云風化本天不専畸地畸地則江漢之間於周召何渉周召垂老勝殷遏劉使天下和平致治刑措者六七十年其源本得力都在於此文王一生肅肅雍雍只是免得面牆一事吾人讀萬卷書不為二南猶是面牆耳晉水云晦翁稱修身齊家以治其國此義亦大如何不取某云性情不調忿欲乖張自家鼻眼無安頓處何况齊家治國上事晦翁自是舉出第二義也讀書人常有呆氣家庭之際孔門已自難調夫子異日稱南方之强亦於寛柔兩字有取程伯淳司馬君實生平無疾言遽色皆是於二南得力晉水云於此處説為字到有下手古人頌容舞蹈不離琴瑟都是此意然雅稱以雅以南禮記稱胥鼓南則南者四方異樂之名不關周召不知二南音節亦有與彼相近者乎且關雎為樂卒章則關雎而下不盡入樂何以得被管絃使晨夕盥漱其際某云既得彼意何勞被聲周召二公已在未有聲音之始晉水云燕處則聽頌之聲古人聲教自是𤣥微不知頌與二南孰為導始某云穆穆皇皇肅肅雍雍想此兩端行逺自邇吕而徳云周召二公詩不稱風特以南冠於諸風之首此是仲尼所命以南以雅以頌無復敢為損益者端木為尼山髙弟其述詩𫝊採東山諸什及駉馬等篇為魯風次召南之後今世所傳申詩篇次是也申毛當時均為𫝊之子夏不知何以差池若此某云秦火之餘𫝊於誦說篇章俱存而大義難了齊魯申韓各存章句以自名家義不相襲不足怪也而徳云如南山楚茨大田諸作周官以為豳雅則豐年載芟諸篇當為豳頌是則周有三詩豳俱三體所以表章后稷源本世澤意思甚長何不悉從風例附於終篇而毛公或以為刺幽之作元晦悉以為農社之詩分錯互異不知後人何所稽循某云周官稱撃土鼔吹豳雅舉雅可該風頌毛公雖云大田刺幽丘明雖云楚茨多禮然中間多敶農政以豳括之於義無害也至如國風始於周召以明文王肅雍之化終於豳風以申其勤無逸之㫖與雅頌殊例何必同乎而徳云二南既不稱風而邶鄘衛稱風且以一國而具三風黍離以王國稱風而鄭齊魏唐俱為屬國且無大小强弱之殊車鄰以霸國稱風而陳鄶曹豳俱為屬國亦無逺近存亡之别何也嚮於三易註中曾覩三始四滅之說却未分明今可復得聞乎某云兄此問已見刪詩大意某平居都說過惜無㑹者耳凡詩有十二際每際五等國風三際二南為成周之始歴五等而變王衛從二南與邶鄘自為一家周所以變商風教之始自平中而柔曼此一際也黍離為遷國之中歴五等而變霸晉鄭東依至於齊而拜胙周所以變列國風教之中文劣於桓憂思之音流於亡國此二際也車鄰為侯國之終歴五等而復始陳為虞𦙍楚實滅之鄶曹之封并於晉鄭列國紛爭秦豳所以復合風教之終自二南歸於二北此三際也有此三際以推二雅有二雅以推三頌猶十二舍之在天地日月所經晦朔從生僻儒因之以有午亥天門夘酉革政之說蕩而愈逺耳而徳云古人五際只說二雅不及國風吾門平居說風為九野雅為三垣今通以十二舍推之則誰為三統五緯内外終始者某云天地四時毎時各有三際歲月日辰厥例維鈞夫子雖未嘗比配以初中終三候推之却無不同者耳而徳云如二雅百有五篇以三候分之則猶可齊魯商二頌不過九篇何當六候某云亦大意如此必精詳配屬雖以三垣九野總之難齊得其渺論亦流為緯家耳而徳云風之終於豳風雅之終於召旻畢竟是思二南之意然以周公居豳為風則魯公居魯不得為頌魯公諸孫既列為頌則周原諸子不得為南古稱周南為正風豳風為變風魯頌為後人増益想亦不謬也某云周南始於夫婦温以柔豳風終於君臣篤以摰召南始於庭幃和以貞召旻終於邊圉敬以治周南豳風自以時地不同正變異感不關周公身上事召南召旻自是勞績所在先後繫思又不關燕國上事也燕魯去西周各五六千里召公世治江漢以御彊楚周公世治涇渭以御彊秦江漢四詩皆紀召公以終於雅駉牡四詩皆紀魯公以列於頌燕魯最為後亡秦楚最為暴起宗子家相先後之間權衡進退不失纍黍自非仲尼誰能為之者而徳云齊亦雄國也而列東遷之後晉亦大邦王霸兩際不紀其烈何也某云齊自哀侯之烹天下多哀之者入春秋而始大終春秋而為田田陳一家夫子存齊以尊太公存陳以屏猾楚唐魏之間晉以創興亦以創裂素衣朱襮有馬白顛夫子所以命秦晉也自某往歲常聞是論比多談者徒為波濤耳吾輩只管在性情裏面看出周召世業聖人損益非所敢知也而徳云如此則申公之錄魯風必非子夏之説某云申詩不𫝊久矣以魯匹衛定是書生之見想是晉魏以降强附端木者耳王千里云前日說詩亡春秋作春秋之時桓文之蹟見於鄭衛曹陳可見國風半為春秋時詩元晦以為雅詩亡耳不得云天子不復採風也然考諸說苕華黄草都人角弓亦多有東遷後詩者不得謂雅詩亡也古人詩多風刺如楚茨信南山甫田大田皆刺井田不治農政久荒耳而談者直謂農祀報賽采葛大車扶蘇狡童皆諷當時寡謀輕諾好事失時者耳而談者直謂淫奔是則詩之大義亡非詩之章句亡也風刺之義息而後褒貶之義起猶之禮樂息而後政刑起也某云如此看書都有意當春秋盛時士大夫相見皆歌詩以徴其志小雅之詩亡自公宴季子歌南山有臺始也大雅之詩亡自韓不信髙張城成周南面而語諸侯始也國風之詩亡自公歸楚而楚語始也魯頌之詩亡自定哀之間鼷䑕兩食郊牛始也千里云然則詩之亡在景敬之間乎某云當景敬時晉有范文獻諸子鄭有子産太叔魯有穆叔昭子動稱詩書言本故府至定哀之際君臣誼衰列國改姓終敬王之世而衛逐其君三晉首亂春秋始作殆為是耳千里云如此則春秋編年何不始於東遷之初而始於魯隠之元某云此事講之已詳自上元甲子凡二十五元而至己未己未為古今升降之㑹天道人事之所取衷聖作淵微非蠡測所及耳汝翼又問周召分陜而治周公治陜以東召公治陜以西又記稱江楚多波其民易動有道則先治無道則先亂故周召之治同在江漢如周南之稱江漢汝墳召南之稱南山江汜是也嚮對吕而徳乃云召公世治江漢以御彊楚周公世治涇渭以御彊秦秦時未封不過嬴氏馬圉耳何得以秦楚比看某云删詩自東遷而後仲尼所治以周召之澤逺御百世不必周召自為治之也周公雖分陜以東未必親莅江漢召公雖分陜以西未必多在南山而詩人寄托風教所鍾概可見矣雅稱文武受命召公是翰記稱周公退老歸葬於畢是周公以豳治秦召公以江漢治楚之明驗也平王之失在以豳與秦以鄶與鄭遂開霸國吞滅之始春秋不録邶鄘千古而下誰知衛之先滅邶鄘不録唐魏千古而下誰知晉之先滅唐魏滅邶鄘而猶存衛滅唐魏而不存晉晉與楚同苛衛與鄭同恕聖人意思豈後人所窺大略寛始封而嚴吞併亦是二南之㫖耳汝翼云二南為風之始亦與易之乾坤咸恒書之釐降觀刑同意何關春秋上事某云爾自看書某自說聖人大意吕而逺云賈誼以騶虞為文王之囿王者親射虞人掖五豝而從之又記稱王者射騶虞此皆與騶虞異義而二南稱為祥應何也某云騶虞既是祥應何妨稱囿又何妨以為射禮乎秦火既燔家各異說關雎之或美或刺蒿宫之或豐或儉騶虞之或獸或人音節尚存則㫖趣可繹也而逺云易無通故詩無通說如韓嬰詩說有一事而三四引諷有一詩而三四指事者不過欲其悠長宜於誦說而已韓嬰與董賈同時董生服其持論而後世諸儒但推董賈不及韓嬰何也某云後儒或治他經不覩列𫝊其治詩者又牽訓詁不通大意見董賈旁通因時指事便擊節稱賞其實韓嬰精辯在劉向以上一人而已而逺云皮日休讀新書稱其為命世王佐之才歐陽修讀繁露謂深極春秋之㫖裴度以賈誼之文為化成仲舒之文為通儒皆未有稱讚韓嬰者班氏以仲舒為羣儒首當時宫中閭巷皆比之仲尼而卒困於外傅與韓嬰同遇何歟某云遭遇各自其時孔子不免饑厄而孟老百鎰千鍾仲舒困於囹圄而千秋隻言拜相抽繭者殊難登軸者殊易不足怪也當漢文武時匈奴七國數數有患雖整飭干羽不能與弓鉞比勲及其盛平章誼匡衡蔡義翟方進之流皆執一經坐衡師傅及於桓榮張佚牀下見帝稱天子師豈復董賈之所敢問乎而逺云賈誼少年洞逹事體豫處七國之禍不爽毫髪此其才具豈鼂董之所敢望某云賈生亦少年不曉事體而逺云異哉何故與衆異說某云賈生去秦時未四十年穉子老婦皆習覩戰國歸併於秦秦受天下化為郡縣不能再世漢視異姓既有郡縣之實視同姓又有列國之形惴惴厝火以為數年上下必有望夷函谷之變是以痛哭流涕而談之猶蔡澤韓非之意也不知春秋戰國四百八十年來人苦戰爭一旦化為郡縣蕭曹規隨帝后黄老去秦苛法漸復詩書但使諸侯王子弟自為分藩不交通賓客不出三十年其勢自弱無足大憂者至於匈奴只當謹守州縣或至驁悖當命將出討奈何以表餌餌之此處賈生看未明白後人只論事勢謂縣斷得效耳不知賈生時淮南已亂諸宗室驁僻極為難處人人杞憂但無賈生筆力痛發之耳賈生自是史才文章之祖與司馬遷一様氣格而逺云新書於道徳之際極其精微大言不墜莊列細言不落黄老司馬子長有莊列之趣有黄老之㫖如何得與賈生比肩某云而逺亦看得是但如史遷於仲尼微言無所不逹上下古今罕見其儔而逺云賈董如在仲尼之門當屬何科某云賈自由賜董自游夏而逺云既如此如何得稱王佐之才某云何曾見由賜游夏不是王佐之才而逺云王佐之才須如伊尹周公某云他已是聖人地位只如管葛房杜他亦攀提其間俯仰自若也而逺又云功名之士左袒洛陽理學之徒推轂廣川舍此兩途别無成就古今只一管夷吾論事似洛陽談理似廣川至其精奥都非兩賢所及而孔門不道何也某云他亦未曾為過周南召南而逺云房杜豈曾為過某云房杜後來已是面牆而立林朋䕫云王佐亦賢人之遭時者耳周召兩公都於二南成徳亦於二南奏功天下温粹之氣盡在二南而二公末年不免有疑何也易乾九四以陽居隂坤六三以隂居陽故皆曰或或者疑之也二公處當其位不當上戰之時雖復辟居東猶然不離於極豈有疑陽嫌隂之說某云定天下之亹亹成天下之變化皆從疑來成王為此一疑生出風雷大事周公在或躍無咎之時召公當無成有終之日敬義不孤何疑之有易曰直方大不習無不利則不疑其所行也都就二公心事上看出嫌疑兩字的為霍子孟桓司馬位置他當時不盡改王猶未離其類如莽操便離其類了夫子於初爻說出臣弑其君子弑其父凜然可畏猶於二南之章說出正牆面而立令人怵然無容身處到此始信二南功夫成就極大耳林朋䕫又云坤道在西南其六三曰無成有終巽道在東南其九五曰無初有終此兩者皆臣道也妻道也周公無成有纘緒之勲召公無初享敬治之福則周公之化成於坤召公之治成於巽此亦詩書之通㫖二南之雋義歟某云讀書至此可為明悉然亦勿以此啟後人之疑張師乂云尋繹二南只是要人十分温粹凡人性情固須和美亦要剛毅發强纔不墮隂柔一路程伯淳常教人變化氣質如正叔氣質自是嚴毅一邊亦與伯淳比徳何須變易李見羅嘗云性自是性質自是質質美者性未必全性全者質不必變世間多少善柔人一望如飴下氣怡聲豈便可登二南之路某云變化氣質此說出於洪範洪範亦與二南同㫖師乂云莫是剛克柔克不某云此兩克正是復禮根原二氣五行所繇變化八政庶徴所繇叶極二氣五行如不變化何繇有潤下炎上曲直從革時雨時𤾉時寒時燠之用善柔人只如一味甜水過口便酸耳南者天地陽明之氣日月之所取中多少烈風暴雨值還南便清霽了多少利用嘉生不值南風蕃殖不得故二南者萬物所養役潔齊也師乂云二南中語語寛和涵泳不盡兩克四端何克似之某云誰謂女無家何以速我訟雖速我訟亦不女從此是彊弗友剛克懲忿窒慾一邊事舒而脫脫兮無感我帨兮無使厖也吠此是燮友柔克果行育徳一邊事漢之廣矣不可泳思江之永矣不可方思此是沈潛剛克忠信進徳一邊事陟彼崔嵬我馬虺隤我姑酌彼金罍此是髙明柔克修辭立誠居業一邊事行此四事體備二南雖周召之化被於天下可也何獨房闥之間乎師又又云李見羅云至聖是質至誠是學譬如天地是質天地運行乾乾不已當是學也如此則何處討性出來某云論性則天地聖人與人都是一般論學則聖人學得天地中人學不得聖人耳師又云如此則學自因質不因性也某云性自天命學自人修誠是性之本體至誠是明誠之極功見羅以至誠為學此亦不錯也師又云至誠雖亦闗學至聖豈専闗質乎某云天亶聰明說質字亦自不錯林朋䕫又云乾九三稱修辭立誠坤六二言敬以直内又乾稱寛仁坤稱敬義兩家學問似有隂陽之别亦豈是剛克柔克之㫖乎某云忠信立誠敬義不孤此是吾儒合下得力不關氣質上事至如乾徳之賴寛仁坤徳之資敬義自有天地來分派如此有如此徳性便有如此學問一毫氣習不到所謂不習無不利也朋䕫云如此則乾須學問坤不須學問後來主敬集義之說固是誠明本體而保合太和之道反是明誠工夫耶某云人生何者不學不習無不利只是不消向險阻上推求學聚問辨到是在各正上加功耳易稱三立曰隂陽剛柔仁義如前兩克變化之說固有深微於是諸賢共商中人以上之義沈若木云人性本善孟子說性善又說利與善之間此間字是分途不是性路猶濓溪言幾字是分兆不是性始也然自雞鳴夜氣分判出來譬如中夜是時常日界中人是時常人界從中夜走利是黒邊走善是白邊猶自中人走上是上逹走下是下逹也不知此中字與降中之中尚有分别不某云此中字已落時路如夜半為中此中在亥子之間如天地定針千轉不變者雖十二時俱在子半方位然從此子半上走亦是白邊下走亦是黒邊也上清下濁上白下黒人在平地以上皆天鬼在平地以下皆地自平地上皆見精光自平地下纔無景曜夫子說中人以下不可以語上也明是雞鳴而起孳孳為利之徒若木云如此則夜半之與中人亦無甚分别定針上北極冬至時子半隨人著眼白日開眸黄介俶云徃人説此語極不明白天下中人最多至教無量自行束脩以上未嘗無誨如何要待上根之人王龍谿亦謂初學與聖學只有生熟安勉不同原無二致自外道纔有不向下根抛種之說豈有夫子抹殺中人定要中人以上今日說自中人為準以上準清以下準濁除是鬼路不立人極覺天地日月俱有光華某云介俶看書亦自分明周房仲云聖人生平學力言上不言下聖門髙弟若愚若魯半是中人所云博約忠恕亦是尋常耳目之所通曉如何說有語上不語上之别端木學識亦是下學功夫乃就中間悟出性與天道豈是仲尼居平别有詔告在終日省私之際乎易稱形下為器形上為道漢儒如李尋京房輩皆以天數為道西域又以三乘分品到無上上處不知如何蹠實使中人而上皆可持循皆可不惑漸到顔曾之路某云中人以上此語便可語上了孟子說人所異禽獸者㡬希㡬希兩字上下多少如在㡬希中間隠然見得人禽分關聖狂異路豈是聲臭毛倫之所得至中庸說道不逺人夫子一生竭力只在子臣弟友分上看得老老實實只如中人一般末路纔説上天之載無聲無臭至矣其所謂無聲無臭者與不聞不睹豈有分别只是中人以下便自墮落既自墮落便說地上不來何況上天之載黄率中云既是中人皆可語上則聖門髙弟通六藝者千數與聞一貫何但兩人且人氣質不齊讀數行書亦有敏鈍之别又言教難量尋繹數字亦有百里千里之差今概云中人即是上哲下學即是上逹天下多中人聖人無髙論此徒是學究套語耳張子厚云性在氣質中有清濁猶寳珠投在清濁水中水清者珠光映現水濁者摸索為勞中人以上自是清水中珠中人以下自是埋泥之珠某云既然有珠何愁不說只是平水自有升沈人都是此中人登峰造巓亦是此路墜淵入谷亦是此路趣興髙者如平地自到㤗山趣興卑者如平地自淪深岸墜珠徑尺尚有寳光入海淪波豈是象㒺離朱之所能矚聖門上七十二賢個個是個中人耳除是彼婦讒人纔不與談禮樂之務其餘諸子各各成就何曾見聖門三尺猶有魚鹽之業率中云如此則語上的何所指某云自中人以上皆上也子路問一成人再說兩番猶是上品平居要見聖人思量三次只是恒人自有鄉愿以來鼓動中人淪胥汨没到下流一般孳孳為利無復出頭日子雖道斯世只是中人其實是中人以下了如此纔無上逹之路不是中人之中不可語上也既是中人以下不可語上則此上語不須上人妙談亦是常話矣率中云如此如何引拔得人得到峰巓之上某云一息在平地雙眼懸青天死而後已不亦逺乎正是此意羅期生云如此只是教人莫為中人以下耳性命天道更付阿誰某云看世間何者不是性命天道期生云箕子之敶洪範周文之序象卦詩有星野之行樂有歴律之陳十翼之範圍天地春秋之損益百世豈對中人目見耳聆之所得度邵堯夫謂章子厚云以君之才於吾所學頃刻可盡但須一二十年澄澈塵慮胸中豁然無物乃可授受耳章子厚雖是邪人然亦聰明籠蓋一世却難語此安得謂中人俱堪告語耶某云中人以上便浸浸向上邊來章子厚自向下邊去謝客兒要從恵逺猶以心地不淨卻之何况内聖外王之學只是人以中人自安亦漸到下流路上提撕不得耳期生云如何纔是中人以上某云胡憲劉勉之同入太學聞涪陵譙定得易詣于伊川遂至涪陵受業久未有得以問譙定定曰心為物漬不見本性唯學可明耳胡劉乃歸一意克復遂為晦翁之師羅從彦見楊時三日驚汗浹背曰不如是幾虛過一生似此三人都是中人以上余錫侯云夫子說可語上不可語上畢竟有個揀擇有個恰好應付不知此三品人從何處截起如遇中等人可把何語付下某云夫子看人俱從中起夫子著語俱從上來錫侯云如此則是中人亦承上語當不對針也某云中人認得上語便是上人上語落在中人不失中語也性道文章隨人略領見仁見智何必齊觀錫侯云如此則是中人造化戴仍樸云六經如日月昭垂夫子只把詩禮樂為興立成本領至其雅言惟詩書禮三者而已三者亦須擇人而言則上語示人益自希絶了乃其生平行在孝經志在春秋至易道服膺韋編三絶都置不道何也易道自是精微或學而不言抑問而不辯如孝經春秋何以不說某云此是晚年告成之書何須辯說仍樸云只如學易四五十年不語一字亦是經怪某云幽有鬼神明有禮樂既説禮樂何須鬼神且不是夫子常談何處得十翼説話唐偉倫云道亦在悟耳悟者指鐵成金不悟者刻舟求劍胡安國作春秋傳冠絶一時而陳公輔輩譏其頗僻朱元晦作語孟解契合百代而沈繼祖輩訟其妖魔雖是利欲汨心亦關識見媕昧何況平常答話中人可道髙深幽微之指夫子說中人以上還是意在不語某云不語亦説得是吕歩舒之駁災異胡海陵之爭鍾律此或不必至如身心向上一路居常切磋何可無人張勗之云夫子屢説禮樂而經無樂書或謂樂不可以書𫝊而夫子稱雅頌得所即為樂正是則成周之樂至今在也前日諸友屢問韶樂去夫子千餘年聲容俱在今官家攷撃猶稱韶樂可是音節神理相麗而存抑是喜起明良叢脞惰墮猶可與關雎比亂乎如云樂自為樂詩自為詩則夫子不宜以得所為樂正后䕫不宜以詩言志歌永言聲依永律和聲著之帝典也記稱武樂至萇𢎞而失𫝊商樂至戴公而已壊魯樂至師摰而終亡或稱上古樂書淪於朝鮮而洪範所敶不乏文獻不知史遷所載律吕俱在試以詩歌聲律被於八音則時幾颺言五十餘韻可與勺桓賚般相起也歴律二事首被尚書定是聖神留此真本難説夫子不語至道難聞也某云某有此意但恐君實景仁更費往復耳勗之云君實景仁所爭者皆在黍度權量之間所以不合今若虞典所云聲必依永律必和聲則詩書聲永自成鍾律何必疑乎某云此道須是有徴有信當萬寳常祖孝孫時古器鍾鎛尺度之屬尚千數百而聲音差池卒不可定何況於今風氣日澆器數不備是魏徵韓琦所欲舍其議論求之原本也勗之云聲音雖有南北之殊而詩歌初無古今之異以聲依永則有字之聲可别十二律之永以律和聲則有音之律可定六十律之聲古今徵信孰有過於勅命時幾勺桓賚般此八篇律令者某云某最鄙陋常在赤墀之下竊聞韶樂三皷之後金聲遞鳴既而簫管八人合奏廣庭衆穆宛如鳯凰之音自是撃石羣臣舞蹈諧於百獸詩云依我磬聲既和且平又云既備乃奏簫管備舉是夏商人同用此韶樂也法輅初出雞人奏和㑹之音九章二百餘字不過和㑹大和㑹數字耳推之簫管合奏幾曲亦是喜起明良脞惰之三章尋其賡颺可以意悟也勺桓賚般自是大武時事難以聲永概之百世若至家常時用皷鐘有禁君子之樂不過琴瑟而已國風自譏刺而外兩雅自王政之餘闗雎葛覃巻耳漢廣鹿鳴伐木賓筵隰桑菁莪匏葉自可按其宫商施於堂几但當與王樸借其和均荀勗調其牛鐸耳勗之云聲詩之用不過别其音律音生於永律生於聲四聲七律亦互相生前日對諸賢略略說過今可更取諸篇定其律吕乎某云五音之中各有二變一章之曲各備七音性情和調則笙歌安適神思淫厲則語意乖邪關雎一篇首章多為清宫次章以商羽轉角三章以徵還宫吟繹數次極其分明然以邪心發之則宫徵之間不能為主矣葛覃清角帶宫聲以歸羽卷耳清商間羽調以歸宫喬木角徵之音歸於清商三變商聲多含宫羽以調分之則關雎太蔟間以南吕荇菜兩章各有正間五章相間自太蔟至於𬎼賓不盡宫聲也令其取音深和按節誕通循環肅穆則皆黄鍾矣古者樂節以金發聲以石收之中間所貴絲竹匏土諧於人聲導之以革止之以木各依言字不濫傍聲今為絲竹皆無言字誰當就風雅别其律吕者譬如勅天之命惟時惟幾八字發音諧於金石以永取之其音極下叶於黄鍾九寸之管而字多清聲通於徵羽在應鍾子亥之交絲竹宣之有所不盡至於喜起明良脞惰間歌而絲竹匏土正閒之義粲然備矣凡單音宜於環復雙聲宜於遞和單音取長雙聲取短長聲取深深以出幽短聲取亮亮以導陽隂陽遞變不離其正要使滿庭有賡歌之意則詩書多擊拊之文鳥獸麟鳯但解人意豈必審音乎勗之云此事甚大行當與鎮樸商之昔子路鼓瑟為北鄙之聲夫子告冉有曰先王制樂本於中聲流於南不入於北南為生育之鄉北為殺伐之域舜歌南風而興紂好北鄙而亡子路聞之蓋七日骨立也不為二南必至亡身豈獨正面牆而立哉某云嚮發此論未見結束聞兄道古正自欣然有解慍之思榕壇問業卷十一
