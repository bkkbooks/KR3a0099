  - {type: page-break, offset: 0, content: '', id: KR3a0099_WYG_004-1a, image: WYG0717/WYG0717-0302a.png}
body:
  text: 榕壇問業卷四明黃道周撰甲戌八月朔二日乙卯為秋仲正會之期某又以省家入郡於時在會者五十三人自愧寡陋藏匿不深擬先一日為撤臯比奉諸長者請諸鄉里先正左右辟咡至期未有至者而秋水曹公業在壇次既謁聖及紫陽先生畢某舉聖門中要義數條請曹公提命曹公因舉多學而識章次及君子所不可及義諸賢坐定曹公便問此章比參乎吾道孰為淺深某云聖人兩説一貫對參説道對賜説學學須悟頭要與聰頴人參證道須實踐要與篤實人推求畢竟道在行邊一貫易尋學在知邊一貫難悟也曹公云道之與學總繇心造貫得去者千溪萬山亦貫得去貫不去者一重故紙亦穿不出頭某顧諸賢云只是如此此外亦更無餘義了於時鄒德基坐近東頭某謂德基云還可發揮者不德基云顔淵一生在博約處下手夫子一生在默識處凝神如謂此處是多則終身是多此處是一則終身是一也某謂曹公云此賢到説得好但不知此中可有頓漸否曹公云只是一箇物遇鈍人看得極敏遇敏人翻看得極鈍豈是道須頓悟學須漸證耶某云已曽領過道亦不得頓學亦不得漸串得去者磨杵亦是利根串不去者刺錐亦是鈍器也諸賢寂然某謂諸賢豈看此中果有疑義耶黃共爾徐云孔聖呼參一唯已畢當時有人舉似便為忠恕下得轉語當時若有門人請問不知子貢如何開交曹公云此問最好正要商量某云須此一問然此中亦無商量處夫子言下再無滯旨如對懿子問孝一語不了亦尋人開交豈有一貫不了頻頻閃出疑義曹公云如夫子生平遍知萬物却説無知自認多能又稱鄙事設有人問是如何轉語某云當日轉過君子多乎哉不多也又問諸賢君子不可及亦無甚疑難有何商量林非著坐近西頭應云君子只是中庸人中庸無甚過人者反説不可及得毋與中庸其至中庸不可能也參看麼曹公亦首肯之某對曹公云今日領略亦無遺義但如學識可一貫得不可一貫得夫子是多識人不是多識人下筆細勘便自分明言下追求終難得盡也曹公云夫子只是一身説道説學了無夾帶一任當體逺近推求某亦服膺久之良久諸賢各就筆研某與曹公西坐振衣亭中遊鱗長黃少文亦相從就坐再舉前話某云紫陽以參語行以賜語知古人云行可當知知不可當行宋儒又云真知可當力行不審如何曹公云陽明先生亦主此説某云孟子亦云巧在力先學識是力一貫是巧施濟是力取譬是巧但不知明明看得紅心者可當彎弓透札不耳曹公管然良久問云夫子生平説無知又説鄙夫空空叩端而竭此意云何某時徑率便云此如洪鐘不擇莛杵隨觸生聲聲藏何處曹公極歎得是良久憮然覺自徑率迂愚也日晡課藝完者已三十餘人始屬觴就坐鄒德基謝爾剡爾載劉賡美賡穆各以有服辭去在坐可四十人兩義俱完者吳雲赤楊峻人謝有懷三人耳觴數行矇人擊磬歌伐木首章某謂諸賢草野嚶鳴不敢致拜次歌鶴鳴二章致辭如前又良久出次稱觴歌泂酌之二不敢以行潦煩公祖再歌小明之兩嗟致神聽也又良久歌蒸民之六及泮水之七以明哲德心𢎞將命南征之業曹公起謝肄及更定遂别去某與諸賢少坐移時歌綿蠻終焉翼日曹公過敝寓追理前業云昨聞伐木及小明之章為通夕不寐某問云何公云聲氣一事果然不小鳥自嚶鳴於人何涉人感之和平人自安處於神何涉神聽之降福可見神之聽人猶人之聽鳥也某言下悚然如有鬼神屬於耳側翼日以告徐晉斌斌云易言人靈於鬼神故曰而况於人乎而况於鬼神乎傳怕人蠢於鳥故曰可以人而不如鳥乎某亦斂衽久之不知其為諧語也翼日許二懋見問聖門一字千了萬了安得分行分知又如聖人教人因乎其質曽氏實體難道不關慧性端木慧人難道盡是機頴作用某云子貢何嘗不事事實體看他要不欲勿施要博施濟衆只是看得忒濶大些夫子對參對賜一樣提呼都是教人説約漸到本原上去如聖門上人箇箇在圈子裏亦不消教他一貫也二懋云知行分别意是如何某云正如解之與修有手有眼眼當一千手當五百若論手眼中間更無多寡之異譬如挽弓看箭兩下相成要到紅心只是一般功德趙希五問云聖門之學不過博文約禮如是禮者三千三百包舉詩書夫子自少到老定奪不盡如是無文之禮此是入手便當尋求豈容留為後著某云此道常有人尋求無如今日親切賢看一部禮記才信得儼若思抑先信得儼若思然後去看一部禮記耶真讀書人目光常出紙背往復循環都有放光所在若初入手便求要約如行道人不睹宫牆妄意室中是亦穿窬之類也希五又云如志道是先遊藝是後道藝中間如何分别某云此處看不得先後如船放海中四望波瀾眼見川流何分時節希五云然則博約景候畢竟如何某云上髙入天下堅入石透紙萬重下釘八尺尤詹茹云用中要須執兩一貫亦須多識此中精一原頭畢竟如何異日説一言終身於此有可參合不某云謝爾載亦曽作此問千個聖賢都是一心如推廣得去千萬種書都可了徹然亦須實想五經諸史掀在目前落一恕字貫串何處此處亦勿糊塗也聖門體道在鄙夫靣前説孝説弟説敬説誠説仁説義得了一箇箇箇貫得只是學便不同也如要學孝學弟學敬學誠學仁學義亦何處貫串不得試問諸賢周公仰思待旦夫子發憤忘食此豈謂恕字擬議不透耶讀書人再不要傍聲起影如夢蕉鹿無一是處然如爾載説聖人性地明通萬物同原自然隨地映現於此處較自親切也一時把忠恕一貫在學識中摩揣者如楊峻人周房仲郭受子劉賡美諸辨折一齊放下不須論説蘇伯韡謝爾剡又問達巷太宰兩家語意孰為淺深太宰説聖達巷説大都在夫子身上攢簇夫子不得已亦在吾道豫學上對他分明世人看得是學夫子看得是道慧人看得是學魯人看得是道夫子自家開口不得一曰不試故藝一曰吾執御矣此是機語抑是權語某云如何是機如何是權謝云如太宰聖夫子以多能夫子自稱少賤黨人大夫子以博學夫子微説何執此有關捩似是機語蘇云釣弋瑣事不礙聖修射御名途何勞言教此有爐錘似是權説某云夫子自家不居仁聖倒將學誨上來今日不居學識又倒在一貫上去層層開剝現出本身何嘗於言下機權作法如要實悟聖修須知大聖名場與釣弋射御亦了無分别也唐君瓚問晦翁以曽氏當時雨子貢當達財二子似有懸隔尹氏謂子貢終不能如曽子之唯此問如何某云尹氏在程門亦稱為魯程門諸賢以尹方參以謝方賜然子貢在聖門最蚤子輿在聖門最少源流漸靡初末相資難道終身一言不欲勿施不在曽子之前曽子一生推服顔子若無若虛正須以學識實之不然與瞿曇有何分别看來不欲勿施之法仲弓首領特地下根到子貢開花向曽參結果耳如是性道文章要多不多要貫不貫要學不學要識不識自子貢外再無一人分付者奈何淺淺看他君瓚又問此章語意畢竟未明可是問多識是夫子不是夫子抑是問學識是多不是多耶某云曉得學識是多不是多便曉得學識是夫子不是夫子矣吕而德又問如坊前日所問疑墜空門今日一貫未明絮絮叨叨反入禪教了某云何繇見得而德云老氏五千瞿曇數萬竟有何物當他原本如有一物則此一物已先凝滯如何貫得某云五千數萬祗是貧兒曰儉曰慈是他財本却走馬以糞掇拾甚低還衣腦之珠珍藏何事假使虛無可珍則實有為贅須知髙堅前後手腳難齊卓爾現前心眼要破也王豐功又問嚮時闡發一貫大義於學識上實未了然夜闌歸家秉燭靜坐覔不得一是何物多是何物多一相生又是何物易曰動貞夫一此一字與貞觀貞明何處貫串某云此事某常講貫無人會者凡天地貞觀此是氣象凝成在學識中做體幹自在日月貞明此是精神所結在學識中做意思回環有此兩樣理義萬千費千古聖賢多少言論唯曉得兩極貫串貞一而動天地日月東西循環總此一條走閃不得四顧星河煙雲草木都是性道都是文章至此便有要約何消重疑豐功云如此體會猶在太虛空際如何探討自家消息如要事事物物求箇太極雖舌敝齒落做不得學識漢子如何會到一貫田地某云賢看兩極果落虛空天地日月何繇不能傾倒須信兩極只是一條控持天地轆轤日月觀是此觀明是此明不須就他顯求形象細認聲音豐功云如此看一貫到有一物貫串中間如轂之與輻四旁中央等是一物何繇能得終古無敝萬物同原某云吾生在天地中間盡天地中事何須怪天地有物也豐功云蔡九峰以純守解一於精一之一猶有異同顔回擇善得一豈亦曽到貞明貞觀上去想不過如南軒所云盡性者一之耳某云擇執服膺自天地日月來只有此理更不須説豐功云如黃共爾所云子貢門人請下轉語便云唯盡性者能一之可亦契不某云窮理盡性以至於命此事滔天豈片言所括劉賡美云諸賢下不得轉語如使子貢當時自下直云夫子之言性與天道不可得而聞也可復契不某云山中虎嘯只是清風憑誰讚嘆楊玉宸問隂陽變化離不得多二五絪緼説不得一生初既不須説復命又不容談何苦於一多上往反辨折譬如西銘數行該括許大曉得此意亦省多少言語豈有聖門諸賢當日未解西銘意思也某云西銘極好然如一詩六義春秋三微禮樂五起中間變現千億無涯如何包裹得住豐功亦云籠統話再勿説如且學識看他後來終是緩綆穿石如要把柄體會詩書終是傀儡線子也某亦瞿然自覺多談魏秉德云此道只須靜觀久當自徹古人嘗説外照終年不見一身內照移時能見天下聖人學問只是致知致知前頭又要格物如看萬物果是萬物此與未曽格物有何分别如看萬物不殊一物此知豈復萬物所量譬如鏡子十分光明自然老來老照少來少照豈必豫先料理老少面孔耶某云從來論説唯有此徹聖人一貫只是養得靈湛看得無限名象從此歸休首尾中間同是此路如信得盤古世界便有詩書亦信得周公制作初無文字也只為此處浩瀚落空要原本擇執與人持循便説天下言無多子行無多子使天下文人回頭捫心與初讀書人了無分别耳張師乂亦云學識原頭果是格物此物條貫初甚分明聖人教人先知後慮如此知字定是不慮之知若知便有慮便膠擾一畨何繇定靜得來想此止字即是靜定本領知字即是靜定法門定靜生安靈晃自出百千學識俱就此處發亮生光也某云纍日來説此唯此説得透一貫如大法樹萬葉千枝不離此樹學識如花葉隨風映日不離初根即此是本末條貫不為鳥語蟬啼所亂師乂又云此一貫處初不説出本末既有本末是一樹身如何貫得萬樹且如格物物格可是就身心意知看出家國天下才有下手抑是把情性形體與飛走草木揉做一團才有識路也某云是吾道中人只要知至知至者物不役心任是不辨豹鼠畢方不識藻廉二負亦是學問中人知不至者以心役物任是識得萍實楛矢辨得土狗商羊亦未是一貫先生也於是言下大家心折鄒德基問中庸末章歸結謹獨朱子又添出為已兩字此是從身修來抑從自慊來某云自夫子心上來與中庸亦無分别又云內健外止為畜畜者前言往行一一關心內止外健為遁遁者求一人知亦不可得可見積精當心則外物不搖是聖賢學識前事積虛當心則外景不滯是聖賢學識後事雖是時止時行却於吾心參透無量某云此自德基心上來於吾心上亦無分别也黃少文問云君子自下學立心直做到天下平地位如敬信勸威百辟儀刑果是實業可見抑是論理如斯某云現在文廟前過豈容説理説事施非昃問教即學識性即一貫教不過明性學識亦不過明一貫而已中庸稱誠明合體此明字定與博聞強記殊科何不直就誠處教人下手翻説學識令人終身在言語文字上推求某云不説言語文字安得到無言語文字上去譬如一性便有二五氤氲健順保合千聖萬賢詮譯不透莫説無妄兩字空空貫串便與天命相通也於是一貫言義翻爛已多請諸賢别尋言誨蔣仲旭因問精氣為物遊魂為變自易與中庸説出何妨發揮某云此事實是難知易與中庸偶然逗漏某則未解仲旭再問某云記某少時初到郡中在張汰沃齋頭尊公先輩以册使抵家一日過訪便問山下有天取象大畜如何講論某時空疏但以臆對云山下有天想是空洞如乾與咸合成玄谷以此興得寶藏應出神聲如是實物亦生成一物不來把前言往行藏在何處先輩亦謂有理及後歸家見輔嗣舊説云天降時雨山川出雲此便是大畜之象為此慙懊至於纍日今見人講論輒想此語見有學問處便想此事如精氣自是山川遊魂自是雲雨山川不變雲雨時興人與鬼神同是一物夢寐云為同是一變遡他原頭精遊之際學識同歸若條段看去精氣亦貫得遊魂也易説尺蠖龍蛇同是精義莫於此處分人分鬼看曹公説鬼神聽人猶人聽鳥只此兩語十倍分明先是在振衣亭中曽與曹公論顔子好學初無一語學問如何過此便無又説顔子未嘗一試如何説與禹稷同功時遊鱗長亦在坐至是問云聖賢易地皆然必有不易地亦皆然者孟子説同室則可鄉鄰則惑此是易地皆然者吾門説纓冠亦是救閉户亦是救此是不消易地皆然者假使不消易地孟夫子出齊不豫似為禹稷動火了顔子何以彈琴雅歌某云飢溺當前怎忍得過有瓢有簞怎管外事如此念頭聖賢販夫一樣冷熱亦是分别不得林非著又云顔子簞瓢不改其樂此樂字在何處起又説人不堪其憂此憂字從何處來人生食貧吃苦亦罷如何便説不堪某云此處如何容易人之貧苦有無一簞瓢者切莫説樂是仁者憂是不仁者使鹹酸聖賢在溫飽男子下坐也非著云不是只看憂樂源頭分差甚細顔子此處亦賴得好學功夫難道是天資和粹聊且度身也某云日來亹亹不是為人侯晉水又問孟子養氣此學源本何處得來某云亦是清明在躬一處得來侯問如何説是集義得來某云氣志既從氣志既起此間包括千詩萬書豈是苟且得度晉水又問玄素兩家亦説養氣豈不是清明在躬某云他説是處亦是白露蒹葭氣象難道塞於天地之間王千里問善人教民為邦要七年才可即戎要百年才可勝殘去殺此是何義某云今人無此心眼切不要掉臂談兵夫子一部易經只尊一人聰明睿智神武不殺如此人自是羲農一流如善人者只説不殺難説是聰明睿知神武也凡不殺人者須是洗心極密藏身極固如有七年善城善池任是戎馬躪踐不得但是殘殺成風刑名司化徒説不殺未到百年終是銷他不得王圭魏徴在河汾門牆許他作相不許他能興禮樂鳩摩羅什佛圖澄在劉石面前救得幾箇百姓癡頑老子在帝豝面前救得幾箇城池夫子三月復齊侵疆豈是當時俗眼所識王云如此不幾看壞善人也某云聰明睿智有時壞人善人無壞亦壞他不倒千里又云傳稱善人質美未學如子羔者亦是善人做得成宰如何做不得費宰某云費是殘殺城池閔子不做如何教子羔做他此事已經人道不消再説吕而逺又問如此善人定指何等若是質美未學看他太低若是自不為惡又看他太髙了有宋諸賢皆自謂踐迹入室坐底聖域如何掃他在善人班上又如秦漢以來不學者多一入善場都成君子豈有伯玉子産而下虛懸位次伯夷栁惠而上别樹堂簾之理嚮對王千里説善人直是西方路上當夫子時豈有此等人某説何必西方之人如榮啓期林類石門守者荷蕢丈人之類何曽望見夫子堂奧何曽却掃夫子衣塵即自十二聖人而下除却耒耜網罟雖衣裳棺槨亦拋捨得下了何敢責他一路承仰宗廟百官也黃共爾又問幾希二字與危微二字孰為嚴冷孟夫子説舜便對跖此處説禽獸對庶物覺君子中間站足不住不知幾希兩字的何所指又不知孟子為何發此猛教使人咋舌某云孟子此語未猛共爾云如夫子説豈有此某云夫子説小人間居為不善無所不至既無所不至安知不出禽獸而下又云苟患失之無所不至兩無所不至便是痛毒過於孟子也記云能言不離鳥獸此語是孟子話本莫説是孟子創嚴也嚮在亭中曹公亦發此義某云季子問具臣夫子直説出弒父與君此語比孟子今之罪人又毒痛了大要聖賢看善字精則看不善字自嚴耳善惡無鄰分路岔頭都是異類莫説孔北海語是詼諧也劉賡穆問君子九思不知幾時得到聖人無思無慮田地某云誰説聖人無思明生嵗成了無思慮此是日月寒暑上事聖人有慮要經靜安而出艮言止也止後才得靜安靜安後才得慮所以聖人於艮卦大象説思不出位艮是成卦萬物所成始成終無此思慮成得甚麼九思浩煩不出一身明聰溫恭不過此身各得其所豈有一身千手各執一器隨眼所照不礙自然耶賡穆又問忿字得字這樣粗淺如何亦入思料某云思量一遍極是深微張勗之云仲尼間居子貢入侍而有憂色出告顔回顔回援琴而歌夫子問其所樂回曰樂天知命故不憂夫子愀然曰曩吾修詩書正禮樂將以治天下遺後世非徒修一身治魯國而已顔子出而思之至於七日骨立由是而觀顔子憂處深於所樂今人只道顔子所樂不道仲尼所憂未審顔子七日骨立所憂又是何事某曰河汾亦云天下皆憂吾無憂乎天下皆疑吾無疑乎要是顔子所樂吾亦樂之顔子所憂吾亦憂之何疑之有鄭枕石又問六藝皆教莫論理道燦於日星即如文辭亦非後人所及左國董賈離騷史記雖有佳處敻不相追至於擬作非僭則俚將由氣運使然抑是學誨不至也某云自然是學誨不至難道墜地啼笑便自不同朱季乂問逄萌之善春秋君平之善易梅福之善榖梁申公之善詩夏侯勝之善書其人各能探索隂陽進退人事故逄萌知莽將敗擲楯而歎君平不仕衰漢終於巖耕梅福直攻外戚挂冠東遁申公勸帝力行夏侯守正不阿此豈其人品地使然抑是六籍蒸薰所就某云天人各半季乂又云子駿子雲李斯匡衡豈盡不學之過某云子雲亦嘗讀書未到一貫田地季乂云程伯子看太玄到信無不在乎其中便説子雲學已到此今説子雲學亦未到耶某云不是學不到却有識不到處唐伯玉又問前日鎮朴問四始六義為何不實落開示某云已曽講過伯玉云講則講過未能豁然某云此中亦難一口吐出且再放下伯玉惘然謂是五際未明不為四始六義也某云任他五際只是一言謝有懷云聲音之理通乎性情達乎政教夫子自衛反魯然後樂正雅頌各得其所此是謂篇章節次抑是絃誦宜人也且舉雅頌不及國風定是宫廟堂寧享祀所作夫子身為布衣如何移動得他使他就位某云此處動移豈關風力要使正變知歸神人叶聽即曳履髙歌聲出金石豈必借鐘磬於巍懸勞矇瞍於堂序耶張子京又問夫子在齊聞韶從師襄問樂遂能逺契虞廷親睹文象似此千年久逺底事音節器數能保如初何以暗記冥思便能如見且齊非舜後一亡公子所傳經歷十代管仲諸賢未嘗讚嘆何為一旦入心到此某云嘗過錢塘晤錢友朝彥作聞韶篇謂是韶樂入齊淪失已多不圗虞音降在賤𨽻是以感嘆至此心甚然之比歸家翻諸古疏蓋有如此者良足證明至如六代餘音藏在故府世官所循名師所記冥悟玄通何足怪乎子京云此處想亦一貫不來某云不是一貫何處名通張元屏又問前日鎮朴三頌尚未見深答昨日對衆坐間又道詩存三恪風别九野雅列三垣變兼七緯引端藏緒良令人疑如説頌是三恪為何周魯並列若雅列三垣為何正變相麗七緯九野要是後代推求豈是初時所立某云吾輩只管讀書勿道幽深一路元屛又云文中子謂豳是變風周禮又説豳雅豳頌此是如何某云詩易典要大抵多通齊魯諸儒各尋奧義吾初發難今為巵談切勿為他所倒吳雲赤問春王正月胡傳以姬氏不改時月程朱以姬氏改月不改時陽明則謂時月俱改此是如何某云某在山中亦有人問過前賢辨之甚詳只繇前賢不解厯象空爭口頭理語耳春秋三十六日食以郭守敬厯推之皆周月非夏時也蟄蟲不伏知司厯之失閏子月無冰知秋至之必災是非寅亥之月明矣辛亥南至左氏云公登臺而書雲物禮也既云春正月又云日南至改時則安得春改月則安得南至乎又如僖公三十三年十二月隕霜不殺草此在霜降之後定公元年十月隕霜殺菽此在霜降之前是以春秋書之紀異豈獨謂霜威之有輕重乎又如隱公九年三月大雨雪桓公八年十月大雨雪隱咎則晚桓咎則蚤皆周月非夏月也陽明謂雨雪不時故書與隕霜同義於此亦不相悖也公穀好與左氏抵牾於此無間自是近古傳説易明今人習聞夏時再開疑罅何足述乎唐伯玉云周孔學問自是同源夫子何以不主周公之説且如周公豈有不知建寅之是而固指冬仲以為初春某云周公制作極是精微豈有周公不曉建寅之是周公立嵗以日行為主凡日行天中南北各二十四度董子所謂兩中繇二十四度極南而復易所謂復所謂南至繇二十四度極北而反易所謂姤所謂北至也此四十八度蓍法所生一南一北平分其半以為春秋周公作易夫子作春秋子午卯酉微著折衷其義一也譬如月之有朔明尚未生逮其明生不謂之朔時之有春陽尚未盈逮其陽盈不謂之春聖人因之改正象魏因時布和各有取爾安得同乎雲赤又問將受厥明維暮之春春暮定是寅月抑是辰月耶某云詩人多用夏正七月九月一之日二之日四月維夏六月徂暑皆夏月也詩本於豳豳用夏時虞夏殷周五緯分繫又何怪乎趙與蓮問禮經月令或以為出于吕氏或以為秦火未焚參酌舊典小戴所存出於周公某云逸周書夏小正未必是古書然與吕紀月令強半出入今人讀此書亦無甚乖誤者但如尚書日中星鳥日永星火此處不同朔易訛成因之改度耳今如除却星中日躔正其紀次依他施令雖出吕書豈有謬乎如謂他時候不同存為啞鐘則是虞書首篇亦煩更定也唐伯玉又云承論此兩事極難得合某云如何伯玉云如厯書日食正朔果係周月周時則仲尼不應書春正月春二月春三月如仲尼既用夏書則左傳不應書日南及啓蟄諸事也且春秋果用子月為春則月令八節一切差池豈有四立二至周家别記嵗時之理某云雲赤亦如此看章本清諸公及蔡注俱云改嵗耳雲赤云改嵗月令懸之象魏難道象魏布和嵗時便可錯用耶某云帝王所重不過農政丘明所載只占龍火二十四氣七十二候著於京劉雖管氏諸書不過約略霜露潛窺豺獺而已且依春秋冰雪以證冬春勿謂歷代史書總成偽厯也趙與蓮云若此則月令決非周公所作矣某云周時夏正既已不傳諸家各私其説秦漢之際闕焉不傳至元朔諸賢始一更定小戴禮記只五十六篇月令明堂位樂記三篇乃馬融增入并非二戴也伯玉云若此則經傳史厯一一堪疑當復何據某云以某所據則祖沖之僧一行郭守敬及邢雲路皆知厯者九代以來簡較日食不止千次并無以夏時推春秋者行當與諸賢共定耳與蓮又問天道左旋日月五星右轉今人一嚮稱七政俱是左旋何故某云此何須問譬如人身手臂運旋一物左來一物右去豈成運動此道須要七通八透如人行道慣走長安才曉中間何處要跕出門問路不如且為文章也與蓮云如此天道便難一貫也某云且要多識多聞仰髙鑽堅待他明通自然貫串與蓮云畢竟如何學識得來某云凡談此道有訓詁者不妨講貫夫子學琴亦須先明器數不能坐見文王伯玉見諸賢言論已畢又問先儒論詩皆推究世數以别交際嚮來才説九野三垣七緯於國風十五兩雅正變略露一斑如何不根極闡揚性天大義某云賢意云何伯玉云儒家以理解經不以厯證經數家以厯造厯不以經證厯嚮於雲赤春秋與蓮月令已昭揭無遺何故於諸賢論詩尋經舍緯某云三百篇中只餘經軸若要緯看且誦七襄朱君薦盧孝登業不發問因昨日歌詩之事又問樂貴人聲亦資製器五音七律子半相生唐人樂章只是絶句同是一詩别稱鍾吕或𨽻太蔟或配蕤賔昨歌鶴鳴二章云是清商轉羽復歸清角此義何據某云夫子刪定諸風本其水土以正宫商如鄭衛諸篇極多羽調雅頌正變宫徴聲兼要以情理相通貞淫不溷四聲之間遂生七律嶰谷之竹陽濁隂清泗濵之磬浮輕沈實施於絲革無適不然何獨人聲乎君薦又問伐木小明當兼何律𨽻於何宫某云伐木清商以子還母正變之會不失宫音小明變徴以母命子宫徴之間不入羽調君薦又云樂無專書聽此茫然且須異日盧孝登云昨日揚扢詩歌於神聽一義再三致意豈是斷章取義抑是設教精微某云豈敢往日在都下屢與嶽石梁先生商略此語云一部詩經兩行鼓吹只有正直和平四個大字人如曉得正直和平便與鬼神呼吸相通古人作樂六變之後便使天神地祗丹鳥玄鶴一齊翔舞豈獨嚶鳥鼓鐘通其音響而已是時孝登諸賢搆文初就未知曹公見過所論鬼神聽人之旨因又取曹公意義申説一畨云易繫有言言出而善則千里之外應之言出不善則千里之外違之可是人聲千里抑是神耳千里也綿蠻之音逺祈教誨勿以我傲棄之如遺榕壇問業卷四
