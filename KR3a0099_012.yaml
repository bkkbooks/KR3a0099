body:
  text: 榕壇問業卷十二明黄道周撰秋仲之二日為榕壇正㑹吕而德兄弟為政衣冠之集四十八人謁夫子及晦翁畢分札敷坐某舉楊貞復云人心本虗纔一著物便不得其正不正便不在不在時雖視聽飲食亦不復知即云知視聽飲食亦説不得心在心在亦説不得心正然則心中即無忿懥恐懼好樂憂患亦難説心正大家㸔此心果是何物此心正果是何象延平教人㸔未發前氣象果是何意與貞復亦有異同否而德云無在之心説不得已發無不在之心説不得未發此見知覺聞之心尚有欹側偽妄説不得此心真正面目某云如何是此心真正面目而德云㸔得他不正所在便㸔得他至正所在某云如兄説比貞復更透如貞復説直要空諸所有終不得此心真正面目也大家問如何是此心真正面目某云譬如日光晃晃􅀈􅀈為雲影所蔽漏出光隙射於巖阿或著霧雨即成虹霓豈是日光正面而徳云月有圓虧成圭成璧成鏡成鈎何者是月光正面某云都是正面而徳云何不直待望舒某云自家消息或半或全含著明光都是正面如非正面雖當望中團欒五色亦是隂暈不是月華而徳云喜怒哀樂與忿懥恐懼好樂憂患分别多少某云雨𤾉燠寒風只别時恒不爭氣候乾坤之中七緯五行俱是正面到有變亂纔成災沴忿懥恐懼好樂憂患已是亂行難説猶是喜怒哀樂之性而徳云金曰從革木曰曲直水曰潤下火曰炎上土爰稼穡五行之性到此亦有變動作鹹作苦作酸作辛作甘亦已不能希淡還於性始如何有忿懥恐懼好樂憂患便不得其正耶江北人呼著意曰所先儒稱有所謂失正想依舊説以身從心以有所為妄心其義易明耳某云身心原無兩物著物便是妄意意之與識識之與情情之與欲此數者附身而起誤認為心則心無正面亦無正位都為意識情欲誘向外去孟子所云操則存舍則亡又云物交物則引而去正是此話若論格致原頭要曉得意識情欲俱是物上精魄不是性地靈光也有所是江北人常談未必是齊魯雅語如曉得忿懥恐懼好樂憂患俱是物感從身而起不從心生則定靜中間自然安慮人到安慮始識此心真正面目不然只是自弄精魄吳雲赤初離堊室言下因問中庸說恐懼是慎獨工夫易稱恐懼是主鬯作用曾子獨云有所恐懼則不得其正孟老自家說不動心又云孟施舍似曾子孟施舍不過無懼而已後來外道說無顚倒恐怖與孟曾一路偶爾相隣不知大學何與中庸分别某云大學直指心體中庸纔說聖功心體自是天道雷電破山與碧落何渉聖功自是人道迅雷風烈亦要變動一番中人所患不見心體常被事物驚怪賢人所患不見功夫便落無忌憚裏去看大學中庸前後照管纔知古人用心之微某承此問亦知雲赤看書極細也雲赤又問孟老說盡心知性知天又說存心養性事天此是從天道下手從人道下手盡存兩字比正在兩字孰為精詳某云大學從本體上說得明白孟氏從工夫上說得真切譬如一天備得二氣五行留不得一㸃雲霧雲霧盡淨經緯盡呈纔見天之正面風雨晦㝠日光常在入夷出晉明體自存此便是盡存正在的消息人曉得天之與日纔曉得性之與心曉得自存正在纔曉得本體工夫不已無息格得此物十倍分明始信得意識情欲是心邊物初不是心風雨雲雷是日邊物初不是日性之與天皆備萬物不著一物心之與日不著一物乃照萬物只此兩物原無二物知此一事更無他知吾四十年讀書只曉得此物任舉一一以俟來賢吕而逺云大學說正心猶言從繩則正之正今又說出真正面目纔曉得此心明白不為意欲所亂與無妄各正對照分明此正字便端正真實更無他解了孟老如何說必有事焉而勿正漢儒都以正為期必此是何解某云人讀書都無疑誤賴而逺體勘凡爾雅釋詁正字十解無云期必者說文反正為乏篆書正與已相近當是乏與巳之誤也有事勿乏如不乏祀之乏有事勿巳如純亦不巳之已則義暢而語順矣而逺云此解極是分明以正為必想諸儒亦有所始某云此道舍爾雅亦何所始大約期必亦猶正鵠之説以正為射耳記稱諸侯自為正之具未嘗以正為期也而逺又云魏司馬稱陜右人稱著意為所想是以俗通書非是以書通俗也卦傳說之卦原有偏往之義尋常説所字何必以區隂為詮乎某云嚮纔說過兄又判得分明鄭孟儲云嚮說貞復語比貞復尚自不同貞復只道有忿懥等項心便不正如無忿懥等項心如何正不見聞知味為身不修如果見聞知味身如何修宛轉引導未曾說人心本虛著物不得又未曾說意識等項皆是物感不闗真心也今日所說與貞復夐然不同但直以忿懥等項皆繇身起則是正心又先要修身了如何是正心要著某云如從心起則是要著如從身起則是後著也知見覺聞皆從心起情欲畏惡皆從身起人從此處看不分明所以顚倒如看得分明則腑臟官骸個個是性光所攝身心修正豈有兩路工夫柯登南亦云先正常言此心之體當求忿懼憂樂所不遷之地非可就忿懼憂樂求心也譬如巨石壓草石下草自潛滋惟體妙用神始得情識絶萌靜正自在某云此語極當人從身上求心如向國中覔王終為權貴所亂從心上求身如坐王位覔國只覺殿宇隨身忿懥等項所不得其正只是從身覔心修檢不上戒慎恐懼所能得其正只是從心覔身隠顯分明也登南又云此章先輩雖以身為心亦無錯處惟以見聞知味為修身之驗此處微錯譬如禪家七處徵心在眼曰視在耳曰聞在鼻聞香在口談論在手提攜在足運奔此已與食色同㫖難道知覺運動便可説心聞見知味便可說修說正耶某云此處只是修身證佐貞復諸先輩都看得分明外道七處徵心只說得意邊諸路未曾就心中看得入夷出晉赫赫如常柯魯生云大學言正心不言心如何正言不在又不言心如何在阿難言心不在有亦不在無亦不在根亦不在塵如是見聞知味分明心在根裏老氏所謂綿綿若存果是何物不被佛老精説一畨耶某云試問楊峻人峻人云吾門說正心便是真實端整之心他們說者只是猜謎某為許可又問鄭孟儲孟儲云正心之義已盡在誠意章不須再說此就身邊發出不正不修様子便倒剔分明耳猶之下章說齊家不須更說修身只說不修不齊樣子亦自明白也某云孟儲說得是凡心正者只是自慊不正者只是消沮閉藏在者只是誠存於中不在者只是形掩於外耳峻人又云著有非有著無非無遂使空門說勝絶内不出絶外不入亦為異學開宗理㑹於視聽飲食之間簡㸃於喜怒哀樂之際便是吾儒實落正修學問不知此處於格致原流尚有逺近淺深之别不某云此處說格致無復逺近淺深世間多少讀書人博極墳典正為身心對簿耳一事露出肺肝雖千種學問亦自無益也又云喜怒哀樂是主人分上視聽飲食是僮僕分上主人體簡僮僕事煩人到卧時便無視聼飲食之用却當卧後認得喜怒哀樂之性善讀書人只就夢寐一事仔細思量便識聖賢下手要路謝爾載云七情之内怒最難融顔子工夫不遷為要然此是陽剛一路人如隂柔人終日是好樂憂患恐懼耳某云七情到此處動相勾連通人多是喜怒窮人多是憂懼常時多是喜怒變時多是憂懼中間連帯根葉相牽只使常變窮通不礙吾性自然喜怒哀樂各正其所也爾載云常變窮通是命上事喜怒哀樂是性上事盡性而後至命豈須至命而後盡性耶某云只是窮理爾載云思量夢寐一事亦是窮理耶某云此處已有存養工夫爾載又云能制一情可以成徳能忘一情可以契道如就生質所近制其一偏久當融洽矣譬如忿懥一路當頭下手能使衆情咸歸於正乎某云此便是顔子所難窮理盡後如掃雲霧自睹天日也爾載又云龜山先生云心到寂然不動方是極致古人所貴洗心也東坡嘗云既醉之後方識此心之正此語是如何某云此是東坡自勘旁人不知大約他亦寡欲寡欲自然靜正未入夜氣悔吝一路難道思慮渾忘便是寂感遂通也羅期生云寂然不動感而遂通此處難分體用近思録却云心有指體而言者有指用而言者體似未發用似已發忿懼憂樂似有未發之體正須靜觀視聽覺知似有已發之用正須動玩七情之動猶易六爻須是一一取占抑猶有不動去處可握極而存者乎某云既曉得身是六爻自然信得心是太極期生云身是六爻如何取用某云隨身所處各有中位中位不移本末内外自然恰好内為貞卦外為悔卦貞悔剛柔心宅其中如金蜂子蹶趨嗜欲有開必先何疑之有期生因問六爻之象變動不齊大約上下以為本末如咸艮壯履皆如人豎體心在五中與二相應天君用事則處處得吉四體用事則悔吝雜生凡諸忿懼憂樂皆生於四體不生於心耶某云期生看得分明多懼多凶皆生腰膂之際或顚或蹶皆在本末之間只是誤身為心遂使六爻變動凡易中三百八十四爻只有六十爻不與四肢分過王千里云爻象變動能壞本卦四肢妄感能壞本心如此則修身亦是正心要義何謂倒乎某云無心那得有身偃師幻人依然束草尋常疲頓百體如尸譬如睡卧之時聞呼便醒豈有啟衾斂足能令心事神明千里云熟睡聞呼心從何來如從聲來則是知自外至如從心來則心初無知某云此是靜爻偶然觸動如論正體寤夢相循始信此心依然不動吕而徳因問易中六十爻不與四肢分過想是五位中爻尚有四爻與他分過是為何等某云師履恒兌而徳云履之九五與兌之九五盛滿之卦位雖正當而皆有厲師之六五恒之六五順動之卦體雖無邪而亦有凶何也某云凡易毎動各有正位正位在二五之中毎動各有正理正理在全象之内履為君臣兌為朋友君臣朋友不忘其位如漢主臨厠以見廷臣鄧戚張樂以延髙士酈生卻歩於徒跣灌夫憤心於半膝皆為髙位殊乏致柔之功師稱動衆恒為守獨衆貴長子之勲獨尚婦人之志動於隂柔以懷競躁則弟子貽凶於長子婦人踵事於丈夫九節度以弟子隕李郭之師童貫以婦人啟馬趙之釁動靜剛柔其義可知矣而徳又云中爻亦是中位何以凶象又倍於五同人六二以正應而得吝隨之六二以正應而有失剝之六二以蔑貞而得凶頤之六二以拂經而失類凡上經四卦以隂動者雖正而有過無應則皆凶姤之九二有妨賓之魚井之九二有射谷之鮒損之九二凶生於守中節之九二凶生於不出凡下經四卦以陽動者無應則有過有應則為凶而節獨以無應極凶何也某云君道用一臣道用二上經主陽下經主隂主陽者隂動而有應其失小隂動而無應其失大主隂者陽動而因時其失小隂動而失時其禍大也隂陽剛柔仁義三才之正應乗於二五在在著思孟老云思則得之不思則不得也只一思字是正在盡存之要法艮不出位亦是此意於此叅透纔見曾孟同源周房仲云咸之九四言思艮之六四言身則易之四爻當為人身中際忿懥恐懼好樂憂患之所從出四爻猶未當位也艮稱五曰輔已過一層咸稱五曰脢又同艮背此是何義某云感之當心者雖動亦靜感之以言者雖本亦末也房仲云如此則咸其脢又稱志末何也某云脢字字義尚須明白本義作背上肉背為五臟所繋初無著肉之處說家讀脢為梅如頷下梅核人迎中路也言語飲食上下迎接處纔一感動便有逐末之思頤之拂經咸之輔頰兩義互通於此慎節可以無悔凡說脢為背肉感而無思者尚屬滯義再須推求而逺又云定靜安慮自是止後消息如在止前覔知尚有窮理博約許多要務開口便說良知巳是急於下劑下手定要格物又恐為藥添病今日纔信得身家上頭有忿懥恐懼好樂憂患親愛畏敬哀矜傲惰許多種物物物有知物物有止能格得明通不亂我性然後心體真實端整不然徒是意識用事終日奔波飄摇無定也某云此處格物猶差纍黍如要實做須就夢寐中間認出神之非形情之非識情形動處其實非心神識靜中未必是性再破神識以納心端重合形情以歸性始如此十年洞見天地日月星辰纔有定靜田地而逺云如此則中人上下永無知止之期不如陽明教人良知發自不慮也某云而逺試自不慮看得和順發揮果成何物而逺云蓍龜亦自不慮已到至精至變至神田地寢時夢寐死後神靈活坐閉目當有蓍龜之意某云如此則是髙賢獨手而逺又云窮理讀書患不致用今日諄諄只道性命身心至如疆場民生日蹙日困便自整頓不來雖顔閔振袂不能成風若禹臯復生必更有學問豈能坐覩瘡痍日課𤣥虛乎某云禹稷顔閔一樣苦心何曾别有學問如要學問黄農七十二戰豈有兵書烈山粒食天下未開泉府也而逺云軍旅之事仲尼不談然如方叔召虎之倫南靖淮夷北驅玁狁吉甫張仲之輩坐籌帷幄逺御朔方難道只藉虗聲都不講究某云征伐之道詳於易書周公破斧缺斨精神所注畢在爻象苦人全不講解耳而逺云此亦要事試為後人說破某云易作兵書只有八象水守火攻逺明近險而已師同人謙豫此是馭將要法將一而専兵靜而整中權後勁將帥所馭不出中爻逺可以制戎狄近可以征邑國師謙豫皆用之同人用寡師謙豫用衆同人用於險阻師謙豫用於平原用於險阻者趙奢之趨閼與卷甲乗墉而秦弗知用於平原者王翦之代李信堅壁乗暇而楚為戮勞謙之吉天子按轡以下嚴師由豫之得將軍飲醇而消譎計此四卦者古今皆用之而中外前後可得而言也坎離兩濟自是黄農以來戰守之方坎以險而利守故李牧尚鴈門之謀離以明而利戰故崔浩策柔然之功王霸之不救馬武義真之不救陳倉險而不失其信虞詡之日夜兼進馬隆之轉鬬千里獲無匪醜之凶明近於内者算勝於廟堂故李絳捐重賞以與魏博徳裕檄三鎮而平澤潞久克之非憊明在於外者決機於行陣故裴度納李佑而平蔡州韓愈聽柏耆而收徳棣逺震而行志凡此八象備有諸方神明之動存乎其人安得謂軍旅之事聖賢不談韜鈐之書經典盡漏也而逺云戰守之方只在於逺近水火如謙豫兩卦只是震艮用事何也某云行師之道莫貴致壹丈人之威不分於弟子謙豫壹將雖臨三四皆在中權艮限於内故征邑國震動於内故利建侯艮震之義與坎叅行其専志而整暇一也而逺云如此則何者果為長子某云二與四同功異位互卦為震三與五同功異位互卦為坤震為長子坤為弟子裏卦為復復為丈人也而逺云如此則復之上六不利行師亦與師之六五同㫖乎某云復之窮也無明逺之功師之中也有分柄之勢不明而分何功之有而逺又云夬去一隂勢如隤牆歸妹外震悅在於内一則云不利即戎一則云征凶何也某云夬以尚武為心尚之乃窮歸以戀棧為意即出而反與四象四事了不相合何足存證而逺又云䝉之上九不利為寇利禦寇然則周公猶有為寇之心乎某云䝉内險而外艮宜守而不宜攻作易者首著此義後來師謙兩象皆出於此夫子曰凡兵之作與民偕生戈矛之創與𤓰角俱始但願此途不為忿懥所用耳張鎮樸云吾門每言易道與人事相應不知用時要如何看取且如焦易四千九十六卦語語竒驗不過是占卜試候耳如何得如老氏所云不卜筮而知吉凶且如光武之策吳漢崔浩之料柔然萬里決勝不差纍黍此皆知識所經豈是卜度得就某云易稱愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之又云柔之為道不利逺者只此愛惡逺近之間自成爻象吳漢與劉尚分營二十餘里勢不相救魏主至涿邪山亦功半九十勢不窮追何足異乎鎮樸云論大勢則天下猶之一身論至理則一身已濶於天下了士君子平居正躬修徳以行乎人倫之大至其事報相反則命也如有趨避之心則臣無死忠子無死孝終日行於無害之途豈是因貳濟行之意某云晉時吕稽常作此論以為卜筮可廢也某見聖賢不廢卜筮記稱善則歸君過則歸已詩曰惟龜正之武王成之古人毎事不敢自謂神智凡動大衆興大役必資卜筮所以折斷邪謀斂戢智慮使人反巳有寂感遂通之意死忠死孝自是顚沛不違時事洗心退藏自是居常游泳時事京郭之受禍自是跕足巖牆何得使存養者動色乎吕而徳因問下學上達之㫖某云某則不知試問林朋䕫看朋䕫因云昨日嘗問乾為成象坤為效法聖人仰觀俯察逺近類物都是坤道所以必用坤道者人生托足便在底面開口便是學習只有敬義直方不消學習亦要從靜辨中來不從靜辨中來便有無數風霧遮蓋上面冰霜之禍都繇學者自為豪傑處心不下積漸所成有此不屑下學一念直至亂臣賊子亦做得去有此専意下學一念直至天地變化草木蕃亦做得去易云美在其中而暢於四肢發於事業美之至也草木托根於地一曲一直禽鳥孚化於鷇載飛載翔當其用力只是本色一日變化皆不自知江水就下河源出山匹夫厲志星蜺變天此事豈人思想所到而徳云坤為效法此效法時已是上學了聖人只盡人事事事皆下也愈下愈學十二制作各有所學作者非下取者非上只是一念孳孳各有竊比眼耳放低心神放定雖使天徳乾乾亦同是此意既同是此意則此意無不通透了先儒亦云達在學中有獨知而不自知之妙所以不說人知又說知我其天乎朋䕫云上下中間如何看取而徳云乾坤上下只有此學人人到處是人人不到處到處衆眼同垂不到處衆足齊絶便說達天亦復何礙某云如此則同是此意李質嘉云聖人不知不能只是夫婦與知與能上事曾子以忠恕悟一貫子貢以文章悟性道此都是學達本㫖如何遺却但以遜志時敏為談某云夫子自道好古敏求自古至今中間幾千層事登了一級又有一級在上頭只此一事是我性命是我身心只此是孝只此是敬只此是仁只此是信便是下學上達難說雙趺著地一手指天也質嘉又云程子嘗言維天之命於穆不巳忠也乾道變化各正性命恕也學得忠恕兩字便在乾元之顛夫子還說違道不逺譬如孔道上達兩字已到京師不逺兩字猶在郊圻之内不知下學上達别有頓路抑是漸門某云夫子七十年只說一句三千秋解貫未了難道此間尚有頓路是日言說巳多學逹之義未易曉了諸賢更商見賓承祭之義復以乾道坤道為談某對朱季又云前日此義講之已明主敬行恕雖有敬恕之分不過誠之一字季又云克己復禮豈亦是誠字某云然季又云既是如此則都是乾道也朋䕫何以說聖賢都是坤道某云何曾見坤道不是至誠鄭長生云聖人教人皆繇知入故說知止而後安慮孟子不動心亦自知言入手如伯夷伊尹栁下恵一流人似都在行處得力孟子譬之射的以知為巧以行為聖如有力到而巧不到者猶可審括徐獲至巧到而力不到者如何振作得他使登百歩之路某云輕弓弱矢隨人自張大弝强弩不洞秋毫子曰為力不同科吾未見力不足者柯威公又問釋家於心性一路辨之極明所以差處只是致用不同吾門却說他體亦不察何也某云何處是他察别威公云世尊告阿難汝心汝身暨山河大地皆圓妙明此處是他别察某云既圓妙明定是何物如是汝心不應另有圓妙明者如非汝心此圓妙明又立何處以照汝身大地山河皆成影說吾門於此要實體認積精所生積精所成出晉入夷輝輝赫赫如有一毫虗假便與鳥卵同下楊元實又問聖賢好樂各有不同作易之憂患獨知之恐懼何嘗不得其正惟有忿懥一途最費撿㸃當其發時如何節制當其未發如何消融某云某亦未嘗下手只如看火一般知之極真自然不餌熾炭司馬君實云忍過數番自然不動此如頑耐亦與心體無干唐偉倫云釋家亦只是頑耐不知痛癢久之只是不聞不見不復知味之人如此不在之心可便指作頑空看不某云頑空的人是捨身捨宅不在的人是逐主出家若為吾徒只管養育待他成就宜君宜王王述之問養心養氣是孟子一生學問莊生稱不聼之以心而聽之以氣氣能復精於心乎抑心氣之間可認㡬希㡬希之間可認性體乎某云性體語大大於天地語細細於鍼芒長如荳芽消如雪片述之云如此則是道心也難道堯舜不増桀紂不減者亦是這個某云此處㡬希豈容駁卸孟老云茍得其養無物不長茍失其養無物不消一部大學格致當頭只是此物說心亦得說性亦得說氣亦得只不要放之雞犬牧以牛羊耳張昂生問由仁義行非行仁義則此㡬希發皇生下布滿更不須養不某云明察以來亦有三十載工夫如何自生自長黄介俶問思不出其位夫子又說出入無時如是心體時常出入奈何禁住得他如是心位定要敦臨如何離此殻子某云負扆只是座頭馬足周流天下只扶幼主勿樹重臣吳雲赤問楊龜山云六經不言修性惟揚雄言之晦菴講時習亦以明善復初為解則亦是修性也易言盡性不修何繇得盡大學只說至善兩字為性體定符說定靜安慮四字為心中實境後來一部中庸都為知止一節註脚耳嚮講正心修身便把知止說起則誠意知止同為一義大學何以别自命篇某云意識情欲總之非心事物糾纒所以不止誠者明徳之所從生明者羣邪之所繇息無此靜定之心何繇見他真正面目再尋前義極是分明趙希五問夫子叙書斷自唐虞則堯舜以前斷無足録而連山歸藏出於元豐三墳諸篇間多偽造秦火之後不足復存然鄭夾漈博極羣書猶取連山歸藏之篇何也且如連山首艮紊其君臣歸藏首坤瀆於父子不知夏商二代何以用之某云世逺無稽非敢臆說然古人用易各有所取先天之卦以復為首復下震而上坤為長至之始中間純坤為大雪末候右次為剝剝下坤而上艮為大雪初中之交皆子月也三代異建而子為嵗初古今不易讀剝者以為首艮讀復者以為首坤何足疑乎又如後天五行之序皆始於土艮為戊土與坤對化在東北西南之分夏人建寅寅始於艮而達於震震兼木火巽離又以木火次於東南坤為已土丑亦隂土也酉丑始兌兌涵金水而處於西乾坎又以金水次於西北故納音十甲有火木木火土水金金水土相次而周軒轅氏所以宅丘也吾門讀書自經史而外可寘不道獨有圖書起義未能忘懷耳許爾翼問蔡氏皇極内篇與太𤣥潛虗孰為優劣某云太𤣥如左氏潛虗如公羊皇極如穀梁左氏博深豈復公榖可及然以揆於春秋亦猶雲甥之於外祖矣爾翼云王通續經與揚雄擬易均之僭妄其罪孰為軒輊某云河汾夫子當無王之時有徳無位作為元經以紹絶統始於金墉之年卒於陳亡之歲上稽天道下應徳符何過之有循環中論言簡而精意博而逹桓生之歎法言君實之服堯夫仲尼而降何可多匹乎爾翼又云或謂河汾牽引王魏疑是後嗣之書竊比仲尼猶有優孟之意某云孟軻自學孔子後世共宗仲淹私淑仲尼何遽為僭乎如使王揚并辜則栁下西山難與元聖同輩冉求季路不在俎豆之班矣後人讀書更有何用黄率中最後欲問堯夫之學某云某初不識率中云吾門每云堯夫學整而疎子雲學雜而密如要整而不疎密而不雜豈可終緘其口某云堯夫學問備在經世諸篇何關木舌上事率中云固自難解某試舉似率中云乾遇巽為月窟地逢雷為天根姤復兩卦自立冬夏之中何以夏至屬物冬至屬人某云他以隂陽中分人物若論幾希亦無分屬之路探窟知物躡根識人偶亦興到成韻耳率中又云三十六宫都是春觧者謂乾三宫震坎艮各五宫合為十八宫坤六宫巽離兌各四宫合為十八宫通得三十六也此義云何某云東方生喜對俗人論難為士夫所非邵堯夫亦喜於術學誦說遂使末俗競𫝊蚤歳養疎常為失笑凡易六十四卦一反一復只得三十二卦除乾坤坎離頤大過中孚小過合對則損四卦為二十有八得日躔之分宫反復則益八卦為三十有六得日宫之周甲凡七十二卦中分起象何足疑乎然亦自堯夫始明是說淺儒耳語無足復談耳吕而徳云嚮來講論自評隲人物課督𤣥奥者率不多談比來稍復開濶如率中疑難初非堅木亦已與之批繩不知前日伯玉所問大咸象數何以付之偕來一字不答某云正為攻堅須留節目如逢破竹何憚迎機而徳云伯玉亦已仰鑽多時猶迷徑竇餘人眯眯更何從問起某云欲談格物且辨身心禮樂淵源更須他日而徳云房杜王魏同在河汾之門不膺禮樂之託豈有王鄭賈馬遂能絶塵而奔某云向榮之木皮理不章垂實之材文肌如繪房杜既有事業豈得與賈鄭同其鏤心而徳云䕫龍契稷既遭盛時又聞絶學此是天地所開抑是聖賢有造某云元凱比徳各自堯年側陋咨求為日巳久想益稷臯䕫生值重華皆有三十年學問而逺出云嚮纔許我積精十年洞達儀象以是方之差不為晚某為粲然榕壇問業卷十二
