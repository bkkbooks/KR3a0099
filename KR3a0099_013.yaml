body:
  text: 榕壇問業卷十三明黃道周撰乙亥歲秋天下方敦辟雍之典以拔貢比鄉書奮厲甚盛會中得雋者游鱗長劉賡美并為領袖柯魯生自省試歸復修諸業因問古今急計莫重理財管子稱積於不涸之倉藏於不竭之府其法不過官山海籠百姓之利而已計然稱知鬭修備時用知物其法不過知萬貨之情行如流水然或用以霸或用以富漢之桑𢎞羊唐之劉晏亦稱心計𢎞羊以均輸徵逐劉晏以鬻鹽傭漕兩者似有優劣均為君子所不道然當帑藏匱乏疆圉孔棘加𣲖則田畝不增稅户則謗讟日起鑄錢則本末難饒煮鹽則亂民結聚征商則關市弊極矣當道束手無策令起數子於今日何以使民不告病國有餘財者乎某云嚮日講生財之章正為此意魯生云聖人說生衆食寡為疾用舒今若從四事講來天下户口不及國初而游手惰民紈袴冗吏百倍於古又四方多事兵不可撤餉不可缺衆寡疾舒之際才一清釐則禍難岌岌搖手勿動耳誰敢誦聖賢之言者不如且就數子手下商權宜之策也某云管子治齊官山海之利移之他國亦不能爾劉晏鬻鹽至以鹽為漕傭卜式云縣官食租衣稅而已乃坐市肆販鬻劉晏又操傭雇之利雖為救弊取盈要非士大夫所務也魯生云軒轅取莊山之金太公立圜府之法豈必專藉海王茍有心計則李泌之染敗繒陳恕之給茶本猶或為之何况鹽鐵為天地之寶藏推鹽於茶推鐵於金使世有夷吾必不至仰屋而歎無措耳豈藉全齊之力乎某云周人漆林之征二十而五金貝玉石與貨偕行鹽鐵之利非至夷吾始開但夷吾為之太密耳夷吾行法先於大姓富子各藉其直駢邑女閭無功者不得一日索奪可數萬金此事既已難行區區計口一箸一針豈能成九合之業乎天下要治須是與奪無弊天下要盈須是賞罰分明與奪無弊盜臣不起賞罰分明冦攘不行楊可之告緡元載之陌錢姚璹之輸俸裴延齡之抽貫諸種種細事真無當於權宜也魯生云宋人緡錢至多其先只茶酒兩事天禧間茶課不過三十餘萬慶厯間酒課至一千七百餘萬貫諸路鹽稅不過其半耳康誥致嚴於酒誡漢唐申禁於𣙜酤盛世既舍此兩條而專一鹽利行鹽既有定地僻壤鹽價不能驟增獨有關市行貨及西南竹木稍稱大務遇大匱乏因而修莊山圜府之政如宋人於楚蜀兩浙淮南淮北洛中閩廣各立罏頭分界行錢率千萬萬其歲入皆百倍於今又不得已如元人上都雲州興和宣德蔚州奉聖州及雞鳴山房山黃盧三義諸金銀冶聽民採煉以十分之三輸官此皆未為瑣屑也而悉置不道孤注於田畝豈為能得其大者乎如賞罰與奪自是八柄上事大司農之所不徵猶清河源以遏頽波如何可效耶某云方今盛時良政美意只在不稅茶酒不算丁錢不稅間架耳令事事皆行豈成今日之治宋人歲輸折幣以奉契丹亦多出於葭蘆興和諸州其各道罏頭歲入不資然糜於郊祀賞賚俸需亦以萬萬計今天下匪頒祿與用費甚節各道軍需九邊餉額本色民運略足相禆何遽欲採末世之務乎古人以大兵大工大荒大札視為權計不過省其儲胥一舉而措之非有纍年句連溪壑之填也宋人區宇不及古時而財賦倍於今日唐自藩鎮發難無年不兵財賦亦倍於今時究竟虛縻如委川澤嚮使當時天子知四方之已貧海內之已竭别作一樣黽勉圖維安知無有破敵復疆之日而終年賞士繼夜給孤使財盡於漏巵禍成於中飽良可惜耳魯生云大工大荒大札此則間值有數可稽大兵一動難為首尾宋人禁軍歲食五十千漢段熲用士萬二千人一年亦食二百四十億如動十萬之師一年須幾百萬豈復正供舊額之所能償某云今年需餉亦七百萬何嘗便動十萬之師用師欲多用餉欲衆用議欲緩用日欲長四者合併則江漢命財不存涓滴矣古者戰勝廟廊之上豈必取財罏竈之間乎魯生云如此則師有拙速餉無急輸重成易贏重敗難復為之奈何某云選千得英省兵千人選萬得傑省戰百克天地之精英皆在於人才不在於錢帛人才重而財帛輕湯武所以發蹟財帛急而人才緩桓靈所以絶貫也良醫視疾有針灸而愈有投劑而愈者用藥取方不過數味逮其不可雖郤車以載參苓豈有救乎魯生云如此則選將急於徵糧用賢急於措餉如賢才物力一齊俱匱倉皇應急為之奈何某云何曾見水火絶於兩間山川不生草木現前要舉殿梁何以合抱自走吕而德云漢孝昭時諸賢良文學多議罷鹽鐵者是時天下升平四海殷阜諸𣙜官私便鹽價髙而鐵器甚惡民甘食淡手耰木耨是以罷議今如倣唐宋分道鑄錢錢精而盜作者少界立而子母不散雖有私錢不奪銅本即如開礦以救銅本之窮取銅以資中幣之乏不立礦官取辦守令蠲他處之新泒抵久年之逋輸既非厚資為劇賊之所垂涎又有微濡為窮民之所喣沫方之履畝丘甲想亦春秋之所不譏也某云嘗讀小記見採銅之苦十倍於白金白金以三煉而成青銅以七煅始就又嚮在京師見諸銅商負銅本者率十數萬今雖以各道分鑄無貿致之煩而罏頭物役種種縻費詩云如賈三倍君子是識此雖要務自有主者不須吾輩推求耳而德云權萬紀當貞觀時天子方鋭意至道萬紀輒以宣饒銀冶為言自取罪戮貽笑後世今無貞觀康阜之時有大東杼軸之歎搜括已窮士民胥困賢者抱言利之慚智者懷聚徒之慝相率掩口以是為諱不知唐宋利孔甚多尚假權於冶鑄今歲入甚嗇何得孤征於田畝乎吳越舊賦已重重者難增楚豫曠土多荒荒者易散閩廣海壖泥泊所生滋種蚌裸無甚餘饒雖盡輸官無當海王之入徒令士民睨睨胥為囂訟耳政和間陳亨伯創經制錢大率取之𣙜酤及官賣契紙與公家出納每貫收頭子錢猶裴延齡之抽貫耳至算丁役自人家盆盎以上計直二十千者悉令出租如此那得不敗今天下豐豫官賣契紙雖暫行之不及旁徑能得暇日明其政刑敦尚禮義於寇攘不及之處行冶鑄官山海之利似無不可者而率為大體迫切坐困何也某云士大夫切勿言利王半山才言利吕惠卿曾布悉謀於始杜公才楊戩乘弊於終而天下殆矣今天下利孔亦巳盡泄尚賴二百年寬大之力徭役未起海澨山陬一二微營遺秉滯穗與士民淡蕩可保還集田畝加泒尚是良家恆心多賴如使條例宏開徵求漸廣嘯聚反側何可復言而德云方今豈有遺秉滯穗僻谷窮崖亦是有力所趨儻在官家猶得徵其涓滴之助某云民之困於官家與困於有力一耳有力割據尚納微租竇專而弊寡官家徵輸租不能饒竇廣而弊大至其取辦歸於有力徑竇一也而德又云元和國計簿所計天下方鎮自鳳陽鄜坊邠寧振武涇原銀夏靈鹽河東易定魏博鎮冀范陽滄景淮西淄青等十五道七十一州不申户口外每歲賦入僅浙東西宣歙淮南江西鄂嶽福建湖南八道四十餘州與南宋幅員不復相逺而衛兵八十二萬猶足供諸道馳驅宋自防淮上下常三四百萬今天下倍於元和而沿邊額兵不過十餘萬動輒捉襟歎餉不給者何也某云此事難談亦非書生所知丘文莊當嘉靖時算羽林人等已兩倍於成化時今又百餘年種種各倍或十數倍者户口登耗又倍曩時舉一藩封餘可類推葉文忠當時每歎金花正供宜在外庫使廷臣易於參稽今不可問何獨一途乎而德云如此則積漸使然何時可復某云天下有道四海悅安上有必世之仁下有三十年之福饑戎荒札不復相仍蓄三年之貯興十萬之師猶搖塵竈上納帚奧中何足難乎而逺亦問蘇子由對荆公稱劉晏權宜國計因時髙下能知萬物之情不斂於民而用自足今乃與桑孔並稱得無為此老稱屈乎某云冉求治賦夫子明許其才至於論仁則曰不知甚而以為聚斂可見此途未是要急如養草木植嘉穀桔橰灌園未是惠澤耳而逺又云子貢貨殖夫子不許之治賦豈貨殖之才又劣於治賦抑聚斂之途又汙於貨殖耶某云貨殖說不受命聚斂說鳴鼓而攻此意自别要如顔子匹夫尚不患貧豈有天子玉食萬方每煩士夫憂其匱乏耶許汝翼云信者人君之大寶學術治術皆成於信而敗於驕無忠做信不出無泰養驕不成漢武好大喜功窮兵黷武而海內虛耗漢文恬靜𤣥默而粟紅貫朽此便是兩家樣子不某云漢武何曾驕泰只是文景以來紅朽之餘得一番作用使漠北盡空呼韓稽首元成之間殷富已極權臣戚畹驕奢相尚遂使漢祚中衰再煩締造耳如有漢武之才持以忠信守以節儉雖古英主何以加焉洪尊光云財者天地間至不平之物古來帝王有患貧者復有患富者赧王有逃責之臺始皇有渭南之宫財自是天下不可少的何以無財亦亡多財亦亡五衢衣弊齊弱矣桓公以沐枝買鹿而霸朝歌鶴軒衛敗矣文公以訓農勸學而興又似生財作用不無異同者杜祁公嘗言顯官作私計即為致身之本嶽武穆謂文臣不惜錢便為太平之徵二語恰似誰者當存乎某云此則尊光自解某所不識羅期生云經稱生財有四事備在周官如三農生穀六計弊吏之說看來食寡易稽而用舒難計如今日軍興不已財賦難停節儉則士無宿飽取盈則飛挽為勞敵騎乍臨徵召不集勢必養纍年之士以待一日之冦冦至則勢猝而力專待久則勢偷而力薄彼巳難量鬭備俱失故以節儉而當輸挽既不可以救時以征輸而當戈矛又不可以奏績桑孔楊曾之計既刻削在牀膚營平屯種之談又取資於影響究竟如何始為要算某云此則屢屢經心古今聖人說治平事再不說到用兵論語學庸只道即戎去殺說征伐事再不說到用餉江漢常武只道不留不處也期生云說治平不說用兵此猶可悟說征伐再不說用餉如何可通某云古者致師日行有數尅伐有期聲罪命討寇服而歸雖行六師之中猶在三餐之內居平乃裹即為行糧三年大賞己稱憊極矣豈有天幸不至乏絶之事看書中𦙍征牧誓泰誓亦無說餽餉者何獨芑薇六月為然乎期生云周家行師之法本於公劉公劉稱徹田為糧其軍三單又云乃積乃裹後又說徹彼疆土乃疆乃理想亦是營平祖意決無三軍萬里不復齎糧之事某云營平只是可守耳雖趙侯亦未身享營屯之粒只是算計到此可以不錯耳諸葛武侯開墾屯田亦未就只是意思鎮定如此古者徹疆自是常法不留不處只為三農安可以六師之期奪三農之業乎凡師在三代有討有伐在後代有守有戰討伐有定故謙豫不以行師為嫌戰守無常故城漕已致擊鼓之痛如戰勝在於廟堂何必以耰鋤䝉於介胄乎期生云如營屯果有未便則轉輸何以不煩處今道古殊有未合不過適時耳何必同也某云節餉只有四事定謀第一選將第二因地第三不惜費第四期生云既云節餉如何又不惜費某云大費一日省事三年詩云我姑酌彼兕觥維以不永傷是日與諸賢講大道生財二節遂推究至此因憶前日戴仍朴曾問來百工則財用足之義某未有應也因問仍朴前日此問可是農末相資不仍朴云如農末相資者只是粟帛釡甑陶冶械器之屬於國家財用豈有毫髮之繫某云聖人有作亦只是宫室舟車棺槨杵臼耒耜弓矢諸財諸用豈必黃金白銀上幣中幣耶仍朴云三幣之行通於中古百工之集不過縻貨每見通都大邑羣藝麇至徒為侈靡豈有實用國家有大興作大徵輸未必復資將作之力何况兵賦鄉師族師之事能使天子充然不歎無財乎某云古者致財只欲為用今者致用只欲為財譬如今日用師介胄戈兵一一朽蠧有費十金之財不得一金之用及至喪祭營築十金之用遂費千金之財絲縷贏於菅蒯而織造貴於琢雕若使百工子來居廛食餼文巧有禁貿易相需取其常供時其任器百家成林各勤本業四方之貢通變無倦何窮之有乎夷吾吕公每作寶龜神器以斂重發輕事雖雜伯於子母相權義亦有取因之以收兩府之職致飭化之效丱角楮幣一一相資何獨農末為然乎仍朴云此亦太平有道周官之常談施於今日恐未能爾經云有財此有用不云有用此有財也某云人與天地此財各自無盡用著他者他自能來用不著他他自耗散有人來得百工便是財成天地之道輔相萬物之宜柯登南因問周禮一書經以六官緯以三百六十屬厄於秦焰而冬官遂闕有謂其未嘗闕而散見於五官之中者有謂其五官互建而冬官亦未嘗闕者自葉時吳澄皆主此論則河間獻王時豈不知其為全書而故以冬官有闕補以考工歟某云獻王時天下藏書漸出考核極精周禮五篇無司空之屬而冢宰篇有冬官六十屬之文則其為闕文無疑也董仲舒與河間同時每稱冬空也其意亦出於周官竇太后斥轅固云安得司空城旦書而讀之則自秦漢之際巳無復此書想自古者建國之後宗廟社稷城郭宫府井墅廬舍墳墓壇壝大率已定不興大工詩云乃召司空乃召司徒俾立室家此是創始上事如禹平水土而後周公營洛而降物役已定不煩專官井里鄉遂溝澮之官疏瀹修築地官司徒領之已明備其文關市舟車橋梁之務川衡澤虞領之不必盡存其職後世升平滔心易生動有營搆勞民傷財先王豫裁其端使司徒得攝司空之事極為要約何必疑乎柯登南云董子言冬者空也蓋指刑威而言猶霜雪之不至地而己非謂冬官也漢書有鬼薪白粲之文周官皆無之如府舍宫廟歲時修除何得便輟司空之務古云官事不攝豈有司徒可代司空承其利敗者乎某云周官刑徒皆役於司空自搏殺焚棄三赦三宥而外司寇所致辟坐設者皆司空也司空雖專官實與五官承其勞弊盛時五刑既希徭役亦省五官相權理或有之且以司徒申五教之務其制獨詳司空慎興作之防其㫖獨逺如師保救諫不列天官之中縫染絲屨反入冢宰之治天官之治愈細地官之治愈大其義可尋則彼此互取耳登南云胡五峰亦謂冬官事屬之地官蓋以田墅井牧鄉遂之徒皆司徒統之其事則司空任之也又有謂地官遂人以下皆屬冬官者孰為確與某云地官司徒所屬最多自任地而下閭師遺人皆與司空相出入自遂人而下三十五屬皆司空之事秋官司冦自墅廬而下二十屬亦皆地官及司空事也凡任地之務多方九職任民皆列於冢宰八貢任力又載於地師司馬自職方而下有五方三師宗伯自職喪而前有冢人墓士分則皆五官之人合則皆司空之事猶之用刑者五官各自用刑不必皆歸於司冦然司冦自為邦禁五官之刑皆於是誓典耳五官工事歸於司空而司空之工還於各屬故天文室璧之北有土司空井柳之間有㕑酒食天官所以並統㕑人地官所以兼執工役也登南云如此則只設地官不須司空或設司空不須司徒矣某云治地之道重於民事次及市廛大工散於五官除修廟葺宫室閒時而舉小小工作可不煩六卿董之故云司空空者空也藏也因時而命之耳今如於冢宰中取縫染屨羃宗伯中取冢墓巾車司馬中取弓矢甲辨繕槀司冦中取雍萍翨柞庶穴剪茇以成司空之治其去考工能有幾何而須一正卿治之司空之寄百工於五官猶天子之寄飲食服御於冢宰所以蠲邪省用使貢諛導淫者無所騁其豐豫也登南云如此則冢宰之篇所云司空率六十屬者杳然無據吳幼清先生於任土國宅而上加惟王建國二十字及乃立冬官司空二十字不為蛇足耶某云前賢讀書要自詳慎自任地國宅上下要加立春布和諸語乃以遂人諸條足於遺人均人之下此皆各有所取幼清之刪定河間之補記要為周官功臣不必譏也登南云蔡九峰稱周公方條治事之官未及師保之職冬官闕首末未備乃周公未成之書然歟某云秦人既改官儀又廢井田為阡陌發徒驪山窮力阿房取六國之匠營造無極視先王司空猶之枲耳耳周公營洛土圭取景及為明堂世室重屋卜豐鄗宅兆折衷華素皆秦人之所厭觀加以諸儒論難俗主厭聞惡而去籍想當然也然今周官中亦無缺事唯舟船橋梁耳卜宅營墓之法備藏於易有非載記所能盡者山澤二師宜不盡談何足疑乎登南云近項仲昭太史以冬官補亡割天官之司裘獸人地官之均人土均草人稻人山虞澤虞丱人角人囿人封人春官之司服冢人墓大夫巾車司裳夏官之量人司弓矢槀人職方土方刑方山師川師而獨不及秋官何歟某云凡讀書繇人剪裁由巳他别有意不相非也登南云議事亦須停妥耳如今日稱冬官可以相權又說秦人已經紊亂則兩意盩戾以何為準某云周家卜洛以後不專立司空雖無所考然如吉甫築城朔方召伯疆理申謝皆以上卿兼方伯之任未嘗專立司空省官自是防微至意紊亂自是窮極末流何相礙乎且如尚寶太醫光祿宫正女御之皆隸於天官太僕鴻臚之皆隸於司馬行人之隸於司冦世皆無議何獨於司空地官而疑之吳幼清亦謂司徒掌邦教不宜專以任土為事然而恆産恆心不欲民明其義亦難言也登南云如三公論道及輔弼疑丞史祝之制在諸書中種種不同周官缺而不稱獨以師保諫救隸於小司徒何其微歟某云周家故府典籍甚多如逸周書中自有周官職方及戴記所存明堂位王制玉藻郊特牲月令皆各自成書彼此互見非萃衆家以成一部也周官亦是一書與戴記檀弓夏正都是典要法籍所稽耳何必定為周官姬公所作成周致治之書乎登南云鄭康成實主此義嘉靖中嘗命棘闈策士矣何得與戴記齊觀某云漢人之習爾雅唐人之稱孝經皆取裁於當寧布號於學宫士子讀書取其精核如食魚有骨噉果香辣者又何足疑登南云如五官多竒字義在字形考工多竒字形在字義此何所取某云某亦粗讀讀過自見柯威公又問禮器云魯人有事於上帝必先有事於頖宫則魯之有郊審矣記稱成王以周公有大勳勞故命魯公以天子之禮樂又孟春乘大輅載􅋃韣建旗章祀帝於郊配以后稷儼然以人臣用天子之禮樂故曰成王之賜伯禽之受皆非也楊升菴郊禘辨謂非成王伯禽之為春秋書禘於莊公謂禘之僭始於閔公書四卜郊謂郊之僭始於僖公魯閟宫之三章只言成王命伯禽以爵土耳莊公之子以下美僖公郊祀之事未見出於成王也孔子春秋書郊者九始僖終哀使隱桓莊閔之世有郊奚為不書其非成王所賜明矣孔子謂言偃曰魯之郊禘非禮也周公其衰矣然則郊禘果非周公所受不知誰授僖公者某云當僖公時王室多難齊晉始霸惠王以子頽出居襄王以叔帶播越桓文左右匡襄其間楚之僭命者再世矣周家尚惜鼎隧之請閔僖茍且纘其亂緒何事輒請郊禘之大違霸主之命干先王之憲乎蓋郊禘之禮白牡用商騂剛用周尊罍之制參用三代皆成王所康周公者不宜用於羣公之廟耳閔公二年夏五月乙酉吉禘于莊公言吉禘者猶言吉月初用禘于莊公告即位且創見也故吉之僖公三十一年夏四月四卜郊不從乃免牲猶三望凡春秋所書郊皆以卜不從乃書之非為有郊輒書之也自惠公以前伯禽以下又十二公所卜郊而從不從者多矣至僖公四卜郊不從乃書之耳豈龍旗承祀六轡耳耳者顧為免牲三望而頌乎是時霸主盡沒王室久衰猶幸有魯稱秉禮之國歲時禴禘秉其遺文未足非也宣公乙卯匡王在殯卜郊牛傷再卜而死戎楚觀兵大為衰兆成公丁丑定王之喪未三年鼷鼠再食牛角吳始內侵庚辰五卜郊不從成公見止於晉遂為陵替之始襄公乙未夏四月三卜郊不從魯始城費己亥夏四月四卜郊不從魯始作三軍定公丙午哀公丁未鼷鼠食牛猶不輟郊衰絰之間情文蕩然宗國之望於是又衰矣故春秋之義不書事應而考異見郵可以類起觀其特書皆非常事非謂魯初不郊每郊輒有不從之卜也然則夏郊秋嘗皆為魯之常典莊公之子春秋匪懈特頌魯僖者直以閟宫新飭歸美僖公或謂史克及公子魚之舊文仲尼因之以存巨典非謂春秋致貶而魯頌留褒也威公又問然則魯頌閟宫特叙姜嫄將毋以姜嫄配天以后稷主禘歟某云姜嫄只是叙述以為周家之始未必特為姜嫄立廟何况郊禘乎威公云記稱閟宫為姜嫄立廟或祀后稷而稱姜嫄耳諸侯不祖天子而祖其所從出者每於七廟之外别為立宫如竹書稱周立髙圉之廟魯立煬公之宫是也某云如此則祀太姒而祖周公己有女主司晨之嫌何况荒洪俶儻之說乎大約叙述往事則神明共推思齊之雅與閟宫之頌風會參差隆汙可覩矣黃率中又問隂陽摩蕩便有害氣胡五峰云觀隂陽之消息則知聖人之進退如消息則得時成功之說耳如害氣則陽有陽九隂有百六班固漢書以為其說本於仲尼仲尼十翼未嘗說出此事王弇州以上元九章推之無一合者堯湯水旱差近其候過此則不能盡齊矣且所謂陽厄不必皆旱隂厄不必皆水亦有聖人明盛而當兩厄之年者何歟某云此事已詳著之易圖以非要切未嘗講論耳班固據緯書積㑹以三百四歲為德運七百六十歲為代軌千五百二十歲為天地出符四千五百六十歲為七精反初當德運之窮代軌出符間有陽九百六如自周成王甲午至秦政十年八百七十年先百有六年代軌為周顯王草六年王致伯命于秦之歲退其九年為秦政元年是陽九百六之年也今以三易推之知其不然者凡卦九變四千九十六以六乘之為二萬四千五百七十六以氣朔約之得六十七年餘一百六日以日甲約之得六十八年餘九十六日凡卦氣交除皆在此㑹以三四九六乘之而得災歲雖與仲尼災歲之說不同而揆之於易其符契一也易六十四卦皆以先王君子禮樂刑政為度致治弭亂端不在此必欲豫處禍敗以修救持傾但須明其意義舉大象而行之推度之說不足云也林朋䕫因問神以知來知以藏往尼父知損益於百世姬公𢾗夏殷於歷年皆三才如鏡古今一揆如以藏往之事即為知來則上元以來幾千百歲繇後泝前豈能懸合夫子稱文獻不足足則能徵不過亦文質通變上事耳豈尚有神知不測燭照百世者乎某云如三綱五常文質三統何消文獻才有證明夫子所欲言者定是當世所不能言之事即如舊史所藏亦不消夫子發此浩歎耳朋䕫云即如三易所識易詩春秋皆是說禮禮即是厯將謂是德運所係抑是鍾律度量所生抑是經緯天地表章隂陽的道理乎某云現說都是但無能徵者耳朋䕫云現有許多文獻如何又說無徵某云成周去夏殷不逺人懷古獲家有來修夫子尚歎不足何况三代而後朋䕫云夫子刪述六經便是千古不刋之文獻從此藏往從此知來何患不足但如三易所云詩道一書道六春秋道四而易終始之此皆難解如從四經上看天道人道何從徵證得來某云此皆須明天道後以人事推之自然洞朗今讀書只說物理何暇及此朋䕫云天道人事自相表裏五經都是此說但如三代厯律損益相生年數延促如指諸掌譬如夫子定符豫知秦劉禪代之事此是藏往所通抑是知來𤣥悟某云只是此事往過來續藏既無量知亦無量寒暑晝夜只是一部春秋古人常問何物最益人神智云但有讀書耳林非著云晉則不敢為渺論但問晦翁以審幾二字重注慎獨丘文莊遂以審幾微為謹理欲之初分晉思審字終不如慎字慎字是戒懼審字是察别獨知中間再無錯路只常戒懼神明便生有何差途開此岐徑某云非著看得細卲堯夫云思慮未起鬼神莫知不繇乎我更繇乎誰此正是慎獨要語如審理欲之初分便搬泥過水也然如獨中幾微萌動正要審察周濂溪所謂幾分善惡者也些子不善亦玷著善體只為審察不精使獨知錯過嘗云慎者聖賢所以致精獨者聖賢所以致一語雖分拆意實完成非著云易稱動之微吉之先見者也此吉字已是明白程子又加一凶字如獨中只是一理又加一欲字畢竟於性體上看不分明某云吾儒再不要直說性體吉凶悔吝皆生於動加一凶字正自明白獨中有理便有欲加一欲字才使人警省如說空山無虎何以獨行崖谷毛管俱寒非著又云喜怒哀樂中節處謂之中和中節只是合於天理如合天理而不順於人情聖人亦不違道干譽大禹之格有苗仲尼之誅正卯亦有寬嚴互用者後來情恕理遣之說恐是清談之祖以此調人耳如何可治平天下某云此種學問不自輔嗣作祖蓋自顔子若無若虛來顔子一生學力只在過怒兩字見到不遷不二漸到中和見到中和猶未能不遷不二也非著云中和已是極際如何未到不遷不二處某云中和是公衆㕔房不遷不二是自家安身跕足處各家安竈莫占堂心柯魯生因問前日下學上達之說略講不盡今日再問此義尚有何說某云兄試舉似魯生云晦翁開章訓學為覺後覺之效先覺可謂效時是學覺時是達不某云如此只說得學達說不得下學上達魯生云王龍溪謂口之可言力之可致心思之可及雖至精微皆下學事口所不能言力所不能致心思所不能及皆謂之上達石居引天德王道隂陽迭運莫知其神為證龍溪以為未切果是如何某云他們嘗自夢說口可言便有不可言處力可致便有不可致處心思可及便有不可及處其可處皆人其不可處皆天也如此只說得上下亦如何說得學達如云口所可言以達於不可言力所可致以達於不可致心思所可及以達於不可及如此則逾𤣥逾微了如何說真切學問魯生云如此則如何下手某云某亦不知兄試舉似魯生云如子臣弟友文行忠信實實落落不求人知雖聖賢天地亦是這個學問這個道理某云孝子忠臣恭弟信友才踐履過何人不知此豈靠天學問且此數條如人家喫飯豈要告罪又豈有太羮𤣥酒時常享天說人莫知何事又何要天知來繇魯生云如此則舊日講貫猶作暗修是何等學問某云顔子有何等學問季康子問好學夫子只說顔回說顔回只說不遷不二自家說學問只說不怨不尤人有一種怨尤黏帶些子雖周孔學問與狠打并毒人有學問不黏帶些子怨尤雖日用灑掃與天地同寬此處是學此處是達此處最實最平此處頂頭無際此處實信得過便云知我者其天乎柯魯生云吾門講說常有前後異辭者今日說學達與前日頓别又如前日說篤信好學章間許善道之說嚮來品諸文藝只以篤守為主何耶某云某素寡特直以篤守為主猶寒士持齊成何學道如論聖人語意只是靠守者多學而不守何處討善道出來看他危亂不入無道則隱著兩恥也精神皆在退藏一邊說有道則見有道貧賤只是帶言耳樂行憂違確不可拔如此人豈在肉邊揀菜魯生云今日乃知吾門講說原無異同榕壇問業卷十三
