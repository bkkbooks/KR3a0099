body:
  text: 榕壇問業十八卷儒家類提要臣等謹案榕壇問業十八卷明黃道周撰道周有易象正已著録此編乃其家居時講學之語考道周自崇禎壬申削籍歸石養山守墓是年講學于浦之北山越二年甲戌夏始入郡就芝山之正學堂為講舍至乙亥冬以原官召用始罷講故此書起甲戌五月至乙亥仲冬者凡十六卷其十七卷有云丙子春者則道周已罷講還家取他方友人書牘問難之詞當時未即答者續為發明綴入其十八卷則同年蔣德璟所問之詞道周屬諸弟子代答間亦𠂻以已説併以德璟原問十八條附録于後其書每卷分載所編弟子姓氏卷之前後道周復各綴以題識其大旨以致知明善為宗大約宗法考亭而益加駿厲書內所論凡天文地志經史百家之説無不隨問闡發不盡作性命空談蓋由其博洽精研靡所不究故能有叩必竭響應不窮雖詞意間涉深奧而指歸可識不同于禪門機括幻窅無歸明人語録每以陳因迂腐為博學之士所輕道周此編可以一雪斯誚矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d890cdcd545835b79e323c4fafd61b68bf13ef5a1a85cb4a09294c521a5fc265
